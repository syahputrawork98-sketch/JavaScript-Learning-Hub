<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">GROUP BY CLASSIFIER (ES2024)</text>

  <!-- Mixed Input -->
  <circle cx="100" cy="150" r="15" fill="#f43f5e"/>
  <rect x="85" y="190" width="30" height="30" fill="#38bdf8"/>
  <circle cx="100" cy="250" r="15" fill="#f43f5e"/>
  <rect x="85" y="290" width="30" height="30" fill="#38bdf8"/>

  <!-- The Classifier -->
  <g transform="translate(300, 150)">
    <rect width="200" height="150" fill="#1e293b" stroke="#fbbf24" stroke-width="4" rx="20"/>
    <text x="100" y="85" fill="#fbbf24" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">GROUP BY</text>
  </g>

  <!-- Sorted Output Bin 1 -->
  <rect x="550" y="100" width="200" height="80" fill="#1e293b" stroke="#f43f5e" rx="10"/>
  <circle cx="600" cy="140" r="10" fill="#f43f5e"/>
  <circle cx="630" cy="140" r="10" fill="#f43f5e"/>
  <text x="700" y="145" fill="#f43f5e" font-family="Arial" font-size="12" font-weight="bold">GROUP A</text>

  <!-- Sorted Output Bin 2 -->
  <rect x="550" y="220" width="200" height="80" fill="#1e293b" stroke="#38bdf8" rx="10"/>
  <rect x="590" y="245" width="20" height="20" fill="#38bdf8"/>
  <rect x="620" y="245" width="20" height="20" fill="#38bdf8"/>
  <text x="700" y="265" fill="#38bdf8" font-family="Arial" font-size="12" font-weight="bold">GROUP B</text>

  <!-- Flow Lines -->
  <path d="M 150 225 L 300 225" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-group)"/>
  <path d="M 500 200 L 550 140" stroke="#f43f5e" stroke-width="2"/>
  <path d="M 500 250 L 550 260" stroke="#38bdf8" stroke-width="2"/>

  <defs>
    <marker id="arrow-group" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
</svg>
