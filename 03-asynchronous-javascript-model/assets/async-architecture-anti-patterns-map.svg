<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Async Architecture and Anti-Patterns Map</title>
  <desc id="desc">Map for healthy async architecture decisions and common anti-patterns.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fffdf7"/><stop offset="100%" stop-color="#eef7ff"/></linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.15"/></filter>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><polygon points="0 0,10 3,0 6" fill="#1f2937"/></marker>
    <style>.h{font:700 30px 'Segoe UI',sans-serif;fill:#fff}.s{font:500 16px 'Segoe UI',sans-serif;fill:#dbeafe}.t{font:700 19px 'Segoe UI',sans-serif;fill:#0f172a}.p{font:500 14px 'Segoe UI',sans-serif;fill:#334155}.card{fill:#fff;stroke:#1e293b;stroke-width:2;rx:14;filter:url(#s)}.ok{fill:#dcfce7;stroke:#166534;stroke-width:2;rx:12}.warn{fill:#fee2e2;stroke:#991b1b;stroke-width:2;rx:12}.flow{stroke:#1f2937;stroke-width:3;fill:none;marker-end:url(#a)}</style>
  </defs>
  <rect width="1280" height="860" fill="url(#bg)"/>
  <rect x="48" y="32" width="1184" height="108" rx="16" fill="url(#hdr)" filter="url(#s)"/>
  <text class="h" x="82" y="76">Async Architecture + Anti-Patterns ⚖️</text>
  <text class="s" x="82" y="104">Desain flow async: ownership, lifecycle, concurrency limit, dan cleanup.</text>

  <rect class="ok" x="80" y="190" width="560" height="360"/>
  <text class="t" x="104" y="228">Healthy Architecture ✅</text>
  <text class="p" x="104" y="254">- owner flow jelas (siapa start/wait/cleanup)</text>
  <text class="p" x="104" y="278">- timeout, retry, fallback didefinisikan</text>
  <text class="p" x="104" y="302">- bounded concurrency</text>
  <text class="p" x="104" y="326">- error path setara dengan success path</text>
  <text class="p" x="104" y="350">- observability: traceId + structured log</text>
  <text class="p" x="104" y="390">Outcome:</text>
  <text class="p" x="128" y="414">- stabil throughput</text>
  <text class="p" x="128" y="438">- lebih mudah debug incident</text>
  <text class="p" x="128" y="462">- failure terkontrol</text>

  <rect class="warn" x="680" y="190" width="520" height="360"/>
  <text class="t" x="704" y="228">Common Anti-Patterns ⚠️</text>
  <text class="p" x="704" y="254">- fire-and-forget tanpa catch</text>
  <text class="p" x="704" y="278">- Promise.all raksasa tanpa limit</text>
  <text class="p" x="704" y="302">- retry agresif tanpa backoff</text>
  <text class="p" x="704" y="326">- cleanup hanya di jalur sukses</text>
  <text class="p" x="704" y="350">- log acak tanpa correlation id</text>
  <text class="p" x="704" y="390">Dampak:</text>
  <text class="p" x="728" y="414">- unhandled rejection</text>
  <text class="p" x="728" y="438">- request storm / thundering herd</text>
  <text class="p" x="728" y="462">- incident susah ditelusuri</text>

  <rect class="card" x="80" y="590" width="1120" height="210"/>
  <text class="t" x="104" y="628">Decision Checklist 🧭</text>
  <text class="p" x="104" y="654">1. Apa owner dari flow async ini?</text>
  <text class="p" x="104" y="678">2. Bagaimana timeout/retry/cancel didefinisikan?</text>
  <text class="p" x="104" y="702">3. Apakah concurrency dibatasi?</text>
  <text class="p" x="104" y="726">4. Apakah error path punya cleanup dan logging setara success path?</text>
  <text class="p" x="104" y="750">5. Bagaimana trace incident dari start hingga fail/success?</text>

  <path class="flow" d="M640 372 L680 372"/><path class="flow" d="M360 550 L360 590"/><path class="flow" d="M940 550 L940 590"/>
</svg>

