<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">Async Error Handling Layers</title>
  <desc id="desc">Layered model for local catch, rethrow strategy, fallback strategy and global unhandled rejection safety net.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8f8"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="170%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <style>
      .hero{fill:url(#hero);rx:18;filter:url(#shadow)}
      .panel{fill:#ffffff;stroke:#334155;stroke-width:2;rx:14;filter:url(#shadow)}
      .error{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:12;filter:url(#shadow)}
      .safe{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:12;filter:url(#shadow)}
      .warn{fill:#ffedd5;stroke:#c2410c;stroke-width:2;rx:12;filter:url(#shadow)}
      .title{font:700 33px 'Segoe UI','Trebuchet MS',sans-serif;fill:#ffffff}
      .subtitle{font:500 17px 'Segoe UI','Trebuchet MS',sans-serif;fill:#dbeafe}
      .h{font:700 20px 'Segoe UI','Trebuchet MS',sans-serif;fill:#0f172a}
      .p{font:500 15px 'Segoe UI','Trebuchet MS',sans-serif;fill:#334155}
      .small{font:600 13px 'Segoe UI','Trebuchet MS',sans-serif;fill:#1f2937}
    </style>
  </defs>

  <rect width="1280" height="900" fill="url(#bg)"/>

  <rect class="hero" x="48" y="32" width="1184" height="122"/>
  <text class="title" x="82" y="82">Async Error Handling - Layered Strategy</text>
  <text class="subtitle" x="82" y="112">Jangan hanya catch; pilih tindakan yang tepat untuk tiap level.</text>

  <rect class="error" x="70" y="190" width="1140" height="110"/>
  <text class="h" x="96" y="228">Layer 1: Local Catch</text>
  <text class="p" x="96" y="254">Tangkap error dekat sumber, tambah context log (endpoint, id, action).</text>

  <rect class="warn" x="70" y="320" width="560" height="238"/>
  <text class="h" x="96" y="358">Layer 2A: Rethrow</text>
  <text class="p" x="96" y="384">Jika level ini tidak bisa recovery, lempar ulang.</text>
  <text class="small" x="96" y="412">Tujuan: caller lebih atas yang menentukan keputusan bisnis.</text>
  <text class="small" x="96" y="438">Hindari swallow error tanpa jejak.</text>

  <rect class="safe" x="650" y="320" width="560" height="238"/>
  <text class="h" x="676" y="358">Layer 2B: Fallback</text>
  <text class="p" x="676" y="384">Jika bisa recovery lokal, kembalikan nilai cadangan terstruktur.</text>
  <text class="small" x="676" y="412">Contoh: { ok:false, reason:'PROFILE_UNAVAILABLE' }.</text>
  <text class="small" x="676" y="438">UI tetap responsif sambil menampilkan status gagal.</text>

  <rect class="panel" x="70" y="584" width="1140" height="258"/>
  <text class="h" x="96" y="622">Layer 3: Global Safety Net</text>
  <text class="p" x="96" y="648">Pasang handler global unhandled rejection untuk observability terakhir.</text>
  <text class="small" x="116" y="678">Checklist: log context, tentukan fallback vs rethrow, dan uji jalur gagal seperti jalur sukses.</text>
  <text class="small" x="116" y="704">Aturan praktis: tidak ada rejection yang dibiarkan tanpa owner.</text>
</svg>
