<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Event Loop Learning Flow</title>
  <desc id="desc">Structured event loop learning flow with stack, APIs, microtask and task queue plus tick loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffef7"/>
      <stop offset="100%" stop-color="#edf5ff"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="170%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#1f2937"/>
    </marker>
    <style>
      .hero{fill:url(#hero);rx:18;filter:url(#shadow)}
      .card{fill:#ffffff;stroke:#1e293b;stroke-width:2;rx:14;filter:url(#shadow)}
      .stack{fill:#e0ecff;stroke:#1d4ed8;stroke-width:2;rx:14;filter:url(#shadow)}
      .api{fill:#f2e8ff;stroke:#7e22ce;stroke-width:2;rx:14;filter:url(#shadow)}
      .micro{fill:#ddfce8;stroke:#15803d;stroke-width:2;rx:14;filter:url(#shadow)}
      .task{fill:#fff2cc;stroke:#b45309;stroke-width:2;rx:14;filter:url(#shadow)}
      .title{font:700 33px 'Segoe UI','Trebuchet MS',sans-serif;fill:#ffffff}
      .subtitle{font:500 17px 'Segoe UI','Trebuchet MS',sans-serif;fill:#dbeafe}
      .h{font:700 20px 'Segoe UI','Trebuchet MS',sans-serif;fill:#0f172a}
      .p{font:500 15px 'Segoe UI','Trebuchet MS',sans-serif;fill:#334155}
      .small{font:600 13px 'Segoe UI','Trebuchet MS',sans-serif;fill:#1f2937}
      .arrow{stroke:#1f2937;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1280" height="860" fill="url(#bg)"/>

  <rect class="hero" x="48" y="32" width="1184" height="122"/>
  <text class="title" x="82" y="82">Event Loop Learning Flow - Track 03</text>
  <text class="subtitle" x="82" y="112">Pola baca urutan async: stack selesai -> microtask drain -> task lanjut.</text>

  <rect class="stack" x="70" y="196" width="250" height="158"/>
  <text class="h" x="92" y="236">1. Call Stack</text>
  <text class="p" x="92" y="264">Jalankan kode sinkron</text>
  <text class="p" x="92" y="286">sampai frame habis.</text>

  <rect class="api" x="360" y="196" width="250" height="158"/>
  <text class="h" x="382" y="236">2. Runtime APIs</text>
  <text class="p" x="382" y="264">Timer/I-O menunggu</text>
  <text class="p" x="382" y="286">siap callback.</text>

  <rect class="micro" x="650" y="196" width="250" height="158"/>
  <text class="h" x="672" y="236">3. Microtask Queue</text>
  <text class="p" x="672" y="264">Promise jobs punya</text>
  <text class="p" x="672" y="286">prioritas tertinggi.</text>

  <rect class="task" x="940" y="196" width="250" height="158"/>
  <text class="h" x="962" y="236">4. Task Queue</text>
  <text class="p" x="962" y="264">Timer/event callback</text>
  <text class="p" x="962" y="286">jalan setelah microtask.</text>

  <path class="arrow" d="M320 274 L360 274"/>
  <path class="arrow" d="M610 274 L650 274"/>
  <path class="arrow" d="M900 274 L940 274"/>

  <rect class="card" x="70" y="392" width="1120" height="420"/>
  <text class="h" x="98" y="432">Tick Checklist (Praktis untuk Debug)</text>
  <text class="small" x="118" y="462">1. Pastikan stack kosong sebelum berharap callback async dijalankan.</text>
  <text class="small" x="118" y="488">2. Setelah satu task selesai, runtime wajib menghabiskan microtask queue.</text>
  <text class="small" x="118" y="514">3. Jika microtask terus menambah microtask, task/render bisa tertunda (starvation).</text>
  <text class="small" x="118" y="540">4. Timer 0ms tetap menunggu giliran task queue, bukan dieksekusi instan.</text>

  <rect class="card" x="98" y="574" width="510" height="214"/>
  <text class="h" x="122" y="612">Output Pattern Paling Umum</text>
  <text class="p" x="122" y="640">Sync logs dulu -> Promise logs -> timer logs</text>
  <text class="small" x="122" y="668">Contoh: A, D, C, B</text>

  <rect class="card" x="652" y="574" width="510" height="214"/>
  <text class="h" x="676" y="612">Decision Rule</text>
  <text class="p" x="676" y="640">Jika output tidak sesuai prediksi:</text>
  <text class="small" x="676" y="668">cek apakah masalah ada di stack blocking,</text>
  <text class="small" x="676" y="692">microtask chain, atau salah asumsi queue.</text>
</svg>
