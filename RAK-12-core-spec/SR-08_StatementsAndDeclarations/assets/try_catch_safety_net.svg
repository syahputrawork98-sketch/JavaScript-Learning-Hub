<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">TRY-CATCH SAFETY NET (THE VAULT)</text>

  <!-- The Try Chamber -->
  <g transform="translate(50, 100)">
    <rect width="220" height="250" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="10"/>
    <text x="110" y="30" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">TRY CHAMBER</text>
    <path d="M 50 80 L 170 80" stroke="#38bdf8" stroke-width="2" />
    <path d="M 50 120 L 170 120" stroke="#f43f5e" stroke-width="3" /> <!-- The Bomb -->
    <text x="110" y="145" fill="#f43f5e" font-family="Arial" font-size="10" text-anchor="middle">Potential Malfunction</text>
  </g>

  <!-- The Explosion Flow -->
  <path d="M 270 220 L 330 220" stroke="#f43f5e" stroke-width="3" marker-end="url(#arrow-bomb)"/>

  <!-- The Catch Net -->
  <g transform="translate(330, 200)">
    <path d="M 0 0 L 150 0 L 75 100 Z" fill="#065f46" stroke="#34d399" stroke-width="2"/>
    <text x="75" y="40" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">CATCH NET</text>
    <text x="75" y="60" fill="#a7f3d0" font-family="Arial" font-size="10" text-anchor="middle">Neutralize throw</text>
  </g>

  <!-- The Finally Cleanup -->
  <g transform="translate(550, 100)">
    <rect width="200" height="250" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="2" rx="10"/>
    <text x="100" y="30" fill="#0ea5e9" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">FINALLY VAULT</text>
    <path d="M 40 80 L 160 80 M 40 120 L 160 120 M 40 160 L 160 160" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
    <text x="100" y="230" fill="#bae6fd" font-family="Arial" font-size="11" text-anchor="middle">Always Executes</text>
  </g>

  <!-- Main Flow Path -->
  <path d="M 270 120 L 550 120" stroke="#34d399" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-safe)"/>
  <text x="410" y="110" fill="#34d399" font-family="Arial" font-size="10" text-anchor="middle">Normal Success Path</text>

  <defs>
    <marker id="arrow-bomb" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f43f5e" />
    </marker>
    <marker id="arrow-safe" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
    </marker>
  </defs>

  <text x="400" y="420" fill="#64748b" font-family="Arial" font-size="14" text-anchor="middle">"The security infrastructure prevents accidental Hub shutdown during energy surges"</text>
</svg>
