<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">ABRUPT COMPLETION JUMP (SIGNAL INTERRUPTS)</text>

  <!-- Execution Stack -->
  <g transform="translate(100, 100)">
    <rect width="250" height="300" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="5"/>
    <text x="125" y="30" fill="#94a3b8" font-family="Arial" font-size="14" text-anchor="middle">CURRENT CIRCUIT</text>
    
    <!-- Code Lines -->
    <rect x="25" y="60" width="200" height="30" fill="#334155" rx="3"/>
    <text x="40" y="80" fill="#ffffff" font-family="Courier New" font-size="12">line 1: step_a()</text>
    
    <rect x="25" y="100" width="200" height="30" fill="#991b1b" stroke="#f43f5e" rx="3"/>
    <text x="40" y="120" fill="#ffffff" font-family="Courier New" font-size="12">line 2: return / throw</text>
    <circle cx="210" cy="115" r="8" fill="#f43f5e" /> <!-- Interrupt Point -->

    <rect x="25" y="140" width="200" height="30" fill="#1e293b" stroke="#475569" stroke-dasharray="2,2" rx="3" opacity="0.3"/>
    <text x="40" y="160" fill="#475569" font-family="Courier New" font-size="12">line 3: step_c()</text>
    <text x="125" y="190" fill="#64748b" font-family="Arial" font-size="10" text-anchor="middle">UNREACHABLE_ZONE</text>
  </g>

  <!-- Jump Logic -->
  <path d="M 310 215 L 450 215" stroke="#f43f5e" stroke-width="3" stroke-dasharray="10,5" marker-end="url(#arrow-jump)"/>
  <text x="380" y="200" fill="#f43f5e" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">JUMP!</text>

  <!-- Targets -->
  <g transform="translate(500, 100)">
    <rect width="250" height="300" fill="#1e293b" stroke="#34d399" rx="10"/>
    <text x="125" y="30" fill="#34d399" font-family="Arial" font-size="14" text-anchor="middle">RECOVERY / EXIT</text>
    
    <!-- Catch -->
    <rect x="25" y="60" width="200" height="60" fill="#065f46" rx="5"/>
    <text x="125" y="90" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">CATCH BLOCK</text>
    <text x="125" y="110" fill="#a7f3d0" font-family="Arial" font-size="10" text-anchor="middle">(Neutralize Error)</text>

    <!-- Finally -->
    <rect x="25" y="140" width="200" height="60" fill="#0369a1" rx="5"/>
    <text x="125" y="170" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">FINALLY BLOCK</text>
    <text x="125" y="190" fill="#bae6fd" font-family="Arial" font-size="10" text-anchor="middle">(Mandatory Cleanup)</text>
    
    <!-- Caller -->
    <rect x="25" y="220" width="200" height="60" fill="#1e293b" stroke="#94a3b8" rx="5"/>
    <text x="125" y="250" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">EXTERNAL CALLER</text>
  </g>

  <defs>
    <marker id="arrow-jump" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f43f5e" />
    </marker>
  </defs>

  <text x="400" y="420" fill="#64748b" font-family="Arial" font-size="14" text-anchor="middle">"Abrupt completions force the signal to bypass standard circuitry"</text>
</svg>
