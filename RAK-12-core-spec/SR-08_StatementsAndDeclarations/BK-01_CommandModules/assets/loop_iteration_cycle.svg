<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">ITERATION CYCLE MECHANISM (THE LOOP ENGINE)</text>

  <!-- Initialization -->
  <rect x="50" y="80" width="160" height="50" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="5"/>
  <text x="130" y="110" fill="#38bdf8" font-family="Arial" font-size="12" text-anchor="middle">INITIALIZE (let i=0)</text>

  <!-- Condition Gate -->
  <polygon points="400,80 500,130 400,180 300,130" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="400" y="135" fill="#fbbf24" font-family="Arial" font-size="12" text-anchor="middle">CONDITION (i &lt; N)</text>

  <!-- Loop Body -->
  <rect x="300" y="250" width="200" height="80" fill="#1e293b" stroke="#34d399" stroke-width="2" rx="10"/>
  <text x="400" y="285" fill="#34d399" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">EXECUTE UNIT</text>
  <text x="400" y="310" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">(The Statements)</text>

  <!-- Update Logic -->
  <rect x="550" y="250" width="160" height="50" fill="#1e293b" stroke="#a855f7" stroke-width="2" rx="5"/>
  <text x="630" y="280" fill="#a855f7" font-family="Arial" font-size="12" text-anchor="middle">UPDATE (i++)</text>

  <!-- Flows -->
  <!-- Exit Flow -->
  <path d="M 500 130 L 650 130 L 650 180" stroke="#f43f5e" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-exit)"/>
  <text x="600" y="120" fill="#f43f5e" font-family="Arial" font-size="10" text-anchor="middle">FALSE (Exit)</text>

  <!-- Initial to Condition -->
  <path d="M 210 105 L 300 105" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow-loop)"/>
  
  <!-- Condition to Execution -->
  <path d="M 400 180 L 400 250" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-loop)"/>
  <text x="420" y="215" fill="#34d399" font-family="Arial" font-size="10">TRUE</text>

  <!-- Execution to Update -->
  <path d="M 500 290 L 550 280" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-loop)"/>

  <!-- Update back to Condition -->
  <path d="M 630 250 C 630 180 550 130 500 130" fill="none" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow-loop)"/>

  <defs>
    <marker id="arrow-loop" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" />
    </marker>
    <marker id="arrow-exit" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f43f5e" />
    </marker>
  </defs>

  <text x="400" y="420" fill="#64748b" font-family="Arial" font-size="14" text-anchor="middle">"Repeating the energy cycle until the safety sensor breaks the circuit"</text>
</svg>
