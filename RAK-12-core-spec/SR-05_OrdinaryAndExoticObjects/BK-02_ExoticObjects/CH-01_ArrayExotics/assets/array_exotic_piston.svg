<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">ARRAY LENGTH PISTON (EXOTIC HYDRAULICS)</text>

  <!-- Array Pipe -->
  <rect x="100" y="150" width="600" height="100" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="5"/>
  
  <!-- Index Cells -->
  <g fill="#334155" stroke="#475569">
    <rect x="110" y="160" width="80" height="80" rx="5"/>
    <rect x="200" y="160" width="80" height="80" rx="5"/>
    <rect x="290" y="160" width="80" height="80" rx="5"/>
    <text x="150" y="205" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">Index 0</text>
    <text x="240" y="205" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">Index 1</text>
    <text x="330" y="205" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">Index 2</text>
  </g>

  <!-- The Piston Head -->
  <g transform="translate(380, 140)">
    <rect width="20" height="120" fill="#f43f5e"/>
    <rect x="20" y="50" width="100" height="20" fill="#f43f5e"/>
    <text x="70" y="40" fill="#f43f5e" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">LENGTH PISTON</text>
    <path d="M 120 60 L 180 60" stroke="#f43f5e" stroke-width="4" marker-end="url(#arrow-pist)"/>
  </g>

  <!-- Auto-Sync Logic -->
  <path d="M 150 250 Q 150 350 380 350" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="265" y="340" fill="#38bdf8" font-family="Arial" font-size="12" text-anchor="middle">Setting Index triggers [[DefineOwnProperty]]</text>
  
  <rect x="380" y="330" width="200" height="40" fill="#0f172a" stroke="#38bdf8" rx="5"/>
  <text x="480" y="355" fill="#38bdf8" font-family="Arial" font-size="12" text-anchor="middle">Synchronizing Length...</text>

  <defs>
    <marker id="arrow-pist" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f43f5e" />
    </marker>
  </defs>

  <text x="400" y="390" fill="#64748b" font-family="Arial" font-size="14" text-anchor="middle">"Exotic behavior: Properti 'length' mendengarkan setiap perubahan indeks"</text>
</svg>
