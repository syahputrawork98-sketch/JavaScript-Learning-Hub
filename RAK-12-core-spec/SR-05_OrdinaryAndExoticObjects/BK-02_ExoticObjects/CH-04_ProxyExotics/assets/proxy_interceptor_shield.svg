<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">PROXY INTERCEPTOR SHIELD (TRAP MECHANISM)</text>

  <!-- Target Object (The Core) -->
  <circle cx="200" cy="220" r="60" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="200" y="225" fill="#94a3b8" font-family="Arial" font-size="14" text-anchor="middle">TARGET UNIT</text>

  <!-- The Proxy Shield (Translucent Wrap) -->
  <circle cx="200" cy="220" r="100" fill="rgba(56, 189, 248, 0.1)" stroke="#38bdf8" stroke-width="4" stroke-dasharray="10,5"/>
  <text x="200" y="105" fill="#38bdf8" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">PROXY SHIELD</text>

  <!-- The Handler (The Logic) -->
  <rect x="450" y="120" width="250" height="200" fill="#0f172a" stroke="#fbbf24" stroke-width="2" rx="10"/>
  <text x="575" y="150" fill="#fbbf24" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">HANDLER (Traps)</text>
  
  <g fill="#94a3b8" font-family="Courier New" font-size="11">
    <text x="470" y="180">get(target, prop) { ... }</text>
    <text x="470" y="210">set(target, prop) { ... }</text>
    <text x="470" y="240">has(target, prop) { ... }</text>
  </g>

  <!-- Interception Flow -->
  <path d="M 50 220 L 100 220" stroke="#34d399" stroke-width="3" marker-end="url(#arrow-shield)"/>
  <text x="75" y="210" fill="#34d399" font-family="Arial" font-size="12" text-anchor="middle">[[Get]]</text>

  <path d="M 200 120 L 450 180" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,2"/>
  <text x="320" y="140" fill="#fbbf24" font-family="Arial" font-size="11" transform="rotate(-15, 320, 140)">Redirect to Trap</text>

  <defs>
    <marker id="arrow-shield" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
    </marker>
  </defs>

  <text x="400" y="380" fill="#64748b" font-family="Arial" font-size="14" text-anchor="middle">"Every internal signal must pass through the Shield's validation trap"</text>
</svg>
