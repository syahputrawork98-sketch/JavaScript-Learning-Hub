<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">NUMERIC LITERAL SCHEMATIC (THE POWER LOADS)</text>

  <!-- Input Scanners -->
  <g transform="translate(50, 80)">
    <rect width="180" height="280" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="10"/>
    <text x="90" y="30" fill="#94a3b8" font-family="Arial" font-size="14" text-anchor="middle">INTAKE SCANNER</text>
    
    <!-- Prefix Detector -->
    <rect x="20" y="60" width="140" height="40" fill="#0f172a" stroke="#38bdf8" rx="5"/>
    <text x="90" y="85" fill="#38bdf8" font-family="Courier New" font-size="12" text-anchor="middle">0x / 0b / 0o</text>
    <text x="90" y="115" fill="#64748b" font-family="Arial" font-size="10" text-anchor="middle">Base Detector</text>

    <!-- Suffix Detector -->
    <rect x="20" y="150" width="140" height="40" fill="#0f172a" stroke="#f43f5e" rx="5"/>
    <text x="90" y="175" fill="#f43f5e" font-family="Courier New" font-size="12" text-anchor="middle">...n</text>
    <text x="90" y="205" fill="#64748b" font-family="Arial" font-size="10" text-anchor="middle">BigInt (Industrial)</text>

    <!-- Separator Stripper -->
    <rect x="20" y="230" width="140" height="30" fill="#334155" rx="5"/>
    <text x="90" y="250" fill="#ffffff" font-family="Courier New" font-size="12" text-anchor="middle">"_" -> REMOVE</text>
  </g>

  <!-- Logic Gate -->
  <path d="M 230 220 L 300 220" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow-num)"/>

  <!-- Processors -->
  <rect x="300" y="150" width="450" height="140" fill="#1e293b" stroke="#34d399" rx="10"/>
  <text x="525" y="180" fill="#34d399" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">LITERAL EXTRACTION ENGINE</text>
  
  <g fill="#94a3b8" font-family="Arial" font-size="12">
    <text x="330" y="220">1. Cleanse Separators (1_000 -> 1000)</text>
    <text x="330" y="245">2. Convert based on Prefix (Hex/Oct/Bin)</text>
    <text x="330" y="270">3. Final Data: IEEE 754 Float OR BigInt</text>
  </g>

  <defs>
    <marker id="arrow-num" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8" />
    </marker>
  </defs>

  <text x="400" y="380" fill="#64748b" font-family="Arial" font-size="14" text-anchor="middle">"Converting raw literal signals into internal energy values"</text>
</svg>
