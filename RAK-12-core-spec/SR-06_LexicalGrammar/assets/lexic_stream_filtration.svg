<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">TOKEN STREAM FILTRATION (THE INTAKE)</text>

  <!-- Input Source Text -->
  <rect x="50" y="80" width="200" height="100" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="5"/>
  <text x="150" y="110" fill="#f8fafc" font-family="Courier New" font-size="12" text-anchor="middle">const x = 10;</text>
  <text x="150" y="130" fill="#64748b" font-family="Arial" font-size="10" text-anchor="middle">// Source Text</text>

  <!-- Flow Arrow -->
  <path d="M 250 130 L 300 130" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow-head)"/>

  <!-- The Filter Chamber -->
  <rect x="300" y="80" width="200" height="300" fill="#0f172a" stroke="#38bdf8" stroke-width="2" rx="10"/>
  <text x="400" y="110" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">SCANNER UNIT</text>
  
  <!-- Filter Layers -->
  <g transform="translate(310, 140)">
    <rect width="180" height="30" fill="#334155" rx="5"/>
    <text x="90" y="20" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">1. Unicode Normalization</text>
    
    <rect y="40" width="180" height="30" fill="#334155" rx="5"/>
    <text x="90" y="60" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">2. WhiteSpace Stripping</text>
    
    <rect y="80" width="180" height="30" fill="#1e293b" stroke="#f43f5e" rx="5"/>
    <text x="90" y="100" fill="#f43f5e" font-family="Arial" font-size="10" text-anchor="middle">3. Comment Removal</text>
  </g>

  <!-- Output Tokens -->
  <g transform="translate(550, 80)">
    <rect width="200" height="300" fill="#1e293b" stroke="#34d399" stroke-width="2" rx="5"/>
    <text x="100" y="30" fill="#34d399" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">CLEAN TOKENS</text>
    
    <rect x="20" y="60" width="160" height="30" fill="#065f46" rx="5"/>
    <text x="100" y="80" fill="#ffffff" font-family="Courier New" font-size="12" text-anchor="middle">KEYWORD: const</text>
    
    <rect x="20" y="100" width="160" height="30" fill="#065f46" rx="5"/>
    <text x="100" y="120" fill="#ffffff" font-family="Courier New" font-size="12" text-anchor="middle">ID: x</text>
    
    <rect x="20" y="140" width="160" height="30" fill="#065f46" rx="5"/>
    <text x="100" y="160" fill="#ffffff" font-family="Courier New" font-size="12" text-anchor="middle">PUNC: =</text>
  </g>

  <!-- Defs for arrows -->
  <defs>
    <marker id="arrow-head" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8" />
    </marker>
  </defs>

  <text x="400" y="420" fill="#64748b" font-family="Arial" font-size="14" text-anchor="middle">"Raw energy is filtered and labeled before entering the Parser Reaktor"</text>
</svg>
