<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">ASI SAFETY MECHANISM (AUTOMATIC SWITCHES)</text>

  <!-- Code Blocks -->
  <g transform="translate(100, 100)">
    <rect width="250" height="150" fill="#1e293b" stroke="#38bdf8" rx="10"/>
    <text x="20" y="40" fill="#ffffff" font-family="Courier New" font-size="14">return</text>
    <text x="20" y="70" fill="#f43f5e" font-family="Courier New" font-size="14">100</text>
    <text x="125" y="130" fill="#64748b" font-family="Arial" font-size="10" text-anchor="middle">"Restricted Production" Trap</text>
    
    <!-- ASI Intervention -->
    <rect x="70" y="25" width="40" height="25" fill="#f59e0b" rx="3" opacity="0.8"/>
    <text x="90" y="43" fill="#000" font-family="Courier New" font-size="16" font-weight="bold" text-anchor="middle">;</text>
  </g>

  <!-- Flow Explanation -->
  <path d="M 380 175 L 450 175" stroke="#f59e0b" stroke-width="4" marker-end="url(#arrow-asi)"/>
  <text x="415" y="155" fill="#f59e0b" font-family="Arial" font-size="12" text-anchor="middle">Intervention</text>

  <!-- Logic Reactor -->
  <rect x="450" y="100" width="300" height="300" fill="#0f172a" stroke="#f59e0b" stroke-width="2" rx="10"/>
  <text x="600" y="130" fill="#f59e0b" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">ASI RULES ENGINE</text>
  
  <g fill="#94a3b8" font-family="Arial" font-size="11">
    <text x="470" y="170">Rule 1: Grammar Syntax Error?</text>
    <text x="500" y="190" fill="#34d399">-> Insert ; if on new line</text>
    
    <text x="470" y="230">Rule 2: End of Input Stream?</text>
    <text x="500" y="250" fill="#34d399">-> Insert ; automatically</text>
    
    <text x="470" y="290">Rule 3: restricted 'return' / LF?</text>
    <text x="500" y="310" fill="#f43f5e">-> FORCE ; (Potential Bug!)</text>
  </g>

  <defs>
    <marker id="arrow-asi" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
  </defs>

  <text x="400" y="450" fill="#64748b" font-family="Arial" font-size="14" text-anchor="middle">"The Hub engine fixes your broken circuits, but sometimes it chooses wrongly"</text>
</svg>
