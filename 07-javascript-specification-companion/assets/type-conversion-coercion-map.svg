<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs><style>.t{font:700 34px 'Segoe UI',sans-serif;fill:#111827}.s{font:500 18px 'Segoe UI',sans-serif;fill:#374151}.b{fill:#fff;stroke:#16a34a;stroke-width:2;rx:12}.h{font:700 17px 'Segoe UI',sans-serif;fill:#14532d}.p{font:500 14px 'Segoe UI',sans-serif;fill:#1f2937}.a{stroke:#334155;stroke-width:2.5;marker-end:url(#m)}</style><marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#334155"/></marker></defs>
  <rect width="1200" height="760" fill="#f0fdf4"/>
  <text x="50" y="70" class="t">Type Conversion and Coercion Map</text>
  <text x="50" y="102" class="s">Alur umum ketika operator butuh type tertentu</text>
  <rect x="80" y="170" width="250" height="120" class="b"/><text x="100" y="208" class="h">Input Value</text><text x="100" y="236" class="p">primitive / object</text>
  <rect x="390" y="170" width="250" height="120" class="b"/><text x="410" y="208" class="h">ToPrimitive?</text><text x="410" y="236" class="p">jika object, ubah dulu</text>
  <rect x="700" y="170" width="250" height="120" class="b"/><text x="720" y="208" class="h">ToString / ToNumber</text><text x="720" y="236" class="p">tergantung kebutuhan</text>
  <rect x="960" y="170" width="180" height="120" class="b"/><text x="980" y="208" class="h">Result</text><text x="980" y="236" class="p">nilai akhir</text>
  <line x1="330" y1="230" x2="390" y2="230" class="a"/><line x1="640" y1="230" x2="700" y2="230" class="a"/><line x1="950" y1="230" x2="960" y2="230" class="a"/>
  <rect x="120" y="390" width="450" height="220" class="b"/><text x="145" y="430" class="h">Contoh operator +</text><text x="145" y="460" class="p">1) Kedua operand dievaluasi</text><text x="145" y="485" class="p">2) ToPrimitive dijalankan bila perlu</text><text x="145" y="510" class="p">3) Jika salah satu string -> concatenation</text><text x="145" y="535" class="p">4) Jika tidak -> numeric addition</text>
  <rect x="640" y="390" width="450" height="220" class="b"/><text x="665" y="430" class="h">Spec Anchor</text><text x="665" y="460" class="p">- #sec-type-conversion</text><text x="665" y="485" class="p">- #sec-toprimitive</text><text x="665" y="510" class="p">- Operator semantics terkait</text><text x="665" y="535" class="p">  expression yang dipakai</text>
</svg>
