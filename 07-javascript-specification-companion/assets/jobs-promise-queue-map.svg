<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs><style>.t{font:700 34px 'Segoe UI',sans-serif;fill:#111827}.s{font:500 18px 'Segoe UI',sans-serif;fill:#374151}.lane{fill:#fff;stroke:#d97706;stroke-width:2;rx:12}.job{fill:#ffedd5;stroke:#ea580c;stroke-width:2;rx:10}.micro{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:10}.macro{fill:#e0f2fe;stroke:#0284c7;stroke-width:2;rx:10}.h{font:700 17px 'Segoe UI',sans-serif;fill:#7c2d12}.p{font:500 14px 'Segoe UI',sans-serif;fill:#1f2937}.a{stroke:#334155;stroke-width:2.5;marker-end:url(#m)}</style><marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#334155"/></marker></defs>
  <rect width="1200" height="760" fill="#fff7ed"/>
  <text x="50" y="70" class="t">Jobs and Promise Queue Map</text>
  <text x="50" y="102" class="s">Model spec: Promise reaction dijadwalkan sebagai jobs</text>
  <rect x="70" y="150" width="1060" height="120" class="lane"/><text x="95" y="185" class="h">Execution Context</text><rect x="95" y="205" width="260" height="45" class="job"/><text x="115" y="233" class="p">sync code berjalan</text>
  <rect x="70" y="300" width="500" height="180" class="lane"/><text x="95" y="335" class="h">Promise Reaction Jobs</text><rect x="95" y="355" width="220" height="50" class="micro"/><text x="115" y="386" class="p">then/catch callback</text><rect x="335" y="355" width="220" height="50" class="micro"/><text x="355" y="386" class="p">await continuation</text>
  <rect x="630" y="300" width="500" height="180" class="lane"/><text x="655" y="335" class="h">Host Task Queue</text><rect x="655" y="355" width="220" height="50" class="macro"/><text x="675" y="386" class="p">timer callback</text><rect x="895" y="355" width="220" height="50" class="macro"/><text x="915" y="386" class="p">I/O event</text>
  <rect x="70" y="520" width="1060" height="170" class="lane"/><text x="95" y="555" class="h">Rule of thumb</text><text x="95" y="585" class="p">1) Selesaikan sync stack.</text><text x="95" y="612" class="p">2) Kosongkan Promise reaction jobs.</text><text x="95" y="639" class="p">3) Lanjut ke host task berikutnya.</text>
  <line x1="355" y1="228" x2="205" y2="355" class="a"/><line x1="355" y1="228" x2="765" y2="355" class="a"/>
