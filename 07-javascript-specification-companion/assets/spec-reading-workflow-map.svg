<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .t{font:700 34px 'Segoe UI',sans-serif;fill:#111827}
      .s{font:500 18px 'Segoe UI',sans-serif;fill:#374151}
      .box{fill:#fff;stroke:#1d4ed8;stroke-width:2;rx:12}
      .h{font:700 17px 'Segoe UI',sans-serif;fill:#1e3a8a}
      .p{font:500 14px 'Segoe UI',sans-serif;fill:#1f2937}
      .a{stroke:#334155;stroke-width:2.5;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#334155"/></marker>
  </defs>
  <rect width="1200" height="760" fill="#eff6ff"/>
  <text x="50" y="70" class="t">How To Read ECMAScript Spec Map</text>
  <text x="50" y="102" class="s">Workflow cepat dari konsep praktis ke clause formal</text>
  <rect x="70" y="150" width="240" height="120" class="box"/><text x="90" y="188" class="h">1. Tentukan konsep</text><text x="90" y="216" class="p">contoh: this, promise,</text><text x="90" y="238" class="p">prototype, coercion</text>
  <rect x="350" y="150" width="240" height="120" class="box"/><text x="370" y="188" class="h">2. Cari keyword</text><text x="370" y="216" class="p">pakai index/search di</text><text x="370" y="238" class="p">tc39.es/ecma262</text>
  <rect x="630" y="150" width="240" height="120" class="box"/><text x="650" y="188" class="h">3. Baca istilah</text><text x="650" y="216" class="p">cek definisi sebelum</text><text x="650" y="238" class="p">masuk algoritme</text>
  <rect x="910" y="150" width="240" height="120" class="box"/><text x="930" y="188" class="h">4. Ikuti algoritme</text><text x="930" y="216" class="p">tandai input/output</text><text x="930" y="238" class="p">dan kondisi cabang</text>
  <rect x="210" y="360" width="320" height="150" class="box"/><text x="230" y="398" class="h">5. Mapping ke kode</text><text x="230" y="426" class="p">hubungkan tiap langkah</text><text x="230" y="448" class="p">dengan snippet runtime</text><text x="230" y="470" class="p">yang sedang dipelajari</text>
  <rect x="660" y="360" width="320" height="150" class="box"/><text x="680" y="398" class="h">6. Validasi</text><text x="680" y="426" class="p">jalankan eksperimen kecil</text><text x="680" y="448" class="p">bandingkan output vs</text><text x="680" y="470" class="p">prediksi algoritme</text>
  <line x1="310" y1="210" x2="350" y2="210" class="a"/><line x1="590" y1="210" x2="630" y2="210" class="a"/><line x1="870" y1="210" x2="910" y2="210" class="a"/>
  <line x1="1030" y1="270" x2="820" y2="360" class="a"/><line x1="680" y1="270" x2="380" y2="360" class="a"/>
</svg>
