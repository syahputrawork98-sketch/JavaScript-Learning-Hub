<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs><style>.t{font:700 34px 'Segoe UI',sans-serif;fill:#111827}.s{font:500 18px 'Segoe UI',sans-serif;fill:#374151}.b{fill:#fff;stroke:#dc2626;stroke-width:2;rx:12}.h{font:700 17px 'Segoe UI',sans-serif;fill:#7f1d1d}.p{font:500 14px 'Segoe UI',sans-serif;fill:#1f2937}.a{stroke:#b91c1c;stroke-width:2.5;marker-end:url(#m)}</style><marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#b91c1c"/></marker></defs>
  <rect width="1200" height="760" fill="#fef2f2"/>
  <text x="50" y="70" class="t">🛡️ Proxy Reflect Metaprogramming Map</text>
  <text x="50" y="102" class="s">Intercept object operations dengan trap yang terkontrol</text>
  <rect x="90" y="170" width="280" height="150" class="b"/><text x="115" y="208" class="h">Target Object</text><text x="115" y="238" class="p">state asli</text><text x="115" y="266" class="p">tanpa intersep</text>
  <rect x="450" y="170" width="280" height="150" class="b"/><text x="475" y="208" class="h">Proxy Trap</text><text x="475" y="238" class="p">get / set / has / ...</text><text x="475" y="266" class="p">validasi atau logging</text>
  <rect x="810" y="170" width="300" height="150" class="b"/><text x="835" y="208" class="h">Reflect Fallback</text><text x="835" y="238" class="p">Reflect.get/set/... </text><text x="835" y="266" class="p">jaga default behavior</text>
  <line x1="370" y1="245" x2="450" y2="245" class="a"/><line x1="730" y1="245" x2="810" y2="245" class="a"/>
  <rect x="130" y="420" width="940" height="220" class="b"/>
  <text x="160" y="460" class="h">🧭 Safe Usage Checklist</text>
  <text x="160" y="492" class="p">1) trap hanya di boundary yang perlu</text>
  <text x="160" y="522" class="p">2) default path diteruskan ke Reflect</text>
  <text x="160" y="552" class="p">3) hindari trap kompleks tanpa observability</text>
  <text x="160" y="582" class="p">4) evaluasi biaya debug/performance sebelum adopsi luas</text>
</svg>
