<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Property Descriptor Visual</title>
  <desc id="desc">Visual map for writable enumerable configurable and accessor descriptors.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fff9f3"/><stop offset="100%" stop-color="#edf6ff"/></linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c2d12"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="170%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <style>.header{fill:url(#header);rx:16;filter:url(#shadow)} .flag{fill:#ffedd5;stroke:#c2410c;stroke-width:2;rx:12;filter:url(#shadow)} .box{fill:#fff;stroke:#334155;stroke-width:2;rx:14;filter:url(#shadow)} .title{font:700 32px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#fff} .sub{font:500 17px 'Segoe UI',sans-serif;fill:#dbeafe} .h{font:700 20px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#0f172a} .p{font:500 15px 'Segoe UI',sans-serif;fill:#334155} .s{font:600 13px 'Segoe UI',sans-serif;fill:#1f2937}</style>
  </defs>
  <rect width="1280" height="860" fill="url(#bg)"/>
  <rect class="header" x="46" y="30" width="1188" height="118"/>
  <text class="title" x="80" y="78">🧾 Property Descriptors Dasar</text>
  <text class="sub" x="80" y="106">Kamu bisa kontrol cara properti dibaca, ditulis, dan ditampilkan.</text>

  <rect class="flag" x="80" y="190" width="270" height="180"/><text class="h" x="106" y="232">✍️ writable</text><text class="p" x="106" y="258">boleh diubah?</text>
  <rect class="flag" x="370" y="190" width="270" height="180"/><text class="h" x="396" y="232">📋 enumerable</text><text class="p" x="396" y="258">muncul di iterasi?</text>
  <rect class="flag" x="660" y="190" width="270" height="180"/><text class="h" x="686" y="232">🔒 configurable</text><text class="p" x="686" y="258">boleh redefine/delete?</text>
  <rect class="flag" x="950" y="190" width="250" height="180"/><text class="h" x="976" y="232">🔁 get/set</text><text class="p" x="976" y="258">accessor behavior</text>

  <rect class="box" x="80" y="420" width="1120" height="370"/>
  <text class="h" x="106" y="460">✅ Praktik Aman</text>
  <text class="s" x="126" y="490">1. Cek descriptor sebelum debug assignment yang gagal.</text>
  <text class="s" x="126" y="516">2. Gunakan enumerable:false untuk detail internal.</text>
  <text class="s" x="126" y="542">3. Gunakan configurable:false hanya jika kontrak API sudah stabil.</text>
  <text class="s" x="126" y="568">4. Accessor (`get/set`) berguna untuk validasi/transformasi terkontrol.</text>
</svg>
