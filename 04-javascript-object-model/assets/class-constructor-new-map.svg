<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Class Constructor New Visual</title>
  <desc id="desc">Visual lifecycle when calling new and method sharing via prototype.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fffef2"/><stop offset="100%" stop-color="#eef6ff"/></linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#0c4a6e"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="170%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <style>.header{fill:url(#header);rx:16;filter:url(#shadow)} .step{fill:#fff;stroke:#334155;stroke-width:2;rx:14;filter:url(#shadow)} .good{fill:#dcfce7;stroke:#166534;stroke-width:2;rx:14;filter:url(#shadow)} .title{font:700 32px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#fff} .sub{font:500 17px 'Segoe UI',sans-serif;fill:#dbeafe} .h{font:700 20px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#0f172a} .p{font:500 15px 'Segoe UI',sans-serif;fill:#334155} .s{font:600 13px 'Segoe UI',sans-serif;fill:#1f2937}</style>
  </defs>
  <rect width="1280" height="860" fill="url(#bg)"/>
  <rect class="header" x="46" y="30" width="1188" height="118"/>
  <text class="title" x="80" y="78">🏗️ Class, Constructor, dan new</text>
  <text class="sub" x="80" y="106">Class rapi di syntax, tapi mesin tetap prototype-based.</text>

  <rect class="step" x="80" y="190" width="270" height="190"/><text class="h" x="106" y="232">1️⃣ new User()</text><text class="p" x="106" y="258">buat instance baru</text>
  <rect class="step" x="370" y="190" width="270" height="190"/><text class="h" x="396" y="232">2️⃣ link prototype</text><text class="p" x="396" y="258">instance -> prototype</text>
  <rect class="step" x="660" y="190" width="270" height="190"/><text class="h" x="686" y="232">3️⃣ run constructor</text><text class="p" x="686" y="258">this = instance</text>
  <rect class="good" x="950" y="190" width="250" height="190"/><text class="h" x="976" y="232">♻️ shared method</text><text class="p" x="976" y="258">method tinggal di prototype</text>

  <rect class="step" x="80" y="430" width="1120" height="360"/>
  <text class="h" x="106" y="470">🧪 Debug Checklist</text>
  <text class="s" x="126" y="500">1. `hasOwnProperty('method')` biasanya false untuk method class normal.</text>
  <text class="s" x="126" y="526">2. Jika this hilang, cek call-site callback dan pertimbangkan bind.</text>
  <text class="s" x="126" y="552">3. Pahami bahwa class bukan model object terpisah dari prototype chain.</text>
</svg>
