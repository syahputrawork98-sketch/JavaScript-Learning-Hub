<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Prototype Chain Advanced Visual</title>
  <desc id="desc">Visual for delegation, shadowing and mutation risk in shared prototype.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fffaf4"/><stop offset="100%" stop-color="#eef6ff"/></linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#111827"/><stop offset="100%" stop-color="#0f766e"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="170%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <style>.header{fill:url(#header);rx:16;filter:url(#shadow)} .ok{fill:#dcfce7;stroke:#166534;stroke-width:2;rx:14;filter:url(#shadow)} .risk{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:14;filter:url(#shadow)} .box{fill:#fff;stroke:#1e293b;stroke-width:2;rx:14;filter:url(#shadow)} .title{font:700 32px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#fff} .sub{font:500 17px 'Segoe UI',sans-serif;fill:#d1fae5} .h{font:700 20px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#0f172a} .p{font:500 15px 'Segoe UI',sans-serif;fill:#334155} .s{font:600 13px 'Segoe UI',sans-serif;fill:#1f2937}</style>
  </defs>
  <rect width="1280" height="860" fill="url(#bg)"/>
  <rect class="header" x="46" y="30" width="1188" height="118"/>
  <text class="title" x="80" y="78">🧠 Prototype Chain Lanjutan</text>
  <text class="sub" x="80" y="106">Delegation itu kuat, tapi mutasi shared parent bisa berbahaya.</text>

  <rect class="ok" x="80" y="190" width="520" height="230"/>
  <text class="h" x="108" y="232">✅ Delegation + Shadowing</text>
  <text class="p" x="108" y="260">Object boleh pakai parent behavior saat miss.</text>
  <text class="p" x="108" y="286">Own property bernama sama akan menutupi parent.</text>

  <rect class="risk" x="680" y="190" width="520" height="230"/>
  <text class="h" x="708" y="232">⚠️ Shared Mutation Risk</text>
  <text class="p" x="708" y="260">Ubah prototype parent = efek ke semua turunan.</text>
  <text class="p" x="708" y="286">Ini sering jadi sumber regresi lintas modul.</text>

  <rect class="box" x="80" y="460" width="1120" height="330"/>
  <text class="h" x="108" y="500">🛡️ Guardrail</text>
  <text class="s" x="128" y="530">1. Jangan mutasi prototype global/shared di runtime tanpa alasan kuat.</text>
  <text class="s" x="128" y="556">2. Override behavior di instance jika perubahan hanya lokal.</text>
  <text class="s" x="128" y="582">3. Saat bug muncul, telusuri asal method: own vs inherited.</text>
</svg>
