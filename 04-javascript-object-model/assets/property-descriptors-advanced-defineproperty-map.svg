<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .t{font:700 34px 'Segoe UI',sans-serif;fill:#111827}.s{font:500 18px 'Segoe UI',sans-serif;fill:#374151}
      .b{fill:#fff;stroke:#16a34a;stroke-width:2;rx:12}.h{font:700 17px 'Segoe UI',sans-serif;fill:#14532d}
      .p{font:500 14px 'Segoe UI',sans-serif;fill:#1f2937}.a{stroke:#15803d;stroke-width:2.5;marker-end:url(#m)}
    </style><marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#15803d"/></marker>
  </defs>
  <rect width="1200" height="760" fill="#f0fdf4"/>
  <text x="50" y="70" class="t">🧪 Advanced Descriptor Map</text>
  <text x="50" y="102" class="s">Data descriptor vs accessor descriptor + mutability control</text>
  <rect x="80" y="170" width="500" height="210" class="b"/>
  <text x="105" y="208" class="h">Data Descriptor</text>
  <text x="105" y="238" class="p">value + writable + enumerable + configurable</text>
  <text x="105" y="268" class="p">cocok untuk field data biasa</text>
  <text x="105" y="298" class="p">contoh: id read-only (writable: false)</text>
  <rect x="620" y="170" width="500" height="210" class="b"/>
  <text x="645" y="208" class="h">Accessor Descriptor</text>
  <text x="645" y="238" class="p">get + set + enumerable + configurable</text>
  <text x="645" y="268" class="p">cocok untuk computed value / validation</text>
  <text x="645" y="298" class="p">tanpa value/writable langsung</text>
  <rect x="140" y="450" width="920" height="200" class="b"/>
  <text x="170" y="490" class="h">✅ Decision Flow</text>
  <text x="170" y="520" class="p">1) butuh simpan nilai langsung? pakai data descriptor</text>
  <text x="170" y="550" class="p">2) butuh logika baca/tulis? pakai accessor descriptor</text>
  <text x="170" y="580" class="p">3) set configurable=false hanya jika kontrak final</text>
  <line x1="580" y1="275" x2="620" y2="275" class="a"/>
</svg>
