<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Object Prototype Basics Visual</title>
  <desc id="desc">Visual guide for own property and prototype delegation lookup.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fffdf2"/><stop offset="100%" stop-color="#edf5ff"/></linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e3a8a"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="170%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <style>
      .header{fill:url(#header);rx:16;filter:url(#shadow)} .box{fill:#fff;stroke:#1e293b;stroke-width:2;rx:14;filter:url(#shadow)}
      .own{fill:#dcfce7;stroke:#166534;stroke-width:2;rx:14;filter:url(#shadow)} .proto{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2;rx:14;filter:url(#shadow)}
      .title{font:700 32px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#fff} .sub{font:500 17px 'Segoe UI',sans-serif;fill:#dbeafe}
      .h{font:700 20px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#0f172a} .p{font:500 15px 'Segoe UI',sans-serif;fill:#334155} .s{font:600 13px 'Segoe UI',sans-serif;fill:#1f2937}
    </style>
  </defs>
  <rect width="1280" height="860" fill="url(#bg)"/>
  <rect class="header" x="46" y="30" width="1188" height="118"/>
  <text class="title" x="80" y="78">🧩 Object &amp; Prototype Dasar</text>
  <text class="sub" x="80" y="106">Rule utama: cek properti lokal dulu, baru naik ke prototype.</text>

  <rect class="own" x="80" y="190" width="520" height="210"/>
  <text class="h" x="108" y="230">🟢 1. Own Property Check</text>
  <text class="p" x="108" y="258">Akses `obj.x` dimulai dari object saat ini.</text>
  <text class="p" x="108" y="284">Jika ketemu, proses berhenti di sini.</text>

  <rect class="proto" x="680" y="190" width="520" height="210"/>
  <text class="h" x="708" y="230">🔵 2. Prototype Delegation</text>
  <text class="p" x="708" y="258">Jika miss, engine naik ke parent prototype.</text>
  <text class="p" x="708" y="284">Berhenti saat ketemu atau chain berakhir di null.</text>

  <rect class="box" x="80" y="440" width="1120" height="350"/>
  <text class="h" x="108" y="480">✅ Checklist Pemula</text>
  <text class="s" x="128" y="510">1. Pakai `hasOwnProperty` / `Object.hasOwn` untuk cek properti milik sendiri.</text>
  <text class="s" x="128" y="536">2. Jika nilai datang dari prototype, hati-hati saat override.</text>
  <text class="s" x="128" y="562">3. Jangan buru-buru mutasi prototype shared sebelum paham dampaknya.</text>
  <text class="s" x="128" y="588">4. Debug cepat: tandai properti mana own, mana inherited.</text>
</svg>
