<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs><style>.t{font:700 34px 'Segoe UI',sans-serif;fill:#111827}.s{font:500 18px 'Segoe UI',sans-serif;fill:#374151}.b{fill:#fff;stroke:#7c3aed;stroke-width:2;rx:12}.h{font:700 17px 'Segoe UI',sans-serif;fill:#4c1d95}.p{font:500 14px 'Segoe UI',sans-serif;fill:#1f2937}.a{stroke:#6d28d9;stroke-width:2.5;marker-end:url(#m)}</style><marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#6d28d9"/></marker></defs>
  <rect width="1200" height="760" fill="#faf5ff"/>
  <text x="50" y="70" class="t">🧰 Built-in Objects Behavior Map</text>
  <text x="50" y="102" class="s">Built-in tetap object, tapi sebagian punya behavior khusus</text>
  <rect x="90" y="170" width="320" height="150" class="b"/><text x="115" y="208" class="h">Array</text><text x="115" y="238" class="p">own: length</text><text x="115" y="266" class="p">methods di Array.prototype</text>
  <rect x="440" y="170" width="320" height="150" class="b"/><text x="465" y="208" class="h">Function</text><text x="465" y="238" class="p">call/apply/bind di prototype</text><text x="465" y="266" class="p">callable behavior khusus</text>
  <rect x="790" y="170" width="320" height="150" class="b"/><text x="815" y="208" class="h">Map/Set</text><text x="815" y="238" class="p">struktur key/value khusus</text><text x="815" y="266" class="p">lebih tepat dari object biasa</text>
  <line x1="410" y1="245" x2="440" y2="245" class="a"/><line x1="760" y1="245" x2="790" y2="245" class="a"/>
  <rect x="120" y="420" width="960" height="210" class="b"/>
  <text x="150" y="460" class="h">⚠️ Prototype Patch Risk</text>
  <text x="150" y="492" class="p">patch ke Array.prototype bisa mempengaruhi seluruh codebase + dependency</text>
  <text x="150" y="524" class="p">gunakan utility terpisah jika tidak ada alasan kuat patch global prototype</text>
</svg>
