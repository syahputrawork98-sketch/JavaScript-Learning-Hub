<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Composition vs Inheritance Visual</title>
  <desc id="desc">Visual decision board for composition vs inheritance.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fffdf2"/><stop offset="100%" stop-color="#edf6ff"/></linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#0f766e"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="170%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <style>.header{fill:url(#header);rx:16;filter:url(#shadow)} .inh{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:14;filter:url(#shadow)} .comp{fill:#dcfce7;stroke:#166534;stroke-width:2;rx:14;filter:url(#shadow)} .box{fill:#fff;stroke:#334155;stroke-width:2;rx:14;filter:url(#shadow)} .title{font:700 32px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#fff} .sub{font:500 17px 'Segoe UI',sans-serif;fill:#d1fae5} .h{font:700 20px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#0f172a} .p{font:500 15px 'Segoe UI',sans-serif;fill:#334155} .s{font:600 13px 'Segoe UI',sans-serif;fill:#1f2937}</style>
  </defs>
  <rect width="1280" height="860" fill="url(#bg)"/>
  <rect class="header" x="46" y="30" width="1188" height="118"/>
  <text class="title" x="80" y="78">⚖️ Composition vs Inheritance</text>
  <text class="sub" x="80" y="106">Pilih yang paling mudah diubah saat requirement bergerak.</text>

  <rect class="inh" x="80" y="190" width="520" height="240"/>
  <text class="h" x="108" y="232">🧬 Inheritance</text>
  <text class="p" x="108" y="258">Cocok jika hubungan is-a stabil.</text>
  <text class="p" x="108" y="284">Risiko coupling tinggi saat hierarchy makin dalam.</text>

  <rect class="comp" x="680" y="190" width="520" height="240"/>
  <text class="h" x="708" y="232">🧱 Composition</text>
  <text class="p" x="708" y="258">Gabung behavior modular (has-a).</text>
  <text class="p" x="708" y="284">Lebih fleksibel untuk perubahan fitur.</text>

  <rect class="box" x="80" y="470" width="1120" height="320"/>
  <text class="h" x="108" y="510">🧭 Decision Rule</text>
  <text class="s" x="128" y="540">1. Jika domain benar-benar is-a dan stabil -> inheritance boleh.</text>
  <text class="s" x="128" y="566">2. Jika butuh mix-and-match behavior -> composition lebih aman.</text>
  <text class="s" x="128" y="592">3. Jika ragu, mulai dari composition lalu evaluasi kebutuhan inheritance.</text>
</svg>
