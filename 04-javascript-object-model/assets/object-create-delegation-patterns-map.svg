<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .t{font:700 34px 'Segoe UI',sans-serif;fill:#0f172a}
      .s{font:500 18px 'Segoe UI',sans-serif;fill:#334155}
      .b{fill:#fff;stroke:#0ea5e9;stroke-width:2;rx:12}
      .h{font:700 17px 'Segoe UI',sans-serif;fill:#0c4a6e}
      .p{font:500 14px 'Segoe UI',sans-serif;fill:#1f2937}
      .a{stroke:#0369a1;stroke-width:2.5;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#0369a1"/></marker>
  </defs>
  <rect width="1200" height="760" fill="#f0f9ff"/>
  <text x="50" y="70" class="t">🧩 Object.create Delegation Map</text>
  <text x="50" y="102" class="s">Prototype delegation tanpa class hierarchy</text>
  <rect x="80" y="170" width="300" height="140" class="b"/>
  <text x="105" y="208" class="h">Prototype Object</text>
  <text x="105" y="236" class="p">shared methods</text>
  <text x="105" y="260" class="p">greet(), run(), ...</text>
  <rect x="450" y="170" width="300" height="140" class="b"/>
  <text x="475" y="208" class="h">Object.create(proto)</text>
  <text x="475" y="236" class="p">buat instance baru</text>
  <text x="475" y="260" class="p">dengan [[Prototype]] = proto</text>
  <rect x="820" y="170" width="300" height="140" class="b"/>
  <text x="845" y="208" class="h">Instance</text>
  <text x="845" y="236" class="p">own properties</text>
  <text x="845" y="260" class="p">name, id, config, ...</text>
  <line x1="380" y1="240" x2="450" y2="240" class="a"/>
  <line x1="750" y1="240" x2="820" y2="240" class="a"/>
  <rect x="160" y="420" width="880" height="210" class="b"/>
  <text x="190" y="460" class="h">🔁 Lookup Flow</text>
  <text x="190" y="492" class="p">1) cari own property di instance</text>
  <text x="190" y="522" class="p">2) jika tidak ada, delegasi ke prototype</text>
  <text x="190" y="552" class="p">3) stop di null jika tetap tidak ditemukan</text>
  <text x="190" y="592" class="p">Risiko: shadowing property bisa menyamarkan behavior prototype.</text>
</svg>
