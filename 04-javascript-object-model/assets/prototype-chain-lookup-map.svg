<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Prototype Chain Lookup Visual</title>
  <desc id="desc">Lookup flow from own property to null terminal.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fffef4"/><stop offset="100%" stop-color="#edf5ff"/></linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="170%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <style>.header{fill:url(#header);rx:16;filter:url(#shadow)} .lvl{fill:#fff;stroke:#334155;stroke-width:2;rx:14;filter:url(#shadow)} .end{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:14;filter:url(#shadow)} .title{font:700 32px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#fff} .sub{font:500 17px 'Segoe UI',sans-serif;fill:#dbeafe} .h{font:700 20px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#0f172a} .p{font:500 15px 'Segoe UI',sans-serif;fill:#334155} .s{font:600 13px 'Segoe UI',sans-serif;fill:#1f2937}</style>
  </defs>
  <rect width="1280" height="860" fill="url(#bg)"/>
  <rect class="header" x="46" y="30" width="1188" height="118"/>
  <text class="title" x="80" y="78">🔎 Prototype Chain Lookup</text>
  <text class="sub" x="80" y="106">Flow: child -> parent -> grandparent -> null</text>

  <rect class="lvl" x="80" y="190" width="340" height="190"/>
  <text class="h" x="106" y="232">1️⃣ Child (own)</text>
  <text class="p" x="106" y="258">Cek properti lokal dulu.</text>

  <rect class="lvl" x="470" y="190" width="340" height="190"/>
  <text class="h" x="496" y="232">2️⃣ Parent</text>
  <text class="p" x="496" y="258">Jika miss, naik 1 level.</text>

  <rect class="lvl" x="860" y="190" width="340" height="190"/>
  <text class="h" x="886" y="232">3️⃣ Grandparent</text>
  <text class="p" x="886" y="258">Lanjut sampai ketemu.</text>

  <rect class="end" x="470" y="420" width="340" height="140"/>
  <text class="h" x="496" y="462">🛑 Terminal null</text>
  <text class="p" x="496" y="488">Tidak ketemu -> undefined.</text>

  <rect class="lvl" x="80" y="600" width="1120" height="220"/>
  <text class="h" x="106" y="640">🧭 Debug Pattern</text>
  <text class="s" x="126" y="668">1. Jangan asumsikan semua value milik object sendiri.</text>
  <text class="s" x="126" y="694">2. Track lookup per level untuk cari sumber nilai asli.</text>
  <text class="s" x="126" y="720">3. Bedakan miss chain vs value undefined yang memang valid.</text>
</svg>
