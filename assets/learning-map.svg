<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">JavaScript Learning Hub - Learning Map</title>
  <desc id="desc">Peta belajar dari fondasi, model inti, hingga pendalaman dan aplikasi.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
      .layer { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
      .layerTitle { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .book { font: 600 15px 'Consolas', 'Courier New', monospace; fill: #1f2937; }
      .arrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#a); }
      .note { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #6b7280; }
      .chip { fill: #eef2ff; stroke: #c7d2fe; stroke-width: 1; rx: 8; }
      .chipText { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #3730a3; }
    </style>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="520"/>

  <text class="title" x="60" y="64">JavaScript Learning Hub 🧠</text>
  <text class="subtitle" x="60" y="92">Peta belajar dari fondasi ke pemahaman internal JavaScript</text>
  <rect class="chip" x="925" y="56" width="215" height="28"/>
  <text class="chipText" x="938" y="75">Update: 2026-03-08</text>

  <rect class="layer" x="60" y="130" width="1080" height="92"/>
  <text class="layerTitle" x="84" y="164">Layer 1 - Fondasi Bahasa 🌱</text>
  <text class="book" x="84" y="194">01-javascript-tutorial</text>

  <rect class="layer" x="60" y="244" width="1080" height="120"/>
  <text class="layerTitle" x="84" y="278">Layer 2 - Core Runtime Model ⚙️</text>
  <text class="book" x="84" y="308">02-runtime-first-principles   03-asynchronous-model   04-object-model   05-memory-references</text>

  <rect class="layer" x="60" y="386" width="1080" height="92"/>
  <text class="layerTitle" x="84" y="420">Layer 3 - Pendalaman dan Aplikasi 🚀</text>
  <text class="book" x="84" y="450">06-runtime-exercises   07-spec-companion   08-engine-internals   09-modules-structure</text>

  <path class="arrow" d="M600 222 L600 244"/>
  <path class="arrow" d="M600 364 L600 386"/>

  <text class="note" x="850" y="164">Mulai dari sintaks dan struktur program dasar.</text>
  <text class="note" x="850" y="278">Bangun mental model eksekusi, async, objek, dan memori.</text>
  <text class="note" x="850" y="420">Perkuat lewat latihan, spec, internals, dan desain modul.</text>
</svg>
