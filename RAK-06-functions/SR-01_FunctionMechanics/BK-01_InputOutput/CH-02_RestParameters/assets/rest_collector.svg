<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">REST COLLECTOR (THE COLLECTOR BINS)</text>

  <!-- Stream of Arguments -->
  <circle cx="100" cy="100" r="15" fill="#facc15" opacity="0.8"/>
  <circle cx="150" cy="80" r="15" fill="#facc15" opacity="0.6"/>
  <circle cx="200" cy="110" r="15" fill="#facc15" opacity="0.4"/>
  <circle cx="250" cy="90" r="15" fill="#facc15" opacity="0.2"/>

  <!-- The Collector Bin -->
  <g transform="translate(450, 150)">
    <path d="M 0 0 L 250 0 L 220 150 L 30 150 Z" fill="#1e293b" stroke="#fbbf24" stroke-width="4"/>
    <text x="125" y="80" fill="#fbbf24" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">...args</text>
    <text x="125" y="110" fill="#94a3b8" font-family="Arial" font-size="14" text-anchor="middle">(Array Bin)</text>
  </g>

  <!-- Funnel -->
  <path d="M 280 100 Q 350 100 450 150" fill="none" stroke="#fbbf24" stroke-width="6" stroke-dasharray="10,5" marker-end="url(#arrow-bin)"/>

  <defs>
    <marker id="arrow-bin" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" />
    </marker>
  </defs>
</svg>
