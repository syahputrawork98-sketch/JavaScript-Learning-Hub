<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">ERROR CONTAINMENT (THE PROTECTION SHIELD)</text>

  <!-- The Explosion (Error) -->
  <g transform="translate(400, 200)">
    <path d="M -50 -50 L 0 -100 L 50 -50 L 100 0 L 50 50 L 0 100 L -50 50 L -100 0 Z" fill="#f43f5e" opacity="0.6"/>
    <text x="0" y="10" fill="#ffffff" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">ERROR!</text>
  </g>

  <!-- The Containment Shield (Try/Catch) -->
  <circle cx="400" cy="200" r="150" fill="none" stroke="#fbbf24" stroke-width="8" stroke-dasharray="20,10"/>
  
  <!-- Outer Grid (Safe Area) -->
  <text x="150" y="100" fill="#34d399" font-family="Arial" font-size="16" font-weight="bold">STABLE GRID</text>
  <path d="M 100 120 L 250 150" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-safe)"/>

  <defs>
    <marker id="arrow-safe" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
    </marker>
  </defs>
</svg>
