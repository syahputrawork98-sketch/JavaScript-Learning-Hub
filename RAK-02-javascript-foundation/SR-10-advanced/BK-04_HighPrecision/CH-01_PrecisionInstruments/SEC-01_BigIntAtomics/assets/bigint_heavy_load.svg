<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">BIGINT HEAVY LOAD (PRECISION INSTRUMENT)</text>

  <!-- Normal Number Scale -->
  <g transform="translate(100, 250)">
    <rect width="200" height="40" fill="#38bdf8" opacity="0.5" rx="5"/>
    <text x="100" y="-10" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle">Standard Number (64-bit)</text>
    <text x="100" y="25" fill="#ffffff" font-family="Courier New" font-size="12" text-anchor="middle">2^53 - 1</text>
  </g>

  <!-- BigInt Scale (Unlimited) -->
  <g transform="translate(400, 150)">
    <rect width="300" height="140" fill="#f43f5e" opacity="0.3" rx="10"/>
    <rect width="300" height="140" fill="none" stroke="#f43f5e" stroke-width="4" rx="10"/>
    <text x="150" y="70" fill="#f43f5e" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">BIGINT LOAD</text>
    <text x="150" y="100" fill="#ffffff" font-family="Courier New" font-size="14" text-anchor="middle">9007199254740992n...</text>
  </g>

  <!-- Pressure Gauge -->
  <path d="M 300 270 L 400 220" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow-heavy)"/>

  <defs>
    <marker id="arrow-heavy" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f43f5e" />
    </marker>
  </defs>
</svg>
