<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="globalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- Outer Unit (Global) -->
  <rect x="20" y="20" width="360" height="260" rx="10" fill="url(#globalGrad)" stroke="#64748b" stroke-width="1" />
  <text x="40" y="45" font-family="Arial, sans-serif" font-size="12" fill="#64748b" font-weight="bold">GLOBAL GRID</text>
  <circle cx="340" cy="50" r="10" fill="#38bdf8" filter="url(#glow)" /> <!-- Global Var -->
  <text x="320" y="55" font-family="Arial, sans-serif" font-size="8" fill="#38bdf8" text-anchor="end">global_var</text>

  <!-- Functional Unit (Outer) -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="280" height="160" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2" opacity="0.8" />
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="12" fill="#38bdf8" font-weight="bold">OUTER_UNIT()</text>
    <rect x="230" y="30" width="30" height="30" rx="5" fill="#a78bfa" filter="url(#glow)" /> <!-- Outer Var -->
    <text x="220" y="50" font-family="Arial, sans-serif" font-size="8" fill="#a78bfa" text-anchor="end">outer_var</text>

    <!-- Nested Unit (Inner) -->
    <g transform="translate(40, 60)">
      <rect x="0" y="0" width="140" height="80" rx="5" fill="#0f172a" stroke="#f472b6" stroke-width="2" />
      <text x="15" y="20" font-family="Arial, sans-serif" font-size="10" fill="#f472b6" font-weight="bold">INNER_UNIT()</text>
      
      <!-- Looking Out (Paths) -->
      <path d="M 120 40 L 190 40" stroke="#a78bfa" stroke-width="1" stroke-dasharray="2,2" />
      <path d="M 120 40 L 190 -20 Q 280 -20 280 -30" fill="none" stroke="#38bdf8" stroke-width="1" stroke-dasharray="2,2" />
      <text x="80" y="50" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" opacity="0.6">Access outwards only</text>
    </g>
  </g>

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE CONTAINMENT UNITS</text>
  <text x="200" y="270" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Wiring is fixed at creation time, not execution time"</text>

</svg>
