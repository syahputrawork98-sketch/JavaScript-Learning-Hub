<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="batteryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" />
    </marker>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Closed Outer Environment -->
  <rect x="40" y="80" width="220" height="150" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2" opacity="0.4" stroke-dasharray="5,5" />
  <text x="50" y="105" font-family="Arial, sans-serif" font-size="10" fill="#38bdf8">OUTER_ENV (Disconnected)</text>

  <!-- The Data Tank (Private State) -->
  <rect x="80" y="130" width="60" height="40" rx="5" fill="url(#batteryGrad)" filter="url(#glow)" />
  <text x="110" y="155" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">DATA</text>
  <text x="110" y="185" font-family="Arial, sans-serif" font-size="8" fill="#fbbf24" text-anchor="middle">"Persistent"</text>

  <!-- The Inner Function (The Battery Carry) -->
  <g transform="translate(300, 150)">
    <rect x="-35" y="-35" width="70" height="70" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2" filter="url(#glow)" />
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">INNER</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle">CLOSURE</text>
  </g>

  <!-- The Magic Connection (The Invisible Cord) -->
  <path d="M 140 150 C 200 150 240 150 265 150" stroke="#fbbf24" stroke-width="3" stroke-dasharray="4,4" marker-end="url(#arrowhead)" />
  <text x="210" y="140" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">captured scope</text>

  <!-- Title & Labels -->
  <text x="200" y="50" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE PERSISTENT BATTERY</text>
  <text x="200" y="270" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Even when the room is closed, the link remains alive"</text>

</svg>
