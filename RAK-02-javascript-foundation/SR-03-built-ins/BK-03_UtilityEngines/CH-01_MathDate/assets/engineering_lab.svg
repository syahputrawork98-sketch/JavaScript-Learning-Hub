<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mathGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#84fab0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8fd3f4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas (Blueprint Style) -->
  <rect width="400" height="300" rx="15" fill="#1e3a8a" />
  <path d="M0 50 L400 50 M0 100 L400 100 M0 150 L400 150 M0 200 L400 200 M0 250 L400 250" stroke="#3b82f6" stroke-width="0.5" opacity="0.3" />
  <path d="M50 0 L50 300 M100 0 L100 300 M150 0 L150 300 M200 0 L200 300 M250 0 L250 300 M300 0 L300 300 M350 0 L350 300" stroke="#3b82f6" stroke-width="0.5" opacity="0.3" />

  <!-- The Math Lab Badge -->
  <rect x="120" y="100" width="160" height="100" rx="10" fill="url(#mathGradient)" filter="url(#glow)" />
  <text x="200" y="155" font-family="Arial, sans-serif" font-size="28" fill="#1e293b" text-anchor="middle" font-weight="bold">MATH</text>
  <text x="200" y="180" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">Static Lab Utility</text>

  <!-- Tools Symbols -->
  <!-- PI (Constant) -->
  <circle cx="70" cy="70" r="30" fill="#ffffff" opacity="0.1" />
  <text x="70" y="80" font-family="serif" font-size="30" fill="#84fab0" text-anchor="middle">π</text>
  
  <!-- Random (Dice) -->
  <rect x="300" y="40" width="40" height="40" rx="5" fill="#ffffff" opacity="0.1" stroke="#8fd3f4" stroke-width="1" />
  <circle cx="310" cy="50" r="2" fill="#8fd3f4" />
  <circle cx="330" cy="50" r="2" fill="#8fd3f4" />
  <circle cx="320" cy="60" r="2" fill="#8fd3f4" />
  <circle cx="310" cy="70" r="2" fill="#8fd3f4" />
  <circle cx="330" cy="70" r="2" fill="#8fd3f4" />

  <!-- Rounding (Compass) -->
  <path d="M60 250 L100 210 M100 210 L140 250" stroke="#84fab0" stroke-width="3" fill="none" />
  <circle cx="100" cy="210" r="5" fill="#84fab0" />

</svg>
