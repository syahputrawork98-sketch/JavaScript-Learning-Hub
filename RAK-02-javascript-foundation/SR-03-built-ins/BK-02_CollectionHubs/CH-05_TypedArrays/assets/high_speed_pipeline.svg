<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pipeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The ArrayBuffer (Memory Reservoir) -->
  <rect x="20" y="120" width="360" height="80" rx="40" fill="url(#pipeGradient)" stroke="#4facfe" stroke-width="2" />
  
  <!-- The View Window (Interpretation) -->
  <g transform="translate(100, 110)">
    <rect x="0" y="0" width="200" height="100" rx="10" fill="#ffffff" opacity="0.1" stroke="#00f2fe" stroke-width="2" filter="url(#glow)" />
    <text x="100" y="25" font-family="Arial, sans-serif" font-size="12" fill="#00f2fe" text-anchor="middle" font-weight="bold">TYPED VIEW</text>
    
    <!-- Binary Segments -->
    <rect x="20" y="45" width="30" height="30" fill="#4facfe" rx="3">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite" />
    </rect>
    <rect x="60" y="45" width="30" height="30" fill="#4facfe" rx="3" />
    <rect x="100" y="45" width="30" height="30" fill="#4facfe" rx="3" />
    <rect x="140" y="45" width="30" height="30" fill="#4facfe" rx="3" />
    
    <text x="100" y="90" font-family="Courier, monospace" font-size="10" fill="#94a3b8" text-anchor="middle">Uint8 [0, 255, 4, 128]</text>
  </g>

  <text x="200" y="60" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">HIGH-SPEED PIPELINE</text>
  <text x="200" y="240" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">"Raw Binary ↔ Structured View"</text>

</svg>
