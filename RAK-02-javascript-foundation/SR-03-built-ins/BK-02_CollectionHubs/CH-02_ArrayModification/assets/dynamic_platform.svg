<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="modGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Platform -->
  <rect x="50" y="180" width="300" height="20" rx="5" fill="#1e293b" stroke="#FFD700" stroke-width="2" />
  
  <!-- Mechanical Arm: PUSH -->
  <g transform="translate(300, 100)">
    <rect x="-10" y="0" width="20" height="80" fill="#94a3b8" />
    <circle cx="0" cy="80" r="15" fill="url(#modGradient)" filter="url(#glow)" />
    <text x="0" y="-10" font-family="Arial, sans-serif" font-size="10" fill="#FFD700" text-anchor="middle" font-weight="bold">PUSH</text>
  </g>

  <!-- Mechanical Arm: SHIFT -->
  <g transform="translate(100, 100)">
    <rect x="-10" y="0" width="20" height="80" fill="#94a3b8" />
    <circle cx="0" cy="80" r="15" fill="#ef4444" filter="url(#glow)" />
    <text x="0" y="-10" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle" font-weight="bold">SHIFT</text>
  </g>

  <!-- The Splice Cutter -->
  <g transform="translate(200, 150)">
    <path d="M-15 0 L15 0 L0 30 Z" fill="#4facfe" filter="url(#glow)" />
    <text x="0" y="-10" font-family="Arial, sans-serif" font-size="10" fill="#4facfe" text-anchor="middle" font-weight="bold">SPLICE</text>
  </g>

  <text x="200" y="60" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">DYNAMIC PLATFORM</text>
  <text x="200" y="240" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">"Mutating &amp; Surgery Operations"</text>

</svg>
