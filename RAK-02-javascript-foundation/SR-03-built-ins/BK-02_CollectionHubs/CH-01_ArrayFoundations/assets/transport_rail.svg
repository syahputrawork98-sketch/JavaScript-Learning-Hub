<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="railGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Rail Track -->
  <rect x="20" y="150" width="360" height="10" rx="5" fill="#1e293b" stroke="#334155" />
  <rect x="20" y="170" width="360" height="10" rx="5" fill="#1e293b" stroke="#334155" />

  <!-- Containers (Array Elements) -->
  <g transform="translate(40, 100)">
    <rect x="0" y="0" width="60" height="60" rx="5" fill="url(#railGradient)" filter="url(#glow)" />
    <text x="30" y="35" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">A</text>
    <text x="30" y="80" font-family="Courier, monospace" font-size="14" fill="#94a3b8" text-anchor="middle">[0]</text>
  </g>

  <g transform="translate(120, 100)">
    <rect x="0" y="0" width="60" height="60" rx="5" fill="url(#railGradient)" filter="url(#glow)" />
    <text x="30" y="35" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">B</text>
    <text x="30" y="80" font-family="Courier, monospace" font-size="14" fill="#94a3b8" text-anchor="middle">[1]</text>
  </g>

  <g transform="translate(200, 100)">
    <rect x="0" y="0" width="60" height="60" rx="5" fill="url(#railGradient)" filter="url(#glow)" />
    <text x="30" y="35" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">C</text>
    <text x="30" y="80" font-family="Courier, monospace" font-size="14" fill="#94a3b8" text-anchor="middle">[2]</text>
  </g>

  <g transform="translate(280, 100)">
    <rect x="0" y="0" width="60" height="60" rx="5" stroke="#4facfe" stroke-width="2" fill="none" stroke-dasharray="4" />
    <text x="30" y="35" font-family="Arial, sans-serif" font-size="20" fill="#4facfe" text-anchor="middle">?</text>
    <text x="30" y="80" font-family="Courier, monospace" font-size="14" fill="#94a3b8" text-anchor="middle">[3]</text>
  </g>

  <text x="200" y="60" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">THE TRANSPORT RAIL</text>
  <text x="200" y="240" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">"Zero-Indexed Sequential Storage"</text>

</svg>
