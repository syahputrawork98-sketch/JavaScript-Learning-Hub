<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mapGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8e44ad;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Map Hub -->
  <rect x="50" y="80" width="300" height="180" rx="10" fill="#1e293b" stroke="#8e44ad" stroke-width="2" />
  
  <!-- Key-Value Pairs -->
  <g transform="translate(80, 110)">
    <rect x="0" y="0" width="80" height="30" rx="5" fill="#8e44ad" opacity="0.8" filter="url(#glow)" />
    <text x="40" y="20" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">KEY-1</text>
    <path d="M90 15 L160 15" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)" />
    <rect x="170" y="0" width="80" height="30" rx="5" fill="#3498db" />
    <text x="210" y="20" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">VALUE-1</text>
  </g>

  <g transform="translate(80, 160)">
    <circle cx="40" cy="15" r="15" fill="#8e44ad" filter="url(#glow)" />
    <text x="40" y="20" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">OBJ-K</text>
    <path d="M90 15 L160 15" stroke="#ffffff" stroke-width="2" />
    <rect x="170" y="0" width="80" height="30" rx="5" fill="#3498db" />
    <text x="210" y="20" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">VALUE-2</text>
  </g>

  <text x="200" y="60" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">LOGISTICS HUB (MAP)</text>
  <text x="200" y="240" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">"Omni-Typed Key-Value Associations"</text>

</svg>
