<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="numberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a1c4fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2e9fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bigIntGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbc2eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a6c1ee;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- Number: The High-Precision Sensor -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="140" height="140" rx="10" fill="url(#numberGradient)" opacity="0.8" filter="url(#glow)" />
    <text x="70" y="70" font-family="Arial, sans-serif" font-size="24" fill="#1e293b" text-anchor="middle" font-weight="bold">NUMBER</text>
    <text x="70" y="95" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">"IEEE 754 Floating"</text>
    <rect x="10" y="115" width="120" height="15" rx="5" fill="#1e293b" />
    <rect x="10" y="115" width="80" height="15" rx="5" fill="#4facfe">
        <animate attributeName="width" values="10;120;10" dur="4s" repeatCount="indefinite" />
    </rect>
    <text x="70" y="210" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">MAX_SAFE_INTEGER</text>
    <text x="70" y="225" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">±9 Quadrillion</text>
  </g>

  <!-- BigInt: The Heavy-Duty Battery -->
  <g transform="translate(220, 40)">
    <rect x="0" y="0" width="140" height="180" rx="10" fill="url(#bigIntGradient)" filter="url(#glow)" />
    <text x="70" y="80" font-family="Arial, sans-serif" font-size="24" fill="#1e293b" text-anchor="middle" font-weight="bold">BIGINT</text>
    <text x="70" y="105" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">"Arbitrary-precision"</text>
    <text x="70" y="130" font-family="Arial, sans-serif" font-size="20" fill="#1e293b" text-anchor="middle">∞ n</text>
    <text x="70" y="230" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">UNLIMITED RANGE</text>
    <text x="70" y="245" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">No Decimal Support</text>
  </g>
</svg>
