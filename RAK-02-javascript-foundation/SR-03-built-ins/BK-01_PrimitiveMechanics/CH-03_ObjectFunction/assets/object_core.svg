<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Dynamic Gradient Definitions -->
  <defs>
    <linearGradient id="coreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />
  
  <!-- Central Energy Core -->
  <path d="M200 80 L252 110 L252 170 L200 200 L148 170 L148 110 Z" fill="url(#coreGradient)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite" />
  </path>
  
  <text x="200" y="145" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">OBJECT</text>
  <text x="200" y="165" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">Energy Core</text>

  <!-- Properties (Radiating) -->
  <line x1="148" y1="110" x2="80" y2="60" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4" />
  <circle cx="80" cy="60" r="15" fill="#1e293b" stroke="#4facfe" stroke-width="2" />
  <text x="80" y="65" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Prop</text>

  <line x1="252" y1="110" x2="320" y2="60" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4" />
  <circle cx="320" cy="60" r="15" fill="#1e293b" stroke="#4facfe" stroke-width="2" />
  <text x="320" y="65" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Prop</text>

  <!-- Methods (Connecting) -->
  <line x1="148" y1="170" x2="80" y2="240" stroke="#4facfe" stroke-width="2" />
  <rect x="50" y="240" width="60" height="20" rx="5" fill="#1e293b" stroke="#00f2fe" />
  <text x="80" y="254" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Method()</text>

  <line x1="252" y1="170" x2="320" y2="240" stroke="#4facfe" stroke-width="2" />
  <rect x="290" y="240" width="60" height="20" rx="5" fill="#1e293b" stroke="#00f2fe" />
  <text x="320" y="254" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Method()</text>

</svg>
