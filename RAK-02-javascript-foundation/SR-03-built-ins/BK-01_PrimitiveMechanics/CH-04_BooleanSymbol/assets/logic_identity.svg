<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logicGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48c6ef;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6f86d6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- Boolean: The Gate -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="100" height="60" rx="10" fill="url(#logicGradient)" filter="url(#glow)" />
    <text x="50" y="35" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">BOOLEAN</text>
    <path d="M120 30 L160 10 M120 30 L160 50" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.6" />
    <text x="50" y="75" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Logic Gate</text>
  </g>

  <!-- Symbol: The Secret Key -->
  <g transform="translate(240, 100)">
    <circle cx="50" cy="30" r="35" fill="#1e293b" stroke="#f6d365" stroke-width="2" filter="url(#glow)" />
    <path d="M50 45 L50 90 M40 80 L60 80 M40 90 L60 90" stroke="#f6d365" stroke-width="4" />
    <text x="50" y="35" font-family="Arial, sans-serif" font-size="24" fill="#f6d365" text-anchor="middle">★</text>
    <text x="50" y="75" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold" transform="translate(0, 40)">SYMBOL</text>
    <text x="50" y="130" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Unique ID</text>
  </g>
</svg>
