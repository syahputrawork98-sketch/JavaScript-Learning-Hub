<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="relayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- Hub A (The Source) -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="100" height="120" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="2" />
    <text x="50" y="30" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">SOURCE HUB</text>
    <rect x="20" y="50" width="60" height="20" rx="3" fill="url(#relayGrad)" filter="url(#glow)" />
    <text x="50" y="63" font-family="Courier, monospace" font-size="8" fill="#ffffff" text-anchor="middle">export { ... }</text>
  </g>

  <!-- Hub B (The Receiver) -->
  <g transform="translate(260, 80)">
    <rect x="0" y="0" width="100" height="120" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="2" />
    <text x="50" y="30" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">MAIN HUB</text>
    <rect x="20" y="50" width="60" height="20" rx="3" fill="url(#relayGrad)" filter="url(#glow)" />
    <text x="50" y="63" font-family="Courier, monospace" font-size="8" fill="#ffffff" text-anchor="middle">import { ... }</text>
  </g>

  <!-- The Relay Link (Transmission) -->
  <path d="M 140 120 Q 200 80 260 120" fill="none" stroke="#a855f7" stroke-width="2" stroke-dasharray="4,2" />
  <circle cx="200" cy="100" r="15" fill="#a855f7" filter="url(#glow)" />
  <text x="200" y="105" font-family="Arial, sans-serif" font-size="7" fill="#ffffff" text-anchor="middle" font-weight="bold">DYNAMIC</text>

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE INTER-HUB RELAYS</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Partitioning the Hub into isolated units for secure and efficient logistics"</text>

</svg>
