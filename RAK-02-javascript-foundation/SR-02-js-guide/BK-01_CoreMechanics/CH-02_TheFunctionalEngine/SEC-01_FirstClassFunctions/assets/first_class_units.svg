<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="300" fill="#0f172a" rx="10"/>
  
  <!-- Title -->
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">FIRST-CLASS FUNCTION UNITS</text>

  <!-- Function as Portable Power -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="120" height="150" fill="#1e293b" stroke="#38bdf8" stroke-width="4" rx="10"/>
    <text x="60" y="140" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">VAR / CONST</text>
    <path d="M30 40 L90 40 M30 60 L90 60 M30 80 L90 80" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>
    <text x="60" y="25" fill="#f8fafc" font-family="Arial" font-size="12" text-anchor="middle">Stored as Value</text>
  </g>

  <!-- Arrow passing -->
  <path d="M250 175 L350 175" stroke="#94a3b8" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  
  <!-- Function as Argument -->
  <g transform="translate(400, 120)">
    <circle cx="0" cy="0" r="50" fill="#1e293b" stroke="#f472b6" stroke-width="4"/>
    <text x="0" y="5" fill="#f472b6" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">ARGUMENT</text>
    <text x="0" y="70" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">Passed to Other Units</text>
  </g>

  <!-- Function as Return -->
  <g transform="translate(650, 120)">
    <path d="M-50 -50 L50 -50 L50 50 L-50 50 Z" fill="#1e293b" stroke="#22c55e" stroke-width="4"/>
    <text x="0" y="5" fill="#22c55e" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">RETURN</text>
    <text x="0" y="70" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">Produced by Units</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
</svg>
