<svg width="600" height="350" viewBox="0 0 600 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="350" fill="#0f172a" rx="15"/>
  
  <!-- Lamp (The 'this' context) -->
  <g transform="translate(300, 100)">
    <path d="M -20 0 L 20 0 L 40 60 L -40 60 Z" fill="#475569" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="0" cy="0" r="15" fill="#facc15" filter="url(#glow)"/>
    <text x="0" y="85" font-family="Arial" font-size="16" font-weight="bold" fill="#facc15" text-anchor="middle">this</text>
  </g>

  <!-- Power Sources (Plugs) -->
  <!-- Global -->
  <g transform="translate(100, 250)">
    <rect x="-40" y="-30" width="80" height="60" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
    <text x="0" y="50" font-family="Arial" font-size="12" fill="#3b82f6" text-anchor="middle">GLOBAL (Default)</text>
    <path d="M 0 -30 L 180 -100" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>
  </g>

  <!-- Object -->
  <g transform="translate(300, 250)">
    <rect x="-40" y="-30" width="80" height="60" fill="#1e293b" stroke="#34d399" stroke-width="2" rx="5"/>
    <text x="0" y="50" font-family="Arial" font-size="12" fill="#34d399" text-anchor="middle">OBJECT (Implicit)</text>
    <path d="M 0 -30 L 0 -100" stroke="#34d399" stroke-width="3"/>
  </g>

  <!-- Forced -->
  <g transform="translate(500, 250)">
    <rect x="-40" y="-30" width="80" height="60" fill="#1e293b" stroke="#f43f5e" stroke-width="2" rx="5"/>
    <text x="0" y="50" font-family="Arial" font-size="12" fill="#f43f5e" text-anchor="middle">BIND (Explicit)</text>
    <path d="M 0 -30 L -180 -100" stroke="#f43f5e" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>
  </g>

  <text x="300" y="40" font-family="Arial" font-size="20" font-weight="bold" fill="#facc15" text-anchor="middle">THE 'THIS' POWER SOURCE</text>
  <text x="300" y="330" font-family="Arial" font-size="12" fill="#94a3b8" text-anchor="middle">`this` merujuk pada sumber daya (konteks) yang sedang dicolok saat ini.</text>

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
</svg>
