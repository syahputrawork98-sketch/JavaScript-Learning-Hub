<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">SAFETY FUSE BOX (EXCEPTION HANDLING)</text>

  <!-- TRY Section -->
  <g transform="translate(50, 100)">
    <rect width="250" height="200" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="10"/>
    <text x="125" y="30" fill="#38bdf8" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">TRY (Normal Flow)</text>
    <path d="M 50 100 L 200 100" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow-blue)"/>
  </g>

  <!-- ERROR / CATCH Section -->
  <g transform="translate(300, 150)">
    <circle cx="50" cy="50" r="30" fill="#ef4444" opacity="0.2"/>
    <text x="50" y="60" fill="#ef4444" font-family="Arial" font-size="30" text-anchor="middle">⚡</text>
    <text x="50" y="100" fill="#ef4444" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">EXCEPTION</text>
  </g>

  <g transform="translate(500, 100)">
    <rect width="250" height="200" fill="#1e293b" stroke="#facc15" stroke-width="2" rx="10"/>
    <text x="125" y="30" fill="#facc15" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">CATCH (Recovery)</text>
    <path d="M 50 100 L 200 100" stroke="#facc15" stroke-width="4" marker-end="url(#arrow-gold)"/>
  </g>

  <!-- FINALLY Section -->
  <rect x="50" y="320" width="700" height="50" fill="#0f172a" stroke="#94a3b8" stroke-width="2" rx="5"/>
  <text x="400" y="350" fill="#94a3b8" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">FINALLY (Always Executes)</text>

  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8" />
    </marker>
    <marker id="arrow-gold" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#facc15" />
    </marker>
  </defs>
</svg>
