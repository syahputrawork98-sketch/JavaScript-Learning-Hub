<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="memGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Memory Grid -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="300" height="180" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,2" />
    <text x="150" y="30" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">MEMORY ALLOTMENT</text>

    <!-- Const (Permanent) -->
    <g transform="translate(20, 60)">
      <rect x="0" y="0" width="80" height="80" rx="5" fill="url(#memGrad)" filter="url(#glow)" />
      <text x="40" y="35" font-family="Courier, monospace" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">const</text>
      <text x="40" y="60" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">"Locked Cell"</text>
    </g>

    <!-- Let (Mutable) -->
    <g transform="translate(110, 60)">
      <rect x="0" y="0" width="80" height="80" rx="5" fill="#1e293b" stroke="#fbbf24" stroke-width="2" />
      <text x="40" y="35" font-family="Courier, monospace" font-size="14" fill="#fbbf24" text-anchor="middle" font-weight="bold">let</text>
      <text x="40" y="60" font-family="Arial, sans-serif" font-size="8" fill="#fbbf24" text-anchor="middle">"Relocatable"</text>
    </g>

    <!-- Var (Legacy/Global) -->
    <g transform="translate(200, 60)">
      <rect x="0" y="0" width="80" height="80" rx="5" fill="#1e293b" stroke="#94a3b8" stroke-width="1" />
      <text x="40" y="35" font-family="Courier, monospace" font-size="14" fill="#94a3b8" text-anchor="middle">var</text>
      <text x="40" y="60" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">"Global Leak"</text>
    </g>
  </g>

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">STORAGE SCHEMES</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Allocating space for data units with variable strictness and scope"</text>

</svg>
