<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="300" fill="#0f172a" rx="10"/>
  
  <!-- Title -->
  <text x="300" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#34d399" text-anchor="middle">LABELLED BATTERIES (VARIABLES)</text>
  
  <!-- Const Battery -->
  <rect x="100" y="100" width="120" height="60" fill="#1e293b" stroke="#ef4444" stroke-width="3" rx="5"/>
  <rect x="220" y="120" width="10" height="20" fill="#ef4444" rx="2"/>
  <text x="160" y="135" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">const</text>
  <text x="160" y="185" font-family="Arial, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">LOCKED (Fix)</text>
  <path d="M 130 90 L 190 90" stroke="#ef4444" stroke-width="2"/>
  <text x="160" y="80" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">mainCore</text>
  
  <!-- Let Battery -->
  <rect x="380" y="100" width="120" height="60" fill="#1e293b" stroke="#34d399" stroke-width="3" rx="5"/>
  <rect x="500" y="120" width="10" height="20" fill="#34d399" rx="2"/>
  <text x="440" y="135" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">let</text>
  <text x="440" y="185" font-family="Arial, sans-serif" font-size="12" fill="#34d399" text-anchor="middle">UNLOCKED (Dinamis)</text>
  <path d="M 410 90 L 470 90" stroke="#34d399" stroke-width="2"/>
  <text x="440" y="80" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">currentTemp</text>
  
  <!-- Re-assignment Visual -->
  <path d="M 440 200 L 440 240" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="440" y="260" font-family="Arial, sans-serif" font-size="10" fill="#34d399" text-anchor="middle">Ubah Nilai: OK</text>
  
  <path d="M 160 200 L 160 240" stroke="#ef4444" stroke-width="2"/>
  <text x="160" y="240" font-family="Arial, sans-serif" font-size="20" fill="#ef4444" text-anchor="middle">✘</text>
  <text x="160" y="260" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">Ubah Nilai: ERROR</text>
  
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34d399" />
    </marker>
  </defs>
  
  <!-- Legend -->
  <text x="50" y="285" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Nama Variabel = Label pada Baterai. Nilai = Energi di dalam Baterai.</text>
</svg>
