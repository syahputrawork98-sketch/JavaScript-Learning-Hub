<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- Bitwise Circuitry -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="300" height="180" rx="10" fill="#1e293b" stroke="#f472b6" stroke-width="2" stroke-dasharray="4,2" />
    <text x="150" y="30" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">BITWISE CIRCUITS</text>

    <!-- Shift Operation -->
    <g transform="translate(30, 60)">
      <rect x="0" y="0" width="100" height="80" rx="5" fill="url(#bitGrad)" filter="url(#glow)" />
      <text x="50" y="35" font-family="Courier, monospace" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">&lt;&lt; &gt;&gt;</text>
      <text x="50" y="60" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Bit Shifting</text>
    </g>

    <!-- Binary Mask -->
    <g transform="translate(170, 60)">
      <rect x="0" y="0" width="100" height="80" rx="5" fill="#1e293b" stroke="#f472b6" stroke-width="2" />
      <text x="50" y="35" font-family="Courier, monospace" font-size="20" fill="#f472b6" text-anchor="middle" font-weight="bold">&amp; | ^ ~</text>
      <text x="50" y="60" font-family="Arial, sans-serif" font-size="10" fill="#f472b6" text-anchor="middle">Binary Masks</text>
    </g>
  </g>

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">SUB-ATOMIC MANIPULATION</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Precise manipulation of energy at the binary level"</text>

</svg>
