<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="300" fill="#0f172a" rx="10"/>
  
  <!-- Gages Title -->
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">ARITHMETIC POWER GAGES</text>
  
  <!-- Add/Sub Gage -->
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="60" fill="#1e293b" stroke="#38bdf8" stroke-width="4"/>
    <path d="M-40 0 A40 40 0 0 1 40 0" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="2,2"/>
    <line x1="0" y1="0" x2="30" y2="-40" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
    <text x="0" y="85" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">ADD / SUB (+ -)</text>
    <text x="0" y="5" fill="#f8fafc" font-family="Courier New" font-size="12" text-anchor="middle">Flow Control</text>
  </g>
  
  <!-- Mul/Div Gage -->
  <g transform="translate(400, 100)">
    <circle cx="0" cy="0" r="60" fill="#1e293b" stroke="#f472b6" stroke-width="4"/>
    <path d="M-40 0 A40 40 0 0 1 40 0" fill="none" stroke="#f472b6" stroke-width="2" stroke-dasharray="2,2"/>
    <line x1="0" y1="0" x2="-20" y2="-45" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
    <text x="0" y="85" fill="#f472b6" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">MUL / DIV (* /)</text>
    <text x="0" y="5" fill="#f8fafc" font-family="Courier New" font-size="12" text-anchor="middle">Amplification</text>
  </g>
  
  <!-- Mod/Exp Gage -->
  <g transform="translate(700, 100)">
    <circle cx="0" cy="0" r="60" fill="#1e293b" stroke="#a78bfa" stroke-width="4"/>
    <path d="M-40 0 A40 40 0 0 1 40 0" fill="none" stroke="#a78bfa" stroke-width="2" stroke-dasharray="2,2"/>
    <line x1="0" y1="0" x2="45" y2="-15" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
    <text x="0" y="85" fill="#a78bfa" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">MOD / EXP (% **)</text>
    <text x="0" y="5" fill="#f8fafc" font-family="Courier New" font-size="12" text-anchor="middle">Residue/Peak</text>
  </g>
</svg>
