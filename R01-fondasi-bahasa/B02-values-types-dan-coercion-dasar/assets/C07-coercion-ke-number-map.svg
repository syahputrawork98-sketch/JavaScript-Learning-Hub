  <rect x="640" y="110" width="240" height="80" rx="10" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="710" y="158" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#991b1b">Validate</text>

  <rect x="930" y="110" width="210" height="80" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
