  <text x="670" y="415" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">2. Bisa mengolah data array/object dasar.</text>
  <text x="670" y="455" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">3. Bisa menangani error dasar dan membawa catatan miskonsepsi.</text>
