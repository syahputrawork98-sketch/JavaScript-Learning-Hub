  <text x="95" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#166534">7 kemampuan inti harus dicek</text>

  <rect x="450" y="110" width="300" height="110" rx="12" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
