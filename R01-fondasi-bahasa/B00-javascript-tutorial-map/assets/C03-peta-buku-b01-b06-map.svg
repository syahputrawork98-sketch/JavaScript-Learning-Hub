  <text x="90" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Alur Belajar R01</text>
  <text x="90" y="370" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">1. Mulai dari membaca bentuk sintaks dan token dasar di B01.</text>
  <text x="90" y="410" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">2. Lanjut ke perilaku nilai dan coercion di B02 agar output kode tidak terasa misterius.</text>
  <text x="90" y="450" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">3. Bangun logika program di B03 dan pecah ke fungsi di B04.</text>
  <text x="90" y="490" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">4. Rapikan data dengan object/array di B05 dan tutup fondasi dengan robustness serta modules di B06.</text>
