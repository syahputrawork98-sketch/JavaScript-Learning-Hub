<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">C01 Cara Pakai R01 Map</text>

  <rect x="60" y="110" width="300" height="110" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="159" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e3a8a">P0-P1</text>
  <text x="108" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#1e3a8a">mulai dari rute lengkap</text>

  <rect x="450" y="110" width="300" height="110" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="549" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#166534">P2</text>
  <text x="495" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#166534">boleh mulai dari rute minimum</text>

  <rect x="840" y="110" width="300" height="110" rx="12" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="915" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#92400e">Switch</text>
  <text x="876" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#92400e">sesuaikan dari hasil checkpoint</text>

  <line x1="360" y1="165" x2="450" y2="165" stroke="#334155" stroke-width="3"/>
  <polygon points="450,165 438,158 438,172" fill="#334155"/>
  <line x1="750" y1="165" x2="840" y2="165" stroke="#334155" stroke-width="3"/>
  <polygon points="840,165 828,158 828,172" fill="#334155"/>

  <rect x="60" y="280" width="500" height="260" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="325" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Rute Minimum</text>
  <text x="90" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">B01 -> B03 -> B04</text>
  <text x="90" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">Cocok untuk pembaca yang sudah punya dasar.</text>
  <text x="90" y="465" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">Risiko: gap di B02, B05, dan B06.</text>

  <rect x="640" y="280" width="500" height="260" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="670" y="325" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Rute Lengkap</text>
  <text x="670" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">B01 -> B02 -> B03 -> B04 -> B05 -> B06</text>
  <text x="670" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">Ini jalur default yang direkomendasikan.</text>
  <text x="670" y="465" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">Paling aman untuk membangun fondasi stabil.</text>
</svg>
