<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">C10 Default export dan Kapan Memakainya Map</text>

  <rect x="60" y="110" width="320" height="110" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="154" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#166534">Cocok</text>
  <text x="102" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#166534">satu nilai utama per module</text>

  <rect x="440" y="110" width="320" height="110" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="508" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e3a8a">Bentuk</text>
  <text x="487" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#1e3a8a">import tanpa kurung kurawal</text>

  <rect x="820" y="110" width="320" height="110" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="902" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#991b1b">Batas</text>
  <text x="875" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#991b1b">hanya satu default export</text>

  <line x1="380" y1="165" x2="440" y2="165" stroke="#334155" stroke-width="3"/>
  <polygon points="440,165 428,158 428,172" fill="#334155"/>
  <line x1="760" y1="165" x2="820" y2="165" stroke="#334155" stroke-width="3"/>
  <polygon points="820,165 808,158 808,172" fill="#334155"/>

  <rect x="60" y="280" width="500" height="270" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="325" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Contoh</text>
  <text x="90" y="375" font-family="Consolas, monospace" font-size="18" fill="#1e293b">export default function greet(name) {</text>
  <text x="90" y="410" font-family="Consolas, monospace" font-size="18" fill="#1e293b">  return `Halo, ${name}`;</text>
  <text x="90" y="445" font-family="Consolas, monospace" font-size="18" fill="#1e293b">}</text>
  <text x="90" y="495" font-family="Consolas, monospace" font-size="18" fill="#1e293b">import greetUser from './greet.js';</text>

  <rect x="640" y="280" width="500" height="270" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="670" y="325" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Poin Inti</text>
  <text x="670" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">1. Cocok bila file punya satu fokus utama.</text>
  <text x="670" y="415" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">2. Nama import lokal bisa diubah, jadi tetap disiplin menamai.</text>
  <text x="670" y="455" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">3. Jika banyak nilai setara, named export sering lebih jelas.</text>
  <text x="670" y="495" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">4. Satu file tidak boleh punya banyak default export.</text>
</svg>
