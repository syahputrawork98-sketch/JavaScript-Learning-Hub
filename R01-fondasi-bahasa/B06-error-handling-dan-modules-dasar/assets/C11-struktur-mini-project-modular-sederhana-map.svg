<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">C11 Struktur Mini Project Modular Sederhana Map</text>

  <rect x="60" y="110" width="260" height="110" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="125" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e3a8a">Entry Point</text>
  <text x="101" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#1e3a8a">index.js / example.js</text>

  <rect x="390" y="110" width="260" height="110" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="469" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#166534">Store</text>
  <text x="431" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#166534">task-store.js</text>

  <rect x="720" y="110" width="190" height="110" rx="12" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="772" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#92400e">Format</text>
  <text x="757" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#92400e">task-format.js</text>

  <rect x="980" y="110" width="160" height="110" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="1015" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#991b1b">Validasi</text>
  <text x="1008" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#991b1b">task-validator.js</text>

  <line x1="320" y1="165" x2="390" y2="165" stroke="#334155" stroke-width="3"/>
  <polygon points="390,165 378,158 378,172" fill="#334155"/>
  <line x1="650" y1="165" x2="720" y2="165" stroke="#334155" stroke-width="3"/>
  <polygon points="720,165 708,158 708,172" fill="#334155"/>
  <line x1="910" y1="165" x2="980" y2="165" stroke="#334155" stroke-width="3"/>
  <polygon points="980,165 968,158 968,172" fill="#334155"/>

  <rect x="60" y="280" width="500" height="270" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="325" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Alur Mini Project</text>
  <text x="90" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">1. Entry point menerima aksi utama.</text>
  <text x="90" y="415" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">2. Store menyimpan atau membaca data tugas.</text>
  <text x="90" y="455" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">3. Formatter merapikan output.</text>
  <text x="90" y="495" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">4. Validator menjaga input sebelum masuk store.</text>

  <rect x="640" y="280" width="500" height="270" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="670" y="325" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Poin Inti</text>
  <text x="670" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">1. Tiap file punya tanggung jawab lebih jelas.</text>
  <text x="670" y="415" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">2. Perubahan kecil tidak harus membongkar semua file.</text>
  <text x="670" y="455" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">3. Struktur sederhana sudah cukup untuk project pemula.</text>
  <text x="670" y="495" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">4. Modularisasi dipakai secukupnya, bukan berlebihan.</text>
</svg>
