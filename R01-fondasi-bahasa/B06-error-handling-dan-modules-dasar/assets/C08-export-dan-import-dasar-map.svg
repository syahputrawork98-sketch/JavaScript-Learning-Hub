<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">C08 export dan import Dasar Map</text>

  <rect x="60" y="110" width="260" height="110" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="135" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e3a8a">Module A</text>
  <text x="112" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#1e3a8a">punya nilai untuk dibagi</text>

  <rect x="390" y="110" width="420" height="110" rx="12" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="566" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#92400e">export / import</text>
  <text x="474" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#92400e">hubungkan file sumber ke file pemakai</text>

  <rect x="880" y="110" width="260" height="110" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="954" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#166534">Module B</text>
  <text x="929" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#166534">pakai tanpa menyalin</text>

  <line x1="320" y1="165" x2="390" y2="165" stroke="#334155" stroke-width="3"/>
  <polygon points="390,165 378,158 378,172" fill="#334155"/>
  <line x1="810" y1="165" x2="880" y2="165" stroke="#334155" stroke-width="3"/>
  <polygon points="880,165 868,158 868,172" fill="#334155"/>

  <rect x="60" y="280" width="500" height="270" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="325" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Contoh Dasar</text>
  <text x="90" y="375" font-family="Consolas, monospace" font-size="18" fill="#1e293b">export const appName = 'Belajar Modules';</text>
  <text x="90" y="420" font-family="Consolas, monospace" font-size="18" fill="#1e293b">import { appName } from './config.js';</text>
  <text x="90" y="470" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Path file harus tepat agar hubungan antar file terbentuk.</text>

  <rect x="640" y="280" width="500" height="270" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="670" y="325" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Poin Inti</text>
  <text x="670" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">1. export membuka nilai dari sebuah file.</text>
  <text x="670" y="415" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">2. import mengambil nilai itu di file lain.</text>
  <text x="670" y="455" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">3. Tidak semua isi file harus diexport.</text>
  <text x="670" y="495" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">4. Path yang salah sering jadi sumber bug awal.</text>
</svg>
