<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">C03 try...catch Dasar Map</text>

  <rect x="60" y="110" width="320" height="120" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="190" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#1e3a8a">try</text>
  <text x="111" y="191" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#1e3a8a">jalankan operasi yang bisa gagal</text>

  <rect x="440" y="110" width="320" height="120" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="553" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#991b1b">error</text>
  <text x="511" y="191" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#991b1b">runtime melempar kegagalan</text>

  <rect x="820" y="110" width="320" height="120" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="930" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#166534">catch</text>
  <text x="892" y="191" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#166534">baca dan respons error</text>

  <line x1="380" y1="170" x2="440" y2="170" stroke="#334155" stroke-width="3"/>
  <polygon points="440,170 428,163 428,177" fill="#334155"/>
  <line x1="760" y1="170" x2="820" y2="170" stroke="#334155" stroke-width="3"/>
  <polygon points="820,170 808,163 808,177" fill="#334155"/>

  <rect x="60" y="280" width="500" height="270" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="325" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Contoh Alur</text>
  <text x="90" y="375" font-family="Consolas, monospace" font-size="18" fill="#1e293b">try { JSON.parse('{invalid json}'); }</text>
  <text x="90" y="410" font-family="Consolas, monospace" font-size="18" fill="#1e293b">catch (error) { console.log(error.message); }</text>
  <text x="90" y="460" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Jika parse gagal, alur pindah ke catch.</text>
  <text x="90" y="495" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Di catch, kita bisa membaca error.name dan error.message.</text>

  <rect x="640" y="280" width="500" height="270" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="670" y="325" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Poin Inti</text>
  <text x="670" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">1. try bukan jaminan semua masalah hilang.</text>
  <text x="670" y="415" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">2. catch memberi tempat respons yang sadar.</text>
  <text x="670" y="455" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">3. Tangani secukupnya, jangan menutup bug sembarangan.</text>
  <text x="670" y="495" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">4. SyntaxError parse-awal tidak diselesaikan oleh try biasa.</text>
</svg>
