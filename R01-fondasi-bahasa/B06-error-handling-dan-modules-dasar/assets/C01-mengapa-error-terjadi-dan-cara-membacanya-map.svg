<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">C01 Mengapa Error Terjadi dan Cara Membacanya Map</text>

  <rect x="60" y="110" width="300" height="110" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="155" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#991b1b">Error</text>
  <text x="107" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#991b1b">sinyal ada asumsi gagal</text>

  <rect x="450" y="110" width="300" height="110" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="540" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e3a8a">Baca</text>
  <text x="498" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#1e3a8a">jenis, pesan, lokasi</text>

  <rect x="840" y="110" width="300" height="110" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="922" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#166534">Tindak</text>
  <text x="888" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#166534">cek nama, nilai, asumsi</text>

  <line x1="360" y1="165" x2="450" y2="165" stroke="#334155" stroke-width="3"/>
  <polygon points="450,165 438,158 438,172" fill="#334155"/>
  <line x1="750" y1="165" x2="840" y2="165" stroke="#334155" stroke-width="3"/>
  <polygon points="840,165 828,158 828,172" fill="#334155"/>

  <rect x="60" y="280" width="500" height="260" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="325" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Contoh Pesan Error</text>
  <text x="90" y="380" font-family="Consolas, monospace" font-size="20" fill="#1e293b">ReferenceError: userName is not defined</text>
  <text x="90" y="430" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Jenis: ReferenceError</text>
  <text x="90" y="465" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Pesan: userName is not defined</text>
  <text x="90" y="500" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Lokasi: cek file dan nomor baris</text>

  <rect x="640" y="280" width="500" height="260" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="670" y="325" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Respons Awal yang Sehat</text>
  <text x="670" y="380" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">1. Jangan panik dulu.</text>
  <text x="670" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">2. Baca jenis error.</text>
  <text x="670" y="460" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">3. Cari nama atau nilai yang gagal.</text>
  <text x="670" y="500" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">4. Cocokkan dengan asumsi program.</text>
</svg>
