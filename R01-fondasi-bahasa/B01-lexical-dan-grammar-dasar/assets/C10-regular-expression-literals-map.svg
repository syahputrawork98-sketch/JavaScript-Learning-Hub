<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    C10 Regular Expression Literals Map
  </text>

  <rect x="60" y="110" width="360" height="170" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="90" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e3a8a">Regex Literal</text>
  <text x="90" y="185" font-family="Consolas, monospace" font-size="18" fill="#0f172a">/pattern/flags</text>
  <text x="90" y="220" font-family="Consolas, monospace" font-size="18" fill="#0f172a">/abc/i  /[a-z]at/g</text>
  <text x="90" y="250" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#334155">Static pattern notation</text>

  <rect x="450" y="110" width="330" height="170" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="480" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#14532d">Common flags</text>
  <text x="480" y="185" font-family="Consolas, monospace" font-size="18" fill="#0f172a">i => case-insensitive</text>
  <text x="480" y="215" font-family="Consolas, monospace" font-size="18" fill="#0f172a">g => global</text>
  <text x="480" y="245" font-family="Consolas, monospace" font-size="18" fill="#0f172a">m => multiline</text>

  <rect x="810" y="110" width="340" height="170" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="840" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#7f1d1d">Ambiguity</text>
  <text x="840" y="185" font-family="Consolas, monospace" font-size="17" fill="#991b1b">10 / 2  (division)</text>
  <text x="840" y="215" font-family="Consolas, monospace" font-size="17" fill="#991b1b">/2/    (regex literal)</text>
  <text x="840" y="245" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#7f1d1d">Context decides token meaning</text>

  <rect x="60" y="320" width="1090" height="180" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Guideline</text>
  <text x="90" y="395" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Gunakan regex literal untuk pola statis.
  </text>
  <text x="90" y="425" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Escape karakter khusus dengan benar (mis. '.', '/', '\\').
  </text>
  <text x="90" y="455" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Jaga regex tetap terbaca; hindari kompleksitas berlebihan.
  </text>
</svg>
