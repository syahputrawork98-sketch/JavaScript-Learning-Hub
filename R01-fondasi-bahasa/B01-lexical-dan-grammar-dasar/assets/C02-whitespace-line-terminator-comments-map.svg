<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    C02 Whitespace, Line Terminator, Comments Map
  </text>

  <rect x="60" y="110" width="330" height="140" rx="12" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="90" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0c4a6e">Whitespace</text>
  <text x="90" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#164e63">
    Improves readability and token separation.
  </text>
  <text x="90" y="220" font-family="Consolas, monospace" font-size="17" fill="#0f172a">const total = 5 + 7;</text>

  <rect x="435" y="110" width="330" height="140" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="465" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#14532d">Line Terminator</text>
  <text x="465" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#166534">
    Ends lines; interacts with ASI behavior.
  </text>
  <text x="465" y="220" font-family="Consolas, monospace" font-size="17" fill="#0f172a">const a = 1; const b = 2;</text>

  <rect x="810" y="110" width="330" height="140" rx="12" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="840" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#78350f">Comments</text>
  <text x="840" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#92400e">
    Add context without changing runtime result.
  </text>
  <text x="840" y="220" font-family="Consolas, monospace" font-size="17" fill="#0f172a">// explain intent</text>

  <line x1="390" y1="180" x2="435" y2="180" stroke="#334155" stroke-width="3"/>
  <line x1="765" y1="180" x2="810" y2="180" stroke="#334155" stroke-width="3"/>

  <rect x="60" y="290" width="530" height="220" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="330" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Good style</text>
  <text x="90" y="365" font-family="Consolas, monospace" font-size="17" fill="#0f172a">const total = price * quantity;</text>
  <text x="90" y="398" font-family="Consolas, monospace" font-size="17" fill="#0f172a">// tax separated for clarity</text>
  <text x="90" y="431" font-family="Consolas, monospace" font-size="17" fill="#0f172a">const tax = total * 0.11;</text>
  <text x="90" y="470" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    Clear spacing + meaningful comments.
  </text>

  <rect x="625" y="290" width="515" height="220" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="655" y="330" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Common pitfalls</text>
  <text x="655" y="365" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Over-rely on ASI without understanding line-break risks
  </text>
  <text x="655" y="395" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Remove spacing until code becomes hard to scan
  </text>
  <text x="655" y="425" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Write noisy comments that repeat obvious code
  </text>
  <text x="655" y="465" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    Goal: readable source text first, then optimization.
  </text>
</svg>
