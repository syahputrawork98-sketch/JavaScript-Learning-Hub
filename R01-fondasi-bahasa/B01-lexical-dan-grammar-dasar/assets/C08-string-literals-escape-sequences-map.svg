<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    C08 String Literals and Escape Sequences Map
  </text>

  <rect x="60" y="110" width="360" height="170" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="90" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e3a8a">String forms</text>
  <text x="90" y="185" font-family="Consolas, monospace" font-size="18" fill="#0f172a">'...'</text>
  <text x="90" y="215" font-family="Consolas, monospace" font-size="18" fill="#0f172a">\"...\"</text>
  <text x="90" y="245" font-family="Consolas, monospace" font-size="18" fill="#0f172a">`...`</text>

  <rect x="450" y="110" width="320" height="170" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="480" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#14532d">Escapes</text>
  <text x="480" y="185" font-family="Consolas, monospace" font-size="18" fill="#0f172a">\\'  \\\"  \\\\</text>
  <text x="480" y="215" font-family="Consolas, monospace" font-size="18" fill="#0f172a">\\n  \\t</text>
  <text x="480" y="245" font-family="Consolas, monospace" font-size="18" fill="#0f172a">\\u2764  \\u{1F600}</text>

  <rect x="800" y="110" width="350" height="170" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="830" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#7f1d1d">Common issues</text>
  <text x="830" y="185" font-family="Consolas, monospace" font-size="17" fill="#991b1b">'It's broken' (quote clash)</text>
  <text x="830" y="215" font-family="Consolas, monospace" font-size="17" fill="#991b1b">\"C:\\new\" (escape confusion)</text>
  <text x="830" y="245" font-family="Consolas, monospace" font-size="17" fill="#991b1b">raw newline in \"...\"</text>

  <rect x="60" y="320" width="1090" height="180" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Practical guideline</text>
  <text x="90" y="395" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Pakai template literal untuk multiline/interpolasi.
  </text>
  <text x="90" y="425" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Escape hanya saat dibutuhkan; jangan over-escape.
  </text>
  <text x="90" y="455" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Verifikasi output string yang punya karakter spesial.
  </text>
</svg>
