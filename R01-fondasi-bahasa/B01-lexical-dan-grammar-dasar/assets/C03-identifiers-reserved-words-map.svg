<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    C03 Identifiers and Reserved Words Map
  </text>

  <rect x="60" y="110" width="520" height="170" rx="12" fill="#ecfeff" stroke="#22d3ee" stroke-width="2"/>
  <text x="90" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0e7490">Valid Identifier Rules</text>
  <text x="90" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#164e63">
    - start with letter, _ or $
  </text>
  <text x="90" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#164e63">
    - may contain digits after first character
  </text>
  <text x="90" y="250" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#164e63">
    - no spaces, case-sensitive
  </text>

  <rect x="620" y="110" width="520" height="170" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="650" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#7f1d1d">Reserved Words</text>
  <text x="650" y="190" font-family="Consolas, monospace" font-size="19" fill="#991b1b">
    if, for, return, class, const
  </text>
  <text x="650" y="225" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#7f1d1d">
    Cannot be used as plain identifiers.
  </text>
  <text x="650" y="255" font-family="Consolas, monospace" font-size="18" fill="#991b1b">
    // const for = 1;  (invalid)
  </text>

  <rect x="60" y="315" width="520" height="190" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="355" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Valid examples</text>
  <text x="90" y="390" font-family="Consolas, monospace" font-size="18" fill="#1e293b">const userName = 'Arta';</text>
  <text x="90" y="420" font-family="Consolas, monospace" font-size="18" fill="#1e293b">const _internalId = 'A1';</text>
  <text x="90" y="450" font-family="Consolas, monospace" font-size="18" fill="#1e293b">const $cache = {};</text>
  <text x="90" y="485" font-family="Consolas, monospace" font-size="18" fill="#1e293b">function greetUser(name) { ... }</text>

  <rect x="620" y="315" width="520" height="190" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="650" y="355" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Invalid examples</text>
  <text x="650" y="390" font-family="Consolas, monospace" font-size="18" fill="#b91c1c">const 2user = 'A';</text>
  <text x="650" y="420" font-family="Consolas, monospace" font-size="18" fill="#b91c1c">const user name = 'A';</text>
  <text x="650" y="450" font-family="Consolas, monospace" font-size="18" fill="#b91c1c">const return = 'ok';</text>
  <text x="650" y="485" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    Prefer descriptive camelCase naming.
  </text>
</svg>
