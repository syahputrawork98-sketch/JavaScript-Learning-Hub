<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    C15 Lexical Goals and Ambiguity Map
  </text>

  <rect x="60" y="110" width="500" height="180" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="90" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e3a8a">Lexical goal idea</text>
  <text x="90" y="185" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    Parser chooses tokenization mode by grammar context.
  </text>
  <text x="90" y="220" font-family="Consolas, monospace" font-size="18" fill="#0f172a">same char, different meaning</text>

  <rect x="590" y="110" width="550" height="180" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="620" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#7f1d1d">Classic ambiguity</text>
  <text x="620" y="185" font-family="Consolas, monospace" font-size="18" fill="#991b1b">10 / 2   => division</text>
  <text x="620" y="220" font-family="Consolas, monospace" font-size="18" fill="#991b1b">/2/      => regex literal</text>
  <text x="620" y="255" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#7f1d1d">
    Context decides which token rule applies.
  </text>

  <rect x="60" y="320" width="1080" height="180" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Human-readable strategy</text>
  <text x="90" y="395" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Tulis batas statement dengan jelas.
  </text>
  <text x="90" y="425" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Pakai semicolon eksplisit untuk mengurangi ambiguity dari line break.
  </text>
  <text x="90" y="455" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Valid parser belum tentu aman maintenance; utamakan clarity.
  </text>
</svg>
