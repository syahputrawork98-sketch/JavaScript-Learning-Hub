<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    C09 Template Literals and Tagged Template Map
  </text>

  <rect x="60" y="110" width="350" height="170" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="90" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e3a8a">Template Literal</text>
  <text x="90" y="185" font-family="Consolas, monospace" font-size="18" fill="#0f172a">`Halo, ${name}!`</text>
  <text x="90" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#334155">Interpolate + multiline support</text>
  <text x="90" y="250" font-family="Consolas, monospace" font-size="18" fill="#0f172a">`Baris 1\nBaris 2`</text>

  <rect x="440" y="110" width="350" height="170" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="470" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#14532d">Tagged Template</text>
  <text x="470" y="185" font-family="Consolas, monospace" font-size="17" fill="#0f172a">tag`User: ${name}`</text>
  <text x="470" y="220" font-family="Consolas, monospace" font-size="17" fill="#0f172a">tag(strings, ...values)</text>
  <text x="470" y="250" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#334155">Custom processing layer</text>

  <rect x="820" y="110" width="330" height="170" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="850" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#7f1d1d">Pitfalls</text>
  <text x="850" y="185" font-family="Consolas, monospace" font-size="17" fill="#991b1b">'${name}' => no interpolation</text>
  <text x="850" y="215" font-family="Consolas, monospace" font-size="17" fill="#991b1b">complex logic inside ${...}</text>
  <text x="850" y="245" font-family="Consolas, monospace" font-size="17" fill="#991b1b">mixing tag(...) vs tag`...`</text>

  <rect x="60" y="320" width="1090" height="180" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Decision guide</text>
  <text x="90" y="395" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Gunakan template literal untuk string dinamis sehari-hari.
  </text>
  <text x="90" y="425" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Simpan ekspresi kompleks di variabel dulu, lalu interpolasi hasilnya.
  </text>
  <text x="90" y="455" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Pakai tagged template jika memang butuh formatting/custom parser.
  </text>
</svg>
