<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <rect width="1200" height="520" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    C01 Lexical Fundamentals Map
  </text>

  <rect x="60" y="110" width="220" height="80" rx="10" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="90" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1e3a8a">Source Code</text>

  <rect x="350" y="110" width="220" height="80" rx="10" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="420" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#166534">Characters</text>

  <rect x="640" y="110" width="220" height="80" rx="10" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="730" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#991b1b">Tokens</text>

  <rect x="930" y="110" width="220" height="80" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="995" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#92400e">Grammar</text>

  <line x1="280" y1="150" x2="350" y2="150" stroke="#334155" stroke-width="3"/>
  <polygon points="350,150 338,143 338,157" fill="#334155"/>

  <line x1="570" y1="150" x2="640" y2="150" stroke="#334155" stroke-width="3"/>
  <polygon points="640,150 628,143 628,157" fill="#334155"/>

  <line x1="860" y1="150" x2="930" y2="150" stroke="#334155" stroke-width="3"/>
  <polygon points="930,150 918,143 918,157" fill="#334155"/>

  <rect x="60" y="250" width="520" height="220" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="290" font-family="Consolas, monospace" font-size="24" fill="#0f172a">const message = 'Halo';</text>
  <text x="90" y="340" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#334155">Token breakdown:</text>
  <text x="90" y="375" font-family="Consolas, monospace" font-size="19" fill="#1e293b">const | message | = | 'Halo' | ;</text>
  <text x="90" y="415" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">
    Case-sensitive: score != Score
  </text>

  <rect x="640" y="250" width="510" height="220" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="670" y="300" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Core idea</text>
  <text x="670" y="340" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">
    JavaScript reads code as lexical units before execution.
  </text>
  <text x="670" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">
    The same characters can have different meaning by context.
  </text>
  <text x="670" y="410" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">
    Clean token boundaries improve readability and reduce syntax errors.
  </text>
</svg>
