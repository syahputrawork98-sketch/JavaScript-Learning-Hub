<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    C12 Unicode and International Identifiers Map
  </text>

  <rect x="60" y="110" width="360" height="170" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="90" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e3a8a">Unicode source text</text>
  <text x="90" y="185" font-family="Consolas, monospace" font-size="18" fill="#0f172a">'こんにちは'</text>
  <text x="90" y="215" font-family="Consolas, monospace" font-size="18" fill="#0f172a">'مرحبا'</text>
  <text x="90" y="245" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#334155">Strings support global text.</text>

  <rect x="450" y="110" width="360" height="170" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="480" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#14532d">Identifier examples</text>
  <text x="480" y="185" font-family="Consolas, monospace" font-size="18" fill="#0f172a">const nama = 'Arta';</text>
  <text x="480" y="215" font-family="Consolas, monospace" font-size="18" fill="#0f172a">const café = 'kopi';</text>
  <text x="480" y="245" font-family="Consolas, monospace" font-size="18" fill="#0f172a">const caf\\u00E9 = 'kopi';</text>

  <rect x="840" y="110" width="310" height="170" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="870" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#7f1d1d">Risk area</text>
  <text x="870" y="185" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#991b1b">
    Confusable characters
  </text>
  <text x="870" y="215" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#991b1b">
    Normalization differences
  </text>
  <text x="870" y="245" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#991b1b">
    Tooling/font portability
  </text>

  <rect x="60" y="320" width="1090" height="180" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Team guideline</text>
  <text x="90" y="395" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Unicode string content: generally safe and useful for i18n.
  </text>
  <text x="90" y="425" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Identifier Unicode: possible, but follow team naming policy.
  </text>
  <text x="90" y="455" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Use lint/review checks to avoid confusable and hidden-character issues.
  </text>
</svg>
