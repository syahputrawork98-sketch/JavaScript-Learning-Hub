<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    C07 Numeric Literals Lanjutan Map
  </text>

  <rect x="60" y="110" width="260" height="150" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="90" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e3a8a">Base Literals</text>
  <text x="90" y="185" font-family="Consolas, monospace" font-size="18" fill="#0f172a">42</text>
  <text x="90" y="215" font-family="Consolas, monospace" font-size="18" fill="#0f172a">0b1010 | 0o52 | 0x2a</text>

  <rect x="350" y="110" width="260" height="150" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="380" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#14532d">Separator</text>
  <text x="380" y="185" font-family="Consolas, monospace" font-size="18" fill="#0f172a">1_500_000</text>
  <text x="380" y="215" font-family="Consolas, monospace" font-size="18" fill="#0f172a">0b1111_0000</text>

  <rect x="640" y="110" width="260" height="150" rx="12" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="670" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#78350f">BigInt</text>
  <text x="670" y="185" font-family="Consolas, monospace" font-size="18" fill="#0f172a">9007199254740991n</text>
  <text x="670" y="215" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#92400e">Integer besar</text>

  <rect x="930" y="110" width="220" height="150" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="960" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#7f1d1d">Pitfalls</text>
  <text x="960" y="185" font-family="Consolas, monospace" font-size="17" fill="#991b1b">1__000 (invalid)</text>
  <text x="960" y="215" font-family="Consolas, monospace" font-size="17" fill="#991b1b">10n + 5 (TypeError)</text>

  <rect x="60" y="310" width="1090" height="190" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="350" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Rule of thumb</text>
  <text x="90" y="385" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Decimal untuk angka umum, binary/hex untuk konteks bit-level.
  </text>
  <text x="90" y="415" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Separator (`_`) untuk keterbacaan, tidak mengubah nilai runtime.
  </text>
  <text x="90" y="445" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - BigInt (`n`) untuk integer sangat besar, jangan campur langsung dengan Number.
  </text>
  <text x="90" y="475" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Hindari format ambigu dan invalid separator placement.
  </text>
</svg>
