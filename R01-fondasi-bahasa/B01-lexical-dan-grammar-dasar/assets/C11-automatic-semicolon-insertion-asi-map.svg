<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    C11 Automatic Semicolon Insertion (ASI) Map
  </text>

  <rect x="60" y="110" width="520" height="180" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="90" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e3a8a">ASI basics</text>
  <text x="90" y="185" font-family="Consolas, monospace" font-size="18" fill="#0f172a">const a = 1</text>
  <text x="90" y="215" font-family="Consolas, monospace" font-size="18" fill="#0f172a">const b = 2</text>
  <text x="90" y="250" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#334155">Parser may insert semicolon implicitly.</text>

  <rect x="620" y="110" width="520" height="180" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="650" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#7f1d1d">Danger pattern</text>
  <text x="650" y="185" font-family="Consolas, monospace" font-size="17" fill="#991b1b">return</text>
  <text x="650" y="215" font-family="Consolas, monospace" font-size="17" fill="#991b1b">{ name: 'Arta' }</text>
  <text x="650" y="250" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#7f1d1d">
    ASI inserts semicolon after return => undefined.
  </text>

  <rect x="60" y="320" width="520" height="180" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Line-start symbols</text>
  <text x="90" y="395" font-family="Consolas, monospace" font-size="17" fill="#1e293b">const x = 10</text>
  <text x="90" y="425" font-family="Consolas, monospace" font-size="17" fill="#1e293b">(function(){ ... })();</text>
  <text x="90" y="460" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#334155">
    Add explicit semicolon to avoid ambiguous continuation.
  </text>

  <rect x="620" y="320" width="520" height="180" rx="12" fill="#ecfeff" stroke="#22d3ee" stroke-width="2"/>
  <text x="650" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0e7490">Safe policy</text>
  <text x="650" y="395" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#164e63">
    - Pakai semicolon eksplisit secara konsisten
  </text>
  <text x="650" y="425" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#164e63">
    - Hindari line break setelah return/break/continue/throw
  </text>
  <text x="650" y="455" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#164e63">
    - Gunakan formatter/linter untuk menjaga style stabil
  </text>
</svg>
