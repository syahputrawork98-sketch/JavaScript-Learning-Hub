<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    C06 Strict Mode Dasar Map
  </text>

  <rect x="60" y="110" width="510" height="190" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="90" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#7f1d1d">Without strict mode</text>
  <text x="90" y="185" font-family="Consolas, monospace" font-size="18" fill="#991b1b">function run() {</text>
  <text x="120" y="215" font-family="Consolas, monospace" font-size="18" fill="#991b1b">totalPrice = 100;</text>
  <text x="90" y="245" font-family="Consolas, monospace" font-size="18" fill="#991b1b">}</text>
  <text x="90" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#7f1d1d">
    Bisa lolos dan membuat global tak sengaja.
  </text>

  <rect x="630" y="110" width="510" height="190" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="660" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#14532d">With strict mode</text>
  <text x="660" y="185" font-family="Consolas, monospace" font-size="18" fill="#166534">'use strict';</text>
  <text x="660" y="215" font-family="Consolas, monospace" font-size="18" fill="#166534">function run() { totalPrice = 100; }</text>
  <text x="660" y="245" font-family="Consolas, monospace" font-size="18" fill="#166534">// ReferenceError</text>
  <text x="660" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#14532d">
    Error muncul lebih cepat, bug lebih mudah dideteksi.
  </text>

  <line x1="570" y1="205" x2="630" y2="205" stroke="#334155" stroke-width="3"/>
  <polygon points="630,205 618,198 618,212" fill="#334155"/>

  <rect x="60" y="330" width="1080" height="170" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="370" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Practical Guidance</text>
  <text x="90" y="405" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Letakkan `'use strict';` di awal file pembelajaran sederhana.
  </text>
  <text x="90" y="435" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Tetap deklarasikan variabel dengan `const`/`let`.
  </text>
  <text x="90" y="465" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    - Tujuan utama strict mode: mengurangi bug tersembunyi, bukan optimasi performa.
  </text>
</svg>
