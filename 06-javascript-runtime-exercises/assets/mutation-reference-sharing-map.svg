<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title{font:700 34px 'Segoe UI',sans-serif;fill:#111827}
      .subtitle{font:500 18px 'Segoe UI',sans-serif;fill:#374151}
      .card{fill:#fff;stroke:#64748b;stroke-width:2;rx:12}
      .shared{fill:#fee2e2;stroke:#dc2626;stroke-width:2;rx:10}
      .safe{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:10}
      .h{font:700 17px 'Segoe UI',sans-serif;fill:#0f172a}
      .p{font:500 14px 'Segoe UI',sans-serif;fill:#1f2937}
      .arrow{stroke:#334155;stroke-width:2.5;marker-end:url(#m)}
      .warn{font:600 15px 'Segoe UI',sans-serif;fill:#991b1b}
      .ok{font:600 15px 'Segoe UI',sans-serif;fill:#166534}
    </style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="50" y="70" class="title">Mutation Reference Sharing Map</text>
  <text x="50" y="102" class="subtitle">Shallow copy aman di level atas, tapi nested reference masih bisa bocor</text>

  <rect x="60" y="150" width="520" height="250" class="card"/>
  <text x="85" y="185" class="h">Kasus Rentan</text>
  <text x="85" y="215" class="p">const next = { ...state }</text>
  <text x="85" y="245" class="p">next.user.name = 'Bima'</text>

  <rect x="95" y="275" width="210" height="95" class="shared"/>
  <text x="120" y="310" class="h">state.user</text>
  <text x="120" y="340" class="p">(shared ref)</text>

  <rect x="335" y="275" width="210" height="95" class="shared"/>
  <text x="360" y="310" class="h">next.user</text>
  <text x="360" y="340" class="p">(shared ref)</text>

  <line x1="305" y1="322" x2="335" y2="322" class="arrow"/>
  <text x="85" y="390" class="warn">Mutasi di next.user ikut mengubah state.user</text>

  <rect x="620" y="150" width="520" height="250" class="card"/>
  <text x="645" y="185" class="h">Kasus Aman Minimal</text>
  <text x="645" y="215" class="p">const next = { ...state, user: { ...state.user } }</text>

  <rect x="655" y="275" width="210" height="95" class="safe"/>
  <text x="680" y="310" class="h">state.user</text>
  <text x="680" y="340" class="p">(ref lama)</text>

  <rect x="895" y="275" width="210" height="95" class="safe"/>
  <text x="920" y="310" class="h">next.user</text>
  <text x="920" y="340" class="p">(ref baru)</text>

  <text x="645" y="390" class="ok">Mutasi di next.user tidak bocor ke state.user</text>

  <rect x="60" y="450" width="1080" height="220" class="card"/>
  <text x="85" y="485" class="h">Checklist Update Aman</text>
  <text x="85" y="520" class="p">1. Identifikasi nested property yang akan dimutasi.</text>
  <text x="85" y="550" class="p">2. Copy ulang hanya cabang yang disentuh (object/array path).</text>
  <text x="85" y="580" class="p">3. Hindari deep clone penuh jika tidak diperlukan.</text>
  <text x="85" y="610" class="p">4. Verifikasi state lama tetap stabil setelah update.</text>
</svg>
