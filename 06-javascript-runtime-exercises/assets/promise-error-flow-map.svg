<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title{font:700 34px 'Segoe UI',sans-serif;fill:#111827}
      .subtitle{font:500 18px 'Segoe UI',sans-serif;fill:#374151}
      .box{fill:#fff;stroke:#64748b;stroke-width:2;rx:12}
      .then{fill:#e0f2fe;stroke:#0284c7;stroke-width:2;rx:10}
      .catch{fill:#fee2e2;stroke:#dc2626;stroke-width:2;rx:10}
      .recover{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:10}
      .h{font:700 17px 'Segoe UI',sans-serif;fill:#0f172a}
      .p{font:500 14px 'Segoe UI',sans-serif;fill:#1f2937}
      .arrow{stroke:#334155;stroke-width:2.5;marker-end:url(#m)}
      .note{font:600 15px 'Segoe UI',sans-serif;fill:#7c2d12}
    </style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="50" y="70" class="title">Promise Error Flow Map</text>
  <text x="50" y="102" class="subtitle">throw atau Promise.reject akan lompat ke catch terdekat</text>

  <rect x="60" y="150" width="1080" height="430" class="box"/>

  <rect x="95" y="210" width="190" height="90" class="then"/>
  <text x="120" y="245" class="h">then #1</text>
  <text x="120" y="272" class="p">throw Error('A')</text>

  <rect x="335" y="210" width="190" height="90" class="catch"/>
  <text x="360" y="245" class="h">catch #1</text>
  <text x="360" y="272" class="p">log A, throw B</text>

  <rect x="575" y="210" width="190" height="90" class="catch"/>
  <text x="600" y="245" class="h">catch #2</text>
  <text x="600" y="272" class="p">log B, reject C</text>

  <rect x="815" y="210" width="190" height="90" class="then"/>
  <text x="840" y="245" class="h">then #end</text>
  <text x="840" y="272" class="p">skip (rejected)</text>

  <rect x="455" y="370" width="290" height="110" class="recover"/>
  <text x="480" y="410" class="h">catch final</text>
  <text x="480" y="438" class="p">log C atau recover</text>

  <line x1="285" y1="255" x2="335" y2="255" class="arrow"/>
  <line x1="525" y1="255" x2="575" y2="255" class="arrow"/>
  <line x1="765" y1="255" x2="815" y2="255" class="arrow"/>
  <line x1="910" y1="300" x2="700" y2="370" class="arrow"/>

  <rect x="60" y="610" width="1080" height="100" class="box"/>
  <text x="85" y="650" class="note">Rule: catch yang return value mengubah chain jadi fulfilled; catch yang throw/reject meneruskan state rejected.</text>
</svg>
