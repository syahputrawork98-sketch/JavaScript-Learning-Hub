<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">Scope Chain Lookup Map</title>
  <desc id="desc">Diagram for identifier resolution through local scope, outer scope, and global scope with shadowing and ReferenceError outcomes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#edf7ff"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1f2937"/>
    </marker>
    <style>
      .header{fill:url(#header);rx:16;filter:url(#shadow)}
      .local{fill:#dcfce7;stroke:#166534;stroke-width:2.2;rx:14;filter:url(#shadow)}
      .outer{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2.2;rx:14;filter:url(#shadow)}
      .global{fill:#e9d5ff;stroke:#7e22ce;stroke-width:2.2;rx:14;filter:url(#shadow)}
      .warn{fill:#fee2e2;stroke:#991b1b;stroke-width:2.2;rx:14;filter:url(#shadow)}
      .note{fill:#ffffff;stroke:#334155;stroke-width:2;rx:12;filter:url(#shadow)}
      .title{font:700 32px 'Segoe UI','Trebuchet MS',sans-serif;fill:#ffffff}
      .sub{font:500 17px 'Segoe UI','Trebuchet MS',sans-serif;fill:#dbeafe}
      .h{font:700 20px 'Segoe UI','Trebuchet MS',sans-serif;fill:#0f172a}
      .p{font:500 15px 'Segoe UI','Trebuchet MS',sans-serif;fill:#334155}
      .small{font:600 13px 'Segoe UI','Trebuchet MS',sans-serif;fill:#1f2937}
      .arrow{stroke:#1f2937;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .dashed{stroke-dasharray:8 6}
    </style>
  </defs>

  <rect width="1280" height="900" fill="url(#bg)"/>

  <rect class="header" x="46" y="28" width="1188" height="112"/>
  <text class="title" x="80" y="76">Scope Chain Lookup - Identifier Resolution</text>
  <text class="sub" x="80" y="104">Pertanyaan inti: variabel ini ditemukan di scope mana?</text>

  <rect class="local" x="90" y="188" width="320" height="220"/>
  <text class="h" x="116" y="226">Scope Lokal (inner)</text>
  <text class="p" x="116" y="252">Cek nama variabel dulu di sini.</text>
  <rect class="note" x="116" y="274" width="268" height="54"/>
  <text class="small" x="132" y="307">const role = 'dev'</text>
  <rect class="note" x="116" y="338" width="268" height="54"/>
  <text class="small" x="132" y="371">(name tidak ada)</text>

  <rect class="outer" x="480" y="188" width="320" height="220"/>
  <text class="h" x="506" y="226">Scope Luar (outer)</text>
  <text class="p" x="506" y="252">Naik jika tidak ketemu di lokal.</text>
  <rect class="note" x="506" y="274" width="268" height="54"/>
  <text class="small" x="522" y="307">const name = 'outer'</text>
  <rect class="note" x="506" y="338" width="268" height="54"/>
  <text class="small" x="522" y="371">lookup berhenti di sini</text>

  <rect class="global" x="870" y="188" width="320" height="220"/>
  <text class="h" x="896" y="226">Global Scope</text>
  <text class="p" x="896" y="252">Dipakai jika scope atas belum cocok.</text>
  <rect class="note" x="896" y="274" width="268" height="54"/>
  <text class="small" x="912" y="307">const name = 'global'</text>
  <rect class="note" x="896" y="338" width="268" height="54"/>
  <text class="small" x="912" y="371">fallback terakhir lookup</text>

  <rect class="warn" x="870" y="454" width="320" height="120"/>
  <text class="h" x="896" y="492">Jika Tetap Tidak Ada</text>
  <text class="p" x="896" y="518">Unresolvable reference</text>
  <text class="p" x="896" y="542">-> ReferenceError</text>

  <rect class="note" x="90" y="454" width="710" height="120"/>
  <text class="h" x="116" y="492">Shadowing Rule</text>
  <text class="p" x="116" y="518">Jika nama yang sama sudah ada di scope lebih dekat, lookup berhenti.</text>
  <text class="p" x="116" y="542">Scope luar tetap ada, tapi tidak dipakai untuk identifier itu.</text>

  <rect class="note" x="90" y="622" width="1100" height="216"/>
  <text class="h" x="116" y="662">Checklist Debug Cepat</text>
  <text class="small" x="136" y="692">1. Identifier dicari dari scope lokal dulu, bukan langsung global.</text>
  <text class="small" x="136" y="718">2. Cek apakah ada shadowing dengan nama variabel yang sama.</text>
  <text class="small" x="136" y="744">3. Kalau nilainya undefined, bedakan: variabel ada tapi belum diisi vs tidak ada sama sekali.</text>
  <text class="small" x="136" y="770">4. Jika tidak ada di seluruh chain, hasilnya ReferenceError.</text>
  <text class="small" x="136" y="796">5. Solusi umum: rename variabel lokal atau rapikan struktur nested function.</text>

  <path class="arrow" d="M410 300 L480 300"/>
  <path class="arrow" d="M800 300 L870 300"/>
  <path class="arrow dashed" d="M250 408 C250 444, 340 450, 420 454"/>
  <path class="arrow dashed" d="M1030 408 L1030 454"/>
</svg>
