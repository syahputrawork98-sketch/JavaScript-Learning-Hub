<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Execution Context Lifecycle Map</title>
  <desc id="desc">Visual map of JavaScript execution context lifecycle from creation phase to execution phase and function call context nesting.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf3"/>
      <stop offset="100%" stop-color="#eef7ff"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b132b"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1f2937"/>
    </marker>
    <style>
      .header{fill:url(#header);filter:url(#shadow);rx:16}
      .card{fill:#ffffff;stroke:#1e293b;stroke-width:2;rx:14;filter:url(#shadow)}
      .phaseA{fill:#e0f2fe;stroke:#075985;stroke-width:2;rx:14;filter:url(#shadow)}
      .phaseB{fill:#dcfce7;stroke:#166534;stroke-width:2;rx:14;filter:url(#shadow)}
      .warn{fill:#fee2e2;stroke:#991b1b;stroke-width:2;rx:14;filter:url(#shadow)}
      .title{font:700 32px 'Segoe UI','Trebuchet MS',sans-serif;fill:#ffffff}
      .sub{font:500 17px 'Segoe UI','Trebuchet MS',sans-serif;fill:#dbeafe}
      .h{font:700 20px 'Segoe UI','Trebuchet MS',sans-serif;fill:#0f172a}
      .p{font:500 15px 'Segoe UI','Trebuchet MS',sans-serif;fill:#334155}
      .small{font:600 13px 'Segoe UI','Trebuchet MS',sans-serif;fill:#1f2937}
      .arrow{stroke:#1f2937;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1280" height="860" fill="url(#bg)"/>

  <rect class="header" x="48" y="32" width="1184" height="112"/>
  <text class="title" x="82" y="78">Execution Context Lifecycle - Track 02</text>
  <text class="sub" x="82" y="106">Model mental untuk membaca hoisting, TDZ, dan urutan eksekusi function.</text>

  <rect class="card" x="70" y="186" width="350" height="146"/>
  <text class="h" x="94" y="226">1) Kode Masuk Engine</text>
  <text class="p" x="94" y="252">Script atau function dipanggil.</text>
  <text class="p" x="94" y="276">Engine membuat execution context.</text>

  <rect class="phaseA" x="464" y="186" width="350" height="182"/>
  <text class="h" x="488" y="226">2) Creation Phase</text>
  <text class="p" x="488" y="252">Function declaration siap penuh.</text>
  <text class="p" x="488" y="276">var diisi undefined.</text>
  <text class="p" x="488" y="300">let/const berada di TDZ.</text>
  <text class="p" x="488" y="324">this dan scope relation dipasang.</text>

  <rect class="phaseB" x="858" y="186" width="350" height="182"/>
  <text class="h" x="882" y="226">3) Execution Phase</text>
  <text class="p" x="882" y="252">Statement dieksekusi baris demi baris.</text>
  <text class="p" x="882" y="276">Assignment memberi nilai aktual.</text>
  <text class="p" x="882" y="300">Function call baru membuat context lagi.</text>
  <text class="p" x="882" y="324">Siklus berulang saat nested call.</text>

  <rect class="warn" x="464" y="410" width="350" height="124"/>
  <text class="h" x="488" y="448">TDZ Trap</text>
  <text class="p" x="488" y="474">Akses let/const sebelum inisialisasi</text>
  <text class="p" x="488" y="498">akan memicu ReferenceError.</text>

  <rect class="card" x="858" y="410" width="350" height="146"/>
  <text class="h" x="882" y="450">Nested Function Call</text>
  <text class="p" x="882" y="476">Setiap call membuat context baru.</text>
  <text class="p" x="882" y="500">Context selesai lalu kembali ke caller.</text>

  <rect class="card" x="70" y="598" width="1138" height="196"/>
  <text class="h" x="96" y="638">Ringkasan Audit Pemula</text>
  <text class="p" x="96" y="666">Pertanyaan utama saat membaca kode:</text>
  <text class="small" x="120" y="694">A. Saat ini sedang phase apa: creation atau execution?</text>
  <text class="small" x="120" y="718">B. Identifier ini berasal dari scope mana?</text>
  <text class="small" x="120" y="742">C. Function call ini membuat context baru atau tidak?</text>
  <text class="small" x="120" y="766">D. Apakah ada akses variabel sebelum inisialisasi?</text>

  <path class="arrow" d="M420 259 L464 259"/>
  <path class="arrow" d="M814 259 L858 259"/>
  <path class="arrow" d="M639 368 L639 410"/>
  <path class="arrow" d="M1033 368 L1033 410"/>
  <path class="arrow" d="M1033 556 L1033 598"/>
  <path class="arrow" d="M639 534 C639 578, 460 590, 320 612"/>
</svg>
