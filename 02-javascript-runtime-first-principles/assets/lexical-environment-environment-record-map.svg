<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Lexical Environment and Environment Record Map</title>
  <desc id="desc">Visual map showing environment record, outer reference, and identifier lookup across nested lexical environments.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffef7"/>
      <stop offset="100%" stop-color="#eff7ff"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1f2937"/>
    </marker>
    <style>
      .header{fill:url(#header);filter:url(#shadow);rx:16}
      .env{fill:#ffffff;stroke:#1e293b;stroke-width:2;rx:14;filter:url(#shadow)}
      .record{fill:#e0f2fe;stroke:#0369a1;stroke-width:2;rx:12}
      .lookup{fill:#dcfce7;stroke:#166534;stroke-width:2;rx:12}
      .warn{fill:#fee2e2;stroke:#991b1b;stroke-width:2;rx:12}
      .title{font:700 32px 'Segoe UI','Trebuchet MS',sans-serif;fill:#ffffff}
      .sub{font:500 17px 'Segoe UI','Trebuchet MS',sans-serif;fill:#dcfce7}
      .h{font:700 20px 'Segoe UI','Trebuchet MS',sans-serif;fill:#0f172a}
      .p{font:500 15px 'Segoe UI','Trebuchet MS',sans-serif;fill:#334155}
      .small{font:600 13px 'Segoe UI','Trebuchet MS',sans-serif;fill:#1f2937}
      .arrow{stroke:#1f2937;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .dashed{stroke-dasharray:8 7}
    </style>
  </defs>

  <rect width="1280" height="860" fill="url(#bg)"/>

  <rect class="header" x="48" y="32" width="1184" height="112"/>
  <text class="title" x="82" y="78">Lexical Environment + Environment Record</text>
  <text class="sub" x="82" y="106">Peta lookup identifier dari inner scope sampai global scope.</text>

  <rect class="env" x="78" y="196" width="350" height="284"/>
  <text class="h" x="102" y="232">Inner Environment</text>
  <rect class="record" x="102" y="252" width="302" height="120"/>
  <text class="small" x="122" y="282">Environment Record</text>
  <text class="p" x="122" y="308">- innerValue = "I"</text>
  <text class="p" x="122" y="332">- function read()</text>
  <text class="p" x="122" y="356">- cari `outerValue`? tidak ada</text>
  <text class="p" x="102" y="412">Outer Reference -> Outer Environment</text>

  <rect class="env" x="466" y="196" width="350" height="284"/>
  <text class="h" x="490" y="232">Outer Environment</text>
  <rect class="record" x="490" y="252" width="302" height="120"/>
  <text class="small" x="510" y="282">Environment Record</text>
  <text class="p" x="510" y="308">- outerValue = "O"</text>
  <text class="p" x="510" y="332">- role = "team-role"</text>
  <text class="p" x="510" y="356">- lookup berhenti di sini</text>
  <text class="p" x="490" y="412">Outer Reference -> Global Environment</text>

  <rect class="env" x="854" y="196" width="350" height="284"/>
  <text class="h" x="878" y="232">Global Environment</text>
  <rect class="record" x="878" y="252" width="302" height="120"/>
  <text class="small" x="898" y="282">Environment Record</text>
  <text class="p" x="898" y="308">- globalValue = "G"</text>
  <text class="p" x="898" y="332">- console, setTimeout, ...</text>
  <text class="p" x="898" y="356">- fallback terakhir lookup</text>

  <rect class="lookup" x="78" y="520" width="737" height="142"/>
  <text class="h" x="102" y="556">Alur Identifier Lookup</text>
  <text class="p" x="102" y="582">1) Cek environment record saat ini.</text>
  <text class="p" x="102" y="606">2) Jika tidak ada, naik via outer reference.</text>
  <text class="p" x="102" y="630">3) Berhenti saat ditemukan, atau error jika tidak ditemukan di seluruh rantai.</text>

  <rect class="warn" x="854" y="520" width="350" height="142"/>
  <text class="h" x="878" y="556">Unresolvable Reference</text>
  <text class="p" x="878" y="582">Nama tidak ditemukan di inner, outer,</text>
  <text class="p" x="878" y="606">maupun global environment.</text>
  <text class="p" x="878" y="630">Hasil: ReferenceError.</text>

  <rect class="env" x="78" y="696" width="1126" height="126"/>
  <text class="h" x="102" y="734">Checklist Runtime Reasoning</text>
  <text class="small" x="122" y="760">A. Identifier dicari dari scope mana? B. Di scope mana lookup berhenti? C. Apakah terjadi shadowing?</text>
  <text class="small" x="122" y="786">D. Jika tidak ditemukan, apakah benar harus ReferenceError?</text>

  <path class="arrow" d="M428 340 L466 340"/>
  <path class="arrow" d="M816 340 L854 340"/>
  <path class="arrow dashed" d="M252 480 L252 520"/>
  <path class="arrow dashed" d="M640 480 L640 520"/>
  <path class="arrow dashed" d="M1028 480 L1028 520"/>
</svg>
