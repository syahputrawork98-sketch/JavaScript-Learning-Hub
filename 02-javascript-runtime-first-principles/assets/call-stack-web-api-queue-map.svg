<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">Call Stack Web APIs and Queue Handoff</title>
  <desc id="desc">Diagram showing sync execution, async registration, queue waiting, and callback handoff to stack.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fff4"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1f2937"/>
    </marker>
    <style>
      .header{fill:url(#header);filter:url(#shadow);rx:16}
      .stack{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2.2;rx:14;filter:url(#shadow)}
      .api{fill:#e9d5ff;stroke:#7e22ce;stroke-width:2.2;rx:14;filter:url(#shadow)}
      .queue{fill:#fde68a;stroke:#b45309;stroke-width:2.2;rx:14;filter:url(#shadow)}
      .note{fill:#ffffff;stroke:#1f2937;stroke-width:2;rx:14;filter:url(#shadow)}
      .title{font:700 32px 'Segoe UI','Trebuchet MS',sans-serif;fill:#ffffff}
      .sub{font:500 17px 'Segoe UI','Trebuchet MS',sans-serif;fill:#d1fae5}
      .h{font:700 20px 'Segoe UI','Trebuchet MS',sans-serif;fill:#0f172a}
      .p{font:500 15px 'Segoe UI','Trebuchet MS',sans-serif;fill:#334155}
      .small{font:600 13px 'Segoe UI','Trebuchet MS',sans-serif;fill:#1f2937}
      .arrow{stroke:#1f2937;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .dashed{stroke-dasharray:8 6}
    </style>
  </defs>

  <rect width="1280" height="900" fill="url(#bg)"/>

  <rect class="header" x="46" y="28" width="1188" height="112"/>
  <text class="title" x="80" y="76">Call Stack + Web APIs + Queue Handoff</text>
  <text class="sub" x="80" y="104">Panduan visual untuk menjawab kenapa setTimeout(0) tidak langsung jalan.</text>

  <rect class="stack" x="74" y="186" width="340" height="410"/>
  <text class="h" x="102" y="224">Call Stack (LIFO)</text>
  <rect class="note" x="108" y="250" width="270" height="62"/>
  <text class="small" x="126" y="286">Frame: global()</text>
  <rect class="note" x="108" y="326" width="270" height="62"/>
  <text class="small" x="126" y="362">Frame: heavyWork()</text>
  <rect class="note" x="108" y="402" width="270" height="62"/>
  <text class="small" x="126" y="438">Frame: render()</text>
  <text class="p" x="102" y="500">Aturan: satu frame selesai dulu</text>
  <text class="p" x="102" y="524">sebelum frame lain diproses.</text>

  <rect class="api" x="470" y="186" width="340" height="250"/>
  <text class="h" x="498" y="224">Web APIs / Runtime APIs</text>
  <rect class="note" x="504" y="250" width="270" height="62"/>
  <text class="small" x="522" y="286">setTimeout callback</text>
  <rect class="note" x="504" y="326" width="270" height="62"/>
  <text class="small" x="522" y="362">fetch / network callback</text>
  <text class="p" x="498" y="408">Async job menunggu siap di sini.</text>

  <rect class="queue" x="866" y="186" width="340" height="250"/>
  <text class="h" x="894" y="224">Task Queue / Callback Queue</text>
  <rect class="note" x="900" y="250" width="270" height="62"/>
  <text class="small" x="918" y="286">timerCallback()</text>
  <rect class="note" x="900" y="326" width="270" height="62"/>
  <text class="small" x="918" y="362">ioCallback()</text>
  <text class="p" x="894" y="408">Menunggu stack kosong.</text>

  <rect class="note" x="74" y="642" width="1132" height="208"/>
  <text class="h" x="104" y="682">Urutan Mental Model</text>
  <text class="small" x="124" y="710">1. Jalankan semua kode sync di call stack.</text>
  <text class="small" x="124" y="736">2. Async callback tidak langsung eksekusi: didaftarkan ke APIs dulu.</text>
  <text class="small" x="124" y="762">3. Saat siap, callback dipindah ke queue.</text>
  <text class="small" x="124" y="788">4. Callback baru masuk stack jika stack kosong (run-to-completion).</text>
  <text class="small" x="124" y="814">5. Karena itu output umum: start -> end -> timer.</text>

  <path class="arrow" d="M414 286 L470 286"/>
  <path class="arrow" d="M810 286 L866 286"/>
  <path class="arrow dashed" d="M1036 436 C1036 540, 330 540, 330 312"/>
  <text class="small" x="845" y="520">handoff saat stack kosong</text>
</svg>
