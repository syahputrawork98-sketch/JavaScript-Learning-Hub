<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Values Types Coercion Map</title>
  <desc id="desc">Ringkasan hubungan values, types, coercion, dan pilihan perbandingan aman.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .card { fill: #fff; stroke: #cbd5e1; stroke-width: 2; rx: 10; }
      .chip { fill: #eef2ff; stroke: #c7d2fe; stroke-width: 1.5; rx: 7; }
      .h { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .t { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .k { font: 700 12px 'Consolas', 'Courier New', monospace; fill: #3730a3; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="360" />
  <text class="title" x="28" y="42">Values, Types, Coercion &#129504;</text>

  <rect class="card" x="28" y="76" width="296" height="188" />
  <text class="h" x="48" y="108">Value Categories</text>
  <rect class="chip" x="48" y="122" width="256" height="34" />
  <text class="k" x="62" y="143">Primitive: string number boolean ...</text>
  <rect class="chip" x="48" y="166" width="256" height="34" />
  <text class="k" x="62" y="187">Reference: object array function</text>

  <rect class="card" x="342" y="76" width="296" height="188" />
  <text class="h" x="362" y="108">Coercion</text>
  <text class="t" x="362" y="132">Implicit: dipicu operator/konteks</text>
  <text class="t" x="362" y="154">Explicit: Number()/String()/Boolean()</text>
  <text class="t" x="362" y="176">Gunakan explicit saat intent harus jelas.</text>

  <rect class="card" x="656" y="76" width="296" height="188" />
  <text class="h" x="676" y="108">Perbandingan</text>
  <rect class="chip" x="676" y="122" width="256" height="34" />
  <text class="k" x="690" y="143">Default: === dan !==</text>
  <text class="t" x="676" y="172">`==` bisa memicu coercion implisit.</text>
  <text class="t" x="676" y="194">Pakai jika benar-benar paham tradeoff.</text>

  <rect class="card" x="28" y="284" width="924" height="52" />
  <text class="t" x="48" y="316">Runtime reasoning lebih stabil jika kamu sadar kapan coercion terjadi dan kapan harus conversion eksplisit.</text>
</svg>
