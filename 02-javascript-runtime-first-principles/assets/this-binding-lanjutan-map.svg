<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">This Binding Lanjutan Map</title>
  <desc id="desc">Perbandingan call/apply/bind dan strategi menangani callback context loss.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .card { fill: #fff; stroke: #cbd5e1; stroke-width: 2; rx: 10; }
      .h { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .t { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .k { font: 700 12px 'Consolas', 'Courier New', monospace; fill: #334155; }
      .chip { fill: #eef2ff; stroke: #c7d2fe; stroke-width: 1.5; rx: 7; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="360" />
  <text class="title" x="28" y="42">this Binding Lanjutan &#128736;&#65039;</text>

  <rect class="card" x="28" y="76" width="292" height="208" />
  <text class="h" x="48" y="108">One-time Binding</text>
  <rect class="chip" x="48" y="122" width="252" height="34" />
  <text class="k" x="62" y="143">fn.call(obj, ...args) / fn.apply(obj, args)</text>
  <text class="t" x="48" y="176">Dipakai saat panggil langsung sekali.</text>

  <rect class="card" x="344" y="76" width="292" height="208" />
  <text class="h" x="364" y="108">Hard Binding</text>
  <rect class="chip" x="364" y="122" width="252" height="34" />
  <text class="k" x="378" y="143">const safe = fn.bind(obj)</text>
  <text class="t" x="364" y="176">Cocok untuk callback/event/timer berulang.</text>

  <rect class="card" x="660" y="76" width="292" height="208" />
  <text class="h" x="680" y="108">Pragmatic Choice</text>
  <text class="t" x="680" y="132">- Gunakan bind saat context harus stabil</text>
  <text class="t" x="680" y="154">- Gunakan parameter/closure jika lebih jelas</text>
  <text class="t" x="680" y="176">- Hindari chain binding yang membingungkan</text>

  <rect class="card" x="28" y="304" width="924" height="40" />
  <text class="t" x="48" y="330">Inti: pilih mekanisme binding sesuai lifecycle pemanggilan function, bukan sekadar kebiasaan sintaks.</text>
</svg>
