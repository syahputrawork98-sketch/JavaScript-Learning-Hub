<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame  { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .gate   { fill: #fef3c7; stroke: #fbbf24; stroke-width: 2; }
    .valid  { fill: #f0fdf4; stroke: #4ade80; stroke-width: 2; }
    .error  { fill: #fef2f2; stroke: #f87171; stroke-width: 2; }
    .ticket { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1; }
    .text   { font-family: 'Inter', sans-serif; font-size: 13px; fill: #1e293b; }
    .title  { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .badge  { font-weight: bold; font-size: 11px; }
  </style>

  <rect width="600" height="400" class="frame" rx="16"/>
  <text x="300" y="36" text-anchor="middle" class="title">🎫 Parameter Validation: Gerbang Tiket</text>

  <!-- Tickets in queue -->
  <g transform="translate(30, 65)">
    <text x="0" y="20" class="text badge" style="fill: #475569;">Antrian Parameter:</text>
    
    <rect x="0" y="30"  width="120" height="40" class="valid" rx="6"/>
    <text x="60" y="55" text-anchor="middle" class="text" style="font-size: 11px;">(a, b, c) ✅</text>

    <rect x="0" y="80"  width="120" height="40" class="error" rx="6"/>
    <text x="60" y="103" text-anchor="middle" class="text" style="font-size: 11px; fill: #dc2626;">(a, a) STRICT ⛔</text>

    <rect x="0" y="130" width="120" height="40" class="valid" rx="6"/>
    <text x="60" y="153" text-anchor="middle" class="text" style="font-size: 11px;">(x, y, z) ✅</text>

    <rect x="0" y="180" width="120" height="40" class="error" rx="6"/>
    <text x="60" y="203" text-anchor="middle" class="text" style="font-size: 11px; fill: #dc2626;">arguments ASYNC ⛔</text>
  </g>

  <!-- Gate -->
  <rect x="200" y="100" width="100" height="230" class="gate" rx="8"/>
  <text x="250" y="130" text-anchor="middle" class="text badge" style="fill: #b45309;">GERBANG</text>
  <text x="250" y="150" text-anchor="middle" class="text badge" style="fill: #b45309;">VALIDASI</text>
  <line x1="215" y1="180" x2="285" y2="180" stroke="#b45309" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="215" y1="200" x2="285" y2="200" stroke="#b45309" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="215" y1="220" x2="285" y2="220" stroke="#b45309" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="250" y="295" text-anchor="middle" class="text" style="font-size: 10px; fill: #92400e;">Static Audit</text>

  <!-- Accepted Zone -->
  <rect x="340" y="80" width="220" height="120" class="valid" rx="10"/>
  <text x="450" y="108" text-anchor="middle" class="text badge" style="fill: #16a34a;">✅ LOLOS VALIDASI</text>
  <text x="450" y="135" text-anchor="middle" class="text" style="font-size: 11px;">Fungsi dapat dieksekusi</text>
  <text x="450" y="155" text-anchor="middle" class="text" style="font-size: 11px;">di Runtime</text>
  <path d="M 305 155 L 337 155" stroke="#4ade80" stroke-width="2" marker-end="url(#aok)"/>

  <!-- Rejected Zone -->
  <rect x="340" y="230" width="220" height="120" class="error" rx="10"/>
  <text x="450" y="258" text-anchor="middle" class="text badge" style="fill: #dc2626;">⛔ DITOLAK (Early Error)</text>
  <text x="450" y="285" text-anchor="middle" class="text" style="font-size: 11px;">SyntaxError</text>
  <text x="450" y="305" text-anchor="middle" class="text" style="font-size: 11px;">saat parsing</text>
  <path d="M 305 285 L 337 285" stroke="#f87171" stroke-width="2" marker-end="url(#aerr)"/>

  <defs>
    <marker id="aok"  markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4ade80"/></marker>
    <marker id="aerr" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#f87171"/></marker>
  </defs>

  <text x="300" y="388" text-anchor="middle" class="text" style="font-style: italic; fill: #64748b; font-size: 11px;">
    "Pengecekan tiket di gerbang, bukan di tengah penerbangan."
  </text>
</svg>
