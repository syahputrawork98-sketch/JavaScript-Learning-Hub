<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame  { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .phase  { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1; }
    .scan   { fill: #fef3c7; stroke: #fbbf24; stroke-width: 2; }
    .lex    { fill: #fef2f2; stroke: #f87171; stroke-width: 2; }
    .exec   { fill: #f0fdf4; stroke: #4ade80; stroke-width: 2; }
    .record { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; }
    .text   { font-family: 'Inter', sans-serif; font-size: 12px; fill: #1e293b; }
    .title  { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .badge  { font-weight: bold; font-size: 11px; }
  </style>

  <rect width="600" height="400" class="frame" rx="16"/>
  <text x="300" y="36" text-anchor="middle" class="title">🎭 Global Declaration Instantiation: Persiapan Panggung</text>

  <!-- Phase 1: Var Scan -->
  <rect x="30" y="60" width="165" height="220" class="scan" rx="10"/>
  <text x="112" y="83" text-anchor="middle" class="text badge" style="fill: #b45309;">Fase 1: VarScan</text>
  <text x="112" y="103" text-anchor="middle" class="text" style="font-size: 10px;">(Statis)</text>
  <text x="50" y="135" class="text" style="font-size: 11px;">var x → undefined</text>
  <text x="50" y="158" class="text" style="font-size: 11px;">var y → undefined</text>
  <text x="50" y="181" class="text" style="font-size: 11px;">fn greet → [Fn]</text>
  <text x="112" y="250" text-anchor="middle" class="text" style="font-size: 10px; fill: #92400e;">Diisi saat binding</text>

  <!-- Arrow 1->2 -->
  <path d="M 198 160 L 218 160" stroke="#94a3b8" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Phase 2: Lexical Scan -->
  <rect x="220" y="60" width="160" height="220" class="lex" rx="10"/>
  <text x="300" y="83" text-anchor="middle" class="text badge" style="fill: #dc2626;">Fase 2: LexScan</text>
  <text x="300" y="103" text-anchor="middle" class="text" style="font-size: 10px;">(Statis)</text>
  <text x="235" y="135" class="text" style="font-size: 11px;">let user → 🔒 TDZ</text>
  <text x="235" y="158" class="text" style="font-size: 11px;">const PI → 🔒 TDZ</text>
  <text x="300" y="220" text-anchor="middle" class="text" style="font-size: 10px; fill: #dc2626;">Terkunci sampai</text>
  <text x="300" y="238" text-anchor="middle" class="text" style="font-size: 10px; fill: #dc2626;">runtime tercapai</text>

  <!-- Arrow 2->3 -->
  <path d="M 383 160 L 403 160" stroke="#94a3b8" stroke-width="2" marker-end="url(#a2)"/>

  <!-- Phase 3: Runtime Execution -->
  <rect x="405" y="60" width="165" height="220" class="exec" rx="10"/>
  <text x="487" y="83" text-anchor="middle" class="text badge" style="fill: #16a34a;">Fase 3: Runtime</text>
  <text x="487" y="103" text-anchor="middle" class="text" style="font-size: 10px;">(Eksekusi)</text>
  <text x="420" y="135" class="text" style="font-size: 11px;">let user ← "Alice"</text>
  <text x="420" y="158" class="text" style="font-size: 11px;">const PI ← 3.14</text>
  <text x="420" y="181" class="text" style="font-size: 11px;">x = 10 (assignment)</text>
  <text x="487" y="240" text-anchor="middle" class="text" style="font-size: 10px; fill: #16a34a;">TDZ terangkat</text>

  <!-- Global Environment Record -->
  <rect x="30" y="305" width="540" height="60" class="record" rx="8"/>
  <text x="300" y="325" text-anchor="middle" class="text badge" style="fill: #1d4ed8;">Global Environment Record</text>
  <text x="60" y="350" class="text" style="font-size: 10px;">x (var)=undefined | greet (fn)=[Fn] | user (let)=🔒→"Alice" | PI (const)=🔒→3.14</text>

  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/></marker>
  </defs>

  <text x="300" y="395" text-anchor="middle" class="text" style="font-style: italic; fill: #64748b; font-size: 11px;">
    "Panggung disiapkan dalam 2 fase statis, lalu pertunjukan (runtime) dimulai."
  </text>
</svg>
