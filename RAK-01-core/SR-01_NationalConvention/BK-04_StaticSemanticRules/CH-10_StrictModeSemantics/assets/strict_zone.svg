<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame   { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .sloppy  { fill: #f9fafb; stroke: #cbd5e1; stroke-width: 2; }
    .strict  { fill: #eff6ff; stroke: #3b82f6; stroke-width: 3; }
    .module  { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; }
    .rule    { fill: #fef2f2; stroke: #fca5a5; stroke-width: 1; rx: 4; }
    .text    { font-family: 'Inter', sans-serif; font-size: 12px; fill: #1e293b; }
    .title   { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .badge   { font-weight: bold; font-size: 11px; }
    .sign    { fill: #1d4ed8; opacity: 0.9; }
  </style>

  <rect width="600" height="400" class="frame" rx="16"/>
  <text x="300" y="36" text-anchor="middle" class="title">🔐 Strict Mode: Zona Keamanan Ketat</text>

  <!-- Sloppy Zone -->
  <rect x="30" y="60" width="230" height="290" class="sloppy" rx="10"/>
  <text x="145" y="82" text-anchor="middle" class="text badge" style="fill: #64748b;">Zona Sloppy (Default)</text>
  <text x="50" y="110" class="text">✓ Param duplikat: izin</text>
  <text x="50" y="132" class="text">✓ with statement: izin</text>
  <text x="50" y="154" class="text">✓ delete var: izin (silent)</text>
  <text x="50" y="176" class="text">⚠️  Error terdeteksi LAMBAT</text>

  <!-- Divider -->
  <line x1="280" y1="55" x2="280" y2="360" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6"/>

  <!-- Strict Zone -->
  <rect x="320" y="60" width="250" height="200" class="strict" rx="10"/>
  <!-- Badge / Sign -->
  <rect x="350" y="72" width="190" height="22" class="sign" rx="4"/>
  <text x="445" y="87" text-anchor="middle" class="text" style="fill: white; font-weight: bold; font-size: 11px;">🔒 Zona Strict Mode</text>
  <text x="340" y="120" class="text">⛔ Param duplikat: SyntaxError</text>
  <text x="340" y="142" class="text">⛔ with statement: SyntaxError</text>
  <text x="340" y="164" class="text">⛔ delete identifier: SyntaxError</text>
  <text x="340" y="186" class="text">⛔ Future reserved: SyntaxError</text>
  <text x="445" y="230" text-anchor="middle" class="text" style="fill: #1d4ed8; font-weight: bold; font-size: 11px;">Error terdeteksi SEGERA (Parsing)</text>

  <!-- Module/Class sub-zone -->
  <rect x="320" y="280" width="250" height="70" class="module" rx="8"/>
  <text x="445" y="305" text-anchor="middle" class="text badge" style="fill: #16a34a;">Module .mjs / Class Body</text>
  <text x="445" y="328" text-anchor="middle" class="text" style="font-size: 11px;">Automatically Strict. No directive needed.</text>

  <text x="300" y="388" text-anchor="middle" class="text" style="font-style: italic; fill: #64748b; font-size: 11px;">
    "Strict mode: buku peraturan yang lebih tegas, kesalahan terdeteksi lebih awal."
  </text>
</svg>
