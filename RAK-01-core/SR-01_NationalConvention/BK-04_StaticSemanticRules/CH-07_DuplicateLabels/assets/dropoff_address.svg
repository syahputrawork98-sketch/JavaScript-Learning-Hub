<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame  { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .street { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1; }
    .house  { fill: #e0f2fe; stroke: #38bdf8; stroke-width: 2; }
    .dup    { fill: #fee2e2; stroke: #f87171; stroke-width: 2; }
    .courier{ fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
    .text   { font-family: 'Inter', sans-serif; font-size: 13px; fill: #1e293b; }
    .title  { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .badge  { font-weight: bold; font-size: 11px; }
    .arrow  { stroke: #94a3b8; stroke-width: 2; fill: none; }
  </style>

  <rect width="600" height="400" class="frame" rx="16"/>
  <text x="300" y="36" text-anchor="middle" class="title">📮 Duplicate Labels: Alamat Drop-off Unik</text>

  <!-- Street -->
  <rect x="30" y="70" width="540" height="200" class="street" rx="10"/>
  <text x="300" y="95" text-anchor="middle" class="text" style="fill: #64748b; font-size: 11px;">Scope (Block atau Function)</text>

  <!-- Valid House -->
  <rect x="60" y="110" width="130" height="100" class="house" rx="8"/>
  <text x="125" y="140" text-anchor="middle" class="text badge" style="fill: #0369a1;">Label: "outer"</text>
  <text x="125" y="170" text-anchor="middle" class="text" style="font-size: 11px;">break outer; ✅</text>
  <text x="125" y="188" text-anchor="middle" class="text" style="font-size: 11px; fill: #16a34a;">Alamat Unik</text>

  <!-- Duplicate House -->
  <rect x="220" y="110" width="130" height="100" class="dup" rx="8"/>
  <text x="285" y="140" text-anchor="middle" class="text badge" style="fill: #dc2626;">Label: "outer" !</text>
  <text x="285" y="165" text-anchor="middle" class="text" style="font-size: 11px; fill: #dc2626;">⛔ DUPLIKAT!</text>
  <text x="285" y="185" text-anchor="middle" class="text" style="font-size: 11px; fill: #dc2626;">SyntaxError</text>

  <!-- Non-existent target -->
  <rect x="390" y="110" width="140" height="100" fill="#f9fafb" stroke="#d1d5db" stroke-width="2" rx="8" stroke-dasharray="6"/>
  <text x="460" y="140" text-anchor="middle" class="text badge" style="fill: #9ca3af;">Label: "ghost"</text>
  <text x="460" y="165" text-anchor="middle" class="text" style="font-size: 11px; fill: #9ca3af;">(Tidak ada!)</text>
  <text x="460" y="185" text-anchor="middle" class="text" style="font-size: 11px; fill: #dc2626;">break ghost; ⛔</text>

  <!-- Courier -->
  <rect x="200" y="300" width="200" height="50" class="courier" rx="8"/>
  <text x="300" y="330" text-anchor="middle" class="text badge">📦 Kurir: break / continue</text>

  <!-- Arrows from courier -->
  <path d="M 300 300 L 125 215" class="arrow" stroke-dasharray="4" marker-end="url(#arr)"/>
  <path d="M 300 300 L 460 215" class="arrow" stroke="#f87171" stroke-dasharray="4" marker-end="url(#arrerr)"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="arrerr" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f87171"/>
    </marker>
  </defs>

  <text x="300" y="390" text-anchor="middle" class="text" style="font-style: italic; fill: #64748b; font-size: 11px;">
    "Setiap label harus punya alamat unik dan jelas dalam scope yang sama."
  </text>
</svg>
