<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .blueprint { fill: #f0f7ff; stroke: #3b82f6; stroke-width: 2; }
    .note { fill: #fffbeb; stroke: #f59e0b; stroke-width: 1; rx: 4; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1e293b; }
    .title { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .line { stroke: #3b82f6; stroke-width: 1; }
    .highlight { fill: #fef3c7; stroke: #f59e0b; stroke-width: 1; }
  </style>

  <rect width="600" height="400" class="frame" rx="16"/>
  <text x="300" y="40" text-anchor="middle" class="title">📜 Grammar Static Semantics: Catatan Kaki</text>

  <!-- Blueprint Section (Grammar) -->
  <g transform="translate(50, 80)">
    <rect width="300" height="250" class="blueprint" rx="8"/>
    <text x="10" y="25" class="text" style="font-weight: bold; fill: #3b82f6;">BLUEPRINT (Grammar)</text>
    
    <!-- Staircase Structure -->
    <path d="M 50 200 L 100 200 L 100 170 L 150 170 L 150 140 L 200 140 L 200 110 L 250 110" fill="none" stroke="#3b82f6" stroke-width="3"/>
    <text x="50" y="225" class="text" style="font-size: 11px;">Production: Staircase</text>
  </g>

  <!-- Footnote (Static Semantics) -->
  <g transform="translate(380, 100)">
    <rect width="180" height="120" class="note"/>
    <text x="10" y="25" class="text" style="font-weight: bold; fill: #b45309;">CATATAN KAKI</text>
    <text x="10" y="50" class="text" style="font-size: 11px;">"Jika [Handrail] = false,"</text>
    <text x="10" y="70" class="text" style="font-size: 11px;">"maka Tinggi > 3m"</text>
    <text x="10" y="90" class="text" style="font-size: 12px; font-weight: bold; fill: #ef4444;">= ERROR"</text>
    
    <!-- Link Line -->
    <line x1="-30" y1="60" x2="0" y2="60" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4"/>
  </g>

  <!-- Context Badge -->
  <g transform="translate(400, 260)">
    <rect width="140" height="40" class="highlight" rx="20"/>
    <text x="70" y="25" text-anchor="middle" class="text" style="font-weight: bold; font-size: 12px;">Konteks: [Await]</text>
  </g>

  <!-- Legend -->
  <g transform="translate(50, 350)">
    <circle cx="10" cy="10" r="5" fill="#3b82f6"/>
    <text x="25" y="15" class="text" style="font-size: 11px;">Grammar: Bentuk Dasar</text>
    
    <circle cx="180" cy="10" r="5" fill="#f59e0b"/>
    <text x="195" y="15" class="text" style="font-size: 11px;">Semantics: Legitimasi Kontekstual</text>
  </g>
</svg>
