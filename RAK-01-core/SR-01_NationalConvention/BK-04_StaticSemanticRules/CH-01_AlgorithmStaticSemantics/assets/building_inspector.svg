<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .blueprint { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 8; stroke-dasharray: 4; }
    .inspector { fill: #f1f5f9; stroke: #475569; stroke-width: 2; rx: 50%; }
    .stempel { fill: #ef4444; font-weight: bold; font-size: 24px; font-family: 'Inter', sans-serif; opacity: 0.8; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1e293b; }
    .title { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .line { stroke: #94a3b8; stroke-width: 1; }
  </style>

  <rect width="600" height="400" class="frame" rx="16"/>
  <text x="300" y="40" text-anchor="middle" class="title">🔍 Static Semantics Audit: Inspektur Bangunan</text>

  <!-- Blueprint Area -->
  <g transform="translate(50, 80)">
    <rect width="250" height="250" class="blueprint"/>
    <text x="125" y="30" text-anchor="middle" class="text" style="font-weight: bold;">Blueprint (AST / Sintaks)</text>
    
    <!-- Blueprint content (lines/shapes) -->
    <line x1="40" y1="60" x2="210" y2="60" class="line"/>
    <line x1="40" y1="90" x2="210" y2="90" class="line"/>
    <line x1="40" y1="120" x2="210" y2="120" class="line" style="stroke: #ef4444; stroke-width: 2;"/>
    <text x="50" y="115" class="text" style="fill: #ef4444; font-size: 10px;">Duplicate Declaration</text>
    
    <rect x="60" y="150" width="130" height="70" fill="none" stroke="#3b82f6" stroke-width="1"/>
    <text x="125" y="190" text-anchor="middle" class="text" style="font-size: 11px;">Logic Check Area</text>
  </g>

  <!-- Inspector Area -->
  <g transform="translate(380, 150)">
    <circle cx="50" cy="50" r="60" class="inspector"/>
    <text x="50" y="55" text-anchor="middle" class="text" style="font-weight: bold;">INSPEKTUR</text>
    <text x="50" y="75" text-anchor="middle" class="text" style="font-size: 10px;">(Parser/Auditor)</text>
    
    <!-- Magnifier -->
    <circle cx="10" cy="10" r="15" fill="none" stroke="#475569" stroke-width="2"/>
    <line x1="20" y1="20" x2="35" y2="35" stroke="#475569" stroke-width="4"/>
  </g>

  <!-- Flow Arrow -->
  <path d="M 310 200 L 360 200" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Stempel Error (appears after check) -->
  <g transform="translate(100, 250) rotate(-15)">
    <rect width="150" height="50" fill="none" stroke="#ef4444" stroke-width="3" rx="4"/>
    <text x="75" y="35" text-anchor="middle" class="stempel">DITOLAK!</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <text x="300" y="370" text-anchor="middle" class="text" style="font-style: italic;">
    "Statics: Pengecekan blueprint sebelum satu batu pun diletakkan (Runtime)."
  </text>
</svg>
