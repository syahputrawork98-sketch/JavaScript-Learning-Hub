<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame   { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .script  { fill: #f9fafb; stroke: #9ca3af; stroke-width: 2; }
    .module  { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; }
    .feature { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1; rx: 4; }
    .ok      { fill: #f0fdf4; stroke: #4ade80; stroke-width: 1; }
    .no      { fill: #fef2f2; stroke: #f87171; stroke-width: 1; }
    .text    { font-family: 'Inter', sans-serif; font-size: 12px; fill: #1e293b; }
    .title   { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .badge   { font-weight: bold; font-size: 11px; }
  </style>

  <rect width="600" height="400" class="frame" rx="16"/>
  <text x="300" y="36" text-anchor="middle" class="title">🏙️ Script vs Module: Dua Kawasan Berbeda</text>

  <!-- Script Zone -->
  <rect x="30" y="55" width="255" height="295" class="script" rx="10"/>
  <text x="157" y="78" text-anchor="middle" class="text badge" style="fill: #475569;">🏚️ Kawasan Lama (Script)</text>

  <rect x="50" y="95" width="215" height="28" class="no" rx="4"/>
  <text x="157" y="113" text-anchor="middle" class="text" style="font-size: 11px;">import/export ⛔</text>

  <rect x="50" y="133" width="215" height="28" class="no" rx="4"/>
  <text x="157" y="151" text-anchor="middle" class="text" style="font-size: 11px;">Top-Level await ⛔</text>

  <rect x="50" y="171" width="215" height="28" class="ok" rx="4"/>
  <text x="157" y="189" text-anchor="middle" class="text" style="font-size: 11px;">this = globalThis ✅</text>

  <rect x="50" y="209" width="215" height="28" class="ok" rx="4"/>
  <text x="157" y="227" text-anchor="middle" class="text" style="font-size: 11px;">var → Global Scope ✅</text>

  <rect x="50" y="247" width="215" height="28" class="ok" rx="4"/>
  <text x="157" y="265" text-anchor="middle" class="text" style="font-size: 11px;">"use strict" Opsional ✅</text>

  <rect x="50" y="285" width="215" height="46" fill="#fff7ed" stroke="#fbbf24" stroke-width="1" rx="4"/>
  <text x="157" y="306" text-anchor="middle" class="text" style="font-size: 10px;">⚠️ Sloppy by default</text>
  <text x="157" y="322" text-anchor="middle" class="text" style="font-size: 10px;">Legacy-friendly</text>

  <!-- Module Zone -->
  <rect x="315" y="55" width="255" height="295" class="module" rx="10"/>
  <text x="442" y="78" text-anchor="middle" class="text badge" style="fill: #1d4ed8;">🏢 Kawasan Modern (Module)</text>

  <rect x="335" y="95" width="215" height="28" class="ok" rx="4"/>
  <text x="442" y="113" text-anchor="middle" class="text" style="font-size: 11px;">import/export ✅</text>

  <rect x="335" y="133" width="215" height="28" class="ok" rx="4"/>
  <text x="442" y="151" text-anchor="middle" class="text" style="font-size: 11px;">Top-Level await ✅</text>

  <rect x="335" y="171" width="215" height="28" class="no" rx="4"/>
  <text x="442" y="189" text-anchor="middle" class="text" style="font-size: 11px;">this = undefined ❌</text>

  <rect x="335" y="209" width="215" height="28" class="no" rx="4"/>
  <text x="442" y="227" text-anchor="middle" class="text" style="font-size: 11px;">var → Module Scope ⚠️</text>

  <rect x="335" y="247" width="215" height="28" class="ok" rx="4"/>
  <text x="442" y="265" text-anchor="middle" class="text" style="font-size: 11px;">Implicit Strict ✅</text>

  <rect x="335" y="285" width="215" height="46" fill="#dbeafe" stroke="#93c5fd" stroke-width="1" rx="4"/>
  <text x="442" y="306" text-anchor="middle" class="text" style="font-size: 10px;">✅ Strict by default</text>
  <text x="442" y="322" text-anchor="middle" class="text" style="font-size: 10px;">Self-contained, modern</text>

  <!-- Divider -->
  <line x1="295" y1="50" x2="295" y2="360" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="295" y="377" text-anchor="middle" class="text" style="font-size: 10px; fill: #64748b;">Engine detects context before parsing starts</text>
</svg>
