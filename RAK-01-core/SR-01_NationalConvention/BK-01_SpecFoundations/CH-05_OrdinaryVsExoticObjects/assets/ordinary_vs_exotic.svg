<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .node { fill: #f9fafb; stroke: #374151; stroke-width: 2; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
  </style>

  <text x="300" y="40" text-anchor="middle" class="text header">Ordinary vs Exotic Objects</text>

  <!-- Ordinary Box -->
  <rect x="50" y="80" width="230" height="150" rx="8" class="node" style="fill: #f0fdf4; stroke: #16a34a;"/>
  <text x="165" y="110" text-anchor="middle" class="text" style="font-weight: bold;">👤 Ordinary Objects</text>
  <text x="70" y="140" class="text">• "Normal" Instincts</text>
  <text x="70" y="165" class="text">• standard [[Get]], [[Set]]</text>
  <text x="70" y="190" class="text">• Consistent behavior</text>

  <!-- Exotic Box -->
  <rect x="320" y="80" width="230" height="150" rx="8" class="node" style="fill: #fef2f2; stroke: #dc2626;"/>
  <text x="435" y="110" text-anchor="middle" class="text" style="font-weight: bold;">💼 Exotic Objects</text>
  <text x="340" y="140" class="text">• "Special" Instincts</text>
  <text x="340" y="165" class="text">• Overridden methods</text>
  <text x="340" y="190" class="text">• e.g. Array, Proxy, Bound Func</text>

  <path d="M280 155 L320 155" style="stroke: #9ca3af; stroke-width: 1; stroke-dasharray: 4;"/>

  <text x="300" y="270" text-anchor="middle" class="text" style="font-style: italic; font-size: 12px;">CH-05: Ordinary vs Exotic - Behavioral Distinction</text>
</svg>
