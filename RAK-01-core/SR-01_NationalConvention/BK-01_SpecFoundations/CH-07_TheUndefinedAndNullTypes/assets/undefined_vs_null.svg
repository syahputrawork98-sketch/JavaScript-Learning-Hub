<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .node { fill: #f9fafb; stroke: #374151; stroke-width: 2; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
  </style>

  <!-- Undefined Side -->
  <rect x="50" y="50" width="230" height="150" rx="8" class="node" style="fill: #f3f4f6; stroke: #6b7280;"/>
  <text x="165" y="80" text-anchor="middle" class="text" style="font-weight: bold;">👻 Undefined</text>
  <text x="165" y="110" text-anchor="middle" class="text">"The Absence of Value"</text>
  <rect x="135" y="130" width="60" height="40" style="fill: none; stroke: #9ca3af; stroke-dasharray: 4;"/>
  <text x="165" y="155" text-anchor="middle" class="text" style="fill: #9ca3af;">Empty</text>

  <!-- Null Side -->
  <rect x="320" y="50" width="230" height="150" rx="8" class="node" style="fill: #fff7ed; stroke: #ea580c;"/>
  <text x="435" y="80" text-anchor="middle" class="text" style="font-weight: bold;">🕳️ Null</text>
  <text x="435" y="110" text-anchor="middle" class="text">"Intentional Null Object"</text>
  <rect x="405" y="130" width="60" height="40" style="fill: #ea580c; opacity: 0.1;"/>
  <text x="435" y="155" text-anchor="middle" class="text" style="font-weight: bold;">0x00</text>

  <text x="300" y="270" text-anchor="middle" class="text" style="font-style: italic; font-size: 12px;">CH-07: Undefined vs Null - Absence Distinction</text>
</svg>
