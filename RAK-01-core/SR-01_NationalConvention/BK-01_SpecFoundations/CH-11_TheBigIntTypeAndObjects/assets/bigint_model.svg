<svg width="600" height="250" xmlns="http://www.w3.org/2000/svg">
  <style>
    .node { fill: #f9fafb; stroke: #374151; stroke-width: 2; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 18px; }
  </style>

  <text x="300" y="40" text-anchor="middle" class="text header">BigInt: Arbitrary-Precision Integer 📜</text>

  <!-- Visualization -->
  <rect x="50" y="80" width="500" height="80" rx="4" class="node" style="fill: #faf5ff; stroke: #9333ea;"/>
  <text x="300" y="125" text-anchor="middle" class="text" style="font-weight: bold; font-family: monospace; font-size: 18px;">9007199254740993n</text>

  <text x="300" y="200" text-anchor="middle" class="text">Unlike Number, BigInt can grow as much as memory allows.</text>

  <text x="300" y="235" text-anchor="middle" class="text" style="font-style: italic; font-size: 12px;">CH-11: BigInt - Breaking the 53-bit Safety Barrier</text>
</svg>
