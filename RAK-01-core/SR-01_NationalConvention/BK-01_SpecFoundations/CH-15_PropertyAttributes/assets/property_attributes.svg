<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .attr { fill: #f9fafb; stroke: #374151; stroke-width: 2; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 18px; }
  </style>

  <text x="300" y="40" text-anchor="middle" class="text header">Property Attributes (Descriptors) 🔐</text>

  <rect x="50" y="70" width="110" height="150" rx="4" class="attr" style="fill: #ecfdf5; stroke: #059669;"/>
  <text x="105" y="100" text-anchor="middle" class="text" style="font-weight: bold;">Value</text>
  <text x="105" y="150" text-anchor="middle" class="text" style="font-size: 12px;">Actual Data</text>

  <rect x="175" y="70" width="110" height="150" rx="4" class="attr" style="fill: #fff7ed; stroke: #ea580c;"/>
  <text x="230" y="100" text-anchor="middle" class="text" style="font-weight: bold;">Writable</text>
  <text x="230" y="150" text-anchor="middle" class="text" style="font-size: 12px;">Can Change?</text>

  <rect x="300" y="70" width="110" height="150" rx="4" class="attr" style="fill: #eff6ff; stroke: #2563eb;"/>
  <text x="355" y="100" text-anchor="middle" class="text" style="font-weight: bold;">Enumerable</text>
  <text x="355" y="150" text-anchor="middle" class="text" style="font-size: 12px;">Shows in loops?</text>

  <rect x="425" y="70" width="110" height="150" rx="4" class="attr" style="fill: #fef2f2; stroke: #dc2626;"/>
  <text x="480" y="100" text-anchor="middle" class="text" style="font-weight: bold;">Configurable</text>
  <text x="480" y="150" text-anchor="middle" class="text" style="font-size: 12px;">Can delete/edit?</text>

  <text x="300" y="270" text-anchor="middle" class="text" style="font-style: italic; font-size: 12px;">CH-15: Property Attributes - The DNA of a Property</text>
</svg>
