<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .obj { fill: #f9fafb; stroke: #374151; stroke-width: 2; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 18px; }
    .arrow { stroke: #9ca3af; stroke-width: 2; fill: none; }
  </style>

  <rect x="50" y="50" width="200" height="150" rx="8" class="obj" style="fill: #fdf2f8; stroke: #db2777;"/>
  <text x="150" y="80" text-anchor="middle" class="text" style="font-weight: bold;">🎒 Own Object</text>
  <text x="70" y="120" class="text" style="font-weight: bold; fill: #db2777;">[Own Properties]</text>
  <text x="80" y="145" class="text">• "id": 1</text>
  <text x="80" y="170" class="text">• "name": "Me"</text>

  <path d="M250 125 L320 125" class="arrow" marker-end="url(#arrowhead)"/>

  <rect x="330" y="50" width="220" height="150" rx="8" class="obj" style="fill: #eff6ff; stroke: #2563eb;"/>
  <text x="440" y="80" text-anchor="middle" class="text" style="font-weight: bold;">🏛️ Prototype Object</text>
  <text x="350" y="120" class="text" style="font-weight: bold; fill: #2563eb;">[Inherited Properties]</text>
  <text x="360" y="145" class="text">• toString()</text>
  <text x="360" y="170" class="text">• hasOwnProperty()</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af"/>
    </marker>
  </defs>

  <text x="300" y="270" text-anchor="middle" class="text" style="font-style: italic; font-size: 12px;">CH-16: Own vs Inherited - The Proximity Discovery</text>
</svg>
