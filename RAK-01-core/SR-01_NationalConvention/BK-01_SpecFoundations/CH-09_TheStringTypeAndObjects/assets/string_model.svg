<svg width="600" height="250" xmlns="http://www.w3.org/2000/svg">
  <style>
    .unit { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 20px; }
  </style>

  <text x="300" y="40" text-anchor="middle" class="text header">String: Sequence of 16-bit Code Units 🧵</text>

  <!-- Sequence -->
  <rect x="50" y="80" width="80" height="80" rx="4" class="unit"/>
  <text x="90" y="115" text-anchor="middle" class="text header">H</text>
  <text x="90" y="145" text-anchor="middle" class="text" style="font-size: 10px;">0x0048</text>

  <rect x="140" y="80" width="80" height="80" rx="4" class="unit"/>
  <text x="180" y="115" text-anchor="middle" class="text header">i</text>
  <text x="180" y="145" text-anchor="middle" class="text" style="font-size: 10px;">0x0069</text>

  <rect x="230" y="80" width="80" height="80" rx="4" class="unit"/>
  <text x="270" y="115" text-anchor="middle" class="text header">!</text>
  <text x="270" y="145" text-anchor="middle" class="text" style="font-size: 10px;">0x0021</text>

  <text x="350" y="125" class="text" style="font-weight: bold;">...</text>

  <text x="300" y="220" text-anchor="middle" class="text" style="font-style: italic; font-size: 12px;">CH-09: String as UTF-16 Code Unit Sequence</text>
</svg>
