<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .rect { fill: #f9fafb; stroke: #374151; stroke-width: 2; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
    .line { stroke: #4b5563; stroke-width: 2; }
  </style>

  <rect x="180" y="20" width="240" height="50" rx="8" class="rect" style="fill: #f3f4f6; stroke: #1f2937;"/>
  <text x="300" y="52" text-anchor="middle" class="text header">📊 ECMAScript Data Types</text>

  <line x1="300" y1="70" x2="150" y2="120" class="line"/>
  <line x1="300" y1="70" x2="450" y2="120" class="line"/>

  <!-- Primitive Box -->
  <rect x="40" y="120" width="220" height="230" rx="8" class="rect" style="fill: #ecfdf5; stroke: #059669;"/>
  <text x="150" y="145" text-anchor="middle" class="text header">💎 Primitive Types</text>
  <text x="60" y="175" class="text">1. Undefined</text>
  <text x="60" y="200" class="text">2. Null</text>
  <text x="60" y="225" class="text">3. Boolean</text>
  <text x="60" y="250" class="text">4. String</text>
  <text x="60" y="275" class="text">5. Symbol</text>
  <text x="60" y="300" class="text">6. Number</text>
  <text x="60" y="325" class="text">7. BigInt</text>

  <!-- Object Box -->
  <rect x="340" y="120" width="220" height="80" rx="8" class="rect" style="fill: #fff7ed; stroke: #ea580c;"/>
  <text x="450" y="145" text-anchor="middle" class="text header">📦 Object Type</text>
  <text x="360" y="175" class="text">• Collection of Properties</text>

  <text x="300" y="380" text-anchor="middle" class="text" style="font-style: italic; font-size: 12px;">CH-02: Data Type Hierarchy Mental Model</text>
</svg>
