<svg width="600" height="350" xmlns="http://www.w3.org/2000/svg">
  <style>
    .node { fill: #f9fafb; stroke: #374151; stroke-width: 2; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
  </style>

  <!-- Standard Box -->
  <rect x="50" y="50" width="230" height="200" rx="8" class="node" style="fill: #eff6ff; stroke: #2563eb;"/>
  <text x="165" y="80" text-anchor="middle" class="text" style="font-weight: bold;">📦 Standard Objects</text>
  <text x="70" y="110" class="text">• Defined by ECMA-262</text>
  <text x="70" y="135" class="text">• Core language units</text>
  <text x="80" y="165" class="text" style="font-style: italic;">e.g. Object, Array,</text>
  <text x="80" y="185" class="text" style="font-style: italic;">Map, Promise, JSON</text>

  <!-- Built-in Area -->
  <rect x="320" y="20" width="250" height="300" rx="10" style="fill: none; stroke: #9ca3af; stroke-dasharray: 4;"/>
  <text x="445" y="45" text-anchor="middle" class="text" style="font-weight: bold; fill: #6b7280;">Built-in Objects (All)</text>

  <rect x="340" y="70" width="210" height="230" rx="8" class="node" style="fill: #fdf2f8; stroke: #db2777;"/>
  <text x="445" y="100" text-anchor="middle" class="text" style="font-weight: bold;">🔌 Host Built-ins</text>
  <text x="360" y="130" class="text">• Environment specific</text>
  <text x="370" y="160" class="text" style="font-weight: bold;">Browser:</text>
  <text x="380" y="180" class="text">window, document</text>
  <text x="370" y="210" class="text" style="font-weight: bold;">Node.js:</text>
  <text x="380" y="230" class="text">global, process, require</text>

  <text x="300" y="335" text-anchor="middle" class="text" style="font-style: italic; font-size: 12px;">CH-06: Standard vs Host Built-in Objects</text>
</svg>
