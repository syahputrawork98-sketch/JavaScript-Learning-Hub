<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">INHERITANCE LADDER (MODEL SERIES)</text>

  <!-- Parent Module (Base) -->
  <g transform="translate(100, 250)">
    <rect width="200" height="100" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="5"/>
    <text x="100" y="30" fill="#64748b" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">BASE MODEL</text>
    <path d="M 50 60 L 150 60" stroke="#64748b" stroke-width="2"/>
  </g>

  <!-- Inheritance Link (Extends) -->
  <path d="M 200 250 Q 200 150 400 150" fill="none" stroke="#a78bfa" stroke-width="4" marker-end="url(#arrow-extend)"/>
  <text x="300" y="140" fill="#a78bfa" font-family="Arial" font-size="12" font-weight="bold">extends</text>

  <!-- Child Module (Specialized) -->
  <g transform="translate(450, 100)">
    <rect width="250" height="150" fill="#1e293b" stroke="#a78bfa" stroke-width="4" rx="10"/>
    <text x="125" y="30" fill="#a78bfa" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">UPGRADE MODEL</text>
    <rect x="25" y="60" width="200" height="40" fill="#4c1d95" opacity="0.3"/>
    <text x="125" y="85" fill="#a78bfa" font-family="Arial" font-size="12" text-anchor="middle">Inherited Capabilities</text>
    <rect x="25" y="110" width="200" height="30" fill="#34d399" stroke="#34d399" rx="5"/>
    <text x="125" y="130" fill="#0f172a" font-family="Arial" font-size="10" text-anchor="middle" font-weight="bold">+ NEW FEATURE</text>
  </g>

  <defs>
    <marker id="arrow-extend" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa" />
    </marker>
  </defs>
</svg>
