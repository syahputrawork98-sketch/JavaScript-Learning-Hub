<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">REGULATION VALVE (GETTERS &amp; SETTERS)</text>

  <!-- Input Side (Setter) -->
  <g transform="translate(100, 150)">
    <rect width="150" height="100" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="5"/>
    <text x="75" y="-10" fill="#fbbf24" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">SET (Input Valve)</text>
    <path d="M 30 50 L 120 50" stroke="#fbbf24" stroke-width="8" marker-end="url(#arrow-set)"/>
    <text x="75" y="75" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">Validating...</text>
  </g>

  <!-- Internal Storage -->
  <g transform="translate(350, 125)">
    <rect width="100" height="150" fill="#0f172a" stroke="#64748b" stroke-width="2" rx="10"/>
    <text x="50" y="180" fill="#64748b" font-family="Arial" font-size="12" text-anchor="middle"># Private Data</text>
    <path d="M 20 50 L 80 100 M 20 100 L 80 50" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Output Side (Getter) -->
  <g transform="translate(550, 150)">
    <rect width="150" height="100" fill="#1e293b" stroke="#34d399" stroke-width="2" rx="5"/>
    <text x="75" y="-10" fill="#34d399" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">GET (Output Valve)</text>
    <path d="M 20 50 L 110 50" stroke="#34d399" stroke-width="8" marker-end="url(#arrow-get)"/>
    <text x="75" y="75" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">Formatting...</text>
  </g>

  <defs>
    <marker id="arrow-set" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fbbf24" />
    </marker>
    <marker id="arrow-get" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34d399" />
    </marker>
  </defs>
</svg>
