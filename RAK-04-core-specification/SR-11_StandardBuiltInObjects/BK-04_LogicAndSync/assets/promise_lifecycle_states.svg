<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a" rx="15"/>
  
  <text x="400" y="40" fill="#f8fafc" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">PROMISE LIFECYCLE (THE ASYNCHRONOUS PAGER)</text>

  <!-- Flow Connector -->
  <path d="M 150 250 L 650 250" stroke="#334155" stroke-width="4" stroke-dasharray="10,5"/>

  <!-- Pending State -->
  <g transform="translate(50, 200)">
    <rect width="180" height="100" fill="#1e293b" stroke="#94a3b8" stroke-width="2" rx="10"/>
    <text x="90" y="30" fill="#94a3b8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">PENDING</text>
    <circle cx="90" cy="70" r="15" fill="#1e293b" stroke="#94a3b8" stroke-width="2">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 90 70" to="360 90 70" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="90" y="90" fill="#64748b" font-family="Arial" font-size="8" text-anchor="middle">Awaiting signal...</text>
  </g>

  <!-- Fulfilled State -->
  <g transform="translate(310, 80)">
    <rect width="200" height="120" fill="#064e3b" stroke="#34d399" stroke-width="2" rx="10"/>
    <text x="100" y="30" fill="#34d399" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">FULFILLED (Success)</text>
    <path d="M 80 75 L 95 90 L 125 60" fill="none" stroke="#34d399" stroke-width="5" stroke-linecap="round"/>
    <text x="100" y="110" fill="#ffffff" font-family="Arial" font-size="10" text-anchor="middle">.then(value)</text>
  </g>

  <!-- Rejected State -->
  <g transform="translate(310, 300)">
    <rect width="200" height="120" fill="#7f1d1d" stroke="#f43f5e" stroke-width="2" rx="10"/>
    <text x="100" y="30" fill="#f43f5e" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">REJECTED (Fail)</text>
    <path d="M 85 65 L 115 95 M 115 65 L 85 95" fill="none" stroke="#f43f5e" stroke-width="5" stroke-linecap="round"/>
    <text x="100" y="110" fill="#ffffff" font-family="Arial" font-size="10" text-anchor="middle">.catch(reason)</text>
  </g>

  <!-- SETTLED Box -->
  <g transform="translate(570, 200)">
    <rect width="180" height="100" fill="#312e81" stroke="#818cf8" stroke-width="2" rx="10"/>
    <text x="90" y="30" fill="#818cf8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">SETTLED</text>
    <rect x="30" y="55" width="120" height="8" fill="#818cf8" rx="4"/>
    <text x="90" y="85" fill="#ffffff" font-family="Arial" font-size="9" text-anchor="middle">Finality Guaranteed</text>
  </g>

  <!-- Transitions -->
  <path d="M 230 230 L 310 160" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-resolve)"/>
  <path d="M 230 270 L 310 340" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrow-reject)"/>
  <path d="M 510 160 L 570 230" stroke="#818cf8" stroke-width="2" marker-end="url(#arrow-settle)"/>
  <path d="M 510 340 L 570 270" stroke="#818cf8" stroke-width="2" marker-end="url(#arrow-settle)"/>

  <defs>
    <marker id="arrow-resolve" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
    </marker>
    <marker id="arrow-reject" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f43f5e" />
    </marker>
    <marker id="arrow-settle" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#818cf8" />
    </marker>
  </defs>

  <text x="400" y="470" fill="#64748b" font-family="Arial" font-size="12" text-anchor="middle">"Promises transition from uncertain potential to fixed, unchangeable reality"</text>
</svg>
