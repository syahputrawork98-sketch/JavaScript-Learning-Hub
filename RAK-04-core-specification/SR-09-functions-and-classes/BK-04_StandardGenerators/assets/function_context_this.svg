<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#065f46;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d174d;stop-opacity:1" />
    </linearGradient>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#0f172a" rx="15"/>
  
  <text x="400" y="40" fill="#f8fafc" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">THE "THIS" BINDING PRECEDENCE (THE CONTEXT SWITCH)</text>
  <text x="400" y="65" fill="#94a3b8" font-family="Arial" font-size="14" text-anchor="middle">"Determining Context Energy at the Discharge Site (Call Site)"</text>

  <!-- Flow Connector Line -->
  <line x1="400" y1="100" x2="400" y2="500" stroke="#334155" stroke-width="4" stroke-dasharray="8,4"/>

  <!-- Rule 1: NEW -->
  <g transform="translate(150, 110)">
    <rect width="500" height="80" fill="#1e293b" stroke="#34d399" stroke-width="2" rx="10"/>
    <rect x="-20" y="25" width="40" height="30" fill="#34d399" rx="5"/>
    <text x="0" y="45" fill="#0f172a" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">1</text>
    
    <text x="30" y="35" fill="#34d399" font-family="Arial" font-size="16" font-weight="bold">NEW BINDING</text>
    <text x="30" y="60" fill="#94a3b8" font-family="Courier New" font-size="12">new Constructor()</text>
    
    <path d="M 350 40 L 410 40" stroke="#34d399" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="440" y="45" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold">Newly Created Object</text>
  </g>

  <!-- Rule 2: EXPLICIT -->
  <g transform="translate(150, 210)">
    <rect width="500" height="80" fill="#1e293b" stroke="#f472b6" stroke-width="2" rx="10"/>
    <rect x="-20" y="25" width="40" height="30" fill="#f472b6" rx="5"/>
    <text x="0" y="45" fill="#0f172a" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">2</text>
    
    <text x="30" y="35" fill="#f472b6" font-family="Arial" font-size="16" font-weight="bold">EXPLICIT BINDING</text>
    <text x="30" y="60" fill="#94a3b8" font-family="Courier New" font-size="12">.call() / .apply() / .bind()</text>
    
    <path d="M 350 40 L 410 40" stroke="#f472b6" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="440" y="45" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold">The Forced Target</text>
  </g>

  <!-- Rule 3: IMPLICIT -->
  <g transform="translate(150, 310)">
    <rect width="500" height="80" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <rect x="-20" y="25" width="40" height="30" fill="#fbbf24" rx="5"/>
    <text x="0" y="45" fill="#0f172a" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">3</text>
    
    <text x="30" y="35" fill="#fbbf24" font-family="Arial" font-size="16" font-weight="bold">IMPLICIT BINDING</text>
    <text x="30" y="60" fill="#94a3b8" font-family="Courier New" font-size="12">obj.method()</text>
    
    <path d="M 350 40 L 410 40" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="440" y="45" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold">The Owning Object</text>
  </g>

  <!-- Rule 4: DEFAULT -->
  <g transform="translate(150, 410)">
    <rect width="500" height="80" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="10"/>
    <rect x="-20" y="25" width="40" height="30" fill="#38bdf8" rx="5"/>
    <text x="0" y="45" fill="#0f172a" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">4</text>
    
    <text x="30" y="35" fill="#38bdf8" font-family="Arial" font-size="16" font-weight="bold">DEFAULT BINDING</text>
    <text x="30" y="60" fill="#94a3b8" font-family="Courier New" font-size="12">standalone()</text>
    
    <path d="M 350 40 L 410 40" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="440" y="45" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold">Global / Undefined</text>
  </g>

  <rect x="250" y="520" width="300" height="50" fill="#334155" rx="25"/>
  <text x="400" y="550" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">THE "THIS" CONTEXT ENERGY</text>
</svg>
