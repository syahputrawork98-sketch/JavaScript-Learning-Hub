<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a" rx="15"/>
  
  <text x="400" y="40" fill="#f8fafc" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">TEXT &amp; TIME PROCESSING ENGINES</text>

  <!-- String Engine -->
  <g transform="translate(50, 100)">
    <rect width="320" height="300" fill="#1e293b" stroke="#f472b6" stroke-width="2" rx="10"/>
    <text x="160" y="30" fill="#f472b6" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">STRING ENGINE</text>
    
    <!-- Immutability visual -->
    <rect x="20" y="60" width="280" height="60" fill="#0f172a" stroke="#4b5563" rx="5"/>
    <text x="140" y="85" fill="#94a3b8" font-family="Courier New" font-size="12" text-anchor="middle">"Input Signal"</text>
    <path d="M 140 125 L 140 160" stroke="#f472b6" stroke-width="2" marker-end="url(#arrow-text)"/>
    
    <rect x="20" y="170" width="280" height="60" fill="#831843" stroke="#f472b6" rx="5"/>
    <text x="140" y="195" fill="#ffffff" font-family="Courier New" font-size="12" text-anchor="middle" font-weight="bold">"TRANSFORMED_SIGNAL"</text>
    <text x="140" y="215" fill="#f9a8d4" font-family="Arial" font-size="9" text-anchor="middle">(New Instance Created)</text>
  </g>

  <!-- RegExp & Date Engines -->
  <g transform="translate(430, 100)">
    <!-- RegExp Scanner -->
    <rect width="320" height="140" fill="#1e293b" stroke="#a855f7" stroke-width="2" rx="10"/>
    <text x="160" y="30" fill="#a855f7" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">REGEXP SCANNER</text>
    <rect x="40" y="60" width="240" height="40" fill="#3b0764" stroke="#d8b4fe" rx="5"/>
    <text x="140" y="85" fill="#d8b4fe" font-family="Courier New" font-size="12" text-anchor="middle">/PATTERN/g</text>
    <path d="M 60 70 L 60 90" stroke="#34d399" stroke-width="4"/>
    <text x="160" y="125" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">Pattern Matching &amp; Validation</text>

    <!-- Date Synchronizer -->
    <g transform="translate(0, 160)">
      <rect width="320" height="140" fill="#1e293b" stroke="#34d399" stroke-width="2" rx="10"/>
      <text x="160" y="30" fill="#34d399" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">TIME SYNCHRONIZER (DATE)</text>
      <circle cx="160" cy="80" r="30" fill="#064e3b" stroke="#34d399" stroke-width="2"/>
      <path d="M 160 80 L 160 60" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <path d="M 160 80 L 175 80" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <text x="160" y="125" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">Unix Epoch (ms) Tracking</text>
    </g>
  </g>

  <defs>
    <marker id="arrow-text" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f472b6" />
    </marker>
  </defs>

  <text x="400" y="430" fill="#64748b" font-family="Arial" font-size="12" text-anchor="middle">"Managing the semantic identity and temporal state of Hub transmissions"</text>
</svg>
