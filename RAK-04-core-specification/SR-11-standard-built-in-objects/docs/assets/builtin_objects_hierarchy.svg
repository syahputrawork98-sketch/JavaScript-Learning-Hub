<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a" rx="15"/>
  
  <text x="400" y="40" fill="#f8fafc" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">BUILT-IN OBJECTS HIERARCHY (THE CORE MACHINERY)</text>

  <!-- Root: Global Object -->
  <g transform="translate(300, 80)">
    <rect width="200" height="60" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="10"/>
    <text x="100" y="35" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">globalThis / Window</text>
  </g>

  <!-- Level 1 Connectors -->
  <path d="M 400 140 L 400 180" stroke="#475569" stroke-width="2"/>
  <path d="M 150 180 L 650 180" stroke="#475569" stroke-width="2"/>
  
  <!-- BK-01: Processing -->
  <g transform="translate(50, 200)">
    <rect width="180" height="150" fill="#1e293b" stroke="#38bdf8" rx="10"/>
    <text x="90" y="30" fill="#38bdf8" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">PROCESSING UNITS</text>
    <path d="M 20 50 L 160 50" stroke="#334155"/>
    <text x="30" y="75" fill="#ffffff" font-family="Arial" font-size="10">Number / BigInt</text>
    <text x="30" y="100" fill="#ffffff" font-family="Arial" font-size="10">Math (Static)</text>
    <text x="30" y="125" fill="#ffffff" font-family="Arial" font-size="10">globalThis utilities</text>
  </g>

  <!-- BK-02: Structural -->
  <g transform="translate(250, 200)">
    <rect width="180" height="150" fill="#1e293b" stroke="#fbbf24" rx="10"/>
    <text x="90" y="30" fill="#fbbf24" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">STRUCTURAL UNITS</text>
    <path d="M 20 50 L 160 50" stroke="#334155"/>
    <text x="30" y="75" fill="#ffffff" font-family="Arial" font-size="10">Array / TypedArrays</text>
    <text x="30" y="100" fill="#ffffff" font-family="Arial" font-size="10">Map / Set</text>
    <text x="30" y="125" fill="#ffffff" font-family="Arial" font-size="10">Object (Base)</text>
  </g>

  <!-- BK-03: Text/Time -->
  <g transform="translate(450, 200)">
    <rect width="180" height="150" fill="#1e293b" stroke="#f472b6" rx="10"/>
    <text x="90" y="30" fill="#f472b6" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">TEXT &amp; TIME</text>
    <path d="M 20 50 L 160 50" stroke="#334155"/>
    <text x="30" y="75" fill="#ffffff" font-family="Arial" font-size="10">String / RegExp</text>
    <text x="30" y="100" fill="#ffffff" font-family="Arial" font-size="10">Date</text>
    <text x="30" y="125" fill="#ffffff" font-family="Arial" font-size="10">Intl (Localization)</text>
  </g>

  <!-- BK-04: Logic/Sync -->
  <g transform="translate(650, 200)">
    <rect width="180" height="150" fill="#1e293b" stroke="#34d399" rx="10"/>
    <text x="90" y="30" fill="#34d399" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">LOGIC &amp; SYNC</text>
    <path d="M 20 50 L 160 50" stroke="#334155"/>
    <text x="30" y="75" fill="#ffffff" font-family="Arial" font-size="10">Promise</text>
    <text x="30" y="100" fill="#ffffff" font-family="Arial" font-size="10">Proxy / Reflect</text>
    <text x="30" y="125" fill="#ffffff" font-family="Arial" font-size="10">JSON</text>
  </g>

  <!-- Hierarchy Lines -->
  <path d="M 140 180 L 140 200" stroke="#475569" stroke-width="2"/>
  <path d="M 340 180 L 340 200" stroke="#475569" stroke-width="2"/>
  <path d="M 540 180 L 540 200" stroke="#475569" stroke-width="2"/>
  <path d="M 740 180 L 740 200" stroke="#475569" stroke-width="2"/>

  <text x="400" y="470" fill="#64748b" font-family="Arial" font-size="12" text-anchor="middle">"The Hub architecture is built upon these four specialized machinery blocks"</text>
</svg>
