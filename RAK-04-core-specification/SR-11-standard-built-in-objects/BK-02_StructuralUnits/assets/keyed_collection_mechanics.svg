<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a" rx="15"/>
  
  <text x="400" y="40" fill="#f8fafc" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">KEYED COLLECTION MECHANICS (MAP VS SET)</text>

  <!-- MAP Mechanics -->
  <g transform="translate(50, 100)">
    <rect width="320" height="350" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="10"/>
    <text x="160" y="30" fill="#38bdf8" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">MAP (Dictionary)</text>
    
    <!-- Entry 1 -->
    <g transform="translate(20, 60)">
      <rect width="120" height="40" fill="#0c4a6e" stroke="#38bdf8" rx="5"/>
      <text x="60" y="25" fill="#ffffff" font-family="Courier New" font-size="10" text-anchor="middle">KEY: {obj}</text>
      <path d="M 120 20 L 160 20" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow-map)"/>
      <rect x="160" y="0" width="120" height="40" fill="#1e3a8a" rx="5"/>
      <text x="220" y="25" fill="#ffffff" font-family="Arial" font-size="10" text-anchor="middle">VALUE: Meta</text>
    </g>

    <!-- Entry 2 -->
    <g transform="translate(20, 120)">
      <rect width="120" height="40" fill="#0c4a6e" stroke="#38bdf8" rx="5"/>
      <text x="60" y="25" fill="#ffffff" font-family="Courier New" font-size="10" text-anchor="middle">KEY: "id"</text>
      <path d="M 120 20 L 160 20" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow-map)"/>
      <rect x="160" y="0" width="120" height="40" fill="#1e3a8a" rx="5"/>
      <text x="220" y="25" fill="#ffffff" font-family="Arial" font-size="10" text-anchor="middle">VALUE: 100</text>
    </g>

    <text x="160" y="330" fill="#64748b" font-family="Arial" font-size="11" text-anchor="middle">Arbitrary Key-Value Pairs</text>
  </g>

  <!-- SET Mechanics -->
  <g transform="translate(430, 100)">
    <rect width="320" height="350" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="160" y="30" fill="#fbbf24" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">SET (Unique Pool)</text>
    
    <!-- Values -->
    <circle cx="160" cy="120" r="40" fill="#713f12" stroke="#fbbf24" stroke-width="2"/>
    <text x="160" y="125" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Val A</text>

    <circle cx="120" cy="220" r="45" fill="#713f12" stroke="#fbbf24" stroke-width="2"/>
    <text x="120" y="225" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Val B</text>

    <circle cx="200" cy="220" r="35" fill="#713f12" stroke="#fbbf24" stroke-width="2" opacity="0.3" stroke-dasharray="2,2"/>
    <text x="200" y="225" fill="#94a3b8" font-family="Arial" font-size="8" text-anchor="middle">Duplicate Blocked</text>

    <text x="160" y="330" fill="#64748b" font-family="Arial" font-size="11" text-anchor="middle">Strict Uniqueness Filter</text>
  </g>

  <defs>
    <marker id="arrow-map" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8" />
    </marker>
  </defs>

  <text x="400" y="475" fill="#64748b" font-family="Arial" font-size="12" text-anchor="middle">"Maps manage complex relationships, while Sets ensure signal purity in the Hub storage"</text>
</svg>
