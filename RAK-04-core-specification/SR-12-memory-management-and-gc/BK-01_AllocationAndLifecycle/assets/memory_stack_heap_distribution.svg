<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a" rx="15"/>
  
  <text x="400" y="40" fill="#f8fafc" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">MEMORY DOMAINS (STACK VS HEAP)</text>

  <!-- Left: STACK (The Workbench) -->
  <g transform="translate(50, 100)">
    <rect width="300" height="350" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="10"/>
    <text x="150" y="30" fill="#38bdf8" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">STACK (Last-In, First-Out)</text>
    
    <!-- Stack Frames -->
    <rect x="25" y="60" width="250" height="40" fill="#0c4a6e" stroke="#38bdf8" rx="5"/>
    <text x="40" y="85" fill="#ffffff" font-family="Courier New" font-size="10">const voltage = 220</text>

    <rect x="25" y="110" width="250" height="40" fill="#0c4a6e" stroke="#38bdf8" rx="5"/>
    <text x="40" y="135" fill="#ffffff" font-family="Courier New" font-size="10">const active = true</text>

    <rect x="25" y="160" width="250" height="40" fill="#0c4a6e" stroke="#38bdf8" rx="20"/>
    <text x="150" y="185" fill="#38bdf8" font-family="Arial" font-size="10" text-anchor="middle">PTR: 0xAF01 (Ref to Heap)</text>

    <text x="150" y="320" fill="#64748b" font-family="Arial" font-size="11" text-anchor="middle">Fast, Synchronous, Fixed-size</text>
  </g>

  <!-- Connector (Pointer) -->
  <path d="M 330 270 Q 400 300 450 270" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-ref)"/>
  <text x="400" y="260" fill="#fbbf24" font-family="Arial" font-size="10" text-anchor="middle">REFERENCE</text>

  <!-- Right: HEAP (The Warehouse) -->
  <g transform="translate(450, 100)">
    <rect width="300" height="350" fill="#1e293b" stroke="#f472b6" stroke-width="2" rx="10"/>
    <text x="150" y="30" fill="#f472b6" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">HEAP (Unstructured)</text>
    
    <!-- Scattered Objects -->
    <rect x="20" y="60" width="120" height="80" fill="#831843" stroke="#f472b6" rx="10"/>
    <text x="80" y="105" fill="#ffffff" font-family="Arial" font-size="10" text-anchor="middle">Object { id: 1 }</text>

    <circle cx="210" cy="150" r="50" fill="#831843" stroke="#f472b6" stroke-width="2"/>
    <text x="210" y="155" fill="#ffffff" font-family="Arial" font-size="10" text-anchor="middle">Array [ ]</text>

    <rect x="40" y="200" width="200" height="100" fill="#831843" stroke="#f472b6" rx="5" opacity="0.4" stroke-dasharray="4,4"/>
    <text x="140" y="255" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">UNREACHABLE (GC target)</text>

    <text x="150" y="320" fill="#64748b" font-family="Arial" font-size="11" text-anchor="middle">Slow, Dynamic, Scanned by GC</text>
  </g>

  <defs>
    <marker id="arrow-ref" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" />
    </marker>
  </defs>

  <text x="400" y="475" fill="#64748b" font-family="Arial" font-size="12" text-anchor="middle">"The Workbench holds immediate signals, while the Warehouse stores complex machinery"</text>
</svg>
