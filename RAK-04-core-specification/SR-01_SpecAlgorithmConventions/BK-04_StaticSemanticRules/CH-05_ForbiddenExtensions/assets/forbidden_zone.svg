<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame  { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .safe   { fill: #f0fdf4; stroke: #4ade80; stroke-width: 2; }
    .core   { fill: #fef2f2; stroke: #f87171; stroke-width: 2; }
    .annex  { fill: #fffbeb; stroke: #fbbf24; stroke-width: 2; }
    .text   { font-family: 'Inter', sans-serif; font-size: 13px; fill: #1e293b; }
    .title  { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .badge  { font-weight: bold; font-size: 11px; }
    .host   { fill: #e0e7ff; stroke: #6366f1; stroke-width: 2; }
  </style>

  <rect width="600" height="400" class="frame" rx="16"/>
  <text x="300" y="36" text-anchor="middle" class="title">🚫 Forbidden Extensions: Zona Modifikasi</text>

  <!-- Core Spec (Red Zone - DO NOT TOUCH) -->
  <rect x="40" y="60" width="240" height="290" class="core" rx="10"/>
  <text x="160" y="85" text-anchor="middle" class="text badge" style="fill: #dc2626;">🔴 ZONA MERAH (Clause 17)</text>
  <text x="160" y="110" text-anchor="middle" class="text" style="font-size: 11px;">Core Internal Algorithms</text>
  <text x="60" y="140" class="text" style="font-size: 11px;">• Object.defineProperty</text>
  <text x="60" y="160" class="text" style="font-size: 11px;">• Function.prototype.call</text>
  <text x="60" y="180" class="text" style="font-size: 11px;">• Array.prototype semantics</text>
  <text x="60" y="200" class="text" style="font-size: 11px;">• Strict Mode enforcement</text>
  <text x="60" y="240" class="text" style="font-size: 11px; fill: #dc2626; font-weight: bold;">⛔ DILARANG DIMODIFIKASI</text>

  <!-- Annex B (Compromise Zone) -->
  <rect x="40" y="310" width="240" height="30" class="annex" rx="6"/>
  <text x="160" y="330" text-anchor="middle" class="text" style="font-size: 10px; fill: #b45309;">📜 Annex B: Kompromi Lama (Opsional)</text>

  <!-- Host Zone (Safe to Extend) -->
  <rect x="320" y="60" width="240" height="280" class="safe" rx="10"/>
  <text x="440" y="85" text-anchor="middle" class="text badge" style="fill: #16a34a;">🟢 ZONA AMAN (Host-Defined)</text>
  <text x="440" y="110" text-anchor="middle" class="text" style="font-size: 11px;">Boleh Ditambahkan</text>
  <text x="340" y="140" class="text" style="font-size: 11px;">• console (Node/Browser)</text>
  <text x="340" y="160" class="text" style="font-size: 11px;">• fetch (Browser)</text>
  <text x="340" y="180" class="text" style="font-size: 11px;">• localStorage (Browser)</text>
  <text x="340" y="200" class="text" style="font-size: 11px;">• process (Node.js)</text>
  <text x="340" y="240" class="text" style="font-size: 11px; fill: #16a34a; font-weight: bold;">✅ AMAN SEBAGAI EKSTENSI</text>

  <!-- Border/Sign -->
  <line x1="300" y1="55" x2="300" y2="355" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6"/>
  <rect x="260" y="185" width="80" height="30" fill="#f1f5f9" stroke="#64748b" stroke-width="1" rx="4"/>
  <text x="300" y="205" text-anchor="middle" class="text" style="font-size: 10px; fill: #475569;">BATAS SPEC</text>

  <text x="300" y="385" text-anchor="middle" class="text" style="font-style: italic; fill: #64748b; font-size: 11px;">
    "Engine boleh ekspansi ke Zona Aman, bukan ke Zona Merah."
  </text>
</svg>
