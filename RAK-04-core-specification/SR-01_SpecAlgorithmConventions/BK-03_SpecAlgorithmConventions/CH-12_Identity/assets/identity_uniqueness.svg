<svg width="600" height="340" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .object-box { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 12; }
    .fingerprint { fill: none; stroke: #3b82f6; stroke-width: 1.5; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1e293b; }
    .title { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .id-tag { fill: #eff6ff; stroke: #3b82f6; rx: 4; }
    .equal-sign { font-size: 40px; font-weight: bold; fill: #94a3b8; }
  </style>

  <rect width="600" height="340" class="frame" rx="16"/>
  <text x="300" y="40" text-anchor="middle" class="title">🆔 Identity: Sidik Jari Objek</text>

  <!-- Object 1 -->
  <g transform="translate(80, 80)">
    <rect width="180" height="180" class="object-box"/>
    <rect x="25" y="25" width="130" height="30" class="id-tag"/>
    <text x="90" y="45" text-anchor="middle" class="text" style="font-weight: bold; fill: #2563eb;">Object A</text>
    <path d="M 60 80 Q 90 60 120 80 Q 150 100 120 130" class="fingerprint"/>
    <path d="M 50 100 Q 90 70 130 100 Q 170 130 130 160" class="fingerprint"/>
    <text x="90" y="165" text-anchor="middle" class="text" style="font-size: 10px; fill: #64748b;">(Internal ID: 0x123)</text>
  </g>

  <!-- Comparison -->
  <text x="300" y="180" text-anchor="middle" class="equal-sign">≠</text>

  <!-- Object 2 (Looks same, different identity) -->
  <g transform="translate(340, 80)">
    <rect width="180" height="180" class="object-box"/>
    <rect x="25" y="25" width="130" height="30" class="id-tag" style="stroke: #ef4444; fill: #fef2f2;"/>
    <text x="90" y="45" text-anchor="middle" class="text" style="font-weight: bold; fill: #b91c1c;">Object B</text>
    <path d="M 60 81 Q 90 61 120 81 Q 150 101 120 131" class="fingerprint" style="stroke: #ef4444; opacity: 0.5;"/>
    <text x="90" y="165" text-anchor="middle" class="text" style="font-size: 10px; fill: #64748b;">(Internal ID: 0x456)</text>
  </g>

  <text x="300" y="310" text-anchor="middle" class="text" style="font-style: italic;">
    "Meskipun isinya identik, dua objek tetap berbeda jika memiliki 'Alamat' yang berbeda."
  </text>
</svg>
