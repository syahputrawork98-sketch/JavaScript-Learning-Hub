<svg width="600" height="320" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .path-line { stroke: #cbd5e1; stroke-width: 4; stroke-dasharray: 8; fill: none; }
    .normal-state { fill: #16a34a; stroke: #15803d; stroke-width: 2; }
    .error-state { fill: #ef4444; stroke: #b91c1c; stroke-width: 3; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1e293b; }
    .title { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .alarm-bg { fill: #fef2f2; stroke: #ef4444; stroke-width: 1; }
  </style>

  <rect width="600" height="320" class="frame" rx="16"/>
  <text x="300" y="40" text-anchor="middle" class="title">🚨 Throwing Exceptions: Alarm Darurat</text>

  <!-- Flow -->
  <path d="M 50 160 L 250 160" class="path-line"/>
  <path d="M 350 160 L 550 160" class="path-line" style="stroke: #ef4444;"/>

  <!-- Start (Normal) -->
  <g transform="translate(50, 130)">
    <rect width="120" height="60" rx="8" class="normal-state"/>
    <text x="60" y="35" text-anchor="middle" class="text" style="fill: #ffffff; font-weight: bold;">Normal</text>
  </g>

  <!-- Incident (Throw Point) -->
  <g transform="translate(250, 110)">
    <path d="M 50 0 L 100 100 L 0 100 Z" fill="#ef4444"/>
    <text x="50" y="115" text-anchor="middle" class="text" style="fill: #b91c1c; font-weight: bold;">THROW!</text>
  </g>

  <!-- Error Result (Abrupt) -->
  <g transform="translate(430, 130)">
    <rect width="120" height="60" rx="8" class="error-state"/>
    <text x="60" y="32" text-anchor="middle" class="text" style="fill: #ffffff; font-weight: bold;">Abrupt</text>
    <text x="60" y="50" text-anchor="middle" class="text" style="fill: #ffffff; font-size: 10px;">(Type: throw)</text>
  </g>

  <text x="300" y="280" text-anchor="middle" class="text" style="font-style: italic;">
    "Ketika 'Throw' dipanggil, algoritma berhenti berjalan mundur dan mencari penangan terdekat."
  </text>
</svg>
