<svg width="600" height="360" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .pure-math { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 12; }
    .value-box { fill: #ffffff; stroke: #64748b; stroke-width: 2; rx: 8; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1e293b; }
    .title { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .label { font-weight: bold; fill: #2563eb; }
    .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; }
  </style>

  <rect width="600" height="360" class="frame" rx="16"/>
  <text x="300" y="40" text-anchor="middle" class="title">🧮 Mathematical Operations: Presisi Spec</text>

  <!-- Pure Mathematical Value -->
  <g transform="translate(150, 80)">
    <rect width="300" height="80" class="pure-math"/>
    <text x="150" y="30" text-anchor="middle" class="text" style="font-weight: bold;">Mathematical Value (MV)</text>
    <text x="150" y="55" text-anchor="middle" class="text" style="font-size: 11px;">Presisi tak hingga, angka murni tanpa limit bit.</text>
    <text x="150" y="70" text-anchor="middle" class="text" style="font-family: serif; font-style: italic;">e.g., 2^1000 + 0.5</text>
  </g>

  <!-- Conversion Arrows -->
  <path d="M 220 160 L 150 220" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 380 160 L 450 220" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- JS Types -->
  <g transform="translate(50, 220)">
    <rect width="200" height="80" class="value-box" style="stroke: #f59e0b;"/>
    <text x="100" y="35" text-anchor="middle" class="text label" style="fill: #d97706;">Number (float64)</text>
    <text x="100" y="60" text-anchor="middle" class="text" style="font-size: 11px;">Presisi terbatas (IEEE 754).</text>
  </g>

  <g transform="translate(350, 220)">
    <rect width="200" height="80" class="value-box" style="stroke: #10b981;"/>
    <text x="100" y="35" text-anchor="middle" class="text label" style="fill: #059669;">BigInt</text>
    <text x="100" y="60" text-anchor="middle" class="text" style="font-size: 11px;">Hanya bilangan bulat.</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="300" y="335" text-anchor="middle" class="text" style="font-style: italic;">
    "Spec beroperasi di level matematika murni sebelum mengonversinya ke tipe data JS."
  </text>
</svg>
