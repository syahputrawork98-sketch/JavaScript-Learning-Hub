<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .node { fill: #f9fafb; stroke: #374151; stroke-width: 2; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 18px; }
  </style>

  <text x="300" y="40" text-anchor="middle" class="text header">Properties: Data vs Accessor 🗄️</text>

  <!-- Data Side -->
  <rect x="50" y="70" width="230" height="180" rx="8" class="node" style="fill: #f0f9ff; stroke: #0ea5e9;"/>
  <text x="165" y="100" text-anchor="middle" class="text" style="font-weight: bold;">💾 Data Property</text>
  <rect x="70" y="130" width="190" height="60" rx="4" style="fill: #ffffff; stroke: #0ea5e9;"/>
  <text x="165" y="165" text-anchor="middle" class="text" style="font-family: monospace;">Value: 42</text>

  <!-- Accessor Side -->
  <rect x="320" y="70" width="230" height="180" rx="8" class="node" style="fill: #fef2f2; stroke: #dc2626;"/>
  <text x="435" y="100" text-anchor="middle" class="text" style="font-weight: bold;">⚙️ Accessor Property</text>
  <rect x="340" y="130" width="190" height="40" rx="4" style="fill: #ffffff; stroke: #dc2626;"/>
  <text x="435" y="155" text-anchor="middle" class="text" style="font-family: monospace;">get: function()</text>
  <rect x="340" y="180" width="190" height="40" rx="4" style="fill: #ffffff; stroke: #dc2626;"/>
  <text x="435" y="205" text-anchor="middle" class="text" style="font-family: monospace;">set: function(v)</text>

  <text x="300" y="285" text-anchor="middle" class="text" style="font-style: italic; font-size: 12px;">CH-14: Properties - The Storage vs Logic Distinction</text>
</svg>
