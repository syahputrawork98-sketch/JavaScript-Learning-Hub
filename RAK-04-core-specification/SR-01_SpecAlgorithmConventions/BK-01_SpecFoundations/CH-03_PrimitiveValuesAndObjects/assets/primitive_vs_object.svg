<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .rect { fill: #f9fafb; stroke: #374151; stroke-width: 2; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
  </style>

  <!-- Primitive Side -->
  <rect x="20" y="50" width="250" height="300" rx="8" class="rect" style="fill: #eef2ff; stroke: #4338ca;"/>
  <text x="145" y="80" text-anchor="middle" class="text header">💎 Primitive Values</text>
  <text x="40" y="120" class="text">• Immutable (Tidak bisa diubah)</text>
  <text x="40" y="145" class="text">• Pass by Value (Salin nilai)</text>
  <text x="40" y="170" class="text">• "The Value is the Data"</text>
  
  <rect x="50" y="210" width="190" height="100" rx="4" style="fill: #fff; stroke: #818cf8; stroke-dasharray: 4;"/>
  <text x="145" y="240" text-anchor="middle" class="text" style="font-weight: bold;">[ 42 ]</text>
  <text x="145" y="265" text-anchor="middle" class="text">Address: Stack</text>

  <!-- Object Side -->
  <rect x="330" y="50" width="250" height="300" rx="8" class="rect" style="fill: #fffbeb; stroke: #b45309;"/>
  <text x="455" y="80" text-anchor="middle" class="text header">📦 Object Values</text>
  <text x="350" y="120" class="text">• Mutable (Bisa dimodifikasi)</text>
  <text x="350" y="145" class="text">• Pass by Reference (Salin alamat)</text>
  <text x="350" y="170" class="text">• "Identity + Properties"</text>

  <rect x="360" y="210" width="190" height="100" rx="4" style="fill: #fff; stroke: #fbbf24; stroke-dasharray: 4;"/>
  <text x="455" y="240" text-anchor="middle" class="text" style="font-weight: bold;">{ id: 0xFB }</text>
  <text x="455" y="265" text-anchor="middle" class="text">Address: Heap</text>

  <text x="300" y="380" text-anchor="middle" class="text" style="font-style: italic; font-size: 12px;">CH-03: Primitive vs Object Mental Model</text>
</svg>
