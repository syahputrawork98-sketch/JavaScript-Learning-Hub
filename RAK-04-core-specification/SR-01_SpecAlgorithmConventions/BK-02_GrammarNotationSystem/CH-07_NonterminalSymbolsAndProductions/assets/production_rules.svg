<svg width="600" height="350" xmlns="http://www.w3.org/2000/svg">
  <style>
    .node { fill: #f3f4f6; stroke: #374151; stroke-width: 2; }
    .non-terminal { fill: #eff6ff; stroke: #2563eb; }
    .terminal { fill: #f0fdf4; stroke: #16a34a; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
    .arrow { stroke: #4b5563; stroke-width: 2; fill: none; }
    .colon { font-family: monospace; font-weight: bold; font-size: 24px; fill: #ef4444; }
  </style>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" class="text header">🖇️ The Production Chain: Building blocks</text>

  <!-- Production Anatomy -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="150" height="50" rx="8" class="node non-terminal"/>
    <text x="75" y="30" text-anchor="middle" class="text">Identifier</text>
    <text x="75" y="70" text-anchor="middle" class="text" style="font-size: 12px;">Non-terminal</text>

    <text x="175" y="35" class="colon">:</text>
    <text x="180" y="70" text-anchor="middle" class="text" style="font-size: 12px;">"is defined as"</text>

    <rect x="220" y="0" width="200" height="50" rx="4" class="node terminal"/>
    <text x="320" y="30" text-anchor="middle" class="text" style="font-family: monospace;">UnicodeIDStart</text>
    <text x="320" y="70" text-anchor="middle" class="text" style="font-size: 12px;">Alternative (Terminal/Non-T)</text>
  </g>

  <!-- Example Chain -->
  <g transform="translate(50, 160)">
    <text x="0" y="20" class="text header" style="font-size: 14px;">Example Chain:</text>
    
    <!-- Step 1 -->
    <rect x="0" y="40" width="120" height="40" rx="4" class="node non-terminal"/>
    <text x="60" y="65" text-anchor="middle" class="text" style="font-size: 12px;">[[Script]]</text>
    
    <line x1="120" y1="60" x2="160" y2="60" class="arrow" stroke-dasharray="4"/>
    
    <!-- Step 2 -->
    <rect x="160" y="40" width="120" height="40" rx="4" class="node non-terminal"/>
    <text x="220" y="65" text-anchor="middle" class="text" style="font-size: 12px;">[[StatementList]]</text>
    
    <line x1="280" y1="60" x2="320" y2="60" class="arrow" stroke-dasharray="4"/>

    <!-- Step 3 -->
    <rect x="320" y="40" width="120" height="40" rx="4" class="node non-terminal"/>
    <text x="380" y="65" text-anchor="middle" class="text" style="font-size: 12px;">[[Statement]]</text>

    <line x1="440" y1="60" x2="480" y2="60" class="arrow" stroke-dasharray="2"/>

    <!-- Step 4 (The End) -->
    <text x="500" y="65" class="text" style="font-family: monospace; color: #16a34a; font-weight: bold;">"let"</text>
  </g>

  <!-- Legend -->
  <text x="300" y="320" text-anchor="middle" class="text" style="font-style: italic; font-size: 12px;">CH-07: Productions link abstract concepts to concrete code tokens.</text>
</svg>
