<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1; }
    .symbol-box { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
    .code { font-family: monospace; font-size: 18px; fill: #065f46; }
    .label { font-size: 12px; fill: #4b5563; font-style: italic; }
  </style>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" class="text header">💎 Anatomy of a Terminal Symbol</text>

  <!-- terminal Example -->
  <rect x="150" y="70" width="300" height="100" rx="8" class="symbol-box"/>
  <text x="300" y="125" text-anchor="middle" class="code" style="font-size: 32px;">return</text>
  
  <!-- Labels -->
  <path d="M 150 175 L 150 200 L 220 200" fill="none" stroke="#16a34a" stroke-width="1"/>
  <text x="230" y="205" class="label">Fixed Character Code Points</text>

  <path d="M 450 175 L 450 200 L 380 200" fill="none" stroke="#16a34a" stroke-width="1"/>
  <text x="300" y="230" text-anchor="middle" class="label">Literal Unicode Sequence</text>

  <!-- Spec vs Real -->
  <rect x="50" y="240" width="500" height="40" rx="4" class="frame"/>
  <text x="300" y="265" text-anchor="middle" class="text">"In the spec, it's not just a word, it's a specific sequence of bits."</text>

</svg>
