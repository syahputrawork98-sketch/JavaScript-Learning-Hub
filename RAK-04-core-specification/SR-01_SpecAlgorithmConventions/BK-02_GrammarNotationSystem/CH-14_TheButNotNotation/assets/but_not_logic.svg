<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1; }
    .source-box { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; }
    .exclusion-box { fill: #fef2f2; stroke: #ef4444; stroke-width: 2; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
    .code { font-family: monospace; font-size: 14px; fill: #111827; }
    .label { font-size: 12px; fill: #4b5563; font-style: italic; }
  </style>

  <!-- Background -->
  <rect width="600" height="300" rx="12" class="frame"/>

  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" class="text header">🖐️ The "but not" Notation: Exclusion Zone</text>

  <!-- Logic Visualization -->
  <g transform="translate(50, 80)">
    <!-- Source Area -->
    <rect x="0" y="0" width="200" height="120" rx="8" class="source-box"/>
    <text x="100" y="30" text-anchor="middle" class="text" style="font-weight: bold;">Any Character</text>
    <text x="100" y="60" text-anchor="middle" class="code">A, B, C, *, /, ...</text>

    <!-- The "but not" bridge -->
    <text x="250" y="65" text-anchor="middle" class="text" style="font-weight: bold; fill: #ef4444;">but not</text>
    <path d="M 210 60 L 290 60" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Exclusion Area -->
    <rect x="300" y="0" width="200" height="120" rx="8" class="exclusion-box"/>
    <text x="400" y="30" text-anchor="middle" class="text" style="font-weight: bold;">Restricted Set</text>
    <text x="400" y="60" text-anchor="middle" class="code">* or /</text>
  </g>

  <!-- Example Note -->
  <rect x="50" y="220" width="500" height="50" rx="6" style="fill: #f3f4f6; stroke: #9ca3af;"/>
  <text x="70" y="250" class="text" style="font-size: 13px;">
    Spec: <tspan font-style="italic">MultiplicativeOperator</tspan> : <tspan font-family="monospace">any</tspan> <tspan font-weight="bold" fill="#ef4444">but not</tspan> <tspan font-family="monospace">+</tspan> or <tspan font-family="monospace">-</tspan>
  </text>

  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444" />
    </marker>
  </defs>

</svg>
