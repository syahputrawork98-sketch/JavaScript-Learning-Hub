<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .node { fill: #f3f4f6; stroke: #374151; stroke-width: 2; }
    .non-terminal { fill: #eff6ff; stroke: #2563eb; }
    .terminal { fill: #f0fdf4; stroke: #16a34a; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
    .arrow { stroke: #4b5563; stroke-width: 2; fill: none; }
  </style>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" class="text header">🌳 CFG Structure: The Growth of Code</text>

  <!-- Generations/Levels -->
  <!-- Level 1: Start Symbol -->
  <rect x="225" y="60" width="150" height="40" rx="8" class="node non-terminal"/>
  <text x="300" y="85" text-anchor="middle" class="text">[[Program]]</text>

  <!-- Level 2: Fragments -->
  <rect x="75" y="150" width="150" height="40" rx="8" class="node non-terminal"/>
  <text x="150" y="175" text-anchor="middle" class="text">[[Statement]]</text>

  <rect x="375" y="150" width="150" height="40" rx="8" class="node non-terminal"/>
  <text x="450" y="175" text-anchor="middle" class="text">[[Expression]]</text>

  <!-- Level 3: Terminals -->
  <rect x="20" y="260" width="100" height="40" rx="4" class="node terminal"/>
  <text x="70" y="285" text-anchor="middle" class="text">"let"</text>

  <rect x="130" y="260" width="100" height="40" rx="4" class="node terminal"/>
  <text x="180" y="285" text-anchor="middle" class="text">Identifier</text>

  <rect x="375" y="260" width="100" height="40" rx="4" class="node terminal"/>
  <text x="425" y="285" text-anchor="middle" class="text">Number</text>

  <rect x="485" y="260" width="100" height="40" rx="4" class="node terminal"/>
  <text x="535" y="285" text-anchor="middle" class="text">";"</text>

  <!-- Arrows -->
  <line x1="300" y1="100" x2="150" y2="150" class="arrow"/>
  <line x1="300" y1="100" x2="450" y2="150" class="arrow"/>
  
  <line x1="150" y1="190" x2="70" y2="260" class="arrow"/>
  <line x1="150" y1="190" x2="180" y2="260" class="arrow"/>
  
  <line x1="450" y1="190" x2="425" y2="260" class="arrow"/>
  <line x1="450" y1="190" x2="535" y2="260" class="arrow"/>

  <!-- Legend -->
  <rect x="50" y="340" width="20" height="20" rx="4" class="node non-terminal"/>
  <text x="80" y="355" class="text">= Non-terminals (Higher order)</text>
  
  <rect x="320" y="340" width="20" height="20" rx="4" class="node terminal"/>
  <text x="350" y="355" class="text">= Terminals (The actual code)</text>

</svg>
