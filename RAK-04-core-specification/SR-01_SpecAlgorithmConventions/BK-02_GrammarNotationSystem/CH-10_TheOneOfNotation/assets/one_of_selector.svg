<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1; }
    .choice-box { fill: #fdf2f2; stroke: #ef4444; stroke-width: 2; }
    .item { fill: #ffffff; stroke: #9ca3af; stroke-width: 1; }
    .selected { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
    .code { font-family: monospace; font-size: 14px; fill: #111827; }
  </style>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" class="text header">🎯 The "one of" Notation: Rapid Selection</text>

  <!-- Definition Box -->
  <rect x="50" y="60" width="500" height="200" rx="8" class="frame"/>
  
  <text x="80" y="90" class="text" style="font-weight: bold;">Spec Notation:</text>
  <text x="80" y="115" class="code">AssignmentOperator : <tspan font-weight="bold" fill="#ef4444">one of</tspan></text>
  
  <!-- Choice Grid -->
  <g transform="translate(80, 130)">
    <rect x="0" y="0" width="60" height="40" rx="4" class="item selected"/>
    <text x="30" y="25" text-anchor="middle" class="code">=</text>
    
    <rect x="80" y="0" width="60" height="40" rx="4" class="item"/>
    <text x="110" y="25" text-anchor="middle" class="code">*=</text>

    <rect x="160" y="0" width="60" height="40" rx="4" class="item"/>
    <text x="190" y="25" text-anchor="middle" class="code">/=</text>

    <rect x="240" y="0" width="60" height="40" rx="4" class="item"/>
    <text x="270" y="25" text-anchor="middle" class="code">%=</text>

    <rect x="320" y="0" width="60" height="40" rx="4" class="item"/>
    <text x="350" y="25" text-anchor="middle" class="code">+=</text>

    <rect x="400" y="0" width="60" height="40" rx="4" class="item"/>
    <text x="430" y="25" text-anchor="middle" class="code">-=</text>
  </g>

  <!-- Logic -->
  <text x="300" y="220" text-anchor="middle" class="text" style="font-size: 12px; fill: #4b5563;">Matches exactly ONE of the terminals from the list below.</text>
  
  <rect x="200" y="240" width="200" height="30" rx="15" class="selected" style="fill: #ecfdf5; stroke: #10b981;"/>
  <text x="300" y="260" text-anchor="middle" class="text" style="font-size: 11px; font-weight: bold; fill: #047857;">Efficient shorthand for long lists.</text>

</svg>
