<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill: #f3f4f6; stroke: #374151; stroke-width: 2; }
    .process { fill: #eff6ff; stroke: #2563eb; }
    .token { fill: #f0fdf4; stroke: #16a34a; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
    .arrow { stroke: #4b5563; stroke-width: 2; fill: none; }
  </style>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" class="text header">🔍 Lexical Flow: Characters to Tokens</text>

  <!-- Input -->
  <rect x="50" y="70" width="120" height="50" rx="4" class="box"/>
  <text x="110" y="100" text-anchor="middle" class="text" style="font-family: monospace;">"let x = 10"</text>
  <text x="110" y="140" text-anchor="middle" class="text" style="font-size: 12px;">Raw Source</text>

  <!-- Scanner Process -->
  <rect x="225" y="60" width="150" height="70" rx="8" class="process"/>
  <text x="300" y="95" text-anchor="middle" class="text header">Scanner / Lexer</text>
  <text x="300" y="115" text-anchor="middle" class="text" style="font-size: 12px;">(Pattern Matching)</text>

  <!-- Output Tokens -->
  <rect x="430" y="50" width="140" height="150" rx="8" class="token"/>
  <text x="500" y="75" text-anchor="middle" class="text header">Tokens</text>
  <text x="450" y="105" class="text" style="font-family: monospace;">1. Keyword(let)</text>
  <text x="450" y="130" class="text" style="font-family: monospace;">2. Ident(x)</text>
  <text x="450" y="155" class="text" style="font-family: monospace;">3. Punc(=)</text>
  <text x="450" y="180" class="text" style="font-family: monospace;">4. Num(10)</text>

  <!-- Arrows -->
  <line x1="170" y1="95" x2="225" y2="95" class="arrow" style="stroke-dasharray: 4;"/>
  <line x1="375" y1="95" x2="430" y2="95" class="arrow"/>

  <!-- Flow Desc -->
  <text x="300" y="260" text-anchor="middle" class="text" style="font-style: italic; font-size: 12px;">CH-02: Lexical Grammar defines the patterns for these individual tokens.</text>
</svg>
