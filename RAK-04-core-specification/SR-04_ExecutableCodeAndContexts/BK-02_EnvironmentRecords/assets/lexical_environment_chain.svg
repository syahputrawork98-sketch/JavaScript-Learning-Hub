<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">THE LEXICAL SCOPE CHAIN (NESTED NETWORKS)</text>

  <!-- Global Environment (The Base) -->
  <g transform="translate(150, 450)">
    <rect width="500" height="120" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="10"/>
    <text x="250" y="30" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">GLOBAL ENVIRONMENT RECORD</text>
    <text x="250" y="100" fill="#64748b" font-family="Courier New" font-size="12" text-anchor="middle">[[OuterEnv]]: NULL</text>
  </g>

  <!-- Outer Link Pointers -->
  <path d="M 400 180 L 400 130" stroke="#38bdf8" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-scope)"/>
  <path d="M 400 330 L 400 280" stroke="#38bdf8" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-scope)"/>

  <!-- Function Alpha Environment -->
  <g transform="translate(200, 300)">
    <rect width="400" height="100" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="10"/>
    <text x="200" y="30" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle">FUNCTION: alpha()</text>
    <text x="200" y="80" fill="#7dd3fc" font-family="Courier New" font-size="12" text-anchor="middle">[[OuterEnv]] -> Global</text>
  </g>

  <!-- Function Beta Environment -->
  <g transform="translate(250, 150)">
    <rect width="300" height="80" fill="#1e293b" stroke="#34d399" stroke-width="2" rx="10"/>
    <text x="150" y="30" fill="#34d399" font-family="Arial" font-size="14" text-anchor="middle">FUNCTION: beta()</text>
    <text x="150" y="65" fill="#a7f3d0" font-family="Courier New" font-size="12" text-anchor="middle">[[OuterEnv]] -> alpha</text>
  </g>

  <defs>
    <marker id="arrow-scope" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#38bdf8" />
    </marker>
  </defs>

  <text x="400" y="585" fill="#64748b" font-family="Arial" font-size="14" text-anchor="middle">"Searching through the Secret Wiring from Innermost to Outermost"</text>
</svg>
