<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1; }
    .prose-box { fill: #fffbeb; stroke: #d97706; stroke-width: 1; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
    .prose { font-style: italic; font-family: 'Georgia', serif; fill: #92400e; }
  </style>

  <!-- Background -->
  <rect width="600" height="300" rx="12" class="frame"/>

  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" class="text header">📝 Descriptive Phrases: The Spec's Notebook</text>

  <!-- Comparison -->
  <g transform="translate(50, 80)">
    <!-- Formal -->
    <rect x="0" y="0" width="230" height="120" rx="8" style="fill: #f3f4f6; stroke: #9ca3af;"/>
    <text x="115" y="30" text-anchor="middle" class="text" style="font-weight: bold;">Formal Notation</text>
    <text x="115" y="75" text-anchor="middle" class="text" style="font-family: monospace;">A : B C opt</text>
    <text x="115" y="105" text-anchor="middle" class="text" style="font-size: 10px; fill: #6b7280;">Strict, Symbolic, Rigid</text>

    <!-- vs -->
    <text x="250" y="65" text-anchor="middle" class="text" style="font-weight: bold;">VS</text>

    <!-- Descriptive -->
    <rect x="270" y="0" width="230" height="120" rx="8" class="prose-box"/>
    <text x="385" y="30" text-anchor="middle" class="text" style="font-weight: bold;">Descriptive Phrase</text>
    <text x="385" y="75" text-anchor="middle" class="prose" style="font-size: 13px;">"any Unicode code point"</text>
    <text x="385" y="105" text-anchor="middle" class="text" style="font-size: 10px; fill: #6b7280;">Flexible, Readable, Human</text>
  </g>

  <!-- Note -->
  <text x="300" y="240" text-anchor="middle" class="text" style="font-size: 12px; fill: #4b5563;">
    Used when defining a rule formally would be too cumbersome.
  </text>
  
  <rect x="150" y="260" width="300" height="25" rx="12" style="fill: #fef3c7; stroke: #d97706;"/>
  <text x="300" y="277" text-anchor="middle" class="text" style="font-size: 11px; font-weight: bold; fill: #92400e;">Clause 5.1.5.10: The final tool in the notation kit.</text>

</svg>
