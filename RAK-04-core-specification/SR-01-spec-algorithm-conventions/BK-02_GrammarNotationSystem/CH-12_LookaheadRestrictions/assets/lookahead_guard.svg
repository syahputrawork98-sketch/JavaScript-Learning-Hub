<svg width="600" height="350" xmlns="http://www.w3.org/2000/svg">
  <style>
    .node { fill: #f3f4f6; stroke: #374151; stroke-width: 2; }
    .guard-box { fill: #fff1f2; stroke: #e11d48; stroke-width: 2; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
    .code { font-family: monospace; font-size: 14px; fill: #111827; }
    .symbol { font-weight: bold; fill: #e11d48; }
  </style>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" class="text header">🛡️ Lookahead Restrictions: The Invisible Guard</text>

  <!-- Main Symbol -->
  <rect x="200" y="60" width="200" height="50" rx="8" class="node"/>
  <text x="300" y="90" text-anchor="middle" class="text">Expresion</text>

  <!-- Lookahead Guard -->
  <g transform="translate(100, 130)">
    <rect x="0" y="0" width="400" height="80" rx="4" class="guard-box" stroke-dasharray="8"/>
    <text x="200" y="35" text-anchor="middle" class="code">[lookahead <tspan class="symbol">∉</tspan> { <tspan fill="#374151">{</tspan>, <tspan fill="#374151">function</tspan> }]</text>
    <text x="200" y="60" text-anchor="middle" class="text" style="font-size: 11px;">"Stop! Check the next token without consuming it."</text>
  </g>

  <!-- Scenarios -->
  <g transform="translate(50, 240)">
    <rect x="0" y="0" width="240" height="80" rx="4" class="node" style="fill: #f0fdf4; stroke: #16a34a;"/>
    <text x="120" y="30" text-anchor="middle" class="text" style="font-weight: bold; fill: #166534;">Allowed</text>
    <text x="120" y="55" text-anchor="middle" class="code">10 + 20</text>
    <text x="120" y="70" text-anchor="middle" class="text" style="font-size: 10px;">Next token is '10' (Not in set)</text>

    <rect x="260" y="0" width="240" height="80" rx="4" class="node" style="fill: #fef2f2; stroke: #ef4444;"/>
    <text x="380" y="30" text-anchor="middle" class="text" style="font-weight: bold; fill: #991b1b;">Forbidden</text>
    <text x="380" y="55" text-anchor="middle" class="code">{ a: 1 }</text>
    <text x="380" y="70" text-anchor="middle" class="text" style="font-size: 10px;">Next token is '{' (In restricted set!)</text>
  </g>

</svg>
