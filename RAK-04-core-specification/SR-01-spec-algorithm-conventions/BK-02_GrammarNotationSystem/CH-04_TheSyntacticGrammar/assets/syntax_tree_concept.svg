<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .node-rect { fill: #f3f4f6; stroke: #374151; stroke-width: 2; }
    .leaf-rect { fill: #f0fdf4; stroke: #16a34a; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
    .line { stroke: #4b5563; stroke-width: 2; }
  </style>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" class="text header">🌿 Syntactic Tree: The Logic Branch</text>

  <!-- Root -->
  <rect x="225" y="60" width="150" height="40" rx="8" class="node-rect" style="fill: #eff6ff; stroke: #2563eb;"/>
  <text x="300" y="85" text-anchor="middle" class="text header">Program</text>

  <!-- Branches -->
  <rect x="75" y="180" width="180" height="40" rx="8" class="node-rect"/>
  <text x="165" y="205" text-anchor="middle" class="text">VariableDeclaration</text>

  <rect x="345" y="180" width="180" height="40" rx="8" class="node-rect"/>
  <text x="435" y="205" text-anchor="middle" class="text">ExpressionStatement</text>

  <!-- Leaves -->
  <rect x="50" y="300" width="100" height="35" rx="4" class="leaf-rect"/>
  <text x="100" y="322" text-anchor="middle" class="text">let</text>

  <rect x="180" y="300" width="100" height="35" rx="4" class="leaf-rect"/>
  <text x="230" y="322" text-anchor="middle" class="text">Identifier</text>

  <rect x="435" y="300" width="100" height="35" rx="4" class="leaf-rect"/>
  <text x="485" y="322" text-anchor="middle" class="text">FunctionCall</text>

  <!-- Lines -->
  <line x1="300" y1="100" x2="165" y2="180" class="line"/>
  <line x1="300" y1="100" x2="435" y2="180" class="line"/>
  
  <line x1="165" y1="220" x2="100" y2="300" class="line"/>
  <line x1="165" y1="220" x2="230" y2="300" class="line"/>
  
  <line x1="435" y1="220" x2="485" y2="300" class="line"/>

  <!-- Desc -->
  <text x="300" y="375" text-anchor="middle" class="text" style="font-style: italic; font-size: 12px;">CH-04: Syntactic Grammar builds the structural relationship between tokens.</text>
</svg>
