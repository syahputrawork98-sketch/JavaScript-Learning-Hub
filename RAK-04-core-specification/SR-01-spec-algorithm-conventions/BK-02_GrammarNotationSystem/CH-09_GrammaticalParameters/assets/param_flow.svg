<svg width="600" height="350" xmlns="http://www.w3.org/2000/svg">
  <style>
    .node { fill: #f3f4f6; stroke: #374151; stroke-width: 2; }
    .param-box { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
    .param { font-family: monospace; font-size: 12px; fill: #1e40af; font-weight: bold; }
    .arrow { stroke: #2563eb; stroke-width: 1.5; fill: none; }
  </style>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" class="text header">🎛️ Grammatical Parameters: The Context Knobs</text>

  <!-- Main Symbol with Parameters -->
  <rect x="150" y="60" width="300" height="60" rx="8" class="param-box"/>
  <text x="300" y="90" text-anchor="middle" class="text header">Expression<tspan baseline-shift="sub" font-size="12" font-weight="normal" font-family="monospace">[In, Yield, Await]</tspan></text>
  <text x="300" y="140" text-anchor="middle" class="text" style="font-size: 12px;">Symbol inherits parameters from its parent context.</text>

  <!-- Flow Branches -->
  <g transform="translate(50, 180)">
    <!-- Path 1: Yield -->
    <rect x="0" y="0" width="120" height="40" rx="4" class="node"/>
    <text x="60" y="25" text-anchor="middle" class="text" style="font-size: 12px;">Generator</text>
    <path d="M 120 20 L 160 20" class="arrow"/>
    <text x="200" y="25" class="param">[+Yield]</text>
    
    <!-- Path 2: Await -->
    <rect x="0" y="60" width="120" height="40" rx="4" class="node"/>
    <text x="60" y="85" text-anchor="middle" class="text" style="font-size: 12px;">Async Func</text>
    <path d="M 120 80 L 160 80" class="arrow"/>
    <text x="200" y="85" class="param">[+Await]</text>

    <!-- Path 3: No In -->
    <rect x="0" y="120" width="120" height="40" rx="4" class="node"/>
    <text x="60" y="145" text-anchor="middle" class="text" style="font-size: 12px;">For...in Loop</text>
    <path d="M 120 140 L 160 140" class="arrow"/>
    <text x="200" y="145" class="param">[~In]</text>
  </g>

  <!-- Outcome Note -->
  <rect x="300" y="180" width="250" height="100" rx="8" class="node" style="fill: #fdf2f2; stroke: #f87171;"/>
  <text x="425" y="210" text-anchor="middle" class="text" style="font-weight: bold; fill: #dc2626;">Validation Rule:</text>
  <text x="425" y="235" text-anchor="middle" class="text" style="font-size: 11px;">"If [+Yield] is active, 'yield' is</text>
  <text x="425" y="250" text-anchor="middle" class="text" style="font-size: 11px;">treated as a Keyword, not an</text>
  <text x="425" y="265" text-anchor="middle" class="text" style="font-size: 11px;">Identifier."</text>

</svg>
