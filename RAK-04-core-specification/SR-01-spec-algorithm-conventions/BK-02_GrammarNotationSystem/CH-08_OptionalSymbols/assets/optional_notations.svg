<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1; }
    .node { fill: #ffffff; stroke: #374151; stroke-width: 2; }
    .optional { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; }
    .text { font-family: 'Inter', -apple-system, sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
    .opt-tag { font-family: monospace; font-size: 12px; fill: #ea580c; font-weight: bold; }
    .arrow { stroke: #9ca3af; stroke-width: 2; fill: none; }
    .path-text { font-size: 12px; font-weight: 500; }
  </style>

  <!-- Background -->
  <rect width="600" height="300" rx="12" class="frame"/>

  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" class="text header">❓ Optional Symbols: Decision Logic</text>

  <!-- Main Symbol with opt -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="180" height="60" rx="8" class="node optional"/>
    <text x="90" y="35" text-anchor="middle" class="text" style="font-weight: 600;">Initializer<tspan class="opt-tag" baseline-shift="sub">opt</tspan></text>
    
    <!-- Split Point -->
    <circle cx="180" cy="30" r="4" fill="#ea580c"/>

    <!-- Path A: Present (Going down) -->
    <path d="M 180 30 Q 230 30 230 80 L 280 80" class="arrow" marker-end="url(#arrowhead)"/>
    <text x="240" y="100" class="text path-text" style="fill: #16a34a;">[Present] Parse content</text>
    
    <!-- Path B: Absent (Going up) -->
    <path d="M 180 30 Q 230 30 230 -20 L 280 -20" transform="translate(0, 50)" class="arrow" stroke-dasharray="4"/>
    <text x="240" y="50" class="text path-text" style="fill: #6b7280;">[Absent] Skip to next</text>
  </g>

  <!-- Practical Spec Example -->
  <g transform="translate(60, 210)">
    <rect x="0" y="0" width="480" height="60" rx="6" style="fill: #eff6ff; stroke: #3b82f6; stroke-width: 1;"/>
    <text x="20" y="25" class="text" style="font-weight: bold;">Spec Rule:</text>
    <text x="20" y="45" class="text" style="font-family: monospace; font-size: 13px;">VariableDeclaration : BindingIdentifier Initializer<tspan style="font-size: 10px; fill: #3b82f6;">opt</tspan></text>
  </g>

  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af" />
    </marker>
  </defs>

</svg>
