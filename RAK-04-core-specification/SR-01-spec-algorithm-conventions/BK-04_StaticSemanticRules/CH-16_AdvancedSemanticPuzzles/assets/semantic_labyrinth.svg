<svg width="600" height="420" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg     { fill: #0f172a; }
    .wall   { fill: #1e293b; stroke: #334155; stroke-width: 1; }
    .floor  { fill: #1e3a5f; }
    .path   { stroke: #f59e0b; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .node   { stroke-width: 2; }
    .n-green{ fill: #052e16; stroke: #4ade80; }
    .n-blue { fill: #0d1b3e; stroke: #60a5fa; }
    .n-red  { fill: #3b0a0a; stroke: #f87171; }
    .n-purp { fill: #1e0a3c; stroke: #a78bfa; }
    .n-gold { fill: #3b2000; stroke: #fbbf24; }
    .n-exit { fill: #052e16; stroke: #4ade80; }
    .t-base { font-family: 'Consolas','Courier New',monospace; fill: #f1f5f9; }
    .t-dim  { font-family: 'Consolas','Courier New',monospace; fill: #94a3b8; }
    .title  { font-family: 'Inter', sans-serif; font-weight: bold; font-size: 17px; fill: #f1f5f9; }
    .badge  { font-weight: bold; }
    .entry-arrow { stroke: #f59e0b; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
  </style>

  <!-- Background -->
  <rect width="600" height="420" class="bg" rx="16"/>

  <!-- Title -->
  <text x="300" y="32" text-anchor="middle" class="title">🌀 Semantic Labyrinth: Multi-Layer Rule Interactions</text>

  <!-- === MAZE GRID (60x60 cells) starting at x=30 y=50 === -->
  <!-- Outer border walls -->
  <rect x="30"  y="50"  width="540" height="340" class="wall" rx="6"/>

  <!-- Floor corridors (subtract walls from floor) -->
  <!-- Row 1 corridor -->
  <rect x="40"  y="60"  width="100" height="50" class="floor"/>
  <rect x="180" y="60"  width="100" height="50" class="floor"/>
  <rect x="320" y="60"  width="100" height="50" class="floor"/>
  <rect x="460" y="60"  width="100" height="50" class="floor"/>

  <!-- Row 2 corridors -->
  <rect x="40"  y="150" width="100" height="50" class="floor"/>
  <rect x="180" y="150" width="240" height="50" class="floor"/>
  <rect x="460" y="150" width="100" height="50" class="floor"/>

  <!-- Row 3 corridors -->
  <rect x="40"  y="240" width="520" height="50" class="floor"/>

  <!-- Row 4 corridors -->
  <rect x="40"  y="320" width="100" height="50" class="floor"/>
  <rect x="180" y="320" width="100" height="50" class="floor"/>
  <rect x="320" y="320" width="100" height="50" class="floor"/>
  <rect x="460" y="320" width="100" height="50" class="floor"/>

  <!-- Vertical connectors -->
  <rect x="40"  y="110" width="100" height="40"  class="floor"/>
  <rect x="460" y="110" width="100" height="40"  class="floor"/>
  <rect x="40"  y="200" width="100" height="40"  class="floor"/>
  <rect x="40"  y="290" width="100" height="30"  class="floor"/>
  <rect x="460" y="200" width="100" height="40"  class="floor"/>
  <rect x="460" y="290" width="100" height="30"  class="floor"/>
  <rect x="180" y="200" width="50"  height="120" class="floor"/>
  <rect x="370" y="200" width="50"  height="120" class="floor"/>

  <!-- === THE GOLDEN PATH (solution route) === -->
  <path class="path" d="
    M 25 85
    L 50 85
    L 130 85
    L 180 85
    L 270 85
    L 320 85
    L 420 85
    L 460 85
    L 550 85
    L 550 175
    L 460 175
    L 300 175
    L 180 175
    L 180 265
    L 300 265
    L 420 265
    L 420 345
    L 280 345
    L 280 378
  "/>

  <!-- Arrow at entry -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- === NODES === -->
  <!-- ENTRY node -->
  <rect x="40" y="67" width="90" height="36" class="node n-gold" rx="6"/>
  <text x="85" y="81"  text-anchor="middle" class="t-base badge" style="font-size:9px; fill:#fbbf24;">ENTRY</text>
  <text x="85" y="95"  text-anchor="middle" class="t-dim" style="font-size:8px;">Code Input</text>

  <!-- Scope node -->
  <rect x="183" y="67" width="90" height="36" class="node n-green" rx="6"/>
  <text x="228" y="81"  text-anchor="middle" class="t-base badge" style="font-size:9px; fill:#4ade80;">SCOPE</text>
  <text x="228" y="95"  text-anchor="middle" class="t-dim" style="font-size:8px;">CH-04, CH-15</text>

  <!-- Early Error node -->
  <rect x="323" y="67" width="90" height="36" class="node n-red" rx="6"/>
  <text x="368" y="81"  text-anchor="middle" class="t-base badge" style="font-size:9px; fill:#f87171;">EARLY ERR</text>
  <text x="368" y="95"  text-anchor="middle" class="t-dim" style="font-size:8px;">CH-03, CH-06</text>

  <!-- Mode node -->
  <rect x="463" y="157" width="90" height="36" class="node n-blue" rx="6"/>
  <text x="508" y="171"  text-anchor="middle" class="t-base badge" style="font-size:9px; fill:#60a5fa;">MODE CTX</text>
  <text x="508" y="185"  text-anchor="middle" class="t-dim" style="font-size:8px;">CH-10, CH-14</text>

  <!-- Binding node -->
  <rect x="183" y="157" width="90" height="36" class="node n-purp" rx="6"/>
  <text x="228" y="171"  text-anchor="middle" class="t-base badge" style="font-size:9px; fill:#a78bfa;">BINDING</text>
  <text x="228" y="185"  text-anchor="middle" class="t-dim" style="font-size:8px;">CH-11, TDZ</text>

  <!-- Class node -->
  <rect x="183" y="247" width="90" height="36" class="node n-red" rx="6"/>
  <text x="228" y="261"  text-anchor="middle" class="t-base badge" style="font-size:9px; fill:#f87171;">CLASS</text>
  <text x="228" y="275"  text-anchor="middle" class="t-dim" style="font-size:8px;">CH-12 #private</text>

  <!-- Module node -->
  <rect x="323" y="247" width="90" height="36" class="node n-blue" rx="6"/>
  <text x="368" y="261"  text-anchor="middle" class="t-base badge" style="font-size:9px; fill:#60a5fa;">MODULE</text>
  <text x="368" y="275"  text-anchor="middle" class="t-dim" style="font-size:8px;">CH-13, CH-14</text>

  <!-- EXIT / Resolution node -->
  <rect x="210" y="355" width="140" height="38" class="node n-exit" rx="8"/>
  <text x="280" y="371"  text-anchor="middle" class="t-base badge" style="font-size:10px; fill:#4ade80;">🏆 SOLUSI</text>
  <text x="280" y="386"  text-anchor="middle" class="t-dim" style="font-size:8px;">Sistem Aturan Terintegrasi</text>

  <!-- Legend on right -->
  <rect x="460" y="310" width="100" height="68" fill="#0f172a" stroke="#334155" stroke-width="1" rx="6"/>
  <text x="510" y="328" text-anchor="middle" class="t-dim" style="font-size:9px;">Legend:</text>
  <rect x="468" y="334" width="12" height="8" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1" rx="2"/>
  <text x="485" y="342" class="t-dim" style="font-size:8px;">Koridor</text>
  <line x1="468" y1="354" x2="480" y2="354" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="485" y="358" class="t-dim" style="font-size:8px;">Jalur Solusi</text>
  <rect x="468" y="364" width="12" height="8" fill="#052e16" stroke="#4ade80" stroke-width="1" rx="2"/>
  <text x="485" y="372" class="t-dim" style="font-size:8px;">Node Aturan</text>

  <!-- Subtitle -->
  <text x="300" y="412" text-anchor="middle" style="font-family:Inter,sans-serif; font-style:italic; fill:#64748b; font-size:11px;">
    "Temukan jalur KUNING — jalur interaksi aturan yang menghasilkan solusi."
  </text>
</svg>
