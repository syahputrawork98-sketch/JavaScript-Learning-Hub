<svg width="600" height="340" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .core-zone { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 12; }
    .host-zone { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 12; }
    .boundary { stroke: #94a3b8; stroke-width: 4; stroke-dasharray: 8; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1e293b; }
    .title { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .label { font-weight: bold; }
    .portal { fill: #ffffff; stroke: #64748b; stroke-width: 1; rx: 4; }
  </style>

  <rect width="600" height="340" class="frame" rx="16"/>
  <text x="300" y="40" text-anchor="middle" class="title">🌐 Host-defined Operations: Batas Wilayah</text>

  <!-- ECMAScript Core -->
  <g transform="translate(50, 80)">
    <rect width="220" height="200" class="core-zone"/>
    <text x="110" y="30" text-anchor="middle" class="text label" style="fill: #2563eb;">ECMAScript Core</text>
    <text x="110" y="100" text-anchor="middle" class="text" style="font-size: 12px;">Memory, Types, Algorithms</text>
    <rect x="40" y="140" width="140" height="30" class="portal"/>
    <text x="110" y="160" text-anchor="middle" class="text" style="font-size: 11px;">Host-Hooks (Call)</text>
  </g>

  <!-- Boundary Line -->
  <path d="M 300 80 L 300 280" class="boundary"/>
  <text x="300" y="180" text-anchor="middle" class="text" transform="rotate(-90, 300, 180)" style="fill: #64748b; font-size: 10px; font-weight: bold;">SPEC BOUNDARY</text>

  <!-- Host Environment -->
  <g transform="translate(330, 80)">
    <rect width="220" height="200" class="host-zone"/>
    <text x="110" y="30" text-anchor="middle" class="text label" style="fill: #ea580c;">Host Environment</text>
    <text x="110" y="100" text-anchor="middle" class="text" style="font-size: 12px;">V8 / Node.js / Browser</text>
    <rect x="40" y="140" width="140" height="30" class="portal" style="stroke: #ea580c; fill: #ffedd5;"/>
    <text x="110" y="160" text-anchor="middle" class="text" style="font-size: 11px; fill: #c2410c;">Implementation</text>
  </g>

  <text x="300" y="315" text-anchor="middle" class="text" style="font-style: italic;">
    "Spec hanya menyiapkan 'Colokan', Host yang menentukan cara kerjanya."
  </text>
</svg>
