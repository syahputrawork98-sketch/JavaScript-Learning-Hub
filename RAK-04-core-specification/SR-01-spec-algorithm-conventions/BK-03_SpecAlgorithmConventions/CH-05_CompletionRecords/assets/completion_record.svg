<svg width="600" height="340" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .packet { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 12; }
    .header-bar { fill: #334155; rx: 8 8 0 0; }
    .field-box { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1; rx: 4; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1e293b; }
    .title { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .label { font-weight: bold; fill: #475569; font-size: 12px; }
    .value-text { font-family: 'Fira Code', monospace; fill: #2563eb; font-weight: bold; }
  </style>

  <rect width="600" height="340" class="frame" rx="16"/>
  <text x="300" y="40" text-anchor="middle" class="title">📦 Completion Record: Laporan Paket Data</text>

  <!-- Record Container -->
  <g transform="translate(150, 80)">
    <rect width="300" height="200" class="packet"/>
    <path d="M 0 40 L 300 40" stroke="#334155" stroke-width="2"/>
    <text x="150" y="28" text-anchor="middle" class="text" style="fill: #ffffff; font-weight: bold;">Completion { }</text>

    <!-- [[Type]] -->
    <g transform="translate(20, 55)">
      <text x="0" y="15" class="label">[[Type]]</text>
      <rect x="0" y="20" width="260" height="30" class="field-box"/>
      <text x="10" y="40" class="text value-text">"normal" | "break" | "throw" ...</text>
    </g>

    <!-- [[Value]] -->
    <g transform="translate(20, 115)">
      <text x="0" y="15" class="label">[[Value]]</text>
      <rect x="0" y="20" width="260" height="30" class="field-box"/>
      <text x="10" y="40" class="text value-text">any JavaScript value | empty</text>
    </g>

    <!-- [[Target]] -->
    <g transform="translate(20, 175)">
      <text x="0" y="15" class="label">[[Target]]</text>
      <rect x="0" y="20" width="260" height="30" class="field-box"/>
      <text x="10" y="40" class="text value-text">label name | empty</text>
    </g>
  </g>

  <text x="300" y="315" text-anchor="middle" class="text" style="font-style: italic;">
    "Setiap langkah algoritma selalu membungkus hasilnya dalam Laporan ini."
  </text>
</svg>
