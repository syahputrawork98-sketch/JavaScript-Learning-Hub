<svg width="600" height="360" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .puzzle-piece { fill: #ffffff; stroke: #6366f1; stroke-width: 2; rx: 8; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1e293b; }
    .title { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .connector { stroke: #818cf8; stroke-width: 3; fill: none; }
  </style>

  <rect width="600" height="360" class="frame" rx="16"/>
  <text x="300" y="40" text-anchor="middle" class="title">🧩 Algorithm Puzzles: Sintesis Final</text>

  <!-- Puzzle Layout -->
  <g transform="translate(50, 80)">
    <rect width="120" height="80" class="puzzle-piece"/>
    <text x="60" y="45" text-anchor="middle" class="text" style="font-weight: bold;">Syntax (SDO)</text>
    
    <rect x="150" y="0" width="120" height="80" class="puzzle-piece" style="stroke: #f43f5e;"/>
    <text x="210" y="45" text-anchor="middle" class="text" style="font-weight: bold;">Logic (AO)</text>

    <rect x="300" y="0" width="120" height="80" class="puzzle-piece" style="stroke: #10b981;"/>
    <text x="360" y="45" text-anchor="middle" class="text" style="font-weight: bold;">Result (Rec)</text>

    <!-- Connectors -->
    <path d="M 120 40 L 150 40" class="connector"/>
    <path d="M 270 40 L 300 40" class="connector"/>
  </g>

  <g transform="translate(150, 200)">
    <rect width="300" height="100" class="puzzle-piece" style="fill: #e0e7ff; stroke: #4338ca;"/>
    <text x="150" y="40" text-anchor="middle" class="text" style="font-weight: bold; font-size: 16px;">THE SPEC MASTER</text>
    <text x="150" y="70" text-anchor="middle" class="text" style="font-size: 11px;">"Mampu membaca, menafsirkan, dan memprediksi"</text>
  </g>

  <text x="300" y="340" text-anchor="middle" class="text" style="font-style: italic;">
    "Gabungkan semua konvensi untuk memecahkan teka-teki terdalam JavaScript."
  </text>
</svg>
