<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .node { fill: #f9fafb; stroke: #374151; stroke-width: 2; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
    .arrow { stroke: #6b7280; stroke-width: 2; fill: none; }
  </style>

  <!-- Operation -->
  <rect x="50" y="50" width="180" height="60" rx="8" class="node" style="fill: #fdf2f8; stroke: #db2777;"/>
  <text x="140" y="85" text-anchor="middle" class="text header">JS Operation</text>
  <text x="140" y="105" text-anchor="middle" class="text" style="font-family: monospace; font-size: 12px;">obj.prop</text>

  <!-- Arrow -->
  <path d="M230 80 L320 80" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="275" y="70" text-anchor="middle" class="text" style="font-size: 12px;">Triggers</text>

  <!-- Internal Method -->
  <rect x="330" y="50" width="220" height="60" rx="8" class="node" style="fill: #eff6ff; stroke: #2563eb;"/>
  <text x="440" y="85" text-anchor="middle" class="text header">Internal Method</text>
  <text x="440" y="105" text-anchor="middle" class="text" style="font-family: monospace; font-size: 12px;">[[Get]] (P, receiver)</text>

  <!-- Engine Logic -->
  <rect x="190" y="160" width="220" height="80" rx="8" class="node" style="fill: #f0fdf4; stroke: #16a34a; stroke-dasharray: 4;"/>
  <text x="300" y="190" text-anchor="middle" class="text header">Engine Implementation</text>
  <text x="300" y="215" text-anchor="middle" class="text" style="font-size: 12px;">"How the property is found"</text>

  <path d="M440 110 L300 160" class="arrow" marker-end="url(#arrowhead)"/>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <text x="300" y="280" text-anchor="middle" class="text" style="font-style: italic; font-size: 12px;">CH-18: Internal Methods - The Interaction Flow</text>
</svg>
