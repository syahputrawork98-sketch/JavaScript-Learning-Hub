<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles -->
  <style>
    .rect { fill: #f3f4f6; stroke: #374151; stroke-width: 2; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
    .arrow { stroke: #4b5563; stroke-width: 2; fill: none; }
    .arrow-head { fill: #4b5563; }
  </style>

  <!-- Core Box -->
  <rect x="200" y="20" width="200" height="60" rx="8" class="rect" style="fill: #fdf2f8; stroke: #db2777;"/>
  <text x="300" y="55" text-anchor="middle" class="text header">🌐 ECMA-262 Core</text>

  <!-- Arrows from Core -->
  <path d="M300 80 L200 150" class="arrow"/>
  <path d="M300 80 L400 150" class="arrow"/>
  
  <!-- Implementation Box -->
  <rect x="50" y="150" width="230" height="100" rx="8" class="rect" style="fill: #eff6ff; stroke: #2563eb;"/>
  <text x="165" y="180" text-anchor="middle" class="text header">⚙️ Implementation (Engines)</text>
  <text x="70" y="210" class="text">• V8 (Chrome/Node)</text>
  <text x="70" y="230" class="text">• JavaScriptCore (Safari)</text>

  <!-- Host Box -->
  <rect x="320" y="150" width="230" height="100" rx="8" class="rect" style="fill: #f0fdf4; stroke: #16a34a;"/>
  <text x="435" y="180" text-anchor="middle" class="text header">🏟️ Host Environment</text>
  <text x="340" y="210" class="text">• Browser (DOM, Web API)</text>
  <text x="340" y="230" class="text">• Node.js (fs, path, net)</text>

  <!-- Footer -->
  <text x="300" y="350" text-anchor="middle" class="text" style="font-style: italic; font-size: 12px;">CH-01: Implementation Context Mental Model</text>
</svg>
