<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">SHORT-CIRCUIT FLOW LOGIC (SMART GATES)</text>

  <!-- AND Gate ( &amp;&amp; ) -->
  <g transform="translate(100, 100)">
    <rect width="250" height="150" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="10"/>
    <text x="125" y="30" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">LOGICAL AND ( &amp;&amp; )</text>
    
    <circle cx="60" cy="80" r="20" fill="#f43f5e"/>
    <text x="60" y="85" fill="#fff" font-family="Arial" font-size="10" text-anchor="middle">FALSE</text>
    
    <path d="M 80 80 L 150 80" stroke="#f43f5e" stroke-width="3" stroke-dasharray="5,2"/>
    <text x="115" y="70" fill="#f43f5e" font-family="Arial" font-size="10" text-anchor="middle">STOP</text>
    
    <rect x="170" y="60" width="60" height="40" fill="#334155" rx="5"/>
    <text x="200" y="85" fill="#64748b" font-family="Arial" font-size="9" text-anchor="middle">Unreached</text>
    
    <text x="125" y="130" fill="#94a3b8" font-family="Arial" font-size="11" text-anchor="middle">"If first fails, abort second"</text>
  </g>

  <!-- OR Gate ( || ) -->
  <g transform="translate(450, 100)">
    <rect width="250" height="150" fill="#1e293b" stroke="#a855f7" stroke-width="2" rx="10"/>
    <text x="125" y="30" fill="#a855f7" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">LOGICAL OR ( || )</text>
    
    <circle cx="60" cy="80" r="20" fill="#34d399"/>
    <text x="60" y="85" fill="#fff" font-family="Arial" font-size="10" text-anchor="middle">TRUE</text>
    
    <path d="M 80 80 L 150 80" stroke="#34d399" stroke-width="3" stroke-dasharray="5,2"/>
    <text x="115" y="70" fill="#34d399" font-family="Arial" font-size="10" text-anchor="middle">BYPASS</text>
    
    <rect x="170" y="60" width="60" height="40" fill="#334155" rx="5"/>
    <text x="200" y="85" fill="#64748b" font-family="Arial" font-size="9" text-anchor="middle">Unreached</text>
    
    <text x="125" y="130" fill="#94a3b8" font-family="Arial" font-size="11" text-anchor="middle">"If first succeeds, bypass second"</text>
  </g>

  <!-- NULLISH Gate ( ?? ) -->
  <g transform="translate(275, 280)">
    <rect width="250" height="130" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="125" y="30" fill="#fbbf24" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">NULLISH ( ?? )</text>
    
    <text x="125" y="70" fill="#94a3b8" font-family="Arial" font-size="11" text-anchor="middle">"Only switches if primary is DEAD"</text>
    <text x="125" y="90" fill="#fbbf24" font-family="Courier New" font-size="12" text-anchor="middle">null | undefined</text>
  </g>

  <text x="400" y="440" fill="#64748b" font-family="Arial" font-size="14" text-anchor="middle">"Optimization through early termination of the signal flow"</text>
</svg>
