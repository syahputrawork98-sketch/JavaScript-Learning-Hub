<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">EXPRESSION PRECEDENCE STACK (THE HIERARCHY)</text>

  <!-- Precedence Layers (Highest at Top) -->
  <g transform="translate(100, 80)">
    <!-- Level 1: Primary/Access -->
    <rect width="600" height="60" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="5"/>
    <text x="300" y="25" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">LEVEL 1: PRIMARY &amp; ACCESS (Highest)</text>
    <text x="300" y="45" fill="#94a3b8" font-family="Courier New" font-size="12" text-anchor="middle">( ) , . , [ ] , ?. , new , f( )</text>

    <!-- Level 2: Unary/Update -->
    <rect y="80" width="600" height="60" fill="#1e293b" stroke="#f43f5e" stroke-width="2" rx="5"/>
    <text x="300" y="105" fill="#f43f5e" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">LEVEL 2: UNARY &amp; UPDATE</text>
    <text x="300" y="125" fill="#94a3b8" font-family="Courier New" font-size="12" text-anchor="middle">++ , -- , delete , typeof , ! , + , -</text>

    <!-- Level 3: Arithmetic -->
    <rect y="160" width="600" height="60" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="5"/>
    <text x="300" y="185" fill="#fbbf24" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">LEVEL 3: ARITHMETIC</text>
    <text x="300" y="205" fill="#94a3b8" font-family="Courier New" font-size="12" text-anchor="middle">** , * , / , % , + , -</text>

    <!-- Level 4: Comparison/Logic -->
    <rect y="240" width="600" height="60" fill="#1e293b" stroke="#a855f7" stroke-width="2" rx="5"/>
    <text x="300" y="265" fill="#a855f7" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">LEVEL 4: RELATIONAL &amp; LOGIC</text>
    <text x="300" y="285" fill="#94a3b8" font-family="Courier New" font-size="12" text-anchor="middle">&lt; , &gt; , === , &amp;&amp; , || , ??</text>

    <!-- Level 5: Assignment -->
    <rect y="320" width="600" height="60" fill="#1e293b" stroke="#34d399" stroke-width="2" rx="5"/>
    <text x="300" y="345" fill="#34d399" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">LEVEL 5: ASSIGNMENT (Lowest)</text>
    <text x="300" y="365" fill="#94a3b8" font-family="Courier New" font-size="12" text-anchor="middle">= , += , -= , *= , yield , await</text>
  </g>

  <!-- Evaluation Direction -->
  <path d="M 50 100 L 50 480" stroke="#64748b" stroke-width="2" stroke-dasharray="10,5" marker-end="url(#arrow-down)"/>
  <text x="30" y="290" fill="#64748b" font-family="Arial" font-size="12" transform="rotate(-90, 30, 290)" text-anchor="middle">Order of Evaluation</text>

  <defs>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <text x="400" y="550" fill="#64748b" font-family="Arial" font-size="14" text-anchor="middle">"The Engine prioritizes Access before Math, and Math before Logic"</text>
</svg>
