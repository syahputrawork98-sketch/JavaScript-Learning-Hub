<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#f8fafc" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">SCRIPT VS MODULE TRANSMISSION FLOW</text>

  <!-- Script Transmission (Open Circuit) -->
  <g transform="translate(50, 80)">
    <rect width="320" height="380" fill="#1e293b" stroke="#f43f5e" stroke-width="2" rx="10"/>
    <text x="160" y="30" fill="#f43f5e" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">CLASSICAL SCRIPT</text>
    
    <!-- Global Grid -->
    <rect x="20" y="60" width="280" height="300" fill="#0f172a" stroke="#475569" stroke-dasharray="2,2"/>
    <text x="140" y="80" fill="#475569" font-family="Arial" font-size="10" text-anchor="middle">THE GLOBAL GRID (Shared)</text>
    
    <!-- Messy cables -->
    <path d="M 40 120 L 260 120" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrow-script)"/>
    <path d="M 40 180 L 260 180" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrow-script)"/>
    <path d="M 40 240 L 260 240" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrow-script)"/>
    
    <!-- Leakage -->
    <path d="M 280 150 Q 350 150 350 250" fill="none" stroke="#f43f5e" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="355" y="270" fill="#f43f5e" font-family="Arial" font-size="8">Leaking to Global Object</text>
  </g>

  <!-- Module Transmission (Reinforced Network) -->
  <g transform="translate(430, 80)">
    <rect width="320" height="380" fill="#1e293b" stroke="#34d399" stroke-width="2" rx="10"/>
    <text x="160" y="30" fill="#34d399" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">ES MODULE (ESM)</text>
    
    <!-- Isolated Cells -->
    <rect x="40" y="70" width="100" height="100" fill="#064e3b" stroke="#34d399" rx="5"/>
    <text x="90" y="125" fill="#ffffff" font-family="Arial" font-size="10" text-anchor="middle">Private Scope 1</text>
    
    <rect x="180" y="70" width="100" height="100" fill="#064e3b" stroke="#34d399" rx="5"/>
    <text x="230" y="125" fill="#ffffff" font-family="Arial" font-size="10" text-anchor="middle">Private Scope 2</text>
    
    <!-- Explicit Link -->
    <path d="M 140 120 L 180 120" stroke="#34d399" stroke-width="3" marker-end="url(#arrow-mod)"/>
    <text x="160" y="110" fill="#34d399" font-family="Arial" font-size="8" text-anchor="middle">Explicit EXPORT</text>
    
    <rect x="40" y="220" width="240" height="120" fill="#0f172a" stroke="#38bdf8" rx="10"/>
    <text x="140" y="240" fill="#38bdf8" font-family="Arial" font-size="10" text-anchor="middle">TOP-LEVEL AWAIT VAULT</text>
    <path d="M 100 270 L 180 270" stroke="#38bdf8" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-mod)"/>
  </g>

  <defs>
    <marker id="arrow-script" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f43f5e" />
    </marker>
    <marker id="arrow-mod" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
    </marker>
  </defs>

  <text x="400" y="485" fill="#64748b" font-family="Arial" font-size="12" text-anchor="middle">"Transitioning from chaotic open circuits to ordered, high-security modular networks"</text>
</svg>
