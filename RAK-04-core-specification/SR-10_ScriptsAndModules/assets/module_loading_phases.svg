<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-flow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#f8fafc" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">MODULE LOADING PHASES (THE TRANSMISSION CYCLE)</text>

  <!-- Phase 1: Construction -->
  <g transform="translate(100, 100)">
    <rect width="180" height="120" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="10"/>
    <text x="90" y="30" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">PHASE 1</text>
    <text x="90" y="60" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">CONSTRUCTION</text>
    <text x="90" y="85" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">(Parse &amp; Fetch)</text>
    <rect x="30" y="95" width="120" height="8" fill="#334155" rx="4"/>
    <rect x="30" y="95" width="40" height="8" fill="#38bdf8" rx="4"/>
  </g>

  <!-- Flow 1 to 2 -->
  <path d="M 280 160 L 310 160" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow-flow)"/>

  <!-- Phase 2: Instantiation -->
  <g transform="translate(310, 100)">
    <rect width="180" height="120" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="90" y="30" fill="#fbbf24" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">PHASE 2</text>
    <text x="90" y="60" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">INSTANTIATION</text>
    <text x="90" y="85" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">(Memory Allocation)</text>
    <rect x="30" y="95" width="120" height="8" fill="#334155" rx="4"/>
    <rect x="30" y="95" width="80" height="8" fill="#fbbf24" rx="4"/>
  </g>

  <!-- Flow 2 to 3 -->
  <path d="M 490 160 L 520 160" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-flow)"/>

  <!-- Phase 3: Evaluation -->
  <g transform="translate(520, 100)">
    <rect width="180" height="120" fill="#1e293b" stroke="#34d399" stroke-width="2" rx="10"/>
    <text x="90" y="30" fill="#34d399" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">PHASE 3</text>
    <text x="90" y="60" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">EVALUATION</text>
    <text x="90" y="85" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">(Code Execution)</text>
    <rect x="30" y="95" width="120" height="8" fill="#34d399" rx="4"/>
  </g>

  <!-- Detailed Insight -->
  <g transform="translate(100, 260)">
    <rect width="600" height="180" fill="#0f172a" stroke="#64748b" rx="10" stroke-dasharray="5,5"/>
    <text x="300" y="30" fill="#94a3b8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">INTERNAL MECHANICS</text>
    
    <text x="40" y="70" fill="#ffffff" font-family="Arial" font-size="11">- Static Analysis happens before any energy flows (Pre-Execution).</text>
    <text x="40" y="100" fill="#ffffff" font-family="Arial" font-size="11">- Imports are live bindings (not copies) to the source energy.</text>
    <text x="40" y="130" fill="#ffffff" font-family="Arial" font-size="11">- Evaluation only occurs once (Singleton Network Control).</text>
    <text x="40" y="160" fill="#38bdf8" font-family="Arial" font-size="11" font-weight="bold">STATUS: PROTECTED &amp; PREDICTABLE</text>
  </g>

  <text x="400" y="480" fill="#64748b" font-family="Arial" font-size="12" text-anchor="middle">"The Hub meticulously prepares the modular landscape before activating the main pulse"</text>
</svg>
