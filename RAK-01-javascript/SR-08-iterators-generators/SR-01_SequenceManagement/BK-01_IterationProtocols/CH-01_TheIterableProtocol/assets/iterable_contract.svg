<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">ITERABLE CONTRACT (THE HUB AGREEMENT)</text>

  <!-- Symbol.iterator Entry -->
  <g transform="translate(100, 150)">
    <rect width="200" height="150" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="100" y="30" fill="#fbbf24" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">THE ITERABLE</text>
    <circle cx="100" cy="85" r="30" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
    <text x="100" y="90" fill="#fbbf24" font-family="Arial" font-size="18" text-anchor="middle">⚙️</text>
    <text x="100" y="130" fill="#fbbf24" font-family="Arial" font-size="10" text-anchor="middle">[Symbol.iterator]</text>
  </g>

  <!-- Contract Connection -->
  <path d="M 300 225 L 500 225" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow-conn)"/>
  <text x="400" y="210" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">returns</text>

  <!-- The Iterator -->
  <g transform="translate(500, 150)">
    <rect width="200" height="150" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="10"/>
    <text x="100" y="30" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">THE ITERATOR</text>
    <rect x="40" y="60" width="120" height="30" fill="#0f172a" stroke="#38bdf8" rx="5"/>
    <text x="100" y="80" fill="#38bdf8" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">next()</text>
    <text x="100" y="110" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">Track State...</text>
  </g>

  <defs>
    <marker id="arrow-conn" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
</svg>
