<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">ITERATOR CONVEYOR (STEP-BY-STEP)</text>

  <!-- The Conveyor Belt -->
  <rect x="100" y="250" width="600" height="40" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <circle cx="120" cy="270" r="15" fill="#0f172a" stroke="#64748b"/>
  <circle cx="680" cy="270" r="15" fill="#0f172a" stroke="#64748b"/>

  <!-- Items on conveyor -->
  <rect x="150" y="200" width="40" height="40" fill="#fbbf24" rx="5"/>
  <rect x="250" y="200" width="40" height="40" fill="#fbbf24" rx="5" opacity="0.6"/>
  <rect x="350" y="200" width="40" height="40" fill="#fbbf24" rx="5" opacity="0.3"/>

  <!-- The Robot Arm (Iterator) -->
  <g transform="translate(150, 100)">
    <path d="M 0 0 L 20 80" stroke="#38bdf8" stroke-width="6"/>
    <rect x="10" y="80" width="30" height="10" fill="#38bdf8"/>
    <text x="50" y="20" fill="#38bdf8" font-family="Arial" font-size="14" font-weight="bold">next()</text>
  </g>

  <!-- The Contract -->
  <g transform="translate(500, 100)">
    <rect width="200" height="80" fill="#0f172a" stroke="#34d399" stroke-width="2" rx="5"/>
    <text x="100" y="30" fill="#34d399" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">RESULT PACKET</text>
    <text x="20" y="55" fill="#94a3b8" font-family="Arial" font-size="10">value: &lt;any&gt;</text>
    <text x="20" y="70" fill="#94a3b8" font-family="Arial" font-size="10">done: false/true</text>
  </g>
</svg>
