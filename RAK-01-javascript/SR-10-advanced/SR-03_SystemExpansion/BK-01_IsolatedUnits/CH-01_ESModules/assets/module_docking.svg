<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">MODULE DOCKING (EXPANSION SYSTEM)</text>

  <!-- Unit A (The Hub) -->
  <rect x="100" y="120" width="250" height="200" fill="#1e293b" stroke="#38bdf8" stroke-width="4" rx="10"/>
  <text x="225" y="230" fill="#38bdf8" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">CORE HUB</text>

  <!-- Unit B (The Module) -->
  <g transform="translate(500, 120)">
    <rect width="200" height="200" fill="#1e293b" stroke="#a78bfa" stroke-width="4" rx="10"/>
    <text x="100" y="110" fill="#a78bfa" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">EXPANSION</text>
    <text x="100" y="140" fill="#94a3b8" font-family="Arial" font-size="14" text-anchor="middle">MODULE</text>
  </g>

  <!-- The Docking Connection -->
  <path d="M 350 220 L 500 220" stroke="#fbbf24" stroke-width="8" stroke-dasharray="10,5"/>
  <rect x="400" y="200" width="50" height="40" fill="#fbbf24" rx="5"/>
  <text x="425" y="225" fill="#0f172a" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">IMPORT</text>
</svg>
