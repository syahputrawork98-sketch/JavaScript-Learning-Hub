<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">REPLACEMENT STATION (DATA TRANSFORMATION)</text>

  <!-- Input Side -->
  <g transform="translate(50, 150)">
    <rect width="200" height="100" fill="#1e293b" stroke="#f43f5e" stroke-width="2" rx="5"/>
    <text x="100" y="55" fill="#f43f5e" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">OLD DATA</text>
  </g>

  <!-- The Processor -->
  <g transform="translate(300, 100)">
    <rect width="200" height="200" fill="#0f172a" stroke="#38bdf8" stroke-width="4" rx="20"/>
    <path d="M 50 100 L 150 100" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow-proc)"/>
    <text x="100" y="160" fill="#38bdf8" font-family="Courier New" font-size="14" text-anchor="middle">.replace()</text>
  </g>

  <!-- Output Side -->
  <g transform="translate(550, 150)">
    <rect width="200" height="100" fill="#1e293b" stroke="#34d399" stroke-width="2" rx="5"/>
    <text x="100" y="55" fill="#34d399" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">NEW DATA</text>
  </g>

  <defs>
    <marker id="arrow-proc" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8" />
    </marker>
  </defs>

  <!-- Connectors -->
  <path d="M 250 200 L 300 200" stroke="#f43f5e" stroke-width="4"/>
  <path d="M 500 200 L 550 200" stroke="#34d399" stroke-width="4"/>
</svg>
