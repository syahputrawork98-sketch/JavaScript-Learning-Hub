<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">BOUNDARY ASSERTIONS (GRID PROTECTION)</text>

  <!-- Input Area -->
  <rect x="100" y="100" width="600" height="200" fill="#1e293b" rx="10"/>
  <text x="200" y="210" fill="#94a3b8" font-family="Courier New" font-size="40" font-weight="bold">DATA_STREAM</text>

  <!-- Anchor Start (^) -->
  <g transform="translate(100, 100)">
    <rect width="40" height="200" fill="#f43f5e" rx="5"/>
    <text x="20" y="110" fill="#ffffff" font-family="Courier New" font-size="40" text-anchor="middle" font-weight="bold">^</text>
    <text x="20" y="230" fill="#f43f5e" font-family="Arial" font-size="12" text-anchor="middle">START</text>
  </g>

  <!-- Anchor End ($) -->
  <g transform="translate(660, 100)">
    <rect width="40" height="200" fill="#38bdf8" rx="5"/>
    <text x="20" y="110" fill="#ffffff" font-family="Courier New" font-size="40" text-anchor="middle" font-weight="bold">$</text>
    <text x="20" y="230" fill="#38bdf8" font-family="Arial" font-size="12" text-anchor="middle">END</text>
  </g>

  <!-- Word Boundary (\b) -->
  <g transform="translate(350, 250)">
    <path d="M 0 0 L 0 -100" stroke="#fbbf24" stroke-width="4" stroke-dasharray="8,4"/>
    <rect x="-20" y="-120" width="40" height="30" fill="#fbbf24" rx="5"/>
    <text x="0" y="-100" fill="#0f172a" font-family="Courier New" font-size="14" text-anchor="middle" font-weight="bold">\b</text>
  </g>
</svg>
