<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a" rx="15"/>
  <defs>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="40" fill="#f8fafc" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">SUB-ATOMIC BITWISE PROCESSOR</text>

  <!-- Main Chip Body -->
  <rect x="100" y="70" width="600" height="340" fill="url(#chipGrad)" stroke="#334155" stroke-width="2" rx="10"/>
  
  <!-- Circuit Lines -->
  <path d="M150 150 L650 150 M150 250 L650 250 M150 350 L650 350" stroke="#334155" stroke-width="1" fill="none"/>

  <!-- Operand A -->
  <g transform="translate(150, 110)">
    <text x="-30" y="25" fill="#38bdf8" font-family="Arial" font-size="14" font-weight="bold">OP A</text>
    <g transform="translate(50, 0)">
      <rect x="0" y="0" width="40" height="40" fill="#0369a1" stroke="#38bdf8" rx="4"/> <text x="20" y="26" fill="white" font-family="Courier New" font-size="20" text-anchor="middle">1</text>
      <rect x="50" y="0" width="40" height="40" fill="#1e293b" stroke="#334155" rx="4"/> <text x="70" y="26" fill="white" font-family="Courier New" font-size="20" text-anchor="middle">0</text>
      <rect x="100" y="0" width="40" height="40" fill="#0369a1" stroke="#38bdf8" rx="4"/> <text x="120" y="26" fill="white" font-family="Courier New" font-size="20" text-anchor="middle">1</text>
      <rect x="150" y="0" width="40" height="40" fill="#1e293b" stroke="#334155" rx="4"/> <text x="170" y="26" fill="white" font-family="Courier New" font-size="20" text-anchor="middle">0</text>
    </g>
  </g>

  <!-- Operand B -->
  <g transform="translate(150, 190)">
    <text x="-30" y="25" fill="#f472b6" font-family="Arial" font-size="14" font-weight="bold">OP B</text>
    <g transform="translate(50, 0)">
      <rect x="0" y="0" width="40" height="40" fill="#be185d" stroke="#f472b6" rx="4"/> <text x="20" y="26" fill="white" font-family="Courier New" font-size="20" text-anchor="middle">1</text>
      <rect x="50" y="0" width="40" height="40" fill="#be185d" stroke="#f472b6" rx="4"/> <text x="70" y="26" fill="white" font-family="Courier New" font-size="20" text-anchor="middle">1</text>
      <rect x="100" y="0" width="40" height="40" fill="#1e293b" stroke="#334155" rx="4"/> <text x="120" y="26" fill="white" font-family="Courier New" font-size="20" text-anchor="middle">0</text>
      <rect x="150" y="0" width="40" height="40" fill="#1e293b" stroke="#334155" rx="4"/> <text x="170" y="26" fill="white" font-family="Courier New" font-size="20" text-anchor="middle">0</text>
    </g>
  </g>

  <!-- Operation Central Unit -->
  <g transform="translate(420, 140)">
    <rect x="-30" y="-10" width="60" height="120" fill="#334155" rx="10" stroke="#94a3b8" stroke-width="2"/>
    <text x="0" y="60" fill="#f8fafc" font-family="Arial" font-size="40" text-anchor="middle" font-weight="bold">&amp;</text>
    <text x="0" y="100" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">AND Unit</text>
  </g>

  <!-- Output Result -->
  <g transform="translate(580, 150)">
    <text x="0" y="-20" fill="#22c55e" font-family="Arial" font-size="16" font-weight="bold">RESULT</text>
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="40" height="40" fill="#15803d" stroke="#22c55e" rx="4" filter="url(#glow)"/> <text x="20" y="26" fill="white" font-family="Courier New" font-size="20" text-anchor="middle">1</text>
      <rect x="0" y="50" width="40" height="40" fill="#1e293b" stroke="#334155" rx="4"/> <text x="20" y="76" fill="white" font-family="Courier New" font-size="20" text-anchor="middle">0</text>
      <rect x="0" y="100" width="40" height="40" fill="#1e293b" stroke="#334155" rx="4"/> <text x="20" y="126" fill="white" font-family="Courier New" font-size="20" text-anchor="middle">0</text>
      <rect x="0" y="150" width="40" height="40" fill="#1e293b" stroke="#334155" rx="4"/> <text x="20" y="176" fill="white" font-family="Courier New" font-size="20" text-anchor="middle">0</text>
    </g>
  </g>
  
  <rect x="150" y="420" width="500" height="10" fill="#334155" rx="5"/>
  <text x="400" y="445" fill="#475569" font-family="Arial" font-size="12" text-anchor="middle">BIT ALIGNMENT PROTOCOL v2.0</text>
</svg>
