<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="300" fill="#0f172a" rx="10"/>
  
  <!-- Title -->
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">NULLISH (??) BACKUP LINE</text>
  
  <!-- Primary Line -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="200" height="60" fill="#1e293b" stroke="#ef4444" stroke-width="4" stroke-dasharray="10,5"/>
    <text x="100" y="35" fill="#ef4444" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">NULL / UNDEFINED</text>
    <text x="100" y="-10" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">Jalur Utama (Putus)</text>
  </g>
  
  <!-- Backup Operator -->
  <g transform="translate(380, 130)">
    <circle r="30" fill="#1e293b" stroke="#fbbf24" stroke-width="4"/>
    <text x="0" y="10" fill="#fbbf24" font-family="Arial" font-size="28" text-anchor="middle">??</text>
  </g>
  
  <!-- Secondary Line -->
  <g transform="translate(500, 100)">
    <rect x="0" y="0" width="200" height="60" fill="#1e293b" stroke="#22c55e" stroke-width="4"/>
    <text x="100" y="35" fill="#22c55e" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">DEFAULT VALUE</text>
    <text x="100" y="-10" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">Jalur Cadangan (Aktif)</text>
  </g>
</svg>
