<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="300" fill="#0f172a" rx="10"/>
  
  <!-- Title -->
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">TERNARY RAILROAD SWITCH</text>
  
  <!-- Main Path -->
  <path d="M50 150 L300 150" stroke="#334155" stroke-width="10"/>
  <text x="150" y="130" fill="#94a3b8" font-family="Arial" font-size="14" text-anchor="middle">Input Sinyal</text>
  
  <!-- The Switch -->
  <g transform="translate(350, 150)">
    <circle r="30" fill="#1e293b" stroke="#fbbf24" stroke-width="4"/>
    <text x="0" y="5" fill="#fbbf24" font-family="Arial" font-size="24" text-anchor="middle">?</text>
  </g>
  
  <!-- Path TRUE -->
  <path d="M400 150 L550 80 L700 80" fill="none" stroke="#22c55e" stroke-width="6"/>
  <text x="600" y="70" fill="#22c55e" font-family="Arial" font-size="14" font-weight="bold">TRUE : Jalur A</text>
  
  <!-- Path FALSE -->
  <path d="M400 150 L550 220 L700 220" fill="none" stroke="#ef4444" stroke-width="6"/>
  <text x="600" y="240" fill="#ef4444" font-family="Arial" font-size="14" font-weight="bold">FALSE : Jalur B</text>
</svg>
