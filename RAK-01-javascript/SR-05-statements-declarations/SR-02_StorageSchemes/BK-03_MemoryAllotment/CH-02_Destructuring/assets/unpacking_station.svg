<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">UNPACKING STATION (DESTRUCTURING)</text>

  <!-- The Source Object -->
  <g transform="translate(100, 150)">
    <rect width="200" height="150" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="10"/>
    <text x="100" y="30" fill="#38bdf8" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">Container { }</text>
    <circle cx="100" cy="80" r="15" fill="#facc15"/>
    <rect x="85" y="110" width="30" height="20" fill="#f472b6"/>
  </g>

  <!-- Unpacking Action -->
  <path d="M 320 225 L 480 225" stroke="#94a3b8" stroke-width="4" stroke-dasharray="10,5" marker-end="url(#arrow-unpack)"/>
  <text x="400" y="210" fill="#94a3b8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">UNPACK</text>

  <!-- Resulting Variables -->
  <g transform="translate(550, 100)">
    <circle cx="50" cy="50" r="25" fill="#facc15"/>
    <text x="50" y="100" fill="#facc15" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">const a</text>
  </g>
  <g transform="translate(550, 250)">
    <rect width="50" height="30" x="25" y="0" fill="#f472b6"/>
    <text x="50" y="55" fill="#f472b6" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">const b</text>
  </g>

  <defs>
    <marker id="arrow-unpack" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
</svg>
