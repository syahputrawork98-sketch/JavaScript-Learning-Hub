<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">FUNCTION TRANSFORMER (INPUT &amp; OUTPUT)</text>

  <!-- Input (Arguments) -->
  <g transform="translate(50, 150)">
    <rect width="180" height="100" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="5"/>
    <text x="90" y="30" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">ARGUMENTS</text>
    <circle cx="90" cy="70" r="10" fill="#fbbf24"/>
    <path d="M 180 50 L 250 50" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow-blue)"/>
  </g>

  <!-- Processing (Body) -->
  <g transform="translate(300, 100)">
    <rect width="250" height="200" fill="#0f172a" stroke="#a78bfa" stroke-width="4" rx="10"/>
    <text x="125" y="30" fill="#a78bfa" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">PROCESSING UNIT</text>
    <!-- Gear Icon -->
    <path d="M 125 70 L 135 90 L 155 90 L 165 110 L 155 130 L 135 130 L 125 150 L 105 150 L 95 130 L 75 130 L 65 110 L 75 90 L 95 90 Z" fill="#4c1d95" stroke="#a78bfa"/>
    <circle cx="125" cy="110" r="20" fill="#0f172a" stroke="#a78bfa"/>
    <path d="M 250 100 L 320 100" stroke="#a78bfa" stroke-width="4" marker-end="url(#arrow-purple)"/>
  </g>

  <!-- Output (Return) -->
  <g transform="translate(680, 150)">
    <rect width="100" height="100" fill="#1e293b" stroke="#34d399" stroke-width="2" rx="5"/>
    <text x="50" y="30" fill="#34d399" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">OUTPUT</text>
    <path d="M 20 60 L 80 60 L 50 85 Z" fill="#34d399"/>
  </g>

  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8" />
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa" />
    </marker>
  </defs>
</svg>
