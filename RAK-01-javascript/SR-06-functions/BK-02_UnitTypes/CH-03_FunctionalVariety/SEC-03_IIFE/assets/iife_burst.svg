<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">IIFE QUICK BURST (SELF-TRIGGERING UNIT)</text>

  <!-- The Burst Core -->
  <g transform="translate(400, 200)">
    <!-- Explosion spikes -->
    <path d="M 0 -80 L 20 -30 L 70 -50 L 30 -10 L 80 10 L 30 20 L 50 70 L 10 30 L -10 80 L -20 30 L -70 50 L -30 10 L -80 -10 L -30 -20 L -50 -70 L -10 -30 Z" fill="#fb7185" stroke="#f43f5e" stroke-width="2"/>
    
    <!-- Shield (The outer brackets) -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#f43f5e" stroke-width="4" stroke-dasharray="10,5"/>
    <text x="-120" y="0" fill="#f43f5e" font-family="Arial" font-size="60" text-anchor="middle" font-weight="bold">(</text>
    <text x="120" y="0" fill="#f43f5e" font-family="Arial" font-size="60" text-anchor="middle" font-weight="bold">)</text>
    
    <!-- Trigger (The invocation brackets) -->
    <text x="160" y="80" fill="#38bdf8" font-family="Arial" font-size="50" text-anchor="middle" font-weight="bold">()</text>
    <text x="160" y="120" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">TRIGGER</text>

    <text x="0" y="5" fill="white" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">SELF-EXECUTION</text>
  </g>

  <!-- Clean Grid Area -->
  <text x="700" y="350" fill="#34d399" font-family="Arial" font-size="14" text-anchor="end" font-weight="bold">CLEAN GLOBAL GRID</text>
  <path d="M 680 330 L 750 330" stroke="#34d399" stroke-width="2"/>
</svg>
