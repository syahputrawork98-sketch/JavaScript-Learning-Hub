<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#0f172a" rx="10"/>
  
  <!-- Title -->
  <text x="300" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#60a5fa" text-anchor="middle">THE ENERGY GRIDS (SCOPE)</text>
  
  <!-- Global Scope (Outer) -->
  <rect x="50" y="60" width="500" height="300" fill="none" stroke="#60a5fa" stroke-width="2" stroke-dasharray="8,4" rx="10"/>
  <rect x="60" y="70" width="100" height="25" fill="#1e293b" rx="5"/>
  <text x="110" y="88" font-family="Arial, sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">GLOBAL GRID</text>
  
  <!-- Global Variable -->
  <circle cx="100" cy="130" r="15" fill="#facc15"/>
  <text x="125" y="135" font-family="Arial, sans-serif" font-size="12" fill="#facc15">mainPower</text>
  
  <!-- Local Scope A (Function) -->
  <rect x="150" y="100" width="350" height="220" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="10"/>
  <text x="325" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#38bdf8" text-anchor="middle">SECTOR ALPHA (FUNCTION SCOPE)</text>
  
  <!-- Local Variable A -->
  <circle cx="200" cy="160" r="12" fill="#38bdf8"/>
  <text x="220" y="165" font-family="Arial, sans-serif" font-size="12" fill="#38bdf8">alphaVoltage</text>
  
  <!-- Local Scope B (Block) -->
  <rect x="250" y="180" width="220" height="100" fill="#0f172a" stroke="#0ea5e9" stroke-width="2" rx="10"/>
  <text x="360" y="200" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0ea5e9" text-anchor="middle">INNER CIRCUIT (BLOCK SCOPE)</text>
  
  <!-- Local Variable B -->
  <circle cx="280" cy="240" r="10" fill="#0ea5e9"/>
  <text x="300" y="245" font-family="Arial, sans-serif" font-size="12" fill="#0ea5e9">tempSensor</text>
  
  <!-- Lookup Arrows (Chain) -->
  <path d="M 280 230 L 210 170" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)" stroke-dasharray="4,2"/>
  <path d="M 200 150 L 115 135" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)" stroke-dasharray="4,2"/>
  
  <text x="235" y="205" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" transform="rotate(-40, 235, 205)">Lookup Outer</text>
  
  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
    </marker>
  </defs>
  
  <!-- Note -->
  <text x="60" y="380" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">JS mencari variabel dari dalam ke luar (Scope Chain).</text>
  <text x="60" y="395" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Variabel di luar TIDAK bisa melihat ke dalam GRID yang lebih sempit.</text>
</svg>
