<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="300" fill="#0f172a" rx="10"/>
  
  <!-- Title -->
  <text x="300" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#10b981" text-anchor="middle">AUTOMATED RACK MANAGER (ARRAY METHODS)</text>
  
  <!-- Array Rack -->
  <rect x="100" y="100" width="400" height="80" fill="none" stroke="#64748b" stroke-width="2" rx="5"/>
  <text x="300" y="90" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">CURRENT STORAGE RACK</text>
  
  <!-- Items -->
  <rect x="110" y="110" width="80" height="60" fill="#10b981" rx="5"/>
  <text x="150" y="145" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">BATT-01</text>
  
  <rect x="200" y="110" width="80" height="60" fill="#10b981" rx="5"/>
  <text x="240" y="145" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">BATT-02</text>
  
  <rect x="290" y="110" width="80" height="60" fill="#10b981" rx="5" opacity="0.5"/>
  <text x="330" y="145" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">...</text>
  
  <!-- Start Operations (Unshift / Shift) -->
  <!-- Unshift -->
  <path d="M 40 100 L 90 130" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="40" y="90" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#38bdf8">unshift()</text>
  <text x="40" y="105" font-family="Arial, sans-serif" font-size="10" fill="#38bdf8">Tambah ke Awal</text>
  
  <!-- Shift -->
  <path d="M 110 180 L 60 210" stroke="#f87171" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="40" y="225" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f87171">shift()</text>
  <text x="40" y="240" font-family="Arial, sans-serif" font-size="10" fill="#f87171">Hapus dari Awal</text>
  
  <!-- End Operations (Push / Pop) -->
  <!-- Push -->
  <path d="M 560 100 L 510 130" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="500" y="90" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#38bdf8" text-anchor="start">push()</text>
  <text x="500" y="105" font-family="Arial, sans-serif" font-size="10" fill="#38bdf8" text-anchor="start">Tambah ke Akhir</text>
  
  <!-- Pop -->
  <path d="M 490 180 L 540 210" stroke="#f87171" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="500" y="225" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f87171" text-anchor="start">pop()</text>
  <text x="500" y="240" font-family="Arial, sans-serif" font-size="10" fill="#f87171" text-anchor="start">Hapus dari Akhir</text>
  
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f87171" />
    </marker>
  </defs>
  
  <!-- Caption -->
  <text x="300" y="270" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Operasi SHIFT/UNSHIFT lebih berat karena harus menggeser seluruh arsitektur rak.</text>
</svg>
