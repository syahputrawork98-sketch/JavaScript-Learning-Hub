<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="300" fill="#0f172a" rx="10"/>
  
  <!-- Title -->
  <text x="300" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#38bdf8" text-anchor="middle">THE RAILROAD SWITCH (CONDITIONALS)</text>
  
  <!-- Main Track -->
  <path d="M 50 150 L 200 150" stroke="#94a3b8" stroke-width="8"/>
  <text x="125" y="130" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Main Entry</text>
  
  <!-- Decision Point -->
  <rect x="200" y="125" width="50" height="50" transform="rotate(45, 225, 150)" fill="#fbbf24"/>
  <text x="225" y="155" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle">?</text>
  
  <!-- If Track -->
  <path d="M 250 150 L 350 150 L 500 80" fill="none" stroke="#34d399" stroke-width="6" marker-end="url(#arrow-green)"/>
  <text x="450" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#34d399">if (...) { ... }</text>
  
  <!-- Else Track -->
  <path d="M 250 150 L 350 150 L 500 220" fill="none" stroke="#ef4444" stroke-width="6" marker-end="url(#arrow-red)"/>
  <text x="450" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ef4444">else { ... }</text>
  
  <!-- Switch Visual -->
  <path d="M 235 150 L 300 150" stroke="#0f172a" stroke-width="4" stroke-linecap="round">
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="-20 225 150" to="20 225 150" dur="4s" repeatCount="indefinite" values="-20; 20; -20"/>
  </path>
  
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34d399" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
  </defs>
  
  <text x="50" y="270" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Kondisi menentukan ke arah mana energi akan dipancarkan.</text>
</svg>
