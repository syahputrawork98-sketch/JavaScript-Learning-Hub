<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#0f172a" rx="15"/>
  
  <!-- Grid Pattern for Tech Feel -->
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#grid)" rx="15"/>
  
  <!-- Title -->
  <text x="300" y="40" font-family="'Segoe UI', Roboto, Arial" font-size="24" font-weight="800" fill="#facc15" text-anchor="middle" filter="url(#glow)">LOGICAL POWER GATES</text>
  <text x="300" y="65" font-family="'Segoe UI', Roboto, Arial" font-size="14" fill="#94a3b8" text-anchor="middle">Sistem Pengaturan Aliran Arus JavaScript</text>

  <!-- AND GATE (Serial) -->
  <g transform="translate(50, 100)">
    <rect width="160" height="180" fill="#1e293b" rx="10" stroke="#334155" stroke-width="1"/>
    <text x="80" y="-15" font-family="Arial" font-size="14" font-weight="bold" fill="#64748b" text-anchor="middle">AND ( &amp;&amp; )</text>
    
    <!-- Circuit Line -->
    <path d="M -10 90 L 30 90 M 70 90 L 90 90 M 130 90 L 170 90" stroke="#facc15" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Switch 1 -->
    <circle cx="30" cy="90" r="4" fill="#facc15"/>
    <path d="M 30 90 L 65 70" stroke="#facc15" stroke-width="4" stroke-linecap="round"/>
    <text x="45" y="110" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle">Input A</text>
    
    <!-- Switch 2 -->
    <circle cx="90" cy="90" r="4" fill="#facc15"/>
    <path d="M 90 90 L 125 70" stroke="#facc15" stroke-width="4" stroke-linecap="round"/>
    <text x="105" y="110" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle">Input B</text>
    
    <!-- Result Bulb -->
    <path d="M 140 140 Q 140 120 160 120 Q 180 120 180 140 Q 180 160 160 160 Q 140 160 140 140" fill="#334155" stroke="#facc15" stroke-width="2"/>
    <text x="80" y="155" font-family="Arial" font-size="11" fill="#94a3b8" text-anchor="middle">Keluaran: FALSE</text>
    <text x="80" y="170" font-family="Arial" font-size="9" fill="#475569" text-anchor="middle">(Butuh A &amp; B Tertutup)</text>
  </g>

  <!-- OR GATE (Parallel) -->
  <g transform="translate(250, 100)">
    <rect width="160" height="180" fill="#1e293b" rx="10" stroke="#334155" stroke-width="1"/>
    <text x="80" y="-15" font-family="Arial" font-size="14" font-weight="bold" fill="#64748b" text-anchor="middle">OR ( || )</text>
    
    <!-- Circuit lines -->
    <path d="M -10 90 L 20 90 M 20 60 L 20 120 M 20 60 L 30 60 M 20 120 L 30 120 M 70 60 L 100 60 L 140 90 M 70 120 L 100 120 L 140 90 L 170 90" stroke="#34d399" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Switch 1 -->
    <circle cx="30" cy="60" r="4" fill="#34d399"/>
    <path d="M 30 60 L 65 40" stroke="#34d399" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Switch 2 -->
    <circle cx="30" cy="120" r="4" fill="#34d399"/>
    <path d="M 30 120 L 65 140" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-dasharray="2,2"/>
    
    <!-- Result Bulb -->
    <path d="M 140 140 Q 140 120 160 120 Q 180 120 180 140 Q 180 160 160 160 Q 140 160 140 140" fill="#facc15" filter="url(#glow)"/>
    <text x="80" y="155" font-family="Arial" font-size="11" fill="#34d399" text-anchor="middle">Keluaran: TRUE</text>
    <text x="80" y="170" font-family="Arial" font-size="9" fill="#475569" text-anchor="middle">(Satu saja cukup)</text>
  </g>

  <!-- NOT GATE (Inverter) -->
  <g transform="translate(450, 100)">
    <rect width="120" height="180" fill="#1e293b" rx="10" stroke="#334155" stroke-width="1"/>
    <text x="60" y="-15" font-family="Arial" font-size="14" font-weight="bold" fill="#64748b" text-anchor="middle">NOT ( ! )</text>
    
    <!-- Triangle -->
    <path d="M 30 60 L 30 120 L 80 90 Z" fill="none" stroke="#f87171" stroke-width="3"/>
    <circle cx="90" cy="90" r="8" fill="none" stroke="#f87171" stroke-width="3"/>
    
    <!-- Flow -->
    <path d="M 0 90 L 30 90 M 98 90 L 130 90" stroke="#f87171" stroke-width="3" stroke-linecap="round"/>
    
    <text x="60" y="155" font-family="Arial" font-size="11" fill="#f87171" text-anchor="middle">Inverter Status</text>
    <text x="60" y="170" font-family="Arial" font-size="9" fill="#475569" text-anchor="middle">True jadi False</text>
  </g>

  <!-- Caption -->
  <rect x="50" y="320" width="500" height="50" fill="#1e293b" rx="10" opacity="0.5"/>
  <text x="300" y="350" font-family="Arial" font-size="13" fill="#94a3b8" text-anchor="middle">
    Operator logika bertindak sebagai <tspan fill="#facc15" font-weight="bold">Filter Energi</tspan> yang menentukan alur program Anda.
  </text>
</svg>
