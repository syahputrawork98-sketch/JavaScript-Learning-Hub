<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="300" fill="#0f172a" rx="10"/>
  
  <!-- Title -->
  <text x="300" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fbbf24" text-anchor="middle">PROMISE LIFECYCLE (DIGITAL CONTRACT)</text>
  
  <!-- Status Nodes -->
  <!-- Pending -->
  <rect x="50" y="100" width="120" height="60" fill="#64748b" rx="5"/>
  <text x="110" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">PENDING</text>
  <text x="110" y="150" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">(Sedang Diproses)</text>
  
  <!-- Fulfilled -->
  <rect x="300" y="60" width="140" height="60" fill="#10b981" rx="5"/>
  <text x="370" y="90" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">FULFILLED</text>
  <path d="M 450 90 L 500 90" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="530" y="95" font-family="Arial, sans-serif" font-size="12" fill="#10b981">.then()</text>
  
  <!-- Rejected -->
  <rect x="300" y="140" width="140" height="60" fill="#ef4444" rx="5"/>
  <text x="370" y="170" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">REJECTED</text>
  <path d="M 450 170 L 500 170" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="530" y="175" font-family="Arial, sans-serif" font-size="12" fill="#ef4444">.catch()</text>

  <!-- Finally -->
  <rect x="440" y="240" width="100" height="40" fill="none" stroke="#ffffff" stroke-width="1" rx="20"/>
  <text x="490" y="265" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">.finally()</text>
  
  <!-- Arrows -->
  <path d="M 175 120 L 290 95" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <path d="M 175 140 L 290 165" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>
  
  <text x="210" y="90" font-family="Arial, sans-serif" font-size="10" fill="#10b981" transform="rotate(-15, 210, 90)">resolve()</text>
  <text x="210" y="180" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" transform="rotate(15, 210, 180)">reject()</text>
  
  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
  </defs>

  <text x="50" y="250" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Kontrak satu arah: sekali status berubah,</text>
  <text x="50" y="265" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">ia tidak bisa kembali tertunda (PENDING).</text>
</svg>
