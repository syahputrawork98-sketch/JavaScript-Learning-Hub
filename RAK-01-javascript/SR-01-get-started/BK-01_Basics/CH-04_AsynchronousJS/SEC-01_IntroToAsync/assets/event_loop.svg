<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#0f172a" rx="10"/>
  
  <!-- Title -->
  <text x="300" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#38bdf8" text-anchor="middle">THE MULTI-CORE RELAY (EVENT LOOP)</text>
  
  <!-- Call Stack -->
  <rect x="50" y="80" width="120" height="200" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="110" y="70" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">CALL STACK</text>
  <rect x="60" y="240" width="100" height="30" fill="#38bdf8" rx="5"/>
  <text x="110" y="260" font-family="Arial, sans-serif" font-size="12" fill="#0f172a" text-anchor="middle">main()</text>
  <rect x="60" y="200" width="100" height="30" fill="#0ea5e9" rx="5"/>
  <text x="110" y="220" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">fetchData()</text>
  
  <!-- Web APIs / Background -->
  <rect x="380" y="80" width="150" height="120" fill="#1e293b" stroke="#f59e0b" stroke-width="2" rx="10"/>
  <text x="455" y="70" font-family="Arial, sans-serif" font-size="14" fill="#f59e0b" text-anchor="middle">WEB APIs / WORKERS</text>
  <circle cx="455" cy="140" r="30" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,2">
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 455 140" to="360 455 140" dur="5s" repeatCount="indefinite"/>
  </circle>
  <text x="455" y="145" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle">TIMER/HTTP</text>
  
  <!-- Callback Queue -->
  <rect x="350" y="280" width="200" height="60" fill="none" stroke="#10b981" stroke-width="2" rx="5"/>
  <text x="450" y="270" font-family="Arial, sans-serif" font-size="14" fill="#10b981" text-anchor="middle">CALLBACK QUEUE</text>
  <rect x="360" y="295" width="80" height="30" fill="#10b981" rx="5"/>
  <text x="400" y="315" font-family="Arial, sans-serif" font-size="10" fill="#0f172a" text-anchor="middle">onSuccess()</text>
  
  <!-- Event Loop (The Controller) -->
  <circle cx="260" cy="240" r="40" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="10,5">
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 260 240" to="360 260 240" dur="3s" repeatCount="indefinite"/>
  </circle>
  <path d="M 260 200 L 260 210 M 300 240 L 290 240 M 260 280 L 260 270 M 220 240 L 230 240" stroke="#ffffff" stroke-width="2"/>
  <text x="260" y="245" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">LOOP</text>
  
  <!-- Arrows -->
  <path d="M 175 140 L 375 140" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 455 205 L 455 275" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 345 310 L 280 285" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 240 200 L 175 145" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
    </marker>
  </defs>
  
  <!-- Legend -->
  <text x="50" y="350" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">1. Delegasi ke Web API</text>
  <text x="50" y="365" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">2. Masuk ke Queue saat Selesai</text>
  <text x="50" y="380" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">3. Event Loop menarik ke Stack jika Stack Kosong</text>
</svg>
