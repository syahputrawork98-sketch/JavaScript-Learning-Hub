<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="300" fill="#0f172a" rx="10"/>
  
  <!-- Title -->
  <text x="300" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#f87171" text-anchor="middle">PROTOTYPE CHAIN (MASTER BLUEPRINT CHAIN)</text>
  
  <!-- Objects -->
  <!-- Instance -->
  <rect x="50" y="100" width="120" height="60" fill="#3b82f6" rx="5"/>
  <text x="110" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">INSTANCE</text>
  <text x="110" y="145" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">sectorAlpha</text>
  
  <!-- Prototype -->
  <rect x="240" y="100" width="140" height="60" fill="#1d4ed8" rx="5"/>
  <text x="310" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">PROTOTYPE</text>
  <text x="310" y="145" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Sector.prototype</text>
  
  <!-- Object Prototype -->
  <rect x="440" y="100" width="140" height="60" fill="#1e3a8a" rx="5"/>
  <text x="510" y="125" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">OBJECT PROTOTYPE</text>
  <text x="510" y="145" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Object.prototype</text>

  <!-- Null -->
  <circle cx="510" cy="230" r="20" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <text x="510" y="235" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">null</text>
  
  <!-- Arrows (Chain) -->
  <path d="M 170 130 L 230 130" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow-red)"/>
  <path d="M 380 130 L 430 130" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow-red)"/>
  <path d="M 510 160 L 510 205" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow-red)"/>
  
  <text x="200" y="120" font-family="Arial, sans-serif" font-size="10" fill="#f87171" text-anchor="middle">[[Prototype]]</text>
  <text x="410" y="120" font-family="Arial, sans-serif" font-size="10" fill="#f87171" text-anchor="middle">[[Prototype]]</text>
  
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffffff" />
    </marker>
  </defs>
  
  <!-- Details -->
  <text x="50" y="200" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Bila fitur tidak ditemukan di INSTANCE,</text>
  <text x="50" y="215" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">JS mencari ke arah kanan (PROTOTYPE).</text>
  <text x="50" y="230" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Pencarian berhenti di null.</text>
</svg>
