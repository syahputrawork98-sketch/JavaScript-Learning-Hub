<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Energy Hub Controller</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .hub-container {
            border: 2px solid #333;
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            background: #252525;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #status-display {
            font-size: 1.5rem;
            margin: 1rem 0;
            color: #ff4444;
            transition: all 0.3s ease;
        }
        .btn-active {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #f7df1e;
            color: black;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-active:hover {
            background-color: #dec21b;
        }
        .active-state {
            color: #00ff00 !important;
            text-shadow: 0 0 10px #00ff00;
        }
    </style>
</head>
<body>

    <div class="hub-container">
        <h1>Web Energy Hub</h1>
        <p>Current System Status:</p>
        <div id="status-display">OFFLINE</div>
        <button class="btn-active" id="activate-btn">ACTIVATE HUB</button>
    </div>

    <!-- Menghubungkan Logika -->
    <script src="app.js"></script>
</body>
</html>
