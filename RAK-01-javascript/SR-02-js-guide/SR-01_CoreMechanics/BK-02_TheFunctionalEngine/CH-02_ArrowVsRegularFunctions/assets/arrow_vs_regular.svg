<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">ARROW VS REGULAR FUNCTIONS (CONTEXT BINDING)</text>

  <!-- Regular Function Box -->
  <g transform="translate(100, 80)">
    <rect width="280" height="280" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="10"/>
    <text x="140" y="30" fill="#38bdf8" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">Regular Function</text>
    
    <!-- Dynamic This -->
    <rect x="40" y="80" width="200" height="60" fill="#0f172a" stroke="#ef4444" rx="5"/>
    <text x="140" y="115" fill="#ef4444" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">DYNAMIC 'this'</text>
    <text x="140" y="130" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">Depends on how it's called</text>
    
    <path d="M140 140 L140 200" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
    <text x="140" y="230" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">Has own arguments &amp; prototype</text>
  </g>

  <!-- Arrow Function Box -->
  <g transform="translate(420, 80)">
    <rect width="280" height="280" fill="#1e293b" stroke="#f472b6" stroke-width="2" rx="10"/>
    <text x="140" y="30" fill="#f472b6" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">Arrow Function (=&gt;)</text>
    
    <!-- Lexical This -->
    <rect x="40" y="80" width="200" height="60" fill="#0f172a" stroke="#22c55e" rx="5"/>
    <text x="140" y="115" fill="#22c55e" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">LEXICAL 'this'</text>
    <text x="140" y="130" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">Inherited from parents</text>
    
    <circle cx="140" cy="200" r="30" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="140" y="250" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">No own this, arguments, super</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
</svg>
