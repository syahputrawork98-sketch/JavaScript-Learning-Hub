<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">PROPERTY LOCKSMITH (ATTRIBUTES)</text>

  <!-- Property Key -->
  <g transform="translate(150, 200)">
    <rect x="0" y="-30" width="150" height="60" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="5"/>
    <text x="75" y="10" fill="#38bdf8" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">voltage</text>
  </g>

  <!-- Lockers (Attributes) -->
  <g transform="translate(350, 100)">
    <!-- Writable -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="180" height="50" fill="#1e293b" stroke="#22c55e" rx="10"/>
      <text x="20" y="32" fill="#22c55e" font-family="Arial" font-size="24">🔓</text>
      <text x="60" y="32" fill="#f8fafc" font-family="Arial" font-size="14" font-weight="bold">Writable: TRUE</text>
    </g>
    <!-- Enumerable -->
    <g transform="translate(0, 70)">
      <rect x="0" y="0" width="180" height="50" fill="#1e293b" stroke="#fbbf24" rx="10"/>
      <text x="20" y="32" fill="#fbbf24" font-family="Arial" font-size="24">👁️</text>
      <text x="60" y="32" fill="#f8fafc" font-family="Arial" font-size="14" font-weight="bold">Enumerable: TRUE</text>
    </g>
    <!-- Configurable -->
    <g transform="translate(0, 140)">
      <rect x="0" y="0" width="180" height="50" fill="#1e293b" stroke="#ef4444" rx="10"/>
      <text x="20" y="32" fill="#ef4444" font-family="Arial" font-size="24">🔒</text>
      <text x="60" y="32" fill="#f8fafc" font-family="Arial" font-size="14" font-weight="bold">Configurable: FALSE</text>
    </g>
  </g>

  <!-- Connection lines -->
  <path d="M300 200 L350 125" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,2"/>
  <path d="M300 200 L350 195" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,2"/>
  <path d="M300 200 L350 265" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,2"/>
</svg>
