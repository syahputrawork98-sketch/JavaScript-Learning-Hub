<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="300" fill="#0f172a" rx="15"/>
  
  <!-- Outer Function (The Room) -->
  <rect x="50" y="80" width="300" height="150" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="10" opacity="0.3"/>
  <text x="60" y="105" font-family="Arial" font-size="12" fill="#3b82f6">OUTER FUNCTION (Closed Environment)</text>
  
  <!-- Variable inside (The Energy Tank) -->
  <rect x="100" y="130" width="60" height="40" fill="#3b82f6" rx="5"/>
  <text x="130" y="155" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Data Tank</text>

  <!-- The Closure Cord (The Magic Link) -->
  <path d="M 160 150 C 250 150 350 150 450 150" stroke="#facc15" stroke-width="4" stroke-dasharray="8,4" marker-end="url(#arrow)"/>
  
  <!-- Inner Function (The Portable Battery) -->
  <g transform="translate(480, 150)">
    <rect x="-30" y="-40" width="60" height="80" fill="#1e293b" stroke="#facc15" stroke-width="2" rx="10"/>
    <text x="0" y="10" font-family="Arial" font-size="10" fill="#facc15" text-anchor="middle">INNER</text>
    <text x="0" y="25" font-family="Arial" font-size="10" fill="#facc15" text-anchor="middle">FUNC</text>
  </g>

  <!-- Title & Labels -->
  <text x="300" y="40" font-family="Arial" font-size="20" font-weight="bold" fill="#facc15" text-anchor="middle">CLOSURE: PERSISTENT MEMORY LINK</text>
  <text x="300" y="270" font-family="Arial" font-size="12" fill="#94a3b8" text-anchor="middle">Meskipun ruangan luar ditutup, fungsi dalam tetap membawa 'Kabel Energi' ke tangki data.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#facc15" />
    </marker>
  </defs>
</svg>
