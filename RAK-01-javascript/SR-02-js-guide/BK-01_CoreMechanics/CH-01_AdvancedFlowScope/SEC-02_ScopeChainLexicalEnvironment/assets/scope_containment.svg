<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#0f172a" rx="15"/>
  
  <!-- Boxes (Containment Units) -->
  <!-- Global -->
  <rect x="50" y="80" width="500" height="280" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="10"/>
  <text x="60" y="105" font-family="Arial" font-size="14" fill="#64748b" font-weight="bold">GLOBAL GRID</text>
  <circle cx="510" cy="110" r="15" fill="#3b82f6" opacity="0.5"/> <!-- Energy Source -->

  <!-- Function Scope -->
  <rect x="100" y="140" width="400" height="180" fill="#0f172a" stroke="#34d399" stroke-width="2" rx="10"/>
  <text x="110" y="165" font-family="Arial" font-size="14" fill="#34d399" font-weight="bold">ENGINE ROOM (FUNCTION)</text>

  <!-- Block Scope -->
  <rect x="150" y="200" width="300" height="80" fill="#1e293b" stroke="#facc15" stroke-width="2" rx="10"/>
  <text x="160" y="225" font-family="Arial" font-size="14" fill="#facc15" font-weight="bold">CONTROL BOX (BLOCK)</text>

  <!-- Scope Chain Path -->
  <path d="M 300 240 L 300 110" stroke="#facc15" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrow)"/>
  <circle cx="300" cy="240" r="5" fill="#facc15"/>
  <text x="310" y="180" font-family="Arial" font-size="12" fill="#94a3b8">Search Path (Upwards Only)</text>

  <text x="300" y="40" font-family="Arial" font-size="20" font-weight="bold" fill="#facc15" text-anchor="middle">SCOPE CHAIN &amp; CONTAINMENT</text>
  <text x="300" y="380" font-family="Arial" font-size="12" fill="#94a3b8" text-anchor="middle">Jika energi tidak ditemukan di dalam kotak, sistem mencari ke ruangan di luarnya.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#facc15" />
    </marker>
  </defs>
</svg>
