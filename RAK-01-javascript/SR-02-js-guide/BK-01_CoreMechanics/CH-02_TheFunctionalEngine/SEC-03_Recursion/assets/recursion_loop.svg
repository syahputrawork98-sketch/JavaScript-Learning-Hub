<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">RECURSION: THE RE-ROUTING LOOP</text>

  <!-- Recursion Loop -->
  <g transform="translate(400, 220)">
    <!-- Base Case (Exit) -->
    <rect x="-200" y="50" width="120" height="60" fill="#1e293b" stroke="#22c55e" stroke-width="3" rx="5"/>
    <text x="-140" y="85" fill="#22c55e" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">BASE CASE</text>
    <text x="-140" y="100" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">Status: EXIT</text>

    <!-- Recursive Call Path -->
    <path d="M0 0 C150 -100 150 100 0 100" fill="none" stroke="#fbbf24" stroke-width="4" marker-end="url(#arrowhead)"/>
    <text x="160" y="55" fill="#fbbf24" font-family="Arial" font-size="14" font-weight="bold">RE-ENTRY</text>
    
    <!-- Central Processing -->
    <circle r="60" fill="#1e293b" stroke="#38bdf8" stroke-width="4"/>
    <text x="0" y="5" fill="#38bdf8" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">FUNCTION</text>
    
    <!-- Branching -->
    <path d="M-60 0 L-140 50" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="-100" y="20" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">Is condition met?</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" />
    </marker>
  </defs>
</svg>
