<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">PROTOTYPAL EXTENSION (THE MASTER BLUEPRINT)</text>

  <!-- Prototype Chain -->
  <g transform="translate(400, 100)">
    <!-- Base Object -->
    <rect x="-100" y="0" width="200" height="60" fill="#1e293b" stroke="#94a3b8" stroke-width="2" rx="5"/>
    <text x="0" y="35" fill="#f8fafc" font-family="Arial" font-size="14" text-anchor="middle">Object.prototype (Base)</text>

    <!-- Arrow 1 -->
    <path d="M0 60 L0 100" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="20" y="85" fill="#38bdf8" font-family="Arial" font-size="12">__proto__</text>

    <!-- Hub Prototype -->
    <rect x="-100" y="100" width="200" height="60" fill="#1e293b" stroke="#38bdf8" stroke-width="3" rx="5"/>
    <text x="0" y="135" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">HubPrototype</text>

    <!-- Arrow 2 -->
    <path d="M0 160 L0 200" stroke="#f472b6" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="20" y="185" fill="#f472b6" font-family="Arial" font-size="12">__proto__</text>

    <!-- Instance -->
    <rect x="-100" y="200" width="200" height="60" fill="#0f172a" stroke="#f472b6" stroke-width="4" rx="5"/>
    <text x="0" y="235" fill="#f472b6" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">MainHubInstance</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f472b6" />
    </marker>
  </defs>
</svg>
