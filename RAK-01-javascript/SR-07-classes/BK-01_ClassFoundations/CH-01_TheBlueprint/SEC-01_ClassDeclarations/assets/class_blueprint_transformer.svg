<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">CLASS BLUEPRINT (TEMPLATE TO INSTANCE)</text>

  <!-- The Blueprint (Class) -->
  <g transform="translate(100, 100)">
    <rect width="200" height="250" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="100" y="30" fill="#38bdf8" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">THE BLUEPRINT</text>
    <rect x="25" y="60" width="150" height="30" fill="#1e293b" stroke="#38bdf8" rx="5"/>
    <text x="100" y="80" fill="#38bdf8" font-family="Arial" font-size="10" text-anchor="middle">Constructor()</text>
    <rect x="25" y="100" width="150" height="30" fill="#1e293b" stroke="#38bdf8" rx="5"/>
    <text x="100" y="120" fill="#38bdf8" font-family="Arial" font-size="10" text-anchor="middle">Method A()</text>
  </g>

  <!-- Production Arrow -->
  <path d="M 320 225 L 480 225" stroke="#38bdf8" stroke-width="6" marker-end="url(#arrow-build)"/>
  <text x="400" y="210" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">new Class()</text>

  <!-- The Unit (Instance) -->
  <g transform="translate(520, 125)">
    <rect width="180" height="200" fill="#1e293b" stroke="#34d399" stroke-width="4" rx="10"/>
    <text x="90" y="30" fill="#34d399" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">ACTIVE UNIT</text>
    <circle cx="90" cy="100" r="40" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
    <text x="90" y="105" fill="#34d399" font-family="Arial" font-size="10" text-anchor="middle">CORE ACTIVE</text>
  </g>

  <defs>
    <marker id="arrow-build" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8" />
    </marker>
  </defs>
</svg>
