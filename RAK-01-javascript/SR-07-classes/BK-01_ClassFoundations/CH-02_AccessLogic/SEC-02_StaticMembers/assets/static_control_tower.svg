<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">STATIC CONTROL TOWER (GLOBAL TOOLS)</text>

  <!-- The Control Tower (Class) -->
  <g transform="translate(350, 80)">
    <path d="M 0 0 L 100 0 L 120 250 L -20 250 Z" fill="#1e293b" stroke="#fbbf24" stroke-width="4"/>
    <circle cx="50" cy="50" r="30" fill="#fbbf24" opacity="0.2"/>
    <text x="50" y="55" fill="#fbbf24" font-family="Arial" font-size="24" text-anchor="middle">⚡</text>
    <text x="50" y="100" fill="#fbbf24" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">STATIC</text>
  </g>

  <!-- Requests from Instances -->
  <g transform="translate(50, 300)">
    <rect width="150" height="60" fill="#0f172a" stroke="#64748b" rx="10"/>
    <text x="75" y="35" fill="#64748b" font-family="Arial" font-size="12" text-anchor="middle">Instance A</text>
    <path d="M 150 0 L 320 -100" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-static)"/>
  </g>
  <g transform="translate(550, 300)">
    <rect width="150" height="60" fill="#0f172a" stroke="#64748b" rx="10"/>
    <text x="75" y="35" fill="#64748b" font-family="Arial" font-size="12" text-anchor="middle">Instance B</text>
    <path d="M 0 0 L -120 -100" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-static)"/>
  </g>

  <defs>
    <marker id="arrow-static" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fbbf24" />
    </marker>
  </defs>
</svg>
