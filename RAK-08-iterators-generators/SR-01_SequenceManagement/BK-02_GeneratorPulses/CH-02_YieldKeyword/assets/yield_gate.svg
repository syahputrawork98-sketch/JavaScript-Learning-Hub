<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">YIELD GATE (FLOW CONTROL)</text>

  <!-- The Gate Structure -->
  <rect x="300" y="100" width="200" height="200" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <rect x="310" y="110" width="180" height="180" fill="#0f172a"/>

  <!-- The Gate Valve -->
  <g transform="translate(400, 200)">
    <rect x="-80" y="-10" width="160" height="20" fill="#f43f5e" rx="5">
        <animateTransform attributeName="transform" type="rotate" from="0" to="90" dur="2s" repeatCount="indefinite" />
    </rect>
    <circle cx="0" cy="0" r="10" fill="#94a3b8"/>
  </g>

  <!-- Output Flow -->
  <path d="M 500 200 L 650 200" stroke="#f43f5e" stroke-width="8" marker-end="url(#arrow-out)"/>
  <text x="575" y="190" fill="#f43f5e" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Value Out</text>

  <!-- Input Flow (Back to Gen) -->
  <path d="M 650 250 L 510 250" stroke="#38bdf8" stroke-width="4" stroke-dasharray="5,5" marker-end="url(#arrow-in)"/>
  <text x="580" y="275" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">next(input)</text>

  <defs>
    <marker id="arrow-out" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f43f5e" />
    </marker>
    <marker id="arrow-in" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8" />
    </marker>
  </defs>
</svg>
