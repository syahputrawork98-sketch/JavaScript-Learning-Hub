<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">REALM INFRASTRUCTURE (POWER ZONES)</text>

  <!-- Realm A -->
  <g transform="translate(50, 80)">
    <rect width="330" height="280" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="10"/>
    <text x="165" y="30" fill="#38bdf8" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">REALM: MAIN_WINDOW</text>
    
    <rect x="20" y="60" width="290" height="40" fill="#334155" rx="5"/>
    <text x="165" y="85" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">GLOBAL OBJECT: window</text>
    
    <rect x="20" y="120" width="290" height="130" fill="#0f172a" stroke="#64748b" rx="5" stroke-dasharray="5,2"/>
    <text x="165" y="145" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">INTRINSICS</text>
    <text x="165" y="175" fill="#64748b" font-family="Courier New" font-size="10" text-anchor="middle">Array.prototype: [Ref_A]</text>
    <text x="165" y="200" fill="#64748b" font-family="Courier New" font-size="10" text-anchor="middle">Object.prototype: [Ref_B]</text>
  </g>

  <!-- Realm B -->
  <g transform="translate(420, 80)">
    <rect width="330" height="280" fill="#1e293b" stroke="#f43f5e" stroke-width="2" rx="10"/>
    <text x="165" y="30" fill="#f43f5e" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">REALM: IFRAME_01</text>
    
    <rect x="20" y="60" width="290" height="40" fill="#334155" rx="5"/>
    <text x="165" y="85" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">GLOBAL OBJECT: contentWindow</text>
    
    <rect x="20" y="120" width="290" height="130" fill="#0f172a" stroke="#64748b" rx="5" stroke-dasharray="5,2"/>
    <text x="165" y="145" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">INTRINSICS</text>
    <text x="165" y="175" fill="#64748b" font-family="Courier New" font-size="10" text-anchor="middle">Array.prototype: [Ref_X]</text>
    <text x="165" y="200" fill="#64748b" font-family="Courier New" font-size="10" text-anchor="middle">Object.prototype: [Ref_Y]</text>
  </g>

  <!-- Barrier -->
  <line x1="400" y1="80" x2="400" y2="360" stroke="#64748b" stroke-width="2" stroke-dasharray="10,5"/>
  <text x="400" y="380" fill="#64748b" font-family="Arial" font-size="12" text-anchor="middle">Isolasi Mutlak Proteksi Realm</text>
</svg>
