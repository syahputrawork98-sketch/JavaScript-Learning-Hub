<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">THE CALL STACK (ACTIVE TERMINALS)</text>

  <!-- Stack Container -->
  <rect x="250" y="80" width="300" height="380" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  
  <!-- Stack Items (Execution Contexts) -->
  
  <!-- Global Context (Bottom) -->
  <g transform="translate(260, 390)">
    <rect width="280" height="60" fill="#334155" stroke="#94a3b8" rx="5"/>
    <text x="140" y="35" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">GLOBAL CONTEXT</text>
  </g>

  <!-- Function A -->
  <g transform="translate(260, 320)">
    <rect width="280" height="60" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="5"/>
    <text x="140" y="35" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle">FUNCTION: sectorA()</text>
  </g>

  <!-- Function B (Active) -->
  <g transform="translate(260, 250)">
    <rect width="280" height="60" fill="#0369a1" stroke="#0ea5e9" stroke-width="3" rx="5"/>
    <text x="140" y="30" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">FUNCTION: sectorB()</text>
    <text x="140" y="50" fill="#7dd3fc" font-family="Arial" font-size="10" text-anchor="middle">CURRENTLY ACTIVE</text>
  </g>

  <!-- Push/Pop Indicators -->
  <path d="M 600 250 L 600 150" stroke="#f43f5e" stroke-width="4" marker-end="url(#arrow-pop)"/>
  <text x="610" y="200" fill="#f43f5e" font-family="Arial" font-size="14">POP (End)</text>

  <path d="M 150 150 L 150 250" stroke="#34d399" stroke-width="4" marker-end="url(#arrow-push)"/>
  <text x="70" y="200" fill="#34d399" font-family="Arial" font-size="14">PUSH (Call)</text>

  <defs>
    <marker id="arrow-pop" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f43f5e" />
    </marker>
    <marker id="arrow-push" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
    </marker>
  </defs>

  <text x="400" y="485" fill="#64748b" font-family="Arial" font-size="14" text-anchor="middle">"The Grid processes data one terminal at a time (LIFO)"</text>
</svg>
