<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#f8fafc" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">DYNAMIC IMPORT SOCKETS (ON-DEMAND COUPLING)</text>

  <!-- Main System Hub -->
  <g transform="translate(50, 100)">
    <rect width="250" height="300" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="10"/>
    <text x="125" y="30" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">MAIN HUB</text>
    
    <!-- Code logic -->
    <rect x="25" y="60" width="200" height="30" fill="#334155" rx="3"/>
    <text x="40" y="80" fill="#ffffff" font-family="Courier New" font-size="10">async function setup() {</text>

    <!-- The Socket -->
    <rect x="25" y="110" width="200" height="80" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="2" rx="5"/>
    <circle cx="125" cy="150" r="15" fill="#0f172a" stroke="#0ea5e9" stroke-width="2"/>
    <text x="125" y="180" fill="#38bdf8" font-family="Arial" font-size="10" text-anchor="middle">DYNAMIC SOCKET</text>
    <text x="50" y="130" fill="#ffffff" font-family="Courier New" font-size="10">await import("./ext")</text>

    <rect x="25" y="210" width="200" height="30" fill="#334155" rx="3"/>
    <text x="40" y="230" fill="#ffffff" font-family="Courier New" font-size="10">}</text>
  </g>

  <!-- Transmission Wave -->
  <path d="M 320 250 L 450 250" stroke="#0ea5e9" stroke-width="3" stroke-dasharray="10,5" marker-end="url(#arrow-socket)"/>
  <text x="385" y="230" fill="#0ea5e9" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">REQUEST</text>

  <!-- External Module Cell -->
  <g transform="translate(500, 150)">
    <rect width="250" height="200" fill="#1e293b" stroke="#34d399" stroke-width="2" rx="15"/>
    <text x="125" y="30" fill="#34d399" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">EXTERNAL PACKAGE</text>
    
    <!-- Plug -->
    <rect x="-20" y="80" width="40" height="40" fill="#34d399" rx="5"/>
    <circle cx="0" cy="100" r="10" fill="#0f172a" stroke="#ffffff"/>

    <text x="125" y="110" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Heavy Generator Module</text>
    <text x="125" y="130" fill="#94a3b8" font-family="Arial" font-size="9" text-anchor="middle">(Exported Energy)</text>
  </g>

  <defs>
    <marker id="arrow-socket" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0ea5e9" />
    </marker>
  </defs>

  <text x="400" y="420" fill="#64748b" font-family="Arial" font-size="12" text-anchor="middle">"Coupling external circuits only when the main system triggers the connection signal"</text>
</svg>
