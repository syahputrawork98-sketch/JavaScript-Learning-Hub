<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">THE BOX OF NOTHING (NULL VS UNDEFINED)</text>

  <!-- Undefined Side (The Dead Line) -->
  <g transform="translate(100, 100)">
    <rect width="250" height="200" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="10"/>
    <text x="125" y="-10" fill="#94a3b8" font-family="Arial" font-size="14" text-anchor="middle">UNDEFINED</text>
    
    <!-- Broken/Disconnected Wire -->
    <path d="M 50 100 L 100 100 M 150 100 L 200 100" stroke="#f43f5e" stroke-width="4" stroke-dasharray="8,8"/>
    <circle cx="125" cy="100" r="10" fill="none" stroke="#f43f5e" stroke-width="2"/>
    <text x="125" y="150" fill="#f43f5e" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">UNINITIALIZED</text>
    <text x="125" y="170" fill="#64748b" font-family="Arial" font-size="12" text-anchor="middle">"The Grid knows it exists,</text>
    <text x="125" y="185" fill="#64748b" font-family="Arial" font-size="12" text-anchor="middle">but hasn't seen energy yet"</text>
  </g>

  <!-- Null Side (The Empty Socket) -->
  <g transform="translate(450, 100)">
    <rect width="250" height="200" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="10"/>
    <text x="125" y="-10" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle">NULL</text>
    
    <!-- Empty Container -->
    <rect x="75" y="75" width="100" height="50" fill="none" stroke="#38bdf8" stroke-width="3" stroke-dasharray="4,2"/>
    <text x="125" y="150" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">EMPTY BY DESIGN</text>
    <text x="125" y="170" fill="#64748b" font-family="Arial" font-size="12" text-anchor="middle">"The Technician explicitly</text>
    <text x="125" y="185" fill="#64748b" font-family="Arial" font-size="12" text-anchor="middle">unplugged the power source"</text>
  </g>

</svg>
