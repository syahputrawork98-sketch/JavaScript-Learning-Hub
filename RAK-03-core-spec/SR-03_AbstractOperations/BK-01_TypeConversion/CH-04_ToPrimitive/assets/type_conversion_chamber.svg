<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">THE TRANSMUTATION CHAMBER (TOPRIMITIVE FLOW)</text>

  <!-- Input Object -->
  <g transform="translate(50, 150)">
    <rect width="180" height="100" fill="#1e293b" stroke="#34d399" stroke-width="3" rx="10"/>
    <text x="90" y="55" fill="#34d399" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">OBJECT</text>
  </g>

  <!-- Algorithm Engine -->
  <g transform="translate(280, 100)">
    <rect width="240" height="200" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="20"/>
    <text x="120" y="40" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle">ALGORITHM: ToPrimitive</text>
    
    <!-- Steps -->
    <rect x="20" y="60" width="200" height="30" fill="#0f172a" stroke="#64748b"/>
    <text x="110" y="80" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">1. Symbol.toPrimitive?</text>

    <rect x="20" y="100" width="200" height="30" fill="#0f172a" stroke="#64748b"/>
    <text x="110" y="120" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">2. valueOf()</text>

    <rect x="20" y="140" width="200" height="30" fill="#0f172a" stroke="#64748b"/>
    <text x="110" y="160" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">3. toString()</text>
  </g>

  <!-- Outputs -->
  <g transform="translate(580, 120)">
    <path d="M -60 30 L 0 0" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-out)"/>
    <rect width="150" height="50" fill="#1e293b" stroke="#fbbf24" rx="5"/>
    <text x="75" y="30" fill="#fbbf24" font-family="Courier New" font-size="14" text-anchor="middle">"Label" (String)</text>
    
    <path d="M -60 130 L 0 160" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrow-out)"/>
    <rect y="110" width="150" height="50" fill="#1e293b" stroke="#f43f5e" rx="5"/>
    <text x="75" y="140" fill="#f43f5e" font-family="Courier New" font-size="14" text-anchor="middle">100 (Number)</text>
  </g>

  <defs>
    <marker id="arrow-out" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Hint Signal -->
  <circle cx="250" cy="200" r="10" fill="#38bdf8"/>
  <text x="250" y="230" fill="#38bdf8" font-family="Arial" font-size="12" text-anchor="middle">HINT</text>
</svg>
