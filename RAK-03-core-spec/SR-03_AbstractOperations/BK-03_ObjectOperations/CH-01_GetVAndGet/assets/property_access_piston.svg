<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">PROPERTY ACCESS PISTON (GET VS GETV)</text>

  <!-- Piston Assembly -->
  <g transform="translate(300, 100)">
    <!-- Cylinder -->
    <rect width="200" height="250" fill="none" stroke="#64748b" stroke-width="4" stroke-dasharray="10,5"/>
    
    <!-- Piston Rod -->
    <rect x="85" y="20" width="30" height="150" fill="#38bdf8"/>
    <circle cx="100" cy="180" r="40" fill="#38bdf8"/>
    <text x="100" y="185" fill="#0f172a" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">[[Get]]</text>
  </g>

  <!-- Inputs -->
  <g transform="translate(50, 120)">
    <rect width="180" height="50" fill="#1e293b" stroke="#34d399" rx="5"/>
    <text x="90" y="30" fill="#34d399" font-family="Arial" font-size="14" text-anchor="middle">OBJECT (Direct)</text>
    <path d="M 180 25 L 280 150" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-pist)"/>
    <text x="210" y="80" fill="#34d399" font-family="Arial" font-size="12" transform="rotate(35, 210, 80)">Get()</text>
  </g>

  <g transform="translate(50, 250)">
    <rect width="180" height="50" fill="#1e293b" stroke="#fbbf24" rx="5"/>
    <text x="90" y="30" fill="#fbbf24" font-family="Arial" font-size="14" text-anchor="middle">PRIMITIVE (V)</text>
    <path d="M 180 25 L 280 180" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,2" marker-end="url(#arrow-pist)"/>
    <text x="220" y="55" fill="#fbbf24" font-family="Arial" font-size="12" transform="rotate(-30, 220, 55)">GetV() -> ToObject()</text>
  </g>

  <defs>
    <marker id="arrow-pist" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <text x="400" y="380" fill="#64748b" font-family="Arial" font-size="14" text-anchor="middle">"Every dot access triggers the Internal Piston chain"</text>
</svg>
