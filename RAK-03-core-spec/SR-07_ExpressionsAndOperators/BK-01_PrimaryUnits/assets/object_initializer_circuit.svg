<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">OBJECT INITIALIZER CIRCUIT (STRUCTURAL ASSEMBLY)</text>

  <!-- Input Expressions -->
  <g transform="translate(50, 100)">
    <rect width="180" height="40" fill="#1e293b" stroke="#38bdf8" rx="5"/>
    <text x="90" y="25" fill="#38bdf8" font-family="Courier New" font-size="12" text-anchor="middle">"KEY_A"</text>
    
    <rect y="60" width="180" height="40" fill="#1e293b" stroke="#34d399" rx="5"/>
    <text x="90" y="85" fill="#34d399" font-family="Courier New" font-size="12" text-anchor="middle">Value: 100</text>
  </g>

  <!-- Assembly Reactor -->
  <rect x="300" y="100" width="200" height="250" fill="#0f172a" stroke="#fbbf24" stroke-width="3" rx="10"/>
  <text x="400" y="130" fill="#fbbf24" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">ASSEMBLY UNIT</text>
  
  <!-- Computed Logic -->
  <rect x="320" y="160" width="160" height="50" fill="#334155" rx="5"/>
  <text x="400" y="180" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">Evaluate Key [ ]</text>
  <text x="400" y="200" fill="#fbbf24" font-family="Arial" font-size="11" text-anchor="middle">"ZONE_ALPHA"</text>

  <!-- Output Object -->
  <g transform="translate(550, 150)">
    <rect width="200" height="150" fill="#1e293b" stroke="#34d399" stroke-width="2" rx="10"/>
    <text x="100" y="30" fill="#34d399" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">NEW OBJECT UNIT</text>
    <text x="100" y="70" fill="#94a3b8" font-family="Courier New" font-size="12" text-anchor="middle">{</text>
    <text x="100" y="90" fill="#f8fafc" font-family="Courier New" font-size="11" text-anchor="middle"> ZONE_ALPHA: 100</text>
    <text x="100" y="110" fill="#94a3b8" font-family="Courier New" font-size="12" text-anchor="middle">}</text>
  </g>

  <!-- Flow Arrows -->
  <path d="M 230 120 L 300 150" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow-obj)"/>
  <path d="M 230 180 L 300 180" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-obj)"/>
  <path d="M 500 225 L 550 225" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrow-obj)"/>

  <defs>
    <marker id="arrow-obj" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" />
    </marker>
  </defs>

  <text x="400" y="420" fill="#64748b" font-family="Arial" font-size="14" text-anchor="middle">"Building complex energy containers on the fly within the engine stream"</text>
</svg>
