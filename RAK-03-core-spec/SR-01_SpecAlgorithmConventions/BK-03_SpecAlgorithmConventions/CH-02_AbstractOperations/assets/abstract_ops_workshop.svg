<svg width="600" height="350" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .ao-box { fill: #f1f5f9; stroke: #475569; stroke-width: 2; rx: 12; }
    .tool-icon { fill: #3b82f6; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1e293b; }
    .title { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .ao-name { font-weight: bold; font-family: 'Fira Code', monospace; fill: #2563eb; }
    .connection { stroke: #cbd5e1; stroke-width: 1.5; stroke-dasharray: 4; }
  </style>

  <rect width="600" height="350" class="frame" rx="16"/>
  <text x="300" y="40" text-anchor="middle" class="title">🛠️ Abstract Operations: The TC39 Workshop</text>

  <!-- Central Library Node -->
  <g transform="translate(200, 80)">
    <rect width="200" height="60" class="ao-box" style="fill: #eff6ff; stroke: #3b82f6;"/>
    <text x="100" y="35" text-anchor="middle" class="text ao-name">GetV(V, P)</text>
    <text x="100" y="52" text-anchor="middle" class="text" style="font-size: 10px;">(Global Utility)</text>
  </g>

  <!-- Usage 1 -->
  <g transform="translate(50, 220)">
    <rect width="120" height="50" class="ao-box"/>
    <text x="60" y="30" text-anchor="middle" class="text">Algorithm A</text>
  </g>
  <path d="M 110 220 L 250 140" class="connection"/>

  <!-- Usage 2 -->
  <g transform="translate(240, 220)">
    <rect width="120" height="50" class="ao-box"/>
    <text x="60" y="30" text-anchor="middle" class="text">Algorithm B</text>
  </g>
  <path d="M 300 220 L 300 140" class="connection"/>

  <!-- Usage 3 -->
  <g transform="translate(430, 220)">
    <rect width="120" height="50" class="ao-box"/>
    <text x="60" y="30" text-anchor="middle" class="text">Algorithm C</text>
  </g>
  <path d="M 490 220 L 350 140" class="connection"/>

  <text x="300" y="315" text-anchor="middle" class="text" style="font-style: italic;">
    "Operasi Abstrak adalah 'fungsi helper' yang digunakan berulang kali di seluruh spesifikasi."
  </text>
</svg>
