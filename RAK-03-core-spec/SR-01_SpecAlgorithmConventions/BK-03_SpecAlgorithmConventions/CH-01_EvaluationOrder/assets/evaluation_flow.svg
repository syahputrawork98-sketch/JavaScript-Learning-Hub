<svg width="600" height="320" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .step-box { fill: #ffffff; stroke: #64748b; stroke-width: 2; rx: 8; }
    .active-step { fill: #eff6ff; stroke: #3b82f6; stroke-width: 3; }
    .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1e293b; }
    .title { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .label { font-weight: 600; font-size: 16px; }
    .emphasis { fill: #2563eb; font-weight: bold; }
  </style>

  <rect width="600" height="320" class="frame" rx="16"/>
  <text x="300" y="40" text-anchor="middle" class="title">⛓️ Evaluation Order: Chain of Command</text>

  <!-- Step 1 -->
  <g transform="translate(100, 80)">
    <rect width="400" height="50" class="step-box active-step"/>
    <text x="20" y="30" class="text label">1. Let <tspan class="emphasis">val</tspan> be 0.</text>
    <text x="380" y="30" text-anchor="end" class="text" style="opacity: 0.5;">(Initialization)</text>
  </g>

  <!-- Flow Line 1 -->
  <path d="M 300 130 L 300 150" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Step 2 -->
  <g transform="translate(100, 150)">
    <rect width="400" height="50" class="step-box"/>
    <text x="20" y="30" class="text label">2. If some condition is true...</text>
    <circle cx="370" cy="25" r="5" fill="#eab308"/>
  </g>

  <!-- Flow Line 2 -->
  <path d="M 300 200 L 300 220" class="arrow"/>

  <!-- Step 3 -->
  <g transform="translate(100, 220)">
    <rect width="400" height="50" class="step-box"/>
    <text x="20" y="30" class="text label">3. Return <tspan class="emphasis">val</tspan>.</text>
    <text x="380" y="30" text-anchor="end" class="text" style="fill: #16a34a; font-weight: bold;">(Final Result)</text>
  </g>

  <!-- Markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="300" y="300" text-anchor="middle" class="text" style="font-style: italic;">
    "Algoritma dievaluasi dari atas ke bawah, satu per satu tanpa melompat."
  </text>
</svg>
