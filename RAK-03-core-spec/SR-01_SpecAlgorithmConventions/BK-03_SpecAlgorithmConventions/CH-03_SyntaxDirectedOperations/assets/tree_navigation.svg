<svg width="600" height="380" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .node-box { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 8; }
    .op-tag { fill: #fef3c7; stroke: #d97706; stroke-width: 1; rx: 4; }
    .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1e293b; }
    .title { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .code { font-family: 'Fira Code', monospace; font-size: 12px; }
  </style>

  <rect width="600" height="380" class="frame" rx="16"/>
  <text x="300" y="40" text-anchor="middle" class="title">🌳 Syntax-Directed Operations: Tree Navigation</text>

  <!-- Production 1 -->
  <g transform="translate(100, 80)">
    <rect width="400" height="100" class="node-box" style="stroke: #2563eb;"/>
    <text x="20" y="30" class="text" style="font-weight: bold;">Production: <tspan style="fill: #2563eb;">AssignmentExpression</tspan></text>
    <rect x="20" y="45" width="360" height="40" class="op-tag"/>
    <text x="35" y="70" class="text code">Evaluation: Run assignment logic...</text>
  </g>

  <!-- Flow Line -->
  <path d="M 300 180 L 300 210" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Production 2 -->
  <g transform="translate(100, 210)">
    <rect width="400" height="100" class="node-box" style="stroke: #16a34a;"/>
    <text x="20" y="30" class="text" style="font-weight: bold;">Production: <tspan style="fill: #16a34a;">Literal</tspan></text>
    <rect x="20" y="45" width="360" height="40" class="op-tag" style="fill: #f0fdf4; stroke: #16a34a;"/>
    <text x="35" y="70" class="text code">Evaluation: Return the literal value.</text>
  </g>

  <!-- Note -->
  <text x="300" y="350" text-anchor="middle" class="text" style="font-style: italic;">
    "Satu Nama Operasi (misal: Evaluation) memiliki definisi berbeda di tiap jalur produksi."
  </text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
