<svg width="600" height="360" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .gift-box { fill: #ffffff; stroke: #db2777; stroke-width: 2; rx: 8; }
    .ribbon { fill: #f472b6; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1e293b; }
    .title { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .shorthand { font-family: 'Fira Code', monospace; font-weight: bold; font-size: 24px; fill: #db2777; }
    .logic-box { fill: #f1f5f9; stroke: #cbd5e1; rx: 4; }
  </style>

  <rect width="600" height="360" class="frame" rx="16"/>
  <text x="300" y="40" text-anchor="middle" class="title">🎁 Shorthands: Shortcut Pembuka Kado</text>

  <!-- Question Mark (?) -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" class="shorthand">?</text>
    <rect x="30" y="-30" width="220" height="100" class="logic-box"/>
    <text x="45" y="0" class="text" style="font-weight: bold;">Return If Abrupt</text>
    <text x="45" y="25" class="text" style="font-size: 11px;">"Jika isi kado zonk (Error),</text>
    <text x="45" y="40" class="text" style="font-size: 11px;">langsung kembalikan kado itu."</text>
  </g>

  <!-- Exclamation (!) -->
  <g transform="translate(320, 100)">
    <text x="0" y="0" class="shorthand">!</text>
    <rect x="30" y="-30" width="220" height="100" class="logic-box" style="fill: #fdf2f8; stroke: #f472b6;"/>
    <text x="45" y="0" class="text" style="font-weight: bold; fill: #be185d;">Assert Normal</text>
    <text x="45" y="25" class="text" style="font-size: 11px;">"Saya jamin kado ini pasti</text>
    <text x="45" y="40" class="text" style="font-size: 11px;">aman (Normal). Buka paksa!"</text>
  </g>

  <!-- Visual Gift -->
  <g transform="translate(260, 220)">
    <rect width="80" height="80" class="gift-box"/>
    <rect x="35" width="10" height="80" class="ribbon"/>
    <rect y="35" width="80" height="10" class="ribbon"/>
    <text x="40" y="110" text-anchor="middle" class="text" style="font-weight: bold;">Completion Record</text>
  </g>

  <text x="300" y="340" text-anchor="middle" class="text" style="font-style: italic;">
    "Shorthand memangkas ribuan baris teks spec yang membosankan."
  </text>
</svg>
