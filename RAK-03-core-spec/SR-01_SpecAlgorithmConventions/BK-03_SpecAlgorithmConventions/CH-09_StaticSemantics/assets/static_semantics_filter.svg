<svg width="600" height="340" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .filter-bg { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2; rx: 12; }
    .code-block { fill: #ffffff; stroke: #475569; stroke-width: 1; rx: 4; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1e293b; }
    .title { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .error-tag { fill: #ef4444; stroke: #b91c1c; stroke-width: 1; rx: 4; }
    .pass-tag { fill: #16a34a; stroke: #15803d; stroke-width: 1; rx: 4; }
    .magnifier { fill: #3b82f6; opacity: 0.2; }
  </style>

  <rect width="600" height="340" class="frame" rx="16"/>
  <text x="300" y="40" text-anchor="middle" class="title">🔍 Static Semantics: Filter Sebelum Masuk</text>

  <!-- Input Code -->
  <g transform="translate(50, 80)">
    <rect width="180" height="200" class="code-block"/>
    <text x="20" y="30" class="text" style="font-family: monospace;">const x = 1;</text>
    <text x="20" y="60" class="text" style="font-family: monospace;">const x = 2;</text>
    <path d="M 20 50 L 160 50" stroke="#ef4444" stroke-width="2"/>
    <text x="90" y="150" text-anchor="middle" class="text" style="font-weight: bold; fill: #64748b;">Source Code</text>
  </g>

  <!-- Filter -->
  <g transform="translate(260, 80)">
    <rect width="180" height="200" class="filter-bg"/>
    <path d="M 0 50 L 180 50" stroke="#94a3b8" stroke-dasharray="4"/>
    <path d="M 0 100 L 180 100" stroke="#94a3b8" stroke-dasharray="4"/>
    <text x="90" y="35" text-anchor="middle" class="text" style="font-weight: bold;">Auditor Spec</text>
    
    <!-- Analysis Result -->
    <g transform="translate(20, 120)">
      <rect width="140" height="40" class="error-tag"/>
      <text x="70" y="25" text-anchor="middle" class="text" style="fill: #ffffff; font-weight: bold; font-size: 12px;">Syntax Error!</text>
    </g>
  </g>

  <!-- Flow -->
  <path d="M 230 180 L 260 180" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <text x="300" y="310" text-anchor="middle" class="text" style="font-style: italic;">
    "Mencegah kesalahan fatal sebelum satu baris kode pun dieksekusi."
  </text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
