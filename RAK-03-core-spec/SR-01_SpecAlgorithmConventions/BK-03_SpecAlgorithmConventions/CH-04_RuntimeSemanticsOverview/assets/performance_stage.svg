<svg width="600" height="360" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .stage { fill: #1e293b; stroke: #334155; stroke-width: 3; rx: 16; }
    .spotlight { fill: url(#grad); opacity: 0.3; }
    .actor { fill: #3b82f6; stroke: #ffffff; stroke-width: 2; rx: 8; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #ffffff; }
    .header { font-weight: bold; font-size: 18px; fill: #1e293b; }
    .static-box { fill: #f1f5f9; stroke: #cbd5e1; rx: 8; }
    .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; }
  </style>

  <rect width="600" height="360" class="frame" rx="16"/>
  <text x="300" y="40" text-anchor="middle" class="header">🎭 Runtime Semantics: The Performance Stage</text>

  <!-- Static Check (The Audition) -->
  <g transform="translate(50, 80)">
    <rect width="150" height="220" class="static-box"/>
    <text x="75" y="30" text-anchor="middle" class="header" style="font-size: 12px; fill: #64748b;">Static Semantics</text>
    <text x="75" y="110" text-anchor="middle" class="header" style="font-size: 14px; fill: #475569;">"The Audition"</text>
    <circle cx="75" cy="180" r="15" fill="#16a34a" opacity="0.6"/>
    <text x="75" y="210" text-anchor="middle" class="header" style="font-size: 10px; fill: #15803d;">Validated!</text>
  </g>

  <!-- Flow Arrow -->
  <path d="M 200 190 L 250 190" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Runtime Stage (The Show) -->
  <g transform="translate(260, 80)">
    <rect width="290" height="220" class="stage"/>
    <path d="M 145 0 L 0 220 L 290 220 Z" class="spotlight"/>
    <text x="145" y="30" text-anchor="middle" class="text" style="font-weight: bold;">"The Live Show"</text>
    
    <rect x="70" y="100" width="150" height="60" class="actor"/>
    <text x="145" y="135" text-anchor="middle" class="text" style="font-weight: bold;">Execution Engine</text>
    <text x="145" y="200" text-anchor="middle" class="text" style="font-size: 12px; opacity: 0.8;">Processing side effects...</text>
  </g>

  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
