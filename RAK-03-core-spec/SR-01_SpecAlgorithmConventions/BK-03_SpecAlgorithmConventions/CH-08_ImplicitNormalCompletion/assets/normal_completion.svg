<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .algo-box { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 8; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1e293b; }
    .title { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .implicit-tag { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1; rx: 4; }
    .magic-wand { fill: #16a34a; }
  </style>

  <rect width="600" height="300" class="frame" rx="16"/>
  <text x="300" y="40" text-anchor="middle" class="title">✨ Implicit Normal Completion: Final Otomatis</text>

  <!-- Algorithm Body -->
  <g transform="translate(100, 80)">
    <rect width="400" height="150" class="algo-box"/>
    <text x="20" y="30" class="text">1. Step One...</text>
    <text x="20" y="60" class="text">2. Step Two...</text>
    <text x="20" y="90" class="text" style="opacity: 0.3;">(Selesai, tidak ada instruksi return)</text>
    
    <!-- Implicit Return -->
    <g transform="translate(20, 110)">
      <rect width="360" height="30" class="implicit-tag"/>
      <text x="10" y="20" class="text" style="fill: #15803d; font-weight: bold;">[Magic] Return NormalCompletion(undefined)</text>
    </g>
  </g>

  <text x="300" y="270" text-anchor="middle" class="text" style="font-style: italic;">
    "Bahkan jika teks spec berakhir tiba-tiba, mesin tetap memberikan laporan sukses."
  </text>
</svg>
