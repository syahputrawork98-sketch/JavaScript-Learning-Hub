<svg width="600" height="320" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .tag { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 4; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1e293b; }
    .title { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .notation { font-family: 'Fira Code', monospace; font-weight: bold; fill: #2563eb; }
    .desc { font-size: 11px; fill: #64748b; }
  </style>

  <rect width="600" height="320" class="frame" rx="16"/>
  <text x="300" y="40" text-anchor="middle" class="title">🏷️ Value Notation: Label Harga Konteks</text>

  <!-- Constant -->
  <g transform="translate(60, 80)">
    <rect width="220" height="80" class="tag" style="stroke: #b91c1c;"/>
    <text x="110" y="30" text-anchor="middle" class="text notation" style="fill: #b91c1c;">~undefined~</text>
    <text x="110" y="55" text-anchor="middle" class="text desc">Constant/Enum Value</text>
    <text x="110" y="70" text-anchor="middle" class="text desc" style="font-style: italic;">(Unique Internal State)</text>
  </g>

  <!-- Record -->
  <g transform="translate(320, 80)">
    <rect width="220" height="80" class="tag" style="stroke: #059669;"/>
    <text x="110" y="30" text-anchor="middle" class="text notation" style="fill: #059669;">[[Value]]</text>
    <text x="110" y="55" text-anchor="middle" class="text desc">Internal Slot / Field</text>
    <text x="110" y="70" text-anchor="middle" class="text desc" style="font-style: italic;">(Structured Data)</text>
  </g>

  <!-- Literals -->
  <g transform="translate(190, 180)">
    <rect width="220" height="80" class="tag" style="stroke: #2563eb;"/>
    <text x="110" y="30" text-anchor="middle" class="text notation">*empty*</text>
    <text x="110" y="55" text-anchor="middle" class="text desc">Literal Representation</text>
    <text x="110" y="70" text-anchor="middle" class="text desc" style="font-style: italic;">(Spec Language keyword)</text>
  </g>

  <text x="300" y="300" text-anchor="middle" class="text" style="font-style: italic;">
    "Tiap jenis nilai memiliki 'seragam' tulisannya sendiri agar tidak tertukar."
  </text>
</svg>
