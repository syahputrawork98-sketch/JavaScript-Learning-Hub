<svg width="600" height="200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .node { fill: #f9fafb; stroke: #374151; stroke-width: 2; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
  </style>

  <text x="300" y="50" text-anchor="middle" class="text header">The Boolean Type 🚦 { true, false }</text>

  <!-- True Box -->
  <rect x="100" y="80" width="180" height="60" rx="8" class="node" style="fill: #f0fdf4; stroke: #16a34a;"/>
  <text x="190" y="115" text-anchor="middle" class="text" style="font-weight: bold; color: #16a34a;">🟢 true</text>

  <!-- False Box -->
  <rect x="320" y="80" width="180" height="60" rx="8" class="node" style="fill: #fef2f2; stroke: #dc2626;"/>
  <text x="410" y="115" text-anchor="middle" class="text" style="font-weight: bold; color: #dc2626;">🔴 false</text>

  <text x="300" y="180" text-anchor="middle" class="text" style="font-style: italic; font-size: 12px;">CH-08: The Mathematical Logic of Boolean Values</text>
</svg>
