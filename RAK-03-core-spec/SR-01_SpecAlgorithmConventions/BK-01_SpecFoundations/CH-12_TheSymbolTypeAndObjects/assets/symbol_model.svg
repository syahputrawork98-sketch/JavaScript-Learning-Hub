<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .symbol-circle { stroke-width: 2; fill-opacity: 0.1; }
    .fingerprint { stroke-width: 1.5; fill: none; opacity: 0.6; }
    .text { font-family: 'Inter', -apple-system, sans-serif; font-size: 14px; fill: #1e293b; }
    .header { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .label { font-weight: 600; font-size: 16px; }
    .subtext { font-size: 12px; fill: #64748b; }
    .connection { stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 4; }
  </style>

  <!-- Background -->
  <rect width="600" height="300" rx="16" class="frame"/>

  <!-- Title -->
  <text x="300" y="45" text-anchor="middle" class="text header">🔑 Symbol: The Digital Fingerprint</text>

  <!-- Comparison Logic -->
  <g transform="translate(60, 100)">
    <!-- Symbol 1 -->
    <g>
      <circle cx="0" cy="40" r="50" class="symbol-circle" style="fill: #f97316; stroke: #f97316;"/>
      <path d="M -20 30 Q 0 10 20 30 T 20 50 T -20 50" class="fingerprint" stroke="#ea580c"/> <!-- Simplified Fingerprint -->
      <text x="0" y="45" text-anchor="middle" class="text label" style="fill: #9a3412;">S1</text>
      <text x="0" y="110" text-anchor="middle" class="text subtext">Symbol('id')</text>
    </g>

    <!-- Not Equal Sign -->
    <text x="110" y="45" text-anchor="middle" class="text header" style="font-size: 24px; fill: #ef4444;">≠</text>

    <!-- Symbol 2 -->
    <g transform="translate(220, 0)">
      <circle cx="0" cy="40" r="50" class="symbol-circle" style="fill: #10b981; stroke: #10b981;"/>
      <path d="M -15 25 Q 5 5 25 25 T 25 45 T -15 45" class="fingerprint" stroke="#059669"/>
      <text x="0" y="45" text-anchor="middle" class="text label" style="fill: #064e3b;">S2</text>
      <text x="0" y="110" text-anchor="middle" class="text subtext">Symbol('id')</text>
    </g>

    <!-- Equality Note -->
    <g transform="translate(340, 20)">
      <rect x="0" y="0" width="160" height="80" rx="8" style="fill: #fef2f2; stroke: #fecaca; stroke-width: 1;"/>
      <text x="80" y="30" text-anchor="middle" class="text" style="font-weight: bold; fill: #991b1b;">Guaranteed Unique</text>
      <text x="80" y="55" text-anchor="middle" class="text subtext">Even with the same</text>
      <text x="80" y="70" text-anchor="middle" class="text subtext">description string.</text>
    </g>
  </g>

  <!-- Bottom Insight -->
  <line x1="50" y1="240" x2="550" y2="240" class="connection"/>
  <text x="300" y="270" text-anchor="middle" class="text" style="font-style: italic; opacity: 0.8;">
    "Symbols are atoms of identity—invisible to normal iteration, unique forever."
  </text>

</svg>
