<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .rect { fill: #f9fafb; stroke: #374151; stroke-width: 2; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
    .arrow { stroke: #6b7280; stroke-width: 2; fill: none; }
  </style>

  <!-- Instance -->
  <rect x="50" y="40" width="180" height="60" rx="4" class="rect" style="stroke: #ef4444;"/>
  <text x="140" y="75" text-anchor="middle" class="text header">👨‍🍳 Instance Object</text>
  
  <!-- Prototype -->
  <rect x="250" y="140" width="180" height="60" rx="4" class="rect" style="stroke: #3b82f6;"/>
  <text x="340" y="175" text-anchor="middle" class="text header">🍴 Prototype Object</text>

  <!-- Root -->
  <rect x="400" y="240" width="180" height="60" rx="4" class="rect" style="stroke: #10b981;"/>
  <text x="490" y="275" text-anchor="middle" class="text header">🏛️ Object.prototype</text>

  <!-- Connector Lines -->
  <path d="M140 100 L250 145" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M340 200 L400 245" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M490 300 L490 340" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="490" y="360" text-anchor="middle" class="text">null</text>

  <!-- Labels -->
  <text x="110" y="140" class="text" style="fill: #ef4444;">[[Prototype]]</text>
  <text x="310" y="240" class="text" style="fill: #3b82f6;">[[Prototype]]</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <text x="300" y="385" text-anchor="middle" class="text" style="font-style: italic; font-size: 12px;">CH-04: Prototype Chain Delegation Model</text>
</svg>
