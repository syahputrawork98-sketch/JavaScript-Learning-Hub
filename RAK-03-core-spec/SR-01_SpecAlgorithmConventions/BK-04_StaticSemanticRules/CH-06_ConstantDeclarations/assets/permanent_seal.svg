<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame  { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .drawer { fill: #f0f9ff; stroke: #0ea5e9; stroke-width: 2; }
    .sealed { fill: #fff7ed; stroke: #f97316; stroke-width: 3; }
    .open   { fill: #f0fdf4; stroke: #4ade80; stroke-width: 2; }
    .text   { font-family: 'Inter', sans-serif; font-size: 13px; fill: #1e293b; }
    .title  { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .badge  { font-weight: bold; font-size: 11px; }
    .seal   { fill: #f97316; opacity: 0.9; }
    .error  { fill: #fee2e2; stroke: #f87171; stroke-width: 2; rx: 6; }
  </style>

  <rect width="600" height="400" class="frame" rx="16"/>
  <text x="300" y="36" text-anchor="middle" class="title">🔒 Constant Declarations: Segel Permanen</text>

  <!-- let Drawer (mutable) -->
  <g transform="translate(40, 80)">
    <rect width="200" height="130" class="open" rx="8"/>
    <text x="100" y="25" text-anchor="middle" class="text badge" style="fill: #16a34a;">let count = 0</text>
    <text x="100" y="55" text-anchor="middle" class="text" style="font-size: 11px;">Laci biasa:</text>
    <text x="100" y="75" text-anchor="middle" class="text" style="font-size: 11px;">Kunci bisa diserahkan</text>
    <text x="100" y="95" text-anchor="middle" class="text" style="font-size: 11px; fill: #16a34a;">✅ Re-assign: OK</text>
    <rect x="50" y="110" width="100" height="12" fill="#bbf7d0" rx="3"/>
  </g>

  <!-- const Drawer (immutable binding) -->
  <g transform="translate(280, 80)">
    <rect width="200" height="130" class="sealed" rx="8"/>
    <text x="100" y="25" text-anchor="middle" class="text badge" style="fill: #ea580c;">const PI = 3.14</text>
    <text x="100" y="55" text-anchor="middle" class="text" style="font-size: 11px;">Laci bersegel:</text>
    <text x="100" y="75" text-anchor="middle" class="text" style="font-size: 11px;">Segel dipasang saat inisialisasi</text>
    <!-- Seal badge -->
    <circle cx="100" cy="108" r="16" class="seal"/>
    <text x="100" y="113" text-anchor="middle" class="text" style="fill: white; font-size: 10px; font-weight: bold;">SEAL</text>
  </g>

  <!-- Error scenario -->
  <g transform="translate(60, 250)">
    <rect width="460" height="90" class="error" rx="8"/>
    <text x="230" y="28" text-anchor="middle" class="text badge" style="fill: #dc2626;">❌ Skenario Pelanggaran Early Error</text>
    <text x="230" y="55" text-anchor="middle" class="text" style="font-size: 12px; font-family: monospace;">const PI;  // Early Error: Missing Initializer</text>
    <text x="230" y="78" text-anchor="middle" class="text" style="font-size: 11px; fill: #7f1d1d;">SyntaxError saat PARSING, bukan saat runtime.</text>
  </g>

  <text x="300" y="385" text-anchor="middle" class="text" style="font-style: italic; fill: #64748b; font-size: 11px;">
    "const menyegel REFERENSI, bukan isi nilainya."
  </text>
</svg>
