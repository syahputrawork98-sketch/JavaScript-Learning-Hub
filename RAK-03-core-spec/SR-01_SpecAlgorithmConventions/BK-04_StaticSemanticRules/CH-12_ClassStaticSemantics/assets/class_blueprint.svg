<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame   { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .class-b { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 2; }
    .private { fill: #fef2f2; stroke: #f87171; stroke-width: 1; }
    .public  { fill: #f0fdf4; stroke: #4ade80; stroke-width: 1; }
    .static  { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1; }
    .ctor    { fill: #fef3c7; stroke: #fbbf24; stroke-width: 2; }
    .error   { fill: #fee2e2; stroke: #ef4444; stroke-width: 2; }
    .text    { font-family: 'Inter', sans-serif; font-size: 12px; fill: #1e293b; }
    .title   { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .badge   { font-weight: bold; font-size: 11px; }
  </style>

  <rect width="600" height="400" class="frame" rx="16"/>
  <text x="300" y="36" text-anchor="middle" class="title">🏛️ Class Static Semantics: Blueprint Validasi</text>

  <!-- Class Body -->
  <rect x="30" y="55" width="370" height="290" class="class-b" rx="12"/>
  <text x="215" y="78" text-anchor="middle" class="text badge" style="fill: #7c3aed;">class Person { ... }</text>

  <!-- Constructor -->
  <rect x="50" y="90" width="330" height="40" class="ctor" rx="6"/>
  <text x="50" y="107" class="text" style="font-size: 11px;">  constructor(name) { ... }</text>
  <text x="50" y="123" class="text" style="font-size: 10px; fill: #16a34a;">  ✅ Hanya boleh ada SATU</text>

  <!-- Private Fields -->
  <rect x="50" y="140" width="330" height="60" class="private" rx="6"/>
  <text x="50" y="158" class="text" style="font-size: 11px;">  #name = "John";</text>
  <text x="50" y="176" class="text" style="font-size: 11px;">  #age = 30;</text>
  <text x="50" y="192" class="text" style="font-size: 10px; fill: #dc2626;">  ⛔ #name duplikat = SyntaxError</text>

  <!-- Public Method -->
  <rect x="50" y="210" width="330" height="40" class="public" rx="6"/>
  <text x="50" y="230" class="text" style="font-size: 11px;">  greet() { ... }</text>
  <text x="50" y="246" class="text" style="font-size: 10px; fill: #16a34a;">  ✅ Metode publik, tidak dibatasi</text>

  <!-- Static (restricted) -->
  <rect x="50" y="260" width="330" height="65" class="static" rx="6"/>
  <text x="50" y="278" class="text" style="font-size: 11px; fill: #1d4ed8;">  static helper() { ... } ✅</text>
  <text x="50" y="298" class="text" style="font-size: 11px; fill: #dc2626;">  static prototype = ...; ⛔</text>
  <text x="50" y="315" class="text" style="font-size: 10px; fill: #dc2626;">  SyntaxError: 'prototype' dilarang sebagai static</text>

  <!-- Error Panel -->
  <rect x="420" y="55" width="155" height="290" class="error" rx="10"/>
  <text x="497" y="80" text-anchor="middle" class="text badge" style="fill: #dc2626;">❌ Pelanggaran</text>
  <text x="430" y="110" class="text" style="font-size: 10px;">Dup. constructor</text>
  <text x="430" y="135" class="text" style="font-size: 10px;">Dup. #private field</text>
  <text x="430" y="160" class="text" style="font-size: 10px;">static prototype</text>
  <text x="497" y="250" text-anchor="middle" class="text badge" style="fill: #dc2626; font-size: 10px;">All = SyntaxError</text>
  <text x="497" y="275" text-anchor="middle" class="text" style="font-size: 10px;">Parsing ditolak.</text>

  <text x="300" y="385" text-anchor="middle" class="text" style="font-style: italic; fill: #64748b; font-size: 11px;">
    "Class body diverifikasi seperti blueprint bangunan sebelum konstruksi dimulai."
  </text>
</svg>
