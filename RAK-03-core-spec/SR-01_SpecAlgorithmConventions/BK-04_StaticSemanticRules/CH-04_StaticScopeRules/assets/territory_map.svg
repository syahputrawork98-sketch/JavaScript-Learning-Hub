<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame  { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .global { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; }
    .fn     { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; }
    .block  { fill: #fdf4ff; stroke: #a855f7; stroke-width: 2; }
    .flag   { fill: #fbbf24; }
    .text   { font-family: 'Inter', sans-serif; font-size: 13px; fill: #1e293b; }
    .title  { font-weight: bold; font-size: 18px; fill: #0f172a; }
    .badge  { font-weight: bold; font-size: 10px; }
  </style>

  <rect width="600" height="400" class="frame" rx="16"/>
  <text x="300" y="36" text-anchor="middle" class="title">🗺️ Static Scope Rules: Peta Wilayah Kekuasaan</text>

  <!-- Global Scope -->
  <rect x="30" y="60" width="540" height="300" class="global" rx="12"/>
  <text x="50" y="85" class="text badge" style="fill: #3b82f6;">GLOBAL SCOPE</text>
  <text x="50" y="105" class="text" style="font-size: 11px;">var x = 1; let y = 2;</text>

  <!-- Function Scope -->  
  <rect x="60" y="120" width="360" height="210" class="fn" rx="10"/>
  <text x="80" y="145" class="text badge" style="fill: #16a34a;">FUNCTION SCOPE: foo()</text>
  <text x="80" y="163" class="text" style="font-size: 11px;">var a; let b;</text>

  <!-- Block Scope -->
  <rect x="90" y="180" width="280" height="125" class="block" rx="8"/>
  <text x="110" y="200" class="text badge" style="fill: #9333ea;">BLOCK SCOPE: { }</text>
  <text x="110" y="218" class="text" style="font-size: 11px;">let c; const d;</text>

  <!-- Flags (Variables) -->
  <!-- Global flags -->
  <polygon points="460,80  460,110  490,95" class="flag"/>
  <text x="495" y="100" class="text" style="font-size: 10px;">x (var)</text>
  <polygon points="460,120  460,150  490,135" fill="#fde68a" stroke="#f59e0b" stroke-width="1"/>
  <text x="495" y="140" class="text" style="font-size: 10px;">y (let)</text>

  <!-- Arrows: scope lookup -->
  <path d="M 370 270 C 450 270, 450 200, 380 130" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5" marker-end="url(#arrow2)"/>
  <text x="440" y="235" class="text" style="font-size: 10px; fill: #64748b;">Scope lookup (up)</text>

  <defs>
    <marker id="arrow2" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="300" y="385" text-anchor="middle" class="text" style="font-style: italic; fill: #64748b; font-size: 11px;">
    "Scope ditentukan saat kode ditulis, bukan saat fungsi dipanggil."
  </text>
</svg>
