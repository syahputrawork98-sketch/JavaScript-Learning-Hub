<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .node { fill: #f3f4f6; stroke: #374151; stroke-width: 2; }
    .input { fill: #fef2f2; stroke: #dc2626; }
    .result { fill: #f0fdf4; stroke: #16a34a; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
    .arrow { stroke: #4b5563; stroke-width: 2; fill: none; }
  </style>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" class="text header">🔢 Numeric String Grammar Map</text>

  <!-- Input String -->
  <rect x="250" y="50" width="100" height="40" rx="4" class="node input"/>
  <text x="300" y="75" text-anchor="middle" class="text" style="font-family: monospace;">String</text>

  <!-- Branches -->
  <line x1="300" y1="90" x2="100" y2="150" class="arrow"/>
  <text x="200" y="120" text-anchor="middle" class="text" style="font-size: 12px;">"0x..."</text>
  
  <line x1="300" y1="90" x2="300" y2="150" class="arrow"/>
  <text x="320" y="120" text-anchor="middle" class="text" style="font-size: 12px;">"0b..."</text>
  
  <line x1="300" y1="90" x2="500" y2="150" class="arrow"/>
  <text x="400" y="120" text-anchor="middle" class="text" style="font-size: 12px;">"..." (Decimal)</text>

  <!-- Outcomes -->
  <rect x="50" y="150" width="100" height="60" rx="8" class="node result"/>
  <text x="100" y="175" text-anchor="middle" class="text">Hexadecimal</text>
  <text x="100" y="195" text-anchor="middle" class="text" style="font-size: 10px;">[0-9a-fA-F]</text>

  <rect x="250" y="150" width="100" height="60" rx="8" class="node result"/>
  <text x="300" y="175" text-anchor="middle" class="text">Binary</text>
  <text x="300" y="195" text-anchor="middle" class="text" style="font-size: 10px;">[0-1]</text>

  <rect x="450" y="150" width="100" height="60" rx="8" class="node result"/>
  <text x="500" y="175" text-anchor="middle" class="text">Decimal</text>
  <text x="500" y="195" text-anchor="middle" class="text" style="font-size: 10px;">[0-9]</text>

  <!-- Note -->
  <text x="300" y="270" text-anchor="middle" class="text" style="font-style: italic; font-size: 12px;">CH-03: This grammar converts strings directly into numeric values for Number() or BigInt().</text>
</svg>
