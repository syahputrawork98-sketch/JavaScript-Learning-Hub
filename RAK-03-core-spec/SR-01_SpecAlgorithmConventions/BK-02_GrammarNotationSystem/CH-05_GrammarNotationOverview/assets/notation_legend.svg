<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .legend-box { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1; }
    .not-text { font-family: 'Times New Roman', serif; font-style: italic; font-size: 16px; fill: #111827; }
    .desc-text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #4b5563; }
    .header { font-weight: bold; font-size: 18px; fill: #111827; }
    .divider { stroke: #e5e7eb; stroke-width: 1; }
  </style>

  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" class="header">📖 Grammar Notation Legend</text>

  <!-- Legend List -->
  <g transform="translate(50, 80)">
    <!-- 1. Nonterminals -->
    <text x="0" y="20" class="not-text">Statement</text>
    <text x="120" y="20" class="desc-text">= Nonterminal (Abstraksi)</text>
    
    <line x1="0" y1="40" x2="500" y2="40" class="divider"/>

    <!-- 2. Terminals -->
    <text x="0" y="70" class="not-text" style="font-style: normal; font-family: monospace; font-weight: bold;">let</text>
    <text x="120" y="70" class="desc-text">= Terminal (Karakter/Token Riil)</text>

    <line x1="0" y1="90" x2="500" y2="90" class="divider"/>

    <!-- 3. Subscripts -->
    <text x="0" y="120" class="not-text">AssignmentExpression<tspan baseline-shift="sub" font-size="10" font-style="normal">[In, Yield]</tspan></text>
    <text x="120" y="120" class="desc-text">= Parameterized (Berbasis Kondisi)</text>

    <line x1="0" y1="140" x2="500" y2="140" class="divider"/>

    <!-- 4. Optional -->
    <text x="0" y="170" class="not-text">Identifier<tspan baseline-shift="sub" font-size="10" font-style="normal">opt</tspan></text>
    <text x="120" y="170" class="desc-text">= Optional (Boleh tidak ada)</text>

    <line x1="0" y1="190" x2="500" y2="190" class="divider"/>

    <!-- 5. One of -->
    <text x="0" y="220" class="not-text" style="font-style: normal; font-size: 14px; font-weight: bold;">one of</text>
    <text x="120" y="220" class="desc-text">= Pilih salah satu dari daftar di bawahnya</text>
  </g>

  <!-- Note -->
  <text x="300" y="370" text-anchor="middle" class="desc-text" style="font-style: italic; font-size: 12px;">CH-05: Understanding these notations is like learning the alphabet of the specification.</text>
</svg>
