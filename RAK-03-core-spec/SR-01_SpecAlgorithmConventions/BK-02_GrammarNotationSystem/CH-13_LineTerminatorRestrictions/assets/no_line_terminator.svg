<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1; }
    .token-box { fill: #ffffff; stroke: #4b5563; stroke-width: 2; }
    .restriction-zone { fill: #fef2f2; stroke: #ef4444; stroke-width: 1; stroke-dasharray: 4; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
    .code { font-family: monospace; font-size: 14px; font-weight: bold; fill: #111827; }
    .forbidden { fill: #dc2626; font-weight: bold; font-size: 12px; }
  </style>

  <!-- Background -->
  <rect width="600" height="300" rx="12" class="frame"/>

  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" class="text header">🚫 Line Terminator Restrictions: No Gaps Allowed</text>

  <!-- Visualization -->
  <g transform="translate(100, 100)">
    <!-- Token 1 -->
    <rect x="0" y="0" width="80" height="50" rx="4" class="token-box"/>
    <text x="40" y="30" text-anchor="middle" class="code">return</text>

    <!-- Restriction Zone -->
    <rect x="100" y="-20" width="150" height="90" rx="8" class="restriction-zone"/>
    <text x="175" y="10" text-anchor="middle" class="forbidden">[no LineTerminator here]</text>
    <path d="M 120 30 L 230 30" stroke="#ef4444" stroke-width="2" marker-end="url(#xpoint)"/>
    <text x="175" y="50" text-anchor="middle" class="text" style="font-size: 10px;">Enter / Newline forbidden!</text>

    <!-- Token 2 -->
    <rect x="270" y="0" width="120" height="50" rx="4" class="token-box"/>
    <text x="330" y="30" text-anchor="middle" class="code">Expression</text>
  </g>

  <!-- Legend -->
  <g transform="translate(100, 220)">
    <text x="0" y="20" class="text" style="font-weight: bold;">Result if Newline exists:</text>
    <text x="0" y="45" class="text" style="fill: #dc2626;">Automatic Semicolon Insertion (ASI) triggers!</text>
    <text x="0" y="65" class="text" style="font-size: 11px;">The parser treats the 'return' as a complete statement.</text>
  </g>

  <!-- Marker definition -->
  <defs>
    <marker id="xpoint" markerWidth="10" markerHeight="10" refX="5" refY="5">
      <line x1="2" y1="2" x2="8" y2="8" stroke="#dc2626" stroke-width="2"/>
      <line x1="8" y1="2" x2="2" y2="8" stroke="#dc2626" stroke-width="2"/>
    </marker>
  </defs>

</svg>
