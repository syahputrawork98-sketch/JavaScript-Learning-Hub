<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1; }
    .empty-box { fill: #f8fafc; stroke: #64748b; stroke-width: 2; stroke-dasharray: 4; }
    .text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1f2937; }
    .header { font-weight: bold; font-size: 16px; }
    .code { font-family: monospace; font-size: 16px; fill: #475569; }
    .label { font-size: 12px; fill: #64748b; font-style: italic; }
  </style>

  <!-- Background -->
  <rect width="600" height="300" rx="12" class="frame"/>

  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" class="text header">🕳️ The [empty] Notation: Valid Absence</text>

  <!-- Concept Visualization -->
  <g transform="translate(150, 80)">
    <rect x="0" y="0" width="300" height="100" rx="8" class="empty-box"/>
    <text x="150" y="55" text-anchor="middle" class="code" style="font-size: 24px;">[empty]</text>
    <text x="150" y="85" text-anchor="middle" class="label">"Matches zero tokens"</text>
  </g>

  <!-- Practical Example -->
  <g transform="translate(50, 200)">
    <text x="0" y="20" class="text" style="font-weight: bold;">Example: <tspan font-style="italic">ArgumentList</tspan></text>
    <text x="0" y="45" class="code">ArgumentList :</text>
    <text x="20" y="65" class="code" fill="#2563eb">[empty]</text>
    <text x="20" y="85" class="code">AssignmentExpression</text>
    
    <line x1="150" y1="35" x2="250" y2="35" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="2"/>
    <text x="260" y="40" class="text" style="font-size: 12px;">This allows <tspan font-family="monospace">func()</tspan> to be valid.</text>
  </g>

</svg>
