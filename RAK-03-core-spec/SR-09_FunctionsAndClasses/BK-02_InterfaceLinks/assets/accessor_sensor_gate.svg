<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-set" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f43f5e" />
    </marker>
    <marker id="arrow-get" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">ACCESSOR SENSOR GATES (GETTERS/SETTERS)</text>

  <!-- External User -->
  <g transform="translate(50, 150)">
    <rect width="180" height="150" fill="#1e293b" stroke="#94a3b8" rx="10"/>
    <text x="90" y="30" fill="#94a3b8" font-family="Arial" font-size="14" text-anchor="middle">TECHNICIAN (USER)</text>
    <text x="30" y="80" fill="#ffffff" font-family="Courier New" font-size="12">hub.power = 100</text>
    <text x="30" y="110" fill="#ffffff" font-family="Courier New" font-size="12">let p = hub.power</text>
  </g>

  <!-- The Sensor Interface -->
  <rect x="300" y="80" width="200" height="300" fill="#0f172a" stroke="#34d399" stroke-width="2" rx="15"/>
  <text x="400" y="110" fill="#34d399" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">ACCESSOR GATE</text>

  <!-- Setter Sensor -->
  <g transform="translate(310, 140)">
    <rect width="180" height="40" fill="#991b1b" stroke="#f43f5e" rx="5"/>
    <text x="90" y="25" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">SETTER SENSOR</text>
    <text x="90" y="55" fill="#f43f5e" font-family="Arial" font-size="9" text-anchor="middle">(Validation &amp; Inbound Filter)</text>
  </g>

  <!-- Getter Sensor -->
  <g transform="translate(310, 240)">
    <rect width="180" height="40" fill="#1e3a8a" stroke="#60a5fa" rx="5"/>
    <text x="90" y="25" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">GETTER SENSOR</text>
    <text x="90" y="55" fill="#60a5fa" font-family="Arial" font-size="9" text-anchor="middle">(Formatting &amp; Outbound Filter)</text>
  </g>

  <!-- Internal Storage -->
  <g transform="translate(570, 150)">
    <rect width="180" height="150" fill="#1e293b" stroke="#38bdf8" rx="10"/>
    <text x="90" y="30" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle">INTERNAL SOCKET</text>
    <rect x="40" y="60" width="100" height="60" fill="#0f172a" stroke="#38bdf8" stroke-dasharray="2,2"/>
    <text x="90" y="95" fill="#ffffff" font-family="Courier New" font-size="14" text-anchor="middle">#data</text>
  </g>

  <!-- Arrows -->
  <path d="M 230 160 L 310 160" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrow-set)"/>
  <path d="M 490 160 L 570 160" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-set)"/>
  
  <path d="M 570 260 L 490 260" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-get)"/>
  <path d="M 310 260 L 230 260" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-get)"/>

  <text x="400" y="420" fill="#64748b" font-family="Arial" font-size="14" text-anchor="middle">"Filtering inbound and outbound energy pulses through accessor logic"</text>
</svg>
