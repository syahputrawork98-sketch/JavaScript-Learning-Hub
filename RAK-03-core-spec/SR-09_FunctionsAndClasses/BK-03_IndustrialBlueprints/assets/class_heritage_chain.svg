<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">CLASS HERITAGE CHAIN (PROTOTYPAL TRANSMISSION)</text>

  <!-- Base Class -->
  <g transform="translate(100, 80)">
    <rect width="250" height="150" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="10"/>
    <text x="125" y="30" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">BASE GENERATOR</text>
    
    <rect x="25" y="60" width="200" height="30" fill="#0c4a6e" rx="3"/>
    <text x="125" y="80" fill="#ffffff" font-family="Courier New" font-size="12" text-anchor="middle">produceEnergy()</text>
    
    <rect x="25" y="100" width="200" height="30" fill="#0c4a6e" rx="3"/>
    <text x="125" y="120" fill="#ffffff" font-family="Courier New" font-size="12" text-anchor="middle">status</text>
  </g>

  <!-- Extends Link -->
  <path d="M 225 230 L 225 300 L 450 300" stroke="#fbbf24" stroke-width="3" fill="none" marker-end="url(#arrow-extends)"/>
  <text x="300" y="290" fill="#fbbf24" font-family="Arial" font-size="12" text-anchor="middle">extends</text>

  <!-- Derived Class -->
  <g transform="translate(450, 250)">
    <rect width="250" height="180" fill="#1e293b" stroke="#34d399" stroke-width="2" rx="10"/>
    <text x="125" y="30" fill="#34d399" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">SOLAR UNIT (Derived)</text>
    
    <!-- Inherited -->
    <rect x="25" y="50" width="200" height="30" fill="#065f46" rx="3" opacity="0.5"/>
    <text x="125" y="70" fill="#a7f3d0" font-family="Courier New" font-size="10" text-anchor="middle">Inherited: status</text>

    <!-- Super call -->
    <path d="M 50 120 L 50 80" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-super)"/>
    <text x="80" y="105" fill="#fbbf24" font-family="Courier New" font-size="10">super()</text>

    <!-- New Feature -->
    <rect x="25" y="130" width="200" height="30" fill="#065f46" rx="3"/>
    <text x="125" y="150" fill="#ffffff" font-family="Courier New" font-size="12" text-anchor="middle">absorbSun()</text>
  </g>

  <defs>
    <marker id="arrow-extends" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" />
    </marker>
    <marker id="arrow-super" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" />
    </marker>
  </defs>

  <text x="400" y="470" fill="#64748b" font-family="Arial" font-size="14" text-anchor="middle">"Derived blueprints utilize existing energy pathways through the heritage chain"</text>
</svg>
