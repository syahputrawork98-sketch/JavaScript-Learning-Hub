<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">LEXICAL SCOPING VAULT (LET/CONST LOCKS)</text>

  <!-- Global Context -->
  <rect x="50" y="80" width="700" height="380" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="10,5" rx="10"/>
  <text x="70" y="110" fill="#64748b" font-family="Arial" font-size="14">GLOBAL HUB SCOPE</text>

  <!-- Function Scope -->
  <rect x="100" y="140" width="600" height="280" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="10"/>
  <text x="120" y="170" fill="#38bdf8" font-family="Arial" font-size="14">FUNCTION CHAMBER</text>
  
  <!-- Object var (leaks) -->
  <rect x="130" y="200" width="120" height="30" fill="#991b1b" stroke="#f43f5e" rx="3" />
  <text x="190" y="220" fill="#ffffff" font-family="Courier New" font-size="12" text-anchor="middle">var: leaky</text>

  <!-- Block Scope (The Vault) -->
  <rect x="300" y="200" width="350" height="180" fill="#0f172a" stroke="#fbbf24" stroke-width="3" rx="15"/>
  <text x="475" y="230" fill="#fbbf24" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">BLOCK VAULT { ... }</text>
  
  <!-- TDZ Zone -->
  <rect x="320" y="250" width="310" height="40" fill="#334155" opacity="0.5" rx="5"/>
  <text x="475" y="275" fill="#94a3b8" font-family="Courier New" font-size="10" text-anchor="middle">TEMPORAL DEAD ZONE (DANGER!)</text>
  
  <!-- Let/Const Pins -->
  <rect x="350" y="310" width="120" height="40" fill="#065f46" stroke="#34d399" rx="5"/>
  <text x="410" y="335" fill="#ffffff" font-family="Courier New" font-size="12" text-anchor="middle">let: fixed</text>
  
  <rect x="500" y="310" width="120" height="40" fill="#1e40af" stroke="#60a5fa" rx="5"/>
  <text x="560" y="335" fill="#ffffff" font-family="Courier New" font-size="12" text-anchor="middle">const: locked</text>

  <!-- Leaks drawing -->
  <path d="M 250 215 L 680 215" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrow-leak)"/>
  <text x="700" y="220" fill="#f43f5e" font-family="Arial" font-size="10">Leaking to Function!</text>

  <defs>
    <marker id="arrow-leak" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f43f5e" />
    </marker>
  </defs>

  <text x="400" y="480" fill="#64748b" font-family="Arial" font-size="14" text-anchor="middle">"Modern units use reinforced vaults to prevent energy dissipation"</text>
</svg>
