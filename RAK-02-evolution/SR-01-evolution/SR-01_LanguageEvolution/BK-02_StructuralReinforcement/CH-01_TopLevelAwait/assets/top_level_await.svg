<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">INSTANT INITIALIZATION (TOP-LEVEL AWAIT)</text>

  <!-- Module A (Config) -->
  <rect x="50" y="100" width="200" height="150" fill="#1e293b" stroke="#38bdf8" stroke-width="4" rx="10"/>
  <text x="150" y="140" fill="#38bdf8" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">CONFIG MODULE</text>
  <path d="M 80 180 L 220 180" stroke="#38bdf8" stroke-width="2" stroke-dasharray="5,5"/>
  <circle cx="150" cy="180" r="10" fill="#38bdf8" opacity="0.6"/>
  <text x="150" y="220" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">await fetch()</text>

  <!-- Connection Link -->
  <path d="M 250 175 L 450 175" stroke="#fbbf24" stroke-width="6" marker-end="url(#arrow-init)"/>
  <text x="350" y="160" fill="#fbbf24" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">READY AT START</text>

  <!-- Module B (The Hub) -->
  <rect x="450" y="100" width="300" height="150" fill="#1e293b" stroke="#34d399" stroke-width="4" rx="10"/>
  <text x="600" y="140" fill="#34d399" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">MAIN HUB UNIT</text>
  <text x="600" y="190" fill="#94a3b8" font-family="Arial" font-size="14" text-anchor="middle">import config from './A.js'</text>

  <defs>
    <marker id="arrow-init" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" />
    </marker>
  </defs>
</svg>
