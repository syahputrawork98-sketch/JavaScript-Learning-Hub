<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">SAFETY VALVES (ES2020 RELIABILITY)</text>

  <!-- Data Pipe 1 -->
  <g transform="translate(100, 100)">
    <rect width="250" height="60" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="5"/>
    <text x="125" y="35" fill="#94a3b8" font-family="Courier New" font-size="16" text-anchor="middle">data?.user?.id</text>
    
    <!-- The Valve (Optional Chaining) -->
    <path d="M 125 60 L 125 100" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow-opt)"/>
    <circle cx="125" cy="120" r="15" fill="#38bdf8"/>
    <text x="125" y="150" fill="#38bdf8" font-family="Arial" font-size="12" text-anchor="middle">SAFE SKIP IF NULL</text>
  </g>

  <!-- Data Pipe 2 -->
  <g transform="translate(450, 100)">
    <rect width="250" height="60" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="5"/>
    <text x="125" y="35" fill="#94a3b8" font-family="Courier New" font-size="16" text-anchor="middle">load ?? 100</text>
    
    <!-- The Valve (Nullish Coalescing) -->
    <path d="M 125 60 L 125 100" stroke="#fbbf24" stroke-width="4" marker-end="url(#arrow-null)"/>
    <rect x="110" y="110" width="30" height="20" fill="#fbbf24"/>
    <text x="125" y="150" fill="#fbbf24" font-family="Arial" font-size="12" text-anchor="middle">FALLBACK IF UNDEF/NULL</text>
  </g>

  <defs>
    <marker id="arrow-opt" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8" />
    </marker>
    <marker id="arrow-null" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" />
    </marker>
  </defs>
</svg>
