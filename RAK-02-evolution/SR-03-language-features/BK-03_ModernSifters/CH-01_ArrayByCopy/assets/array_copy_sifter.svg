<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#94a3b8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">NON-DESTRUCTIVE SIFTING (ARRAY BY COPY)</text>

  <!-- Input Data (Original) -->
  <rect x="50" y="120" width="200" height="60" fill="#1e293b" stroke="#f43f5e" stroke-width="2" rx="5"/>
  <text x="150" y="155" fill="#f43f5e" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">ORIGINAL ARRAY</text>

  <!-- The Machine (Sifter) -->
  <g transform="translate(300, 100)">
    <rect width="200" height="200" fill="#1e293b" stroke="#38bdf8" stroke-width="4" rx="20"/>
    <text x="100" y="110" fill="#38bdf8" font-family="Courier New" font-size="14" text-anchor="middle">.toSorted()</text>
    <text x="100" y="140" fill="#38bdf8" font-family="Courier New" font-size="14" text-anchor="middle">.toReversed()</text>
  </g>

  <!-- Output Data (Safe Copy) -->
  <rect x="550" y="120" width="200" height="60" fill="#1e293b" stroke="#34d399" stroke-width="2" rx="5"/>
  <text x="650" y="155" fill="#34d399" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">PERFECT COPY</text>

  <!-- Internal Safety Line -->
  <path d="M 250 150 L 300 150" stroke="#64748b" stroke-width="2" stroke-dasharray="5,5"/>
  <path d="M 500 150 L 550 150" stroke="#34d399" stroke-width="4" marker-end="url(#arrow-copy)"/>

  <defs>
    <marker id="arrow-copy" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
    </marker>
  </defs>
</svg>
