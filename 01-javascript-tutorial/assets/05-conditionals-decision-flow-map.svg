<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Conditionals Decision Flow Map</title>
  <desc id="desc">Alur keputusan if, else if, else, dan kapan memakai ternary.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 10; }
      .diamond { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .h { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .t { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #64748b; stroke-width: 2.4; fill: none; marker-end: url(#a); }
      .yesno { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #334155; }
    </style>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="980" height="420" />
  <text class="title" x="28" y="42">05 Conditionals 🧭</text>

  <polygon class="diamond" points="420,88 560,88 630,140 560,192 420,192 350,140" />
  <text class="h" x="430" y="136">Kondisi `if` terpenuhi?</text>
  <text class="t" x="462" y="156">contoh: score &gt;= 80</text>

  <rect class="box" x="704" y="112" width="220" height="56" />
  <text class="h" x="724" y="145">Jalankan blok `if`</text>

  <rect class="box" x="360" y="246" width="260" height="62" />
  <text class="h" x="380" y="278">Cek `else if` berikutnya</text>
  <text class="t" x="380" y="296">Ulangi pola sampai kondisi cocok</text>

  <rect class="box" x="40" y="246" width="260" height="62" />
  <text class="h" x="60" y="278">Jalankan blok `else`</text>
  <text class="t" x="60" y="296">Default saat semua salah</text>

  <rect class="box" x="704" y="246" width="220" height="94" />
  <text class="h" x="724" y="276">Ternary?</text>
  <text class="t" x="724" y="298">Pakai jika keputusan sederhana</text>
  <text class="t" x="724" y="318">`cond ? A : B`</text>

  <path class="arrow" d="M630 140 L704 140" />
  <text class="yesno" x="664" y="128">YA</text>

  <path class="arrow" d="M490 192 L490 246" />
  <text class="yesno" x="502" y="226">TIDAK</text>

  <path class="arrow" d="M360 278 L300 278" />
  <path class="arrow" d="M620 278 L704 278" />
</svg>
