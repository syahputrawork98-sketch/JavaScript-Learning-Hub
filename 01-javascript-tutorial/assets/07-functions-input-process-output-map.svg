<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Functions Input Process Output Map</title>
  <desc id="desc">Peta fungsi sebagai input, process, output dengan parameter dan return value.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 10; }
      .h { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .t { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#a); }
      .note { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #334155; }
    </style>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="980" height="360" />
  <text class="title" x="28" y="42">07 Functions 🧠</text>

  <rect class="box" x="28" y="92" width="250" height="140" />
  <text class="h" x="48" y="124">Input</text>
  <text class="t" x="48" y="148">Parameter: `a`, `b`, `name`</text>
  <text class="t" x="48" y="170">Argumen dikirim saat function dipanggil</text>

  <rect class="box" x="364" y="92" width="250" height="140" />
  <text class="h" x="384" y="124">Process</text>
  <text class="t" x="384" y="148">Logika di dalam function body</text>
  <text class="t" x="384" y="170">Contoh: hitung total / format teks</text>

  <rect class="box" x="700" y="92" width="250" height="140" />
  <text class="h" x="720" y="124">Output</text>
  <text class="t" x="720" y="148">`return` mengirim hasil keluar</text>
  <text class="t" x="720" y="170">Tanpa `return` -> `undefined`</text>

  <path class="arrow" d="M278 162 L364 162" />
  <path class="arrow" d="M614 162 L700 162" />

  <rect class="box" x="28" y="254" width="922" height="78" />
  <text class="note" x="48" y="284">Ringkas: function membungkus logika agar bisa dipakai ulang dengan input berbeda dan output yang konsisten.</text>
</svg>
