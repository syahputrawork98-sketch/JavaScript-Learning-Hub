<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Learning Flow - JavaScript Tutorial</title>
  <desc id="desc">Hybrid flow diagram with clear progression, checkpoint branching, and retry loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1f2937"/>
    </marker>
    <style>
      .title{font:700 32px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#0f172a}
      .subtitle{font:500 17px 'Segoe UI',sans-serif;fill:#334155}
      .card{fill:url(#card);stroke:#1e293b;stroke-width:2;rx:14;filter:url(#shadow)}
      .ok{fill:#dcfce7;stroke:#166534;stroke-width:2;rx:14;filter:url(#shadow)}
      .retry{fill:#fee2e2;stroke:#991b1b;stroke-width:2;rx:14;filter:url(#shadow)}
      .question{fill:#e0f2fe;stroke:#075985;stroke-width:2.2;rx:14;filter:url(#shadow)}
      .h{font:700 20px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#0f172a}
      .p{font:500 15px 'Segoe UI',sans-serif;fill:#334155}
      .arrow{stroke:#1f2937;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .label{font:600 14px 'Segoe UI',sans-serif;fill:#1f2937}
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <text class="title" x="60" y="64">🧠 Learning Flow - 01 JavaScript Tutorial</text>
  <text class="subtitle" x="60" y="92">Belajar runtut, latihan terukur, lanjut hanya saat benar-benar paham.</text>

  <rect class="card" x="70" y="140" width="250" height="92"/>
  <text class="h" x="92" y="176">🚀 Mulai Bab</text>
  <text class="p" x="92" y="202">Tujuan dan konteks dulu</text>

  <rect class="card" x="70" y="266" width="250" height="92"/>
  <text class="h" x="92" y="302">🗺️ Gambaran Besar</text>
  <text class="p" x="92" y="328">Posisi topik di puzzle</text>

  <rect class="card" x="70" y="392" width="250" height="92"/>
  <text class="h" x="92" y="428">🛠️ Konsep + Contoh</text>
  <text class="p" x="92" y="454">Sintaks inti + output</text>

  <rect class="card" x="70" y="518" width="250" height="92"/>
  <text class="h" x="92" y="554">🐞 Debug Corner</text>
  <text class="p" x="92" y="580">Error umum dan solusi</text>

  <rect class="card" x="390" y="518" width="250" height="92"/>
  <text class="h" x="412" y="554">🏋️ Latihan</text>
  <text class="p" x="412" y="580">Mudah - sedang - sulit</text>

  <rect class="question" x="710" y="386" width="300" height="118"/>
  <text class="h" x="742" y="428">🎯 Checkpoint</text>
  <text class="p" x="742" y="456">Sudah paham dan stabil?</text>
  <text class="p" x="742" y="478">Bisa jelaskan sebab-akibat?</text>

  <rect class="ok" x="1040" y="268" width="130" height="88"/>
  <text class="h" x="1070" y="308">✅ Lulus</text>

  <rect class="retry" x="1040" y="530" width="130" height="88"/>
  <text class="h" x="1061" y="570">🔁 Ulang</text>

  <rect class="card" x="1040" y="140" width="130" height="88"/>
  <text class="h" x="1052" y="180">📘 Bab</text>
  <text class="h" x="1056" y="204">Berikut</text>

  <path class="arrow" d="M195 232 L195 266"/>
  <path class="arrow" d="M195 358 L195 392"/>
  <path class="arrow" d="M195 484 L195 518"/>
  <path class="arrow" d="M320 564 L390 564"/>
  <path class="arrow" d="M640 564 C700 564, 680 450, 710 450"/>
  <path class="arrow" d="M1010 424 C1030 424, 1020 312, 1040 312"/>
  <path class="arrow" d="M1010 466 C1030 466, 1020 574, 1040 574"/>
  <path class="arrow" d="M1105 268 L1105 228"/>
  <path class="arrow" d="M1040 574 C850 700, 380 700, 180 640 C90 612, 85 590, 95 574"/>

  <text class="label" x="990" y="408">Ya</text>
  <text class="label" x="985" y="496">Belum</text>
  <text class="label" x="318" y="690">Loop balik ke latihan terarah jika belum lulus checkpoint</text>
</svg>
